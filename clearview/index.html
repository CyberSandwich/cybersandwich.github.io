<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" type="image/png" href="/favicon.png">
<title>ClearView</title>
<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(_){}if(t&&t!=='light')document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="/shared/base.css?v=21">
<style>
body{display:flex;flex-direction:column;align-items:center;min-height:-webkit-fill-available}
.w{max-width:440px;width:100%;padding:20px 20px calc(88px + env(safe-area-inset-bottom,0px))}
.pv-card{padding:20px}
.pv-wrap{display:flex;align-items:center;justify-content:center;min-height:200px;border-radius:12px;overflow:hidden;transition:background .2s}
.pv-wrap canvas{display:block;max-width:100%;height:auto;border-radius:12px}
.empty{display:flex;align-items:center;justify-content:center;padding:48px 20px;color:var(--t4)}
.bg-light .pv-wrap{background:#fff}
.bg-dark .pv-wrap{background:#1a1a1a}
.bg-warm .pv-wrap{background:linear-gradient(135deg,#ffecd2,#fcb69f)}
.bg-cool .pv-wrap{background:linear-gradient(135deg,#e0c3fc,#8ec5fc)}
.actions button{display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;font:500 .9375rem/1 var(--font);color:var(--t2);background:none;border:none;border-bottom:1px solid var(--bdr2);cursor:pointer;text-align:left;transition:background .25s}
.actions button:last-child{border-bottom:none}
.actions button:active{opacity:.7}
@media(hover:hover){.actions button:hover{background:var(--bg2);color:var(--t1)}.chip:hover:not(.active){border-color:var(--t4);color:var(--t2)}.seg:hover:not(.active){color:var(--t2);background:var(--bg2)}}
.seg-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--bdr2)}
.seg-row:last-child{border-bottom:none}
.seg{padding:12px;min-height:46px;display:flex;align-items:center;justify-content:center;font:500 .875rem/1 var(--font);color:var(--t3);background:none;border:none;cursor:pointer;text-align:center;transition:background .2s,color .2s}
.seg.active{background:var(--tab-active);color:var(--tab-active-c)}
.seg:active{opacity:.7}
</style>
</head>
<body>
<div class="w">
<div id="pv" class="card pv-card bg-clear">
<div class="pv-wrap">
<canvas id="cv" style="display:none" role="img" aria-label="Image preview with background removal"></canvas>
<div id="empty" class="empty">
<svg width="48" height="48" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><path d="M12 3v12"/></svg>
</div>
</div>
</div>
<div id="acts" class="card">
<div class="actions">
<button id="psBtn" data-l="Paste"><svg class="id" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg><svg class="ic" viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"/></svg><span>Paste</span></button>
<button id="cpBtn" data-l="Copy"><svg class="id" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg class="ic" viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"/></svg><span>Copy</span></button>
<button id="dlBtn" data-l="Download"><svg class="id" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg><svg class="ic" viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"/></svg><span>Download</span></button>
<button id="rsBtn" data-l="Reset All"><svg class="id" viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg><span>Reset All</span></button>
</div>
</div>
<div id="s2" class="card">
<div class="srow" id="sr-rad">
<label class="slbl"><svg viewBox="0 0 24 24"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M14 3h7v7"/></svg><span id="rad-val"></span></label>
<div class="stepper">
<button class="step-btn" id="rad-dec" aria-label="Decrease Corner Radius"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
<button class="step-btn" id="rad-inc" aria-label="Increase Corner Radius"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
</div>
</div>
<div class="srow" id="sr-shd">
<label class="slbl"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M21 9H9v12"/></svg><span id="shd-val"></span></label>
<div class="stepper">
<button class="step-btn" id="shd-dec" aria-label="Decrease Shadow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
<button class="step-btn" id="shd-inc" aria-label="Increase Shadow"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
</div>
</div>
</div>
<div id="bg-group" role="radiogroup" aria-label="Background">
<div class="card" id="bg-card-1">
<div class="seg-row">
<button class="seg active" id="bg-0" role="radio" aria-checked="true">Clear</button>
<button class="seg" id="bg-1" role="radio" aria-checked="false">Light</button>
<button class="seg" id="bg-2" role="radio" aria-checked="false">Dark</button>
</div>
<div class="seg-row">
<button class="seg" id="bg-5" role="radio" aria-checked="false">Auto</button>
<button class="seg" id="bg-3" role="radio" aria-checked="false">Warm</button>
<button class="seg" id="bg-4" role="radio" aria-checked="false">Cool</button>
</div>
</div>
</div>
<div id="s3" class="card">
<div class="seg-row" id="sr-fmt">
<button class="seg active" id="fmt-0">PNG</button>
<button class="seg" id="fmt-1">JPEG</button>
<button class="seg" id="fmt-2">WebP</button>
</div>
</div>
</div>
<div id="drop-ov" class="drop-overlay" role="status" aria-live="assertive">
<svg width="48" height="48" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg>
Drop Image Here
</div>
<nav class="fx-bottom">
<div class="tabs" aria-label="ClearView">
<a href="/">Home</a>
<a class="active">ClearView</a>
</div>
<div class="tabs"><button id="theme-btn" class="theme-toggle" aria-label="Toggle Theme"></button></div>
</nav>
<script src="/shared/base.js?v=21"></script>
<script>
var $=function(s){return document.getElementById(s)};

var img=null,blobUrl=null;
var bgMode=0,radiusIdx=4,shadowIdx=4,fmtIdx=0;

var RAD_PCT=[0,2,4,6,8,10,14,18,22,26,30];
var SHD_PCT=[0,1,2,3,5,7,9,12,15,18];
var BG_NAMES=['Clear','Light','Dark','Warm','Cool','Auto'];
var BG_CLS=['bg-clear','bg-light','bg-dark','bg-warm','bg-cool','bg-auto'];
var BG_GRAD=[null,null,null,['#ffecd2','#fcb69f'],['#e0c3fc','#8ec5fc'],null];
var autoGrad=null;
var FMT_NAMES=['PNG','JPEG','WebP'];
var FMT_MIME=['image/png','image/jpeg','image/webp'];
var FMT_QUAL=[undefined,0.92,0.92];
var FMT_EXT=['png','jpeg','webp'];
var MAX_DIM=8192;

var canvas=$('cv'),ctx=canvas.getContext('2d'),emptyEl=$('empty');
var pv=$('pv'),ov=$('drop-ov');
var cpBtn=$('cpBtn'),dlBtn=$('dlBtn'),psBtn=$('psBtn'),rsBtn=$('rsBtn');
var dlA=document.createElement('a');dlA.style.display='none';document.body.appendChild(dlA);


function rrPath(c,x,y,w,h,r){
r=Math.min(r,w/2,h/2);
c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);
c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);
c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);
c.arcTo(x,y,x+r,y,r);c.closePath()
}

function render(){
var pw=document.querySelector('.pv-wrap');
if(!img){canvas.style.display='none';emptyEl.style.display='';pw.style.background='';return}
emptyEl.style.display='none';canvas.style.display='block';
pw.style.background='none';
var cw=img.naturalWidth,ch=img.naturalHeight;
var minD=Math.min(cw,ch);
var rad=Math.round(minD*RAD_PCT[radiusIdx]/100);
var shd=Math.round(minD*SHD_PCT[shadowIdx]/100);
var se=shd>0?Math.ceil(shd*3):0;
var ow=cw+se*2,oh=ch+se*2;
if(ow>MAX_DIM||oh>MAX_DIM){
var s=Math.min(MAX_DIM/ow,MAX_DIM/oh);
cw=Math.round(img.naturalWidth*s);ch=Math.round(img.naturalHeight*s);
minD=Math.min(cw,ch);
rad=Math.round(minD*RAD_PCT[radiusIdx]/100);
shd=Math.round(minD*SHD_PCT[shadowIdx]/100);
se=shd>0?Math.ceil(shd*3):0;
ow=cw+se*2;oh=ch+se*2
}
canvas.width=ow;canvas.height=oh;
ctx.clearRect(0,0,ow,oh);
var ix=se,iy=se;
var dk=bgMode===2;
var gr=bgMode===5?autoGrad:BG_GRAD[bgMode];
if(bgMode===1){ctx.fillStyle='#fff';ctx.fillRect(0,0,ow,oh)}
else if(dk){ctx.fillStyle='#1a1a1a';ctx.fillRect(0,0,ow,oh)}
else if(gr){var grd=ctx.createLinearGradient(0,0,ow,oh);grd.addColorStop(0,gr[0]);grd.addColorStop(1,gr[1]);ctx.fillStyle=grd;ctx.fillRect(0,0,ow,oh)}
if(shd>0){
ctx.save();
ctx.shadowColor=dk?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.28)';
ctx.shadowBlur=shd*2;ctx.shadowOffsetX=0;ctx.shadowOffsetY=dk?0:Math.round(shd*0.6);
rrPath(ctx,ix,iy,cw,ch,rad);ctx.fillStyle=dk?'#1a1a1a':'#fff';ctx.fill();
ctx.restore();
ctx.save();
ctx.shadowColor=dk?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)';
ctx.shadowBlur=Math.round(shd*0.6);ctx.shadowOffsetX=0;ctx.shadowOffsetY=dk?0:Math.round(shd*0.15);
rrPath(ctx,ix,iy,cw,ch,rad);ctx.fillStyle=dk?'#1a1a1a':'#fff';ctx.fill();
ctx.restore()
}
ctx.save();
rrPath(ctx,ix,iy,cw,ch,rad);
ctx.clip();
ctx.drawImage(img,ix,iy,cw,ch);
ctx.strokeStyle=dk?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.08)';
ctx.lineWidth=1;
ctx.stroke();
ctx.restore()
}



function computeAutoGrad(){
if(!img){autoGrad=null;return}
var sc=document.createElement('canvas'),sw=16,sh=16;
sc.width=sw;sc.height=sh;
var sctx=sc.getContext('2d');
sctx.drawImage(img,0,0,sw,sh);
var d=sctx.getImageData(0,0,sw,sh).data;
var bestSat=0,hr=128,hg=128,hb=128;
for(var i=0;i<d.length;i+=4){
var r=d[i],g=d[i+1],b=d[i+2];
var mx=Math.max(r,g,b),mn=Math.min(r,g,b);
var sat=mx>0?(mx-mn)/mx:0;
if(sat>bestSat){bestSat=sat;hr=r;hg=g;hb=b}
}
var r1=hr/255,g1=hg/255,b1=hb/255;
var mx2=Math.max(r1,g1,b1),mn2=Math.min(r1,g1,b1);
var h=0,s=0;
if(mx2!==mn2){
var dd=mx2-mn2;
s=(mx2+mn2)>1?dd/(2-mx2-mn2):dd/(mx2+mn2);
if(mx2===r1)h=((g1-b1)/dd+(g1<b1?6:0))/6;
else if(mx2===g1)h=((b1-r1)/dd+2)/6;
else h=((r1-g1)/dd+4)/6
}
if(s<0.08){h=220/360;s=0.3}
else{s=Math.max(s,0.35)}
autoGrad=[
'hsl('+Math.round(h*360)+','+Math.round(s*100)+'%,90%)',
'hsl('+Math.round((h*360+25)%360)+','+Math.round(s*100)+'%,83%)'
]
}

function loadImg(file){
if(!file||!file.type.startsWith('image/')){_base.notify('Invalid Image',false);return}
if(blobUrl)URL.revokeObjectURL(blobUrl);
blobUrl=URL.createObjectURL(file);
var i=new Image();
i.onload=function(){img=i;computeAutoGrad();if(bgMode===5)setBg(5);else render()};
i.onerror=function(){URL.revokeObjectURL(blobUrl);blobUrl=null;_base.notify('Failed to Load Image',false)};
i.src=blobUrl
}

_base.setupDragDrop({overlay:ov,onDrop:function(files){
  if(files&&files.length){var f=files[0];if(f.type.startsWith('image/'))loadImg(f)}
}});

document.addEventListener('paste',function(e){
var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
for(var i=0;i<items.length;i++){if(items[i].type.startsWith('image/')){e.preventDefault();var f=items[i].getAsFile();if(f){loadImg(f);_base.feedback(psBtn,'ps-fb','Pasted')}return}}
});

function pasteClipboard(){
if(!navigator.clipboard||!navigator.clipboard.read){_base.notify('Clipboard Not Available',false);return}
psBtn.classList.add('ld');psBtn.querySelector('span').textContent='Reading\u2026';
navigator.clipboard.read().then(function(items){
for(var i=0;i<items.length;i++){var types=items[i].types;for(var j=0;j<types.length;j++){if(types[j].startsWith('image/')){items[i].getType(types[j]).then(function(blob){
loadImg(new File([blob],'paste.png',{type:blob.type}));
_base.feedback(psBtn,'ps-fb','Pasted')
});return}}}
psBtn.classList.remove('ld');psBtn.querySelector('span').textContent=psBtn.dataset.l;
_base.notify('No Image in Clipboard',false)
}).catch(function(){
psBtn.classList.remove('ld');psBtn.querySelector('span').textContent=psBtn.dataset.l;
_base.notify('Clipboard Not Available',false)
})
}
psBtn.addEventListener('click',pasteClipboard);

function setBg(m){
bgMode=m;BG_CLS.forEach(function(c){pv.classList.remove(c)});pv.classList.add(BG_CLS[m]);
BG_NAMES.forEach(function(n,i){
var el=$('bg-'+i);
el.classList.toggle('active',i===m);
el.setAttribute('aria-checked',i===m?'true':'false')
})
render()
}
BG_NAMES.forEach(function(n,i){$('bg-'+i).addEventListener('click',function(){setBg(i)})});
function rowKey(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();e.stopPropagation();var row=e.target.closest('.srow');if(row)row.click()}}
$('bg-group').addEventListener('keydown',rowKey);

function updateRadUI(){
var v=RAD_PCT[radiusIdx];
$('rad-val').textContent=v===0?'None':v+'% Radius';
$('rad-dec').disabled=radiusIdx===0;
$('rad-inc').disabled=radiusIdx===RAD_PCT.length-1
}
function updateShdUI(){
var v=SHD_PCT[shadowIdx];
$('shd-val').textContent=v===0?'Off':v+'% Shadow';
$('shd-dec').disabled=shadowIdx===0;
$('shd-inc').disabled=shadowIdx===SHD_PCT.length-1
}
updateRadUI();updateShdUI();

$('rad-dec').addEventListener('click',function(){if(radiusIdx>0){radiusIdx--;updateRadUI();render()}});
$('rad-inc').addEventListener('click',function(){if(radiusIdx<RAD_PCT.length-1){radiusIdx++;updateRadUI();render()}});
$('shd-dec').addEventListener('click',function(){if(shadowIdx>0){shadowIdx--;updateShdUI();render()}});
$('shd-inc').addEventListener('click',function(){if(shadowIdx<SHD_PCT.length-1){shadowIdx++;updateShdUI();render()}});

function setFmt(i){
fmtIdx=i;
FMT_NAMES.forEach(function(n,j){$('fmt-'+j).classList.toggle('active',j===i)})
}
FMT_NAMES.forEach(function(n,i){$('fmt-'+i).addEventListener('click',function(){setFmt(i)})});

var RESET_IC='<svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>';
var groups=[
{_row:$('sr-rad'),_reset:function(){radiusIdx=4;updateRadUI();render()}},
{_row:$('sr-shd'),_reset:function(){shadowIdx=4;updateShdUI();render()}}
];
function animateReset(g){
var row=g._row,lbl=row.querySelector('.slbl'),ic=lbl.querySelector('svg');
if(!ic)return;
var orig=ic.outerHTML;
var t=document.createElement('template');t.innerHTML=RESET_IC;
ic.replaceWith(t.content.firstChild);
row.classList.remove('rs-fb');void row.offsetWidth;row.classList.add('rs-fb');
clearTimeout(g._ft);
g._ft=setTimeout(function(){row.classList.remove('rs-fb');var cur=lbl.querySelector('svg');if(cur){var t2=document.createElement('template');t2.innerHTML=orig;cur.replaceWith(t2.content.firstChild)}},600)
}
function resetGroup(g){g._reset();animateReset(g)}
groups.forEach(function(g){
g._row.addEventListener('click',function(e){if(!e.target.closest('button')&&g._reset)resetGroup(g)})
});

function doExport(cb){
if(fmtIdx===1&&bgMode===0){
var tmp=document.createElement('canvas');
tmp.width=canvas.width;tmp.height=canvas.height;
var tc=tmp.getContext('2d');
tc.fillStyle='#fff';tc.fillRect(0,0,tmp.width,tmp.height);
tc.drawImage(canvas,0,0);
tmp.toBlob(cb,FMT_MIME[fmtIdx],FMT_QUAL[fmtIdx])
}else{
canvas.toBlob(cb,FMT_MIME[fmtIdx],FMT_QUAL[fmtIdx])
}
}

function copyToClipboard(){
if(!img)return;
if(!navigator.clipboard||!navigator.clipboard.write){_base.notify('Clipboard Not Available',false);return}
navigator.clipboard.write([new ClipboardItem({'image/png':new Promise(function(resolve,reject){
canvas.toBlob(function(b){if(b)resolve(b);else reject()},'image/png')
})})]).then(
function(){_base.notify('Copied to Clipboard',true)},
function(){_base.notify('Copy Failed',false)})
}

pv.addEventListener('click',function(e){
if(!img||e.target.closest('button'))return;
copyToClipboard()
});

cpBtn.addEventListener('click',function(){
if(!img){_base.notify('No Image Loaded',false);return}
if(!navigator.clipboard||!navigator.clipboard.write){_base.notify('Clipboard Not Available',false);return}
navigator.clipboard.write([new ClipboardItem({'image/png':new Promise(function(resolve,reject){
canvas.toBlob(function(b){if(b)resolve(b);else reject()},'image/png')
})})]).then(
function(){_base.feedback(cpBtn,'ok','Copied')},
function(){_base.notify('Copy Failed',false)})
});

dlBtn.addEventListener('click',function(){
if(!img){_base.notify('No Image Loaded',false);return}
doExport(function(b){
if(!b){_base.notify('Export Failed',false);return}
var u=URL.createObjectURL(b);
dlA.download='clearview.'+FMT_EXT[fmtIdx];dlA.href=u;dlA.click();
setTimeout(function(){URL.revokeObjectURL(u)},1e4);
_base.feedback(dlBtn,'dl-fb','Downloaded')
})
});

var resetCtrl=_base.twoPress(rsBtn,{
text:'Reset All',
guard:function(){return !!img},
onConfirm:function(){
img=null;if(blobUrl){URL.revokeObjectURL(blobUrl);blobUrl=null}
render();setBg(0);radiusIdx=4;shadowIdx=4;
updateRadUI();updateShdUI();setFmt(0);
groups.forEach(function(g){if(g._ft)clearTimeout(g._ft)});
groups.forEach(function(g){animateReset(g)});
}
});
function resetAll(){resetCtrl.press()}
rsBtn.addEventListener('click',resetAll);

_base.onKey({ctrl:{s:function(e){e.preventDefault();if(img)dlBtn.click()},c:function(e){if(!getSelection().toString()){e.preventDefault();if(img)cpBtn.click()}}},Escape:function(){var n=document.querySelector('.notif');if(n)n.click()},v:function(){pasteClipboard()},' ':function(e){if(img){e.preventDefault();copyToClipboard()}},Enter:function(e){if(img){e.preventDefault();copyToClipboard()}},d:function(){if(img)dlBtn.click()},c:function(){if(img)cpBtn.click()},r:function(){if(img)resetAll()},'0':function(){if(img)resetAll()},x:function(){if(img)setBg(0)},l:function(){if(img)setBg(1)},b:function(){if(img)setBg(2)},'3':function(){if(img)setBg(3)},'4':function(){if(img)setBg(4)},a:function(){if(img)setBg(5)},p:function(){if(img)setFmt(0)},j:function(){if(img)setFmt(1)},w:function(){if(img)setFmt(2)},'=':function(){if(img&&radiusIdx<RAD_PCT.length-1){radiusIdx++;updateRadUI();render()}},'-':function(){if(img&&radiusIdx>0){radiusIdx--;updateRadUI();render()}},"'":function(){if(img&&shadowIdx<SHD_PCT.length-1){shadowIdx++;updateShdUI();render()}},';':function(){if(img&&shadowIdx>0){shadowIdx--;updateShdUI();render()}}});
</script>
</body>
</html>
