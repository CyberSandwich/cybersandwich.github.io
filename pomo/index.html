<style>
body{display:flex;align-items:flex-start;justify-content:center}
.w{max-width:440px;padding:20px 20px calc(100px + env(safe-area-inset-bottom,0px));width:100%}
.preset-card{display:grid;grid-template-columns:1fr 1fr}
.preset{padding:16px 14px;background:none;border:none;border-right:1px solid var(--bdr2);border-bottom:1px solid var(--bdr2);cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:4px;transition:background .15s}
.preset:nth-child(2n){border-right:none}
.preset:nth-last-child(-n+2){border-bottom:none}
.preset:active{opacity:.7}
@media(hover:hover){.preset:hover{background:var(--bg2)}}
.p-name{font:600 .9375rem/1 var(--font);color:var(--t1)}
.p-spec{font:400 .8125rem/1 var(--font);color:var(--t3);font-variant-numeric:tabular-nums}
.items{display:flex;flex-direction:column;gap:14px}
.items .item{margin-bottom:0}
.item{transition:opacity .2s ease,box-shadow .2s ease;
  --p-c:#3B82F6;--p-bg:rgba(59,130,246,.12)}
.item[data-phase="break"]{--p-c:#10B981;--p-bg:rgba(16,185,129,.12)}
.item[data-phase="long"]{--p-c:#A855F7;--p-bg:rgba(168,85,247,.12)}
.item[data-phase="done"]{--p-c:var(--t4);--p-bg:transparent;opacity:.6}
html[data-theme="dark"] .item{--p-c:#60A5FA;--p-bg:rgba(96,165,250,.16)}
html[data-theme="dark"] .item[data-phase="break"]{--p-c:#34D399;--p-bg:rgba(52,211,153,.16)}
html[data-theme="dark"] .item[data-phase="long"]{--p-c:#C4B5FD;--p-bg:rgba(196,181,253,.16)}
html[data-theme="sepia"] .item{--p-c:#4A7AA5;--p-bg:rgba(74,122,165,.14)}
html[data-theme="sepia"] .item[data-phase="break"]{--p-c:#3F6212;--p-bg:rgba(63,98,18,.14)}
html[data-theme="sepia"] .item[data-phase="long"]{--p-c:#7C5BAD;--p-bg:rgba(124,91,173,.14)}
.item.kb-focus{outline:2px solid var(--acc);outline-offset:2px}
.item.removing{opacity:0;transition:opacity .15s ease}
.item-head{display:flex;align-items:center;padding:14px 16px 4px 20px;gap:12px}
.item-info{flex:1;min-width:0}
.item-title{font:600 1rem/1.3 var(--font);color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.del{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bdr);background:var(--bg2);cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s,background .15s,border-color .15s;padding:0}
.del svg{width:13px;height:13px;pointer-events:none}
.del:active{opacity:.7}
@media(hover:hover){.del:hover{color:var(--t1);background:var(--bg2);border-color:var(--t4)}}
.ring-zone{position:relative;width:100%;padding:8px 16px 14px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.ring-zone:active .ring-time{opacity:.7}
.ring-zone .ring{display:block;width:200px;height:200px;transform:rotate(-90deg)}
.ring-track{stroke:var(--bdr);stroke-width:5;fill:none}
.ring-arc{stroke:var(--p-c);stroke-width:5;fill:none;stroke-linecap:round;stroke-dasharray:1000 1000;transition:stroke .25s ease}
.item[data-paused="1"] .ring-arc,.item[data-paused="1"] .ring-time{color:var(--t3);stroke:var(--t3)}
.item[data-paused="1"] .dots .d.on{background:var(--t3)}
.ring-center{position:absolute;display:flex;align-items:center;justify-content:center;pointer-events:none}
.ring-time{font:600 clamp(2rem,8vw,2.75rem)/1 var(--font);color:var(--t1);font-variant-numeric:tabular-nums;letter-spacing:-.02em;transition:opacity .15s,color .25s ease}
.item[data-phase="done"] .ring-time{font-size:1.25rem;color:var(--t3)}
.item-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 14px;gap:12px}
.dots{display:flex;gap:5px;align-items:center}
.dots .d{width:7px;height:7px;border-radius:50%;background:var(--bdr);transition:background .25s ease}
.dots .d.on{background:var(--p-c)}
.dots-text{font:500 .8125rem/1 var(--font);color:var(--t3);font-variant-numeric:tabular-nums}
.act-skip{padding:8px 16px;border-radius:var(--rr);border:1.5px solid var(--bdr);background:var(--card);color:var(--t2);font:500 .8125rem/1 var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .15s,border-color .15s,background .15s}
.act-skip svg{width:13px;height:13px;color:var(--t4)}
.act-skip:active{opacity:.7}
.act-skip:disabled{opacity:.35;cursor:not-allowed}
@media(hover:hover){.act-skip:hover:not(:disabled){color:var(--t1);border-color:var(--t4)}.act-skip:hover:not(:disabled) svg{color:var(--t2)}}
.item.boundary .ring-arc{animation:pulse-ring .55s ease}
@keyframes pulse-ring{0%{stroke-width:5}40%{stroke-width:8}100%{stroke-width:5}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
@media(hover:hover){.item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.08)}}
@media(prefers-reduced-motion:reduce){
  .item.boundary .ring-arc{animation:none}
  .dots .d{transition:none}
  .ring-time{transition:none}
}
</style>

<script>
(function(){'use strict';
function $(id){return document.getElementById(id)}
var SVG_NS='http://www.w3.org/2000/svg';

/* ── Constants ───────────────────────────────────────────────────── */
var STORAGE_KEY='pomo-items',SETTINGS_KEY='pomo:settings';
var DEFAULTS={focus:1500,brk:300,long:900,cycles:4};
var LIMITS={focusMin:60,focusMax:14400,brkMin:0,brkMax:3600,longMin:0,longMax:10800,cyclesMin:1,cyclesMax:12};
var DOT_THRESHOLD=8;
var RING_TOTAL=1000;
var FRAME_QUANTUM=8;
var TITLE_THROTTLE=1000;
var REMOVE_ANIM=150;
var BOUNDARY_ANIM=600;
var BC_NAME='pomo';
var SCHEMA_VERSION=1;
var SAVE_DEBOUNCE=250;
var BG_MIN_TIMEOUT=1000;
var LEADER_LOCK='pomo:leader';

/* ── State ───────────────────────────────────────────────────────── */
var items=[],settings={sound:true,vibrate:true};
var rafId=null,wakeLock=null,audioCtx=null;
var kbIdx=-1;
var parseCache=new Map();
var bc=null;
var titleLast=0,titleLastText='';
var ioObserver=null,visibleIds=Object.create(null);
var isLeader=false,leaderRelease=null;

/* ── Storage ─────────────────────────────────────────────────────── */
function migrate(raw){
  if(Array.isArray(raw))return raw;
  if(raw&&typeof raw==='object'&&Array.isArray(raw.items))return raw.items;
  return [];
}
function integrityCheck(arr){
  var validPhases={focus:1,'break':1,'long':1,done:1},issues=0;
  var clean=arr.filter(function(s){
    if(!s||!s.id||!validPhases[s.phase])return(issues++,false);
    if(typeof s.focus!=='number'||typeof s.brk!=='number'||typeof s.long!=='number'||typeof s.cycles!=='number')return(issues++,false);
    if(s.cycleIdx>s.cycles+1||s.cycleIdx<0)return(issues++,false);
    if(s.endsAt!=null&&s.startedAt!=null&&s.endsAt<s.startedAt-1000)return(issues++,false);
    return true;
  });
  if(issues)console.warn('[Pomo] Dropped '+issues+' corrupt session(s) on load');
  return clean;
}
function load(){
  var raw=_base.load(STORAGE_KEY,null);
  items=integrityCheck(migrate(raw));
  var st=_base.load(SETTINGS_KEY,null);
  if(st&&typeof st==='object'){
    if(typeof st.sound==='boolean')settings.sound=st.sound;
    if(typeof st.vibrate==='boolean')settings.vibrate=st.vibrate;
  }
}
var saveTimer=null;
function saveNow(){
  saveTimer=null;
  try{
    var snap=items.map(function(s){
      var c={};for(var k in s)if(k.charAt(0)!=='_')c[k]=s[k];return c;
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify({v:SCHEMA_VERSION,items:snap}));
    bcNotify();
  }catch(err){if(err.name==='QuotaExceededError')_base.notify('Storage Full',false)}
}
function save(){if(saveTimer)return;saveTimer=setTimeout(saveNow,SAVE_DEBOUNCE)}
function flushSave(){if(saveTimer){clearTimeout(saveTimer);saveNow()}}

/* ── Utils ───────────────────────────────────────────────────────── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function announce(msg){var el=$('status');el.textContent='';requestAnimationFrame(function(){el.textContent=msg})}
function fmtTime(s){
  s=Math.max(0,Math.ceil(s));
  if(s>=3600){
    var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    return h+':'+(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
  }
  var m2=Math.floor(s/60),s2=s%60;
  return m2+':'+(s2<10?'0':'')+s2;
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

/* ── SVG helpers ─────────────────────────────────────────────────── */
function mkSvg(w,h){
  var s=document.createElementNS(SVG_NS,'svg');
  s.setAttribute('width',w);s.setAttribute('height',h);
  s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');
  s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','2');
  s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
  s.setAttribute('aria-hidden','true');
  return s;
}
function mkPoly(points){var p=document.createElementNS(SVG_NS,'polygon');p.setAttribute('points',points);return p}
function mkLine(x1,y1,x2,y2){var l=document.createElementNS(SVG_NS,'line');l.setAttribute('x1',x1);l.setAttribute('x2',x2);l.setAttribute('y1',y1);l.setAttribute('y2',y2);return l}
function mkSkipSvg(){var s=mkSvg(13,13);s.appendChild(mkPoly('5 4 15 12 5 20 5 4'));s.appendChild(mkLine(19,5,19,19));return s}

/* ── Phase Machine ───────────────────────────────────────────────── */
function durFor(s,phase){
  if(phase==='focus')return s.focus;
  if(phase==='break')return s.brk;
  if(phase==='long')return s.long;
  return 0;
}
function advancePhase(s){
  var oldEnds=s.endsAt,nextPhase,nextDur;
  if(s.phase==='focus'){
    s.cycleIdx++;
    nextPhase=(s.cycleIdx===s.cycles)?'long':'break';
    nextDur=durFor(s,nextPhase);
  }else if(s.phase==='break'){
    nextPhase='focus';nextDur=durFor(s,nextPhase);
  }else if(s.phase==='long'){
    s.phase='done';s.startedAt=oldEnds;s.endsAt=oldEnds;return;
  }else return;
  s.phase=nextPhase;s.startedAt=oldEnds;s.endsAt=oldEnds+nextDur*1000;
}
function catchUp(s,now){
  var boundaries=0,landedDone=false,iters=0;
  while(s.phase!=='done'&&s.pausedAt==null&&s.endsAt<=now&&iters<1024){
    advancePhase(s);
    boundaries++;iters++;
    if(s.phase==='done'){landedDone=true;break}
  }
  return{boundaries:boundaries,done:landedDone};
}
function liveRemaining(s,now){
  if(s.phase==='done')return 0;
  if(s.pausedAt!=null)return s.remaining||0;
  return Math.max(0,(s.endsAt-now)/1000);
}
function liveProgress(s,now){
  if(s.phase==='done')return 1;
  var dur=durFor(s,s.phase);
  if(dur<=0)return 1;
  var rem=liveRemaining(s,now);
  return clamp(1-rem/dur,0,1);
}
function anyRunning(){
  for(var i=0;i<items.length;i++){
    var s=items[i];
    if(s.phase!=='done'&&s.pausedAt==null)return true;
  }
  return false;
}

/* ── Parser ──────────────────────────────────────────────────────── */
var POMO_DICT={};
(function(){
  var arr=['focus','work','deep','study','session','pomodoro','pomo','break','short','rest','pause','long','big','rounds','round','cycles','cycle','sets','set','reps','rep','min','mins','minute','minutes','hr','hrs','hour','hours','sec','secs','second','seconds','and','for','x','of','then','classic','sprint'];
  for(var i=0;i<arr.length;i++)POMO_DICT[arr[i]]=true;
})();
var POMO_KEYS=Object.keys(POMO_DICT);
var FIELD_ALIAS={
  focus:'focus',work:'focus',deep:'focus',study:'focus',session:'focus',pomodoro:'focus',pomo:'focus',
  'break':'brk',short:'brk',rest:'brk',pause:'brk',
  'long':'long',big:'long',
  rounds:'cycles',round:'cycles',cycles:'cycles',cycle:'cycles',sets:'cycles',set:'cycles',reps:'cycles',rep:'cycles',x:'cycles'
};
function pomoAutocorrect(text){
  if(!_dp||!_dp.damerau)return text;
  return String(text).replace(/[A-Za-z]+/g,function(token){
    var lower=token.toLowerCase();
    if(POMO_DICT[lower])return token;
    var thr=_dp.getThreshold(lower.length);
    if(thr===0)return token;
    var hit=_dp.fuzzyLookup(lower,POMO_KEYS,thr);
    if(!hit)return token;
    if(token===token.toUpperCase())return hit.toUpperCase();
    if(token.charAt(0)===token.charAt(0).toUpperCase())return hit.charAt(0).toUpperCase()+hit.slice(1);
    return hit;
  });
}
function durToSec(n,unit){
  if(!unit)return n*60;
  var u=unit.toLowerCase();
  if(u.charAt(0)==='h')return n*3600;
  if(u.charAt(0)==='s')return n*1;
  return n*60;
}
function validate(cfg){
  cfg.focus=clamp(Math.round(cfg.focus),LIMITS.focusMin,LIMITS.focusMax);
  cfg.brk=clamp(Math.round(cfg.brk),LIMITS.brkMin,LIMITS.brkMax);
  cfg.long=clamp(Math.round(cfg.long),LIMITS.longMin,LIMITS.longMax);
  cfg.cycles=clamp(Math.round(cfg.cycles),LIMITS.cyclesMin,LIMITS.cyclesMax);
  return cfg;
}
function defaults(){return{title:'',focus:DEFAULTS.focus,brk:DEFAULTS.brk,long:DEFAULTS.long,cycles:DEFAULTS.cycles}}
var TITLE_SEPARATORS=[/\s—\s/,/\s–\s/,/\s\|\s/,/\s-\s/,/\s*:\s/];
function splitTitlePrefix(raw){
  for(var i=0;i<TITLE_SEPARATORS.length;i++){
    var m=raw.split(TITLE_SEPARATORS[i]);
    if(m.length===2){
      var left=m[0].trim(),right=m[1].trim();
      if(!left||!right)continue;
      if(/\d/.test(right)&&!/\d/.test(left))return{title:left,rest:right};
    }
  }
  return null;
}
function splitTrailingSlash(raw){
  var m=raw.match(/^(.*?)\s+(\d+(?:\.\d+)?(?:\s*\/\s*\d+(?:\.\d+)?){1,3})\s*$/);
  if(!m)return null;
  var left=m[1].trim();
  if(!left||/\d/.test(left))return null;
  return{title:left,rest:m[2]};
}
function tokenizePomo(s){
  var tokens=[],i=0,n=s.length;
  while(i<n){
    var ch=s.charAt(i);
    if(ch===' '||ch==='\t'||ch===','||ch===';'||ch==='='||ch===':'){i++;continue}
    if(ch==='/'){tokens.push({kind:'slash',start:i,end:i+1});i++;continue}
    if(ch>='0'&&ch<='9'){
      var ns=i;
      while(i<n&&((s[i]>='0'&&s[i]<='9')||s[i]==='.'))i++;
      var numStr=s.slice(ns,i),val=parseFloat(numStr);
      if(isNaN(val)){tokens.push({kind:'word',value:numStr,start:ns,end:i});continue}
      var us=i,unit=null;
      while(i<n&&((s[i]>='a'&&s[i]<='z')||(s[i]>='A'&&s[i]<='Z')))i++;
      if(i>us){
        var raw=s.slice(us,i).toLowerCase();
        if(/^(h(?:rs?|ours?)?|m(?:in(?:ute)?s?)?|s(?:ec(?:ond)?s?)?)$/.test(raw))unit=raw;
        else i=us;
      }
      tokens.push({kind:'num',value:val,unit:unit,start:ns,end:i});
      continue;
    }
    if((ch>='a'&&ch<='z')||(ch>='A'&&ch<='Z')){
      var ws=i;
      while(i<n&&((s[i]>='a'&&s[i]<='z')||(s[i]>='A'&&s[i]<='Z')))i++;
      var word=s.slice(ws,i),lower=word.toLowerCase();
      var sing=lower.replace(/s$/,'');
      var key=FIELD_ALIAS[lower]||FIELD_ALIAS[sing];
      if(key)tokens.push({kind:'label',value:key,start:ws,end:i});
      else tokens.push({kind:'word',value:word,start:ws,end:i});
      continue;
    }
    i++;
  }
  return tokens;
}
function parseFromTokens(tokens){
  if(!tokens.length)return null;
  var cfg=defaults(),found=false;
  for(var i=0;i<tokens.length;i++){
    if(tokens[i].kind!=='label')continue;
    var next=tokens[i+1];
    if(!next||next.kind!=='num')continue;
    var key=tokens[i].value,n=next.value,u=next.unit;
    if(key==='cycles')cfg.cycles=n;
    else cfg[key]=durToSec(n,u);
    found=true;
    tokens[i].consumed=true;next.consumed=true;
    i++;
  }
  if(found)return cfg;
  var nums=[],hasSlash=false;
  for(var j=0;j<tokens.length;j++){
    var t=tokens[j];
    if(t.kind==='num')nums.push(t);
    else if(t.kind==='slash')hasSlash=true;
    else if(t.kind==='label')return null;
  }
  if(!nums.length)return null;
  if(hasSlash){
    if(nums.length>4)return null;
    cfg.focus=nums[0].value*60;
    if(nums[1])cfg.brk=nums[1].value*60;
    if(nums.length===3)cfg.long=nums[2].value*60;
    if(nums.length===4){cfg.cycles=nums[2].value;cfg.long=nums[3].value*60}
    return cfg;
  }
  // Composite "1h30m"
  if(nums.length===2&&nums[0].unit&&nums[0].unit.charAt(0)==='h'&&nums[1].unit&&nums[1].unit.charAt(0)==='m'&&nums[0].end===nums[1].start){
    cfg.focus=durToSec(nums[0].value,'h')+durToSec(nums[1].value,'m');
    return cfg;
  }
  if(nums.length===1){cfg.focus=durToSec(nums[0].value,nums[0].unit);return cfg}
  if(nums.length>=2&&nums.length<=4){
    cfg.focus=durToSec(nums[0].value,nums[0].unit);
    cfg.brk=durToSec(nums[1].value,nums[1].unit);
    if(nums.length===3)cfg.long=durToSec(nums[2].value,nums[2].unit);
    if(nums.length===4){cfg.cycles=nums[2].value;cfg.long=durToSec(nums[3].value,nums[3].unit)}
    return cfg;
  }
  return null;
}
function leftoverFromTokens(tokens){
  var pieces=[];
  for(var i=0;i<tokens.length;i++)if(tokens[i].kind==='word')pieces.push(tokens[i].value);
  return pieces.join(' ').replace(/\s+/g,' ').trim();
}
function parsePomo(raw){
  var input=String(raw||'').trim();
  if(!input)return defaults();
  if(parseCache.has(input))return Object.assign({},parseCache.get(input));
  var result=parsePomoInner(input);
  if(parseCache.size>64)parseCache.clear();
  parseCache.set(input,Object.assign({},result));
  return result;
}
function parsePomoInner(input){
  var corrected=pomoAutocorrect(input);
  var title='';
  var pre=splitTitlePrefix(corrected)||splitTrailingSlash(corrected);
  if(pre){title=pre.title;corrected=pre.rest}
  var tokens=tokenizePomo(corrected);
  var cfg=parseFromTokens(tokens);
  if(cfg){
    if(!title){var leftover=leftoverFromTokens(tokens);if(leftover)title=leftover}
    cfg.title=title;return validate(cfg);
  }
  if(!/\d/.test(corrected)&&corrected.length){
    var d=defaults();d.title=title||corrected.trim();return validate(d);
  }
  var fb=defaults();fb.title=title;fb._fallback=true;return validate(fb);
}

/* ── Render ──────────────────────────────────────────────────────── */
function buildDots(s){
  var n=s.cycles,filled=Math.min(s.cycleIdx,n);
  var wrap=document.createElement('div');
  if(n>DOT_THRESHOLD){
    wrap.className='dots-text';
    wrap.textContent=filled+'/'+n;
    return wrap;
  }
  wrap.className='dots';
  for(var i=0;i<n;i++){
    var d=document.createElement('span');d.className='d'+(i<filled?' on':'');
    wrap.appendChild(d);
  }
  return wrap;
}
function buildItem(s,now){
  var row=document.createElement('div');
  row.className='card item';row.setAttribute('role','listitem');
  row.setAttribute('data-id',s.id);row.setAttribute('data-phase',s.phase);

  // Head: title + delete
  var head=document.createElement('div');head.className='item-head';
  var info=document.createElement('div');info.className='item-info';
  var title=document.createElement('div');title.className='item-title';title.textContent=s.title||'Pomodoro';
  info.appendChild(title);
  var del=document.createElement('button');del.type='button';del.className='del';del.setAttribute('aria-label','Delete');
  del.appendChild(_base.mkX());
  head.appendChild(info);head.appendChild(del);

  // Ring zone: tap to pause
  var zone=document.createElement('div');zone.className='ring-zone';
  zone.setAttribute('role','button');zone.setAttribute('aria-label','Tap to Pause or Resume');
  zone.setAttribute('data-act','toggle');
  var svg=document.createElementNS(SVG_NS,'svg');
  svg.setAttribute('class','ring');svg.setAttribute('viewBox','0 0 200 200');
  var track=document.createElementNS(SVG_NS,'circle');
  track.setAttribute('class','ring-track');track.setAttribute('cx','100');track.setAttribute('cy','100');track.setAttribute('r','86');
  var arc=document.createElementNS(SVG_NS,'circle');
  arc.setAttribute('class','ring-arc');arc.setAttribute('cx','100');arc.setAttribute('cy','100');arc.setAttribute('r','86');
  arc.setAttribute('pathLength',''+RING_TOTAL);
  svg.appendChild(track);svg.appendChild(arc);
  var center=document.createElement('div');center.className='ring-center';
  var time=document.createElement('div');time.className='ring-time';
  center.appendChild(time);
  zone.appendChild(svg);zone.appendChild(center);

  // Foot: dots + skip
  var foot=document.createElement('div');foot.className='item-foot';
  var dots=buildDots(s);
  var skip=document.createElement('button');skip.type='button';skip.className='act-skip';skip.setAttribute('data-act','skip');
  skip.appendChild(mkSkipSvg());
  var skipLbl=document.createElement('span');skipLbl.textContent='Skip';
  skip.appendChild(skipLbl);
  if(s.phase==='done')skip.disabled=true;
  foot.appendChild(dots);foot.appendChild(skip);

  row.appendChild(head);row.appendChild(zone);row.appendChild(foot);

  // Cache refs
  s._el=row;s._arc=arc;s._time=time;
  s._lastTime='';s._lastOffset=-1;s._lastFrame=0;s._lastPaused=null;
  if(s.phase!=='done'&&s.pausedAt==null)arc.style.willChange='stroke-dashoffset';
  else arc.style.willChange='';

  paintCard(s,now);
  return row;
}
function paintCard(s,now){
  if(!s._el)return;
  if(visibleIds[s.id]===false)return;
  if(now-s._lastFrame<FRAME_QUANTUM)return;
  s._lastFrame=now;
  var newText=s.phase==='done'?'Done':fmtTime(liveRemaining(s,now));
  if(s._lastTime!==newText){s._time.textContent=newText;s._lastTime=newText}
  var paused=s.pausedAt!=null?'1':'0';
  if(s._lastPaused!==paused){s._el.setAttribute('data-paused',paused);s._lastPaused=paused}
  var prog=liveProgress(s,now);
  // Inline style bypasses any CSS-rule precedence on stroke-dashoffset
  var off=(RING_TOTAL*prog).toFixed(2);
  if(s._lastOffset!==off){s._arc.style.strokeDashoffset=off;s._lastOffset=off}
}
function ensureObserver(){
  if(ioObserver||typeof IntersectionObserver==='undefined')return;
  ioObserver=new IntersectionObserver(function(entries){
    for(var i=0;i<entries.length;i++){
      var id=entries[i].target.getAttribute('data-id');
      if(id)visibleIds[id]=entries[i].isIntersecting;
    }
  },{rootMargin:'120px'});
}
function render(){
  var c=$('items');
  for(var x=0;x<items.length;x++){items[x]._el=null;items[x]._arc=null;items[x]._time=null}
  if(ioObserver)ioObserver.disconnect();
  visibleIds=Object.create(null);
  c.textContent='';
  if(!items.length){c.style.display='none';return}
  c.style.display='';
  var sorted=items.slice().sort(function(a,b){
    var ad=a.phase==='done'?1:0,bd=b.phase==='done'?1:0;
    if(ad!==bd)return ad-bd;
    return a.ts-b.ts;
  });
  var now=Date.now(),frag=document.createDocumentFragment();
  for(var i=0;i<sorted.length;i++){
    var row=buildItem(sorted[i],now);
    if(i===kbIdx)row.classList.add('kb-focus');
    frag.appendChild(row);
  }
  c.appendChild(frag);
  ensureObserver();
  if(ioObserver)for(var k=0;k<sorted.length;k++){
    visibleIds[sorted[k].id]=true;ioObserver.observe(sorted[k]._el);
  }
  if(kbIdx>=sorted.length)kbIdx=sorted.length-1;
  updateTitleAndBadge(true);
}

/* ── RAF Loop ────────────────────────────────────────────────────── */
function tick(){
  rafId=null;
  checkClockDrift();
  var now=Date.now(),anyBoundary=false,anyDone=false;
  for(var i=0;i<items.length;i++){
    var s=items[i];
    if(s.phase==='done'||s.pausedAt!=null)continue;
    if(s.endsAt<=now){
      var cu=catchUp(s,now);
      if(cu.boundaries){
        anyBoundary=true;if(cu.done)anyDone=true;
        if(s._el&&s._el.parentNode){
          var oldEl=s._el,newRow=buildItem(s,now);
          oldEl.replaceWith(newRow);
          if(ioObserver){ioObserver.unobserve(oldEl);ioObserver.observe(newRow)}
          newRow.classList.add('boundary');
          (function(r){setTimeout(function(){r.classList.remove('boundary')},BOUNDARY_ANIM)})(newRow);
        }
        continue;
      }
    }
    paintCard(s,now);
  }
  if(anyBoundary){save();onPhaseBoundary(anyDone);maybeNotify(anyDone)}
  updateTitleAndBadge(false);
  if(anyRunning())rafId=requestAnimationFrame(tick);
  updateWake();
}
function startLoop(){if(rafId==null&&anyRunning())rafId=requestAnimationFrame(tick)}
function stopLoop(){if(rafId!=null){cancelAnimationFrame(rafId);rafId=null}}

/* ── Phase Boundary Effects ──────────────────────────────────────── */
function onPhaseBoundary(anyDone){
  if(!isLeader)return;
  if(settings.sound){
    if(anyDone)chimeAllDone();
    else chimeFocusEnd();
  }
  if(settings.vibrate&&navigator.vibrate){
    navigator.vibrate(anyDone?[200,100,200,100,400]:[150]);
  }
}

/* ── Web Lock Leader Election ────────────────────────────────────── */
function acquireLeadership(){
  if(!('locks'in navigator)){isLeader=true;return}
  navigator.locks.request(LEADER_LOCK,{mode:'exclusive'},function(){
    isLeader=true;
    return new Promise(function(resolve){leaderRelease=resolve});
  }).catch(function(){isLeader=true});
}
function releaseLeadership(){
  if(leaderRelease){try{leaderRelease()}catch(err){}leaderRelease=null}
  isLeader=false;
}

/* ── Audio ───────────────────────────────────────────────────────── */
function initAudio(){
  if(!audioCtx){
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    try{audioCtx=new AC()}catch(err){return}
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function ensureAudio(){if(!audioCtx)initAudio();return audioCtx&&audioCtx.state==='running'}
function tone(freqStart,freqEnd,type,dur,gain){
  if(!ensureAudio())return;
  var t=audioCtx.currentTime;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type;
  o.frequency.setValueAtTime(freqStart,t);
  o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(gain||.25,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t);o.stop(t+dur+.05);
}
function chimeFocusEnd(){tone(880,660,'sine',.4,.25)}
function chimeBreakEnd(){tone(660,990,'triangle',.35,.22)}
function chimeAllDone(){
  if(!ensureAudio())return;
  var t=audioCtx.currentTime,freqs=[523.25,659.25,783.99,1046.5];
  for(var i=0;i<freqs.length;i++){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='sine';
    o.frequency.value=freqs[i];
    var st=t+i*.12;
    g.gain.setValueAtTime(0,st);
    g.gain.linearRampToValueAtTime(.22,st+.02);
    g.gain.exponentialRampToValueAtTime(.001,st+.4);
    o.start(st);o.stop(st+.45);
  }
}

/* ── Wake Lock ───────────────────────────────────────────────────── */
function updateWake(){
  if(anyRunning()){
    if(!wakeLock&&navigator.wakeLock){
      navigator.wakeLock.request('screen').then(function(w){
        wakeLock=w;wakeLock.addEventListener('release',function(){wakeLock=null});
      },function(){});
    }
  }else{
    if(wakeLock){try{wakeLock.release()}catch(err){}wakeLock=null}
  }
}

/* ── Title + Badge ───────────────────────────────────────────────── */
function updateTitleAndBadge(force){
  var now=Date.now();
  if(!force&&now-titleLast<TITLE_THROTTLE)return;
  titleLast=now;
  var minRem=Infinity,activeCount=0;
  for(var i=0;i<items.length;i++){
    var s=items[i];
    if(s.phase==='done')continue;
    activeCount++;
    if(s.pausedAt!=null)continue;
    var rem=Math.max(0,(s.endsAt-now)/1000);
    if(rem<minRem)minRem=rem;
  }
  var newTitle=isFinite(minRem)?fmtTime(minRem)+', Pomo':'Pomo';
  if(newTitle!==titleLastText){document.title=newTitle;titleLastText=newTitle}
  if(navigator.setAppBadge){
    if(activeCount>0)navigator.setAppBadge(activeCount).catch(function(){});
    else if(navigator.clearAppBadge)navigator.clearAppBadge().catch(function(){});
  }
}

/* ── Add / Remove ────────────────────────────────────────────────── */
function addSession(titleText,durText){
  var combined=durText||'';
  if(titleText&&!combined)combined=titleText;
  else if(titleText&&durText)combined=titleText+' — '+durText;
  var cfg=parsePomo(combined);
  var fallback=cfg._fallback;delete cfg._fallback;
  // If user supplied an explicit title field, force-override
  if(titleText&&titleText.trim())cfg.title=titleText.trim();
  var now=Date.now();
  var s={
    id:uid(),title:cfg.title||'',
    focus:cfg.focus,brk:cfg.brk,long:cfg.long,cycles:cfg.cycles,
    phase:'focus',cycleIdx:0,
    startedAt:now,endsAt:now+cfg.focus*1000,
    pausedAt:null,remaining:null,ts:now
  };
  items.push(s);save();render();startLoop();updateWake();
  if(fallback)_base.notify('Used Defaults','warn');
  else announce('Pomodoro Added');
}
function removeItem(id){
  var row=document.querySelector('.item[data-id="'+id+'"]');
  if(row)row.classList.add('removing');
  for(var i=0;i<items.length;i++){if(items[i].id===id){items.splice(i,1);break}}
  save();
  setTimeout(function(){render();announce('Removed');updateWake();if(!anyRunning())stopLoop()},REMOVE_ANIM);
}

/* ── Card Actions ────────────────────────────────────────────────── */
function pauseResume(s){
  if(s.phase==='done')return;
  var now=Date.now();
  if(s.pausedAt==null){
    s.remaining=Math.max(0,(s.endsAt-now)/1000);
    s.pausedAt=now;
  }else{
    s.startedAt=now-(durFor(s,s.phase)-s.remaining)*1000;
    s.endsAt=now+s.remaining*1000;
    s.pausedAt=null;s.remaining=null;
  }
  save();render();startLoop();updateWake();
}
function skipPhase(s){
  if(s.phase==='done')return;
  s.endsAt=Date.now();
  if(s.pausedAt!=null){s.pausedAt=null;s.remaining=null}
  advancePhase(s);
  save();render();startLoop();updateWake();
}

/* ── Keyboard Navigation ─────────────────────────────────────────── */
function kbCards(){return $('items').querySelectorAll('.item')}
function kbClear(){kbIdx=-1;var all=kbCards();for(var i=0;i<all.length;i++)all[i].classList.remove('kb-focus')}
function kbMove(dir){
  var cards=kbCards();if(!cards.length)return;
  if(kbIdx>=0&&kbIdx<cards.length)cards[kbIdx].classList.remove('kb-focus');
  kbIdx+=dir;
  if(kbIdx<0)kbIdx=cards.length-1;
  if(kbIdx>=cards.length)kbIdx=0;
  cards[kbIdx].classList.add('kb-focus');
  cards[kbIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
}
function kbCurrent(){
  var cards=kbCards();
  if(kbIdx<0||kbIdx>=cards.length)return null;
  var id=cards[kbIdx].getAttribute('data-id');
  for(var i=0;i<items.length;i++)if(items[i].id===id)return items[i];
  return null;
}

/* ── Input / Click Handlers ──────────────────────────────────────── */
function addFromPreset(spec){
  var t=$('inp-title').value.trim();
  addSession(t,spec);
  $('inp-title').value='';
}
$('inp-title').addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();addFromPreset('25/5/4/15')}
});
$('presets').addEventListener('click',function(e){
  var p=e.target.closest('.preset');if(!p)return;
  initAudio();
  addFromPreset(p.getAttribute('data-fill'));
});

/* Fill .p-spec text from each preset's data-fill so the spec format
   stays consistent with whatever parsePomo produces. */
function fmtPresetSpec(cfg){
  var focusMin=Math.round(cfg.focus/60),
      brkMin=Math.round(cfg.brk/60),
      longMin=Math.round(cfg.long/60),
      cycles=cfg.cycles;
  var parts=[focusMin+'m'];
  if(cycles>1&&brkMin>0&&longMin>0)parts.push(brkMin+'/'+longMin+'m');
  else if(longMin>0)parts.push(longMin+'m');
  else if(brkMin>0)parts.push(brkMin+'m');
  parts.push(cycles+(cycles===1?' round':' rounds'));
  return parts.join(' | ');
}
(function(){
  var nodes=document.querySelectorAll('#presets .preset');
  for(var i=0;i<nodes.length;i++){
    var fill=nodes[i].getAttribute('data-fill');
    var spec=nodes[i].querySelector('.p-spec');
    if(fill&&spec)spec.textContent=fmtPresetSpec(parsePomo(fill));
  }
})();
$('items').addEventListener('click',function(e){
  var row=e.target.closest('.item');if(!row)return;
  var id=row.getAttribute('data-id'),s=null;
  for(var i=0;i<items.length;i++)if(items[i].id===id){s=items[i];break}
  if(!s)return;
  initAudio();
  if(e.target.closest('.del')){removeItem(id);return}
  if(e.target.closest('[data-act="skip"]')){skipPhase(s);return}
  if(e.target.closest('[data-act="toggle"]')){pauseResume(s);return}
});

/* ── Keyboard Shortcuts ──────────────────────────────────────────── */
_base.onKey({
  '/':function(e){e.preventDefault();kbClear();$('inp-title').focus()},
  'j':function(e){e.preventDefault();kbMove(1)},
  'k':function(e){e.preventDefault();kbMove(-1)},
  'ArrowDown':function(e){e.preventDefault();kbMove(1)},
  'ArrowUp':function(e){e.preventDefault();kbMove(-1)},
  ' ':function(e){var s=kbCurrent();if(s){e.preventDefault();pauseResume(s)}},
  'Enter':function(e){var s=kbCurrent();if(s){e.preventDefault();pauseResume(s)}},
  'n':function(e){var s=kbCurrent();if(s){e.preventDefault();skipPhase(s)}},
  'd':function(e){var s=kbCurrent();if(s){e.preventDefault();removeItem(s.id)}},
  'Backspace':function(e){var s=kbCurrent();if(s){e.preventDefault();removeItem(s.id)}},
  'Delete':function(e){var s=kbCurrent();if(s){e.preventDefault();removeItem(s.id)}},
  ctrl:{
    'k':function(e){e.preventDefault();kbClear();$('inp-title').focus()}
  }
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.activeElement===$('inp-title'))document.activeElement.blur();
    kbClear();
  }
});
document.addEventListener('mousemove',function(){if(kbIdx>=0)kbClear()},{passive:true});

/* ── Drift Detection ─────────────────────────────────────────────── */
var clockBaseWall=Date.now(),clockBasePerf=(typeof performance!=='undefined'&&performance.now)?performance.now():null;
function checkClockDrift(){
  if(clockBasePerf==null)return;
  var nowWall=Date.now(),nowPerf=performance.now();
  var expectedWall=clockBaseWall+(nowPerf-clockBasePerf);
  var drift=nowWall-expectedWall;
  if(Math.abs(drift)>2000){
    console.warn('[Pomo] Clock drift detected: '+Math.round(drift)+'ms — rebasing');
    clockBaseWall=nowWall;clockBasePerf=nowPerf;
  }
}

/* ── Background Timer ────────────────────────────────────────────── */
var bgTimer=null;
function scheduleBgWake(){
  if(bgTimer){clearTimeout(bgTimer);bgTimer=null}
  if(!document.hidden)return;
  var now=Date.now(),next=Infinity;
  for(var i=0;i<items.length;i++){
    var s=items[i];
    if(s.phase==='done'||s.pausedAt!=null)continue;
    if(s.endsAt<next)next=s.endsAt;
  }
  if(!isFinite(next))return;
  var ms=Math.max(BG_MIN_TIMEOUT,next-now);
  bgTimer=setTimeout(function(){
    bgTimer=null;
    var t=Date.now(),anyBoundary=false,anyDone=false;
    for(var j=0;j<items.length;j++){
      var ss=items[j];
      if(ss.phase==='done'||ss.pausedAt!=null)continue;
      if(ss.endsAt<=t){
        var cu=catchUp(ss,t);
        if(cu.boundaries){anyBoundary=true;if(cu.done)anyDone=true}
      }
    }
    if(anyBoundary){save();onPhaseBoundary(anyDone);maybeNotify(anyDone)}
    scheduleBgWake();
  },ms);
}

/* ── Notifications (opt-in via ?notify=1) ────────────────────────── */
var NOTIFY_ENABLED=/[?&]notify=1\b/.test(location.search);
function maybeNotify(anyDone){
  if(!NOTIFY_ENABLED)return;
  if(typeof Notification==='undefined')return;
  if(Notification.permission!=='granted')return;
  try{
    new Notification(anyDone?'Pomodoro Complete':'Phase Done',{
      body:anyDone?'All cycles finished.':'Switching phase.',
      tag:'pomo-boundary',silent:true
    });
  }catch(err){}
}
if(NOTIFY_ENABLED&&typeof Notification!=='undefined'&&Notification.permission==='default'){
  document.addEventListener('click',function ask(){
    Notification.requestPermission&&Notification.requestPermission();
    document.removeEventListener('click',ask);
  });
}

/* ── Visibility & Reload Catch-up ────────────────────────────────── */
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    flushSave();stopLoop();
    if(wakeLock){try{wakeLock.release()}catch(err){}wakeLock=null}
    scheduleBgWake();
  }else{
    var now=Date.now(),anyBoundary=false,anyDone=false;
    for(var i=0;i<items.length;i++){
      var s=items[i];
      if(s.phase==='done'||s.pausedAt!=null)continue;
      var cu=catchUp(s,now);
      if(cu.boundaries){anyBoundary=true;if(cu.done)anyDone=true}
    }
    if(anyBoundary){save();onPhaseBoundary(anyDone)}
    if(bgTimer){clearTimeout(bgTimer);bgTimer=null}
    render();startLoop();
    wakeLock=null;updateWake();
  }
});

/* ── pagehide: flush + cleanup ───────────────────────────────────── */
window.addEventListener('pagehide',function(){
  flushSave();releaseLeadership();
  if(wakeLock){try{wakeLock.release()}catch(err){}wakeLock=null}
  if(audioCtx&&audioCtx.state!=='closed'){try{audioCtx.close()}catch(err){}audioCtx=null}
  if(bc){try{bc.close()}catch(err){}bc=null}
  if(bgTimer){clearTimeout(bgTimer);bgTimer=null}
});

/* ── Cross-tab Sync ──────────────────────────────────────────────── */
function syncFromOther(){load();render();startLoop();updateWake()}
window.addEventListener('storage',function(e){if(e.key===STORAGE_KEY)syncFromOther()});
if(typeof BroadcastChannel!=='undefined'){
  try{
    bc=new BroadcastChannel(BC_NAME);
    bc.addEventListener('message',function(e){if(e.data==='changed')syncFromOther()});
  }catch(err){}
}
function bcNotify(){if(bc){try{bc.postMessage('changed')}catch(err){}}}

/* ── Init Audio on first interaction ─────────────────────────────── */
document.addEventListener('click',function(){initAudio()},{once:true});
document.addEventListener('touchstart',function(){initAudio()},{once:true,passive:true});

/* ── Init ────────────────────────────────────────────────────────── */
load();
(function(){
  var now=Date.now();
  for(var i=0;i<items.length;i++){
    var s=items[i];
    if(s.phase==='done'||s.pausedAt!=null)continue;
    catchUp(s,now);
  }
  save();flushSave();
})();
acquireLeadership();
render();
startLoop();
updateWake();

})();
</script>
