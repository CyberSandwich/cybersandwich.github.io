<style>
body{display:flex;flex-direction:column;align-items:center}
.w{max-width:440px;width:100%;padding:20px 20px calc(86px + env(safe-area-inset-bottom,0px))}
.card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.inp{display:flex;gap:8px;margin-bottom:14px}
.inp input{flex:1;padding:12px 20px;border:1px solid var(--bdr2);border-radius:50px;font:400 .9375rem/1 var(--font);color:var(--t1);background:var(--card);box-shadow:var(--shadow);transition:border-color .15s}
.inp input:focus{border-color:var(--t4)}
.inp input.shake{animation:shake .3s ease;border-color:#EF4444}
.inp button{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;box-shadow:var(--shadow)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;min-height:46px;border-bottom:1px solid var(--bdr2);user-select:none;-webkit-user-select:none;transition:background .15s;cursor:pointer}
.srow:last-child{border-bottom:none}
.srow:active{opacity:.7}
.slbl{display:flex;align-items:center;gap:12px;font:500 .9375rem/1 var(--font);color:var(--t2)}
.slbl svg{width:18px;height:18px;flex-shrink:0;color:var(--t4)}
.bg-chk{padding:5px 10px;border:1.5px solid var(--bdr);border-radius:var(--rr);background:none;flex-shrink:0;transition:.2s ease}
.bg-chk svg{width:14px;height:14px;display:block;margin:0 auto;color:var(--t4);opacity:.2}
.srow.sel .bg-chk{background:#DCFCE7;color:#34D399;border-color:#A7F3D0;animation:copyPop .35s ease}
.srow.sel .bg-chk svg{color:#34D399;opacity:1}
.srow.sel .bg-chk polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
html[data-theme="dark"] .srow.sel .bg-chk{background:#1A3A2A;border-color:#2D5A3E}
html[data-theme="dark"] .srow.sel .bg-chk svg{color:#34D399}
html[data-theme="sepia"] .srow.sel .bg-chk{background:#E8E0CE;border-color:#DDD4C0}
html[data-theme="sepia"] .srow.sel .bg-chk svg{color:#2D7D46}
.cp-btn{padding:5px 12px;border:1.5px solid var(--bdr);border-radius:var(--rr);background:none;font:500 .75rem/1 var(--font);color:var(--t3);cursor:pointer;flex-shrink:0;min-width:52px;text-align:center;transition:.2s ease}
.cp-btn.copied{background:#DCFCE7;color:#34D399;border-color:#A7F3D0;animation:copyPop .35s ease}
.cp-btn.copied svg{width:14px;height:14px;display:block;margin:0 auto}
.cp-btn.copied polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
html[data-theme="dark"] .cp-btn.copied{background:#1A3A2A;color:#34D399;border-color:#2D5A3E}
html[data-theme="sepia"] .cp-btn.copied{background:#E8E0CE;color:#2D7D46;border-color:#DDD4C0}
.stepper{display:flex;align-items:center;gap:4px}
.step-btn{width:36px;height:36px;border-radius:var(--rr);border:1.5px solid var(--bdr);background:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s,opacity .15s;padding:0}
.step-btn svg{fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;width:16px;height:16px}
.step-btn:active:not(:disabled){transform:scale(.9)}
.step-btn:disabled{opacity:.3;cursor:default}
.cdot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:1px solid var(--bdr2)}
.clbl{flex:1;min-width:0;font:500 .9375rem/1 var(--font);color:var(--t2);word-break:break-all}
.clbl .cg{font:500 .8125rem/1 var(--font);color:var(--t3);margin-left:6px}
.actions button{display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;font:500 .9375rem/1 var(--font);color:var(--t2);background:none;border:none;border-bottom:1px solid var(--bdr2);cursor:pointer;text-align:left;transition:background .25s}
.actions button:last-child{border-bottom:none}
.actions button:active{opacity:.7}
.actions .id,.actions .ic{width:18px;height:18px;flex-shrink:0;color:var(--t4)}
.actions .ic{stroke-width:2.5;display:none}
.ex-opt{padding-left:44px!important}
.dl-chev{width:14px;height:14px;flex-shrink:0;color:var(--t4);margin-left:auto;transition:transform .2s ease}
.dl-open .dl-chev{transform:rotate(90deg)}
.ok{background:#DCFCE7!important}
.ok .id{display:none!important}.ok .ic{display:inline!important}
.ok .ic,.ok span{color:#34D399!important}
.ok polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
html[data-theme="dark"] .ok{background:#1A3A2A!important}
html[data-theme="dark"] .ok .ic,html[data-theme="dark"] .ok span{color:#34D399!important}
html[data-theme="sepia"] .ok{background:#E8E0CE!important}
html[data-theme="sepia"] .ok .ic,html[data-theme="sepia"] .ok span{color:#2D7D46!important}
.rs-warn{background:#FEE2E2!important}
.rs-warn .id{color:#C41E3A!important;animation:spin .4s ease}
.rs-warn span{color:#C41E3A!important}
html[data-theme="dark"] .rs-warn{background:#3A2020!important}
html[data-theme="dark"] .rs-warn .id,html[data-theme="dark"] .rs-warn span{color:#F87171!important}
html[data-theme="sepia"] .rs-warn{background:#F0DDD0!important}
html[data-theme="sepia"] .rs-warn .id,html[data-theme="sepia"] .rs-warn span{color:#C41E3A!important}
.rs-fb{background:#FEF9C3!important}
.rs-fb .id{color:#CA8A04!important;animation:spin .4s ease}
.rs-fb span{color:#CA8A04!important}
html[data-theme="dark"] .rs-fb{background:#3A3524!important}
html[data-theme="dark"] .rs-fb .id,html[data-theme="dark"] .rs-fb span{color:#FACC15!important}
html[data-theme="sepia"] .rs-fb{background:#EDE5C0!important}
html[data-theme="sepia"] .rs-fb .id,html[data-theme="sepia"] .rs-fb span{color:#A67B5B!important}
.srow.rs-fb{background:#FEF9C3!important}
.srow.rs-fb .slbl svg{animation:spin .4s ease;color:#CA8A04}
.srow.rs-fb .slbl span{color:#CA8A04}
html[data-theme="dark"] .srow.rs-fb{background:#3A3524!important}
html[data-theme="dark"] .srow.rs-fb .slbl svg,html[data-theme="dark"] .srow.rs-fb .slbl span{color:#FACC15}
html[data-theme="sepia"] .srow.rs-fb{background:#EDE5C0!important}
html[data-theme="sepia"] .srow.rs-fb .slbl svg,html[data-theme="sepia"] .srow.rs-fb .slbl span{color:#A67B5B}
@keyframes copyPop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
.sec-label{font:600 .8125rem/1 var(--font);color:var(--t4);text-transform:uppercase;letter-spacing:.5px;padding:16px 20px 8px;user-select:none;-webkit-user-select:none}
.items{background:var(--card);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.hist-row{display:flex;align-items:center;padding:10px 14px 10px 16px;border-bottom:1px solid var(--bdr2);cursor:pointer;transition:background .15s}
.hist-row:last-child{border-bottom:none}
.hist-row:active{opacity:.7}
.mini-swatches{display:flex;gap:3px;flex:1;overflow:hidden}
.mini-sw{width:24px;height:24px;border-radius:6px;flex-shrink:0}
.del{width:36px;height:36px;border-radius:50%;border:none;background:none;cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s,background .15s;margin-left:8px}
.del svg{width:14px;height:14px}
.del:active{opacity:.7}
.drop-overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(250,250,250,.95);font:600 1.25rem/1 var(--font);color:var(--t3);opacity:0;pointer-events:none;transition:opacity .2s}
.drop-overlay.active{opacity:1;pointer-events:auto}
html[data-theme="dark"] .drop-overlay{background:rgba(28,28,30,.95)}
html[data-theme="sepia"] .drop-overlay{background:rgba(245,237,218,.95)}
.paste-hint{display:none;text-align:center;font:400 .75rem/1 var(--font);color:var(--t4);padding:0 20px 4px;cursor:pointer}
@media(hover:none){.paste-hint{display:block}}
@media(hover:hover){
.srow:hover{background:var(--bg2)}
.step-btn:hover:not(:disabled){border-color:var(--t4);color:var(--t2)}
.actions button:hover{background:var(--bg2)}
.del:hover{color:var(--t2);background:var(--bg2)}
.hist-row:hover{background:var(--bg2)}
.cp-btn:hover{background:var(--bg2);color:var(--t2);border-color:var(--t4)}
}
</style>
</head>

<script>
'use strict';
var $=function(id){return document.getElementById(id)},PI=Math.PI;
var WHITE=[1,1,1],BLACK=[0,0,0],LUM_W=1,LUM_B=0;

// ===================== COLOR MATH =====================

function srgbToLin(c){return c<=.04045?c/12.92:Math.pow((c+.055)/1.055,2.4)}
function linToSrgb(c){return c<=.0031308?12.92*c:1.055*Math.pow(c,1/2.4)-.055}

function rgbToOklab(rgb){
var r=srgbToLin(rgb[0]),g=srgbToLin(rgb[1]),b=srgbToLin(rgb[2]);
var l=.4122214708*r+.5363325363*g+.0514459929*b;
var m=.2119034982*r+.6806995451*g+.1073969566*b;
var s=.0883024619*r+.2817188376*g+.6299787005*b;
var l_=Math.cbrt(l),m_=Math.cbrt(m),s_=Math.cbrt(s);
return[.2104542553*l_+.7936177850*m_-.0040720468*s_,1.9779984951*l_-2.4285922050*m_+.4505937099*s_,.0259040371*l_+.7827717662*m_-.8086757660*s_]}

function oklabToRgb(lab){
var L=lab[0],a=lab[1],b=lab[2];
var l_=L+.3963377774*a+.2158037573*b;
var m_=L-.1055613458*a-.0638541728*b;
var s_=L-.0894841775*a-1.2914855480*b;
var l=l_*l_*l_,m=m_*m_*m_,s=s_*s_*s_;
return[linToSrgb(4.0767416621*l-3.3077115913*m+.2309699292*s),linToSrgb(-1.2684380046*l+2.6097574011*m-.3413193965*s),linToSrgb(-.0041960863*l-.7034186147*m+1.7076147010*s)]}

function oklabToOklch(lab){
var C=Math.sqrt(lab[1]*lab[1]+lab[2]*lab[2]);
var H=C<1e-8?0:Math.atan2(lab[2],lab[1])*180/PI;
if(H<0)H+=360;return[lab[0],C,H]}

function oklchToOklab(lch){
if(lch[1]<1e-8)return[lch[0],0,0];
var rad=lch[2]*PI/180;
return[lch[0],lch[1]*Math.cos(rad),lch[1]*Math.sin(rad)]}

function rgbToOklch(rgb){return oklabToOklch(rgbToOklab(rgb))}
function oklchToRgb(lch){return oklabToRgb(oklchToOklab(lch))}

function clampV(v){return Math.max(0,Math.min(1,v))}
function clampRgb(rgb){return[clampV(rgb[0]),clampV(rgb[1]),clampV(rgb[2])]}

function inGamut(rgb){return rgb[0]>=-1e-4&&rgb[0]<=1.0001&&rgb[1]>=-1e-4&&rgb[1]<=1.0001&&rgb[2]>=-1e-4&&rgb[2]<=1.0001}

function gamutClamp(L,C,H){
if(C<=0)return[L,0,H];
var rgb=oklchToRgb([L,C,H]);
if(inGamut(rgb))return[L,C,H];
var lo=0,hi=C;
for(var i=0;i<16;i++){if(hi-lo<1e-4)break;var mid=(lo+hi)/2;rgb=oklchToRgb([L,mid,H]);if(inGamut(rgb))lo=mid;else hi=mid}

function rgbToHsl(rgb){

var RULES=[
{name:'Complementary',offsets:[0,180]},
{name:'Analogous',offsets:[-30,0,30]},
{name:'Triadic',offsets:[0,120,240]},
{name:'Tetradic',offsets:[0,90,180,270]},
{name:'Split-Complementary',offsets:[0,150,210]},

var mid=(lMin+lMax)/2,dist=Math.abs(nL-mid)/((lMax-lMin)/2||1);
var nC=C*(1-dist*.5);colors.push(gamutClamp(nL,nC,H))}

for(var i=0;i<rule.offsets.length;i++){
var nH=(H+rule.offsets[i]+360)%360,nL=L,nC=C;
if(nH>=0&&nH<90)nC*=.9;

function oklabDist(a,b){var dL=a[0]-b[0],da=a[1]-b[1],db=a[2]-b[2];return Math.sqrt(dL*dL+da*da+db*db)}

function kmeansInit(pixels,K){

var dists=new Float64Array(pixels.length);

var total=0;
for(var i=0;i<pixels.length;i++){var minD=Infinity;
for(var j=0;j<centroids.length;j++){var dd=oklabDistSq(pixels[i],centroids[j]);if(dd<minD)minD=dd}
dists[i]=minD;total+=minD}

for(var i=0;i<pixels.length;i++){sum+=dists[i];if(sum>=target){centroids.push(pixels[i].slice());break}}}

// Multi-pass extraction: oversample k-means, merge, score, rank, auto-count
function extractColors(imgData,maxColors){
var d=imgData.data,pixels=[];

for(var i=0;i<pixels.length;i++){var hex=rgbToHex(clampRgb(oklabToRgb(pixels[i])));if(!seen[hex]){seen[hex]=1;uniq.push(hex)}}

// Phase 2: Oversample with high K for fine-grained clustering
var K=Math.min(Math.max(maxColors*4,32),pixels.length);
var centroids=kmeansInit(pixels,K);

// Run k-means with adaptive convergence
for(var iter=0;iter<30;iter++){
for(var i=0;i<pixels.length;i++){var minD=Infinity,best=0;
for(var c=0;c<centroids.length;c++){var dd=oklabDistSq(pixels[i],centroids[c]);if(dd<minD){minD=dd;best=c}}assign[i]=best}
sums.fill(0);cnts.fill(0);
for(var i=0;i<pixels.length;i++){var c=assign[i];sums[c*3]+=pixels[i][0];sums[c*3+1]+=pixels[i][1];sums[c*3+2]+=pixels[i][2];cnts[c]++}

var nc=[sums[c*3]/cnts[c],sums[c*3+1]/cnts[c],sums[c*3+2]/cnts[c]];moved+=oklabDist(centroids[c],nc);centroids[c]=nc}

var raw=[];
for(var c=0;c<K;c++){if(cnts[c]===0)continue;
raw.push({lab:centroids[c],lch:oklabToOklch(centroids[c]),count:cnts[c],idx:c})}

for(var r=0;r<raw.length;r++){var cl=raw[r],variance=0;

var xsvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
xsvg.setAttribute('viewBox','0 0 24 24');xsvg.setAttribute('width','14');xsvg.setAttribute('height','14');xsvg.setAttribute('aria-hidden','true');
var xp=document.createElementNS('http://www.w3.org/2000/svg','path');xp.setAttribute('d','M18 6L6 18M6 6l12 12');
xsvg.appendChild(xp);del.appendChild(xsvg);row.appendChild(del);el.appendChild(row)}
showOutput()}

function updateRows(){
var rows=$('gen-card').querySelectorAll('.srow[data-r]');
for(var i=0;i<rows.length;i++){var ri=parseInt(rows[i].getAttribute('data-r'));
rows[i].className='srow'+(ri===ruleIdx?' sel':'');
rows[i].setAttribute('aria-checked',ri===ruleIdx?'true':'false')}
updateNeutralUI()}

function updateNeutralUI(){var nr=$('neutral-row');nr.className='srow'+(neutral?' sel':'');
nr.setAttribute('aria-checked',neutral?'true':'false')}

// ===================== COPY =====================

function copyText(text){
navigator.clipboard.writeText(text).then(function(){},function(){
var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)})}

function mkCheckSvg(){
var s=document.createElementNS('http://www.w3.org/2000/svg','svg');
s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');s.setAttribute('stroke','currentColor');
s.setAttribute('stroke-width','2.5');s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');s.setAttribute('aria-hidden','true');
var p=document.createElementNS('http://www.w3.org/2000/svg','polyline');p.setAttribute('points','4 12 9 17 20 6');
s.appendChild(p);return s}

function copyColor(idx){
if(idx<0||idx>=palette.length)return;
var row=$('color-rows').children[idx];if(!row)return;
var btn=row.querySelector('.cp-btn');if(!btn)return;
copyText(fmtVal(palette[idx],globalFmt));
if(copyTimers[idx]){clearTimeout(copyTimers[idx]);copyTimers[idx]=null}
btn.classList.remove('copied');btn.offsetWidth;btn.classList.add('copied');
btn.textContent='';btn.appendChild(mkCheckSvg());
copyTimers[idx]=setTimeout(function(){
btn.style.opacity='0';
copyTimers[idx]=setTimeout(function(){
btn.classList.remove('copied');btn.textContent='Copy';btn.style.opacity='';
copyTimers[idx]=null},200)},1300)}

function doCopyAll(){
if(palette.length===0)return;
var out=palette.map(function(p){return fmtVal(p,globalFmt)}).join(', ');
copyText(out);btnFeedback($('ca-btn'),'ok','Copy All','Copied',1500)}

function dlFile(name,content,type){
var b=new Blob([content],{type:type||'text/plain'});
var u=URL.createObjectURL(b);
var a=document.createElement('a');a.href=u;a.download=name;
document.body.appendChild(a);a.click();document.body.removeChild(a);
setTimeout(function(){URL.revokeObjectURL(u)},100)}

function doExportFmt(fmt){
if(palette.length===0)return;
var out='',name='palette',type='text/plain';
if(fmt==='text'){out=palette.map(function(p){return fmtVal(p,globalFmt)}).join('\n');name='palette.txt'}
else if(fmt==='css'){out=':root {\n'+palette.map(function(p,i){return'  --color-'+(i+1)+': '+p.hex+';'}).join('\n')+'\n}';name='palette.css';type='text/css'}
else if(fmt==='tw'){out=palette.map(function(p,i){return"  'palette-"+(i+1)+"': '"+p.hex+"',"}).join('\n');name='palette-tailwind.txt'}
dlFile(name,out,type);
var btn=document.querySelector('.ex-opt[data-fmt="'+fmt+'"]');
if(btn)btnFeedback(btn,'ok','','Downloaded',1200)}

var fbTimers=new WeakMap();
function btnFeedback(btn,cls,origText,fbText,dur){
var prev=fbTimers.get(btn);if(prev){clearTimeout(prev);btn.classList.remove('ok','rs-fb','rs-warn')}
var sp=btn.querySelector('span'),orig=sp?sp.textContent:'';
btn.classList.remove(cls);btn.offsetWidth;btn.classList.add(cls);
if(sp&&fbText)sp.textContent=fbText;
fbTimers.set(btn,setTimeout(function(){btn.classList.remove(cls);if(sp)sp.textContent=origText||orig;fbTimers.delete(btn)},dur))}

var resetPending=false,resetWarnTimer;
function doReset(){
var btn=$('rs-btn'),sp=btn.querySelector('span');
if(!resetPending){
resetPending=true;
btn.classList.remove('rs-fb');btn.offsetWidth;btn.classList.add('rs-warn');
sp.textContent='Confirm?';
if(resetWarnTimer)clearTimeout(resetWarnTimer);
resetWarnTimer=setTimeout(function(){resetPending=false;btn.classList.remove('rs-warn');sp.textContent='Reset'},2000);
return}
resetPending=false;if(resetWarnTimer)clearTimeout(resetWarnTimer);
palette=[];base=null;baseUserSet=false;lastValidHex='';ruleIdx=-1;neutral=false;mode='harmony';activeIdx=-1;lastExtracted=[];
hist=[];saveHist();renderHist();
$('cinp').value='';$('cpick').value='#888888';
$('add-btn').style.background='var(--t3)';
$('add-btn').querySelector('svg').setAttribute('stroke','var(--card)');
updateRows();updateNeutralUI();
lastShownMode=undefined;lastShownHas=undefined;lastHistLen=undefined;
showOutput();closeExport();
btn.classList.remove('rs-warn');
btnFeedback(btn,'rs-fb','Reset','Done',1500)}

// ===================== COUNT =====================

function updateCountLabel(){
var max=mode==='image'?lastExtracted.length:12;
$('cnt-lbl').textContent=swatchCount+(swatchCount===1?' Color':' Colors');
$('cnt-dn').disabled=swatchCount<=1;$('cnt-up').disabled=swatchCount>=max}

function resliceImage(){
if(mode!=='image'||lastExtracted.length===0)return;
palette=lastExtracted.slice(0,swatchCount).map(function(hex){return mkEntry(hexToRgb(hex)||[0,0,0])});
updateSwatchDOM()}

// ===================== EXPORT =====================

function toggleExport(){
var opts=document.querySelectorAll('.ex-opt'),btn=$('dl-btn');
exportOpen=!exportOpen;
for(var i=0;i<opts.length;i++)opts[i].style.display=exportOpen?'':'none';
btn.classList.toggle('dl-open',exportOpen);btn.setAttribute('aria-expanded',exportOpen?'true':'false')}

function closeExport(){
if(!exportOpen)return;exportOpen=false;
var opts=document.querySelectorAll('.ex-opt'),btn=$('dl-btn');
for(var i=0;i<opts.length;i++)opts[i].style.display='none';
btn.classList.remove('dl-open');btn.setAttribute('aria-expanded','false')}

// ===================== EVENTS =====================

function setup(){
loadHist();

$('add-btn').addEventListener('click',function(){$('cpick').click()});

$('cpick').addEventListener('input',function(){
var rgb=hexToRgb(this.value);if(!rgb)return;
baseUserSet=true;setBaseColor(rgb);
if(mode!=='harmony'){mode='harmony';lastShownMode=undefined;showOutput()}
if(ruleIdx>=0)generate()});

$('cinp').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();applyColorInput()}});
$('cinp').addEventListener('blur',applyColorInput);
$('cinp').addEventListener('paste',function(){setTimeout(applyColorInput,0)});

function applyColorInput(){
var inp=$('cinp'),v=inp.value.trim();
if(!v){baseUserSet=false;base=null;lastValidHex='';
$('add-btn').style.background='var(--t3)';
$('add-btn').querySelector('svg').setAttribute('stroke','var(--card)');return}
var rgb=parseColor(v);
if(!rgb){inp.classList.remove('shake');inp.offsetWidth;inp.classList.add('shake');
setTimeout(function(){inp.classList.remove('shake');inp.value=lastValidHex||''},300);return}
baseUserSet=true;setBaseColor(rgb);
if(mode!=='harmony'){mode='harmony';lastShownMode=undefined;showOutput()}
if(ruleIdx>=0)generate()}

function rowKey(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();e.stopPropagation();var row=e.target.closest('.srow');if(row)row.click()}}

$('gen-card').addEventListener('click',function(e){
var row=e.target.closest('.srow[data-r]');if(!row)return;
var ri=parseInt(row.getAttribute('data-r'));if(isNaN(ri))return;
if(ri!==ruleIdx||!baseUserSet){ruleIdx=ri;updateRows();generate()}});
$('gen-card').addEventListener('keydown',rowKey);

$('neutral-row').addEventListener('click',function(){if(ruleIdx<0)return;neutral=!neutral;updateNeutralUI();generate()});
$('neutral-row').addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();e.stopPropagation();this.click()}});

$('cnt-dn').addEventListener('click',function(e){e.stopPropagation();if(swatchCount>1){swatchCount--;updateCountLabel();resliceImage()}});
$('cnt-up').addEventListener('click',function(e){e.stopPropagation();var max=mode==='image'?lastExtracted.length:12;if(swatchCount<max){swatchCount++;updateCountLabel();resliceImage()}});
$('count-card').addEventListener('click',function(e){if(e.target.closest('.step-btn'))return;
if(swatchCount===autoCount)return;swatchCount=autoCount;updateCountLabel();resliceImage();
var row=$('count-card').querySelector('.srow');
row.classList.remove('rs-fb');row.offsetWidth;row.classList.add('rs-fb');
if(cntRsTimer)clearTimeout(cntRsTimer);
cntRsTimer=setTimeout(function(){row.classList.remove('rs-fb')},600)});

$('fmt-card').addEventListener('click',function(e){
var row=e.target.closest('.srow[data-f]');if(!row)return;
var f=parseInt(row.getAttribute('data-f'));if(f===globalFmt)return;
globalFmt=f;updateFmtRows();refreshColorValues()});
$('fmt-card').addEventListener('keydown',rowKey);

$('color-rows').addEventListener('click',function(e){
var row=e.target.closest('.srow[data-ci]');if(!row)return;
copyColor(parseInt(row.getAttribute('data-ci')))});

$('ca-btn').addEventListener('click',doCopyAll);
$('dl-btn').addEventListener('click',toggleExport);

document.addEventListener('click',function(e){
var opt=e.target.closest('.ex-opt');
if(opt){doExportFmt(opt.getAttribute('data-fmt'));return}
if(exportOpen&&!e.target.closest('#dl-btn')&&!e.target.closest('.ex-opt'))closeExport()});

$('rs-btn').addEventListener('click',doReset);

$('hist-items').addEventListener('click',function(e){
var del=e.target.closest('.del');
if(del){var idx=parseInt(del.getAttribute('data-idx'));hist.splice(idx,1);saveHist();renderHist();return}
var row=e.target.closest('.hist-row');
if(row){restoreEntry(parseInt(row.getAttribute('data-idx')))}});
$('hist-items').addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){
var row=e.target.closest('.hist-row');if(row){e.preventDefault();e.stopPropagation();restoreEntry(parseInt(row.getAttribute('data-idx')))}}});

$('file-inp').addEventListener('change',function(){if(this.files&&this.files.length>0){processImage(this.files[0]);this.value=''}});

var ov=$('drop-ov');
document.addEventListener('dragenter',function(e){e.preventDefault();dragCount++;if(dragCount===1)ov.classList.add('active')});
document.addEventListener('dragleave',function(e){e.preventDefault();dragCount--;if(dragCount<=0){dragCount=0;ov.classList.remove('active')}});
document.addEventListener('dragover',function(e){e.preventDefault()});
document.addEventListener('drop',function(e){e.preventDefault();dragCount=0;ov.classList.remove('active');
var files=e.dataTransfer.files;if(files.length>0){processImage(files[0]);return}
var text=e.dataTransfer.getData('text');if(text){
var multi=parseMultiColor(text);if(multi){processPastedColors(multi);return}
var rgb=parseColor(text.trim());if(rgb){baseUserSet=true;setBaseColor(rgb);
if(mode!=='harmony'){mode='harmony';lastShownMode=undefined;showOutput()}
if(ruleIdx>=0)generate()}}});

document.addEventListener('paste',function(e){
if(document.activeElement===$('cinp'))return;
var cd=e.clipboardData;if(!cd)return;
var items=cd.items;if(items){for(var i=0;i<items.length;i++){if(items[i].type.indexOf('image')!==-1){processImage(items[i].getAsFile());return}}}
var text=cd.getData('text');if(text){
var multi=parseMultiColor(text);
if(multi){e.preventDefault();processPastedColors(multi);return}
var rgb=parseColor(text.trim());if(rgb){
e.preventDefault();baseUserSet=true;setBaseColor(rgb);
if(mode!=='harmony'){mode='harmony';lastShownMode=undefined;showOutput()}
if(ruleIdx>=0)generate()}}});

document.addEventListener('keydown',function(e){
if(e.metaKey||e.ctrlKey||e.altKey)return;
var tag=document.activeElement.tagName;
if(tag==='INPUT'||tag==='TEXTAREA'){if(e.key==='Escape')document.activeElement.blur();return}
if(e.key==='1'){location.href='/';return}
if(e.key==='t'){_base.setTheme(_base.THEMES[(_base.THEMES.indexOf(_base.curTheme())+1)%_base.THEMES.length]);return}
if(e.key==='/'){e.preventDefault();$('cinp').focus();return}
if(e.key==='ArrowUp'){navSwatch(-1);return}
if(e.key==='ArrowDown'){navSwatch(1);return}
if(e.key==='Enter'&&activeIdx>=0){copyColor(activeIdx);return}
if(e.key==='c'&&palette.length>0){doCopyAll();return}
if(e.key==='Escape'){closeExport();return}});

function navSwatch(dir){
var rows=$('color-rows').children;if(rows.length===0)return;
if(activeIdx>=0&&activeIdx<rows.length)rows[activeIdx].style.background='';
activeIdx+=dir;if(activeIdx<0)activeIdx=rows.length-1;if(activeIdx>=rows.length)activeIdx=0;
rows[activeIdx].style.background='var(--bg2)'}

window.addEventListener('storage',function(e){if(e.key==='palit-history'){loadHist();renderHist()}});

renderHist()}

setup();
</script>
</body>
</html>
