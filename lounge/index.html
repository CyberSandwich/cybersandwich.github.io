<style>
main{max-width:560px;margin:0 auto;padding:20px 20px calc(100px + env(safe-area-inset-bottom,0px))}
@media(min-width:768px){main{padding:32px 32px calc(100px + env(safe-area-inset-bottom,0px))}}

/* Page header, matches main SPA .stitle */
.stitle{
  font-size:clamp(1.5rem,4vw,2rem);
  font-weight:700;
  letter-spacing:-.03em;
  margin:12px 0 clamp(16px,3vw,20px);
  color:var(--t1);
  text-align:center
}

/* Card + section rules copied verbatim from main SPA style.css (pcard / picon / link-sec) */
.pcard{
  display:flex;
  align-items:center;
  gap:18px;
  padding:24px;
  text-decoration:none;
  color:var(--t1);
  background:var(--card);
  box-shadow:var(--shadow);
  border-radius:20px;
  margin-bottom:14px;
  border:none;
  width:100%;
  font:inherit;
  text-align:left;
  cursor:pointer;
  transition:box-shadow .15s,transform .1s,background .2s,color .2s,border-color .2s
}
.pcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.08);transform:translateY(-2px)}
.pcard:active{transform:translateY(-1px) scale(.985)}
@media(hover:hover){.pcard:hover{will-change:transform}}
.pcard .pinf{flex:1;min-width:0}
.pcard .pt{font-size:1.0625rem;font-weight:600;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard .pd{font-size:.8125rem;color:var(--t3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.picon{width:42px;height:42px;border-radius:var(--r);background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.picon svg{width:20px;height:20px;color:var(--t3);stroke-width:2}
html[data-theme="dark"] .picon{background:#3A3A3C}

.search-wrap{margin-bottom:20px}
.link-sec{margin-bottom:clamp(20px,4vw,28px)}
.link-sec h3{
  font-size:.75rem;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--t3);
  margin-bottom:12px
}

.empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:.875rem;background:none;box-shadow:none}

/* Copied-feedback tokens, light theme defaults (sage-green, low saturation) */
:root{--lg-ok-bg:#DCFCE7;--lg-ok-c:#15803D;--lg-ok-bdr:#A7F3D0}
html[data-theme="dark"]{--lg-ok-bg:#1A3A2A;--lg-ok-c:#34D399;--lg-ok-bdr:#2D5A3E}
html[data-theme="sepia"]{--lg-ok-bg:#E8E0CE;--lg-ok-c:#2D7D46;--lg-ok-bdr:#DDD4C0}

.pcard.copied{
  background:var(--lg-ok-bg);
  color:var(--lg-ok-c);
  box-shadow:0 0 0 1.5px var(--lg-ok-bdr),var(--shadow);
  animation:lgPop .35s ease
}
.pcard.copied .pt{color:var(--lg-ok-c)}
.pcard.copied .pd{color:var(--lg-ok-c);opacity:.8}
.pcard.copied .picon{background:var(--lg-ok-bdr)}
.pcard.copied .picon svg{color:var(--lg-ok-c)}
@keyframes lgPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.02)}
  100%{transform:scale(1)}
}
@media(prefers-reduced-motion:reduce){
  .pcard.copied{animation:none}
  .pcard:hover{transform:none}
}
</style>

  function buildIcon(name){
    const div=document.createElement('div');
    div.className='picon';
    div.insertAdjacentHTML('afterbegin',SVG_OPEN+(LOUNGE_ICONS[name]||LOUNGE_ICONS.plane)+SVG_CLOSE);
    return div;
  }

  const list=document.getElementById('lounge-list');
  const input=document.getElementById('lounge-search');
  const clearBtn=document.querySelector('.search-x');

  let lounges=[];
  let renderTimer=0;

  function searchTokens(l){
    return (l.name+' '+l.city+' '+l.airport+' '+l.airportCode+' '+l.country+' '+l.continent+' '+l.icon).toLowerCase();
  }

  function scoreLounge(l,q){
    const words=q.split(/\s+/).filter(Boolean);
    if(!words.length)return 1;
    let total=0;
    const all=searchTokens(l);
    const nameLower=l.name.toLowerCase();
    for(let i=0;i<words.length;i++){
      const w=words[i];
      const nameScore=_search.scoreWord(w,nameLower,false)*1.5;
      const otherScore=_search.scoreWord(w,all,false);
      const best=Math.max(nameScore,otherScore);
      if(best<=0)return 0;
      total+=best;
    }
    return total;
  }

  function copyCard(card,l){
    const payload=l.name+'\n'+l.airport+' ('+l.airportCode+')';
    _base.copyText(payload,
      function(){
        card.classList.remove('copied');void card.offsetWidth;card.classList.add('copied');
        clearTimeout(card._cpT);
        card._cpT=setTimeout(function(){card.classList.remove('copied')},800);
      },
      function(){_base.notify('Copy Failed',false)}
    );
  }

  function buildCard(l){
    const card=document.createElement('button');
    card.type='button';
    card.className='pcard';
    card.appendChild(buildIcon(l.icon));
    const info=document.createElement('div');info.className='pinf';
    const title=document.createElement('div');title.className='pt';title.textContent=l.name;
    const sub=document.createElement('div');sub.className='pd';
    sub.textContent=l.airport+' ('+l.airportCode+'), '+l.city;
    info.appendChild(title);info.appendChild(sub);
    card.appendChild(info);
    card.addEventListener('click',function(){copyCard(card,l)});
    return card;
  }

  function setClearVisible(v){clearBtn.style.display=v?'flex':'none'}

  function render(query){
    const q=(query||'').trim().toLowerCase();
    list.replaceChildren();
    if(!q){
      // Default view: group by country (JSON sort order: continent, country, city, airport, name).
      let curCountry=null,curSection=null;
      const frag=document.createDocumentFragment();
      for(let i=0;i<lounges.length;i++){
        const l=lounges[i];
        const key=l.country||'Other';
        if(key!==curCountry){
          curCountry=key;
          curSection=document.createElement('div');curSection.className='link-sec';
          const h=document.createElement('h3');h.textContent=key;
          curSection.appendChild(h);
          frag.appendChild(curSection);
        }
        curSection.appendChild(buildCard(l));
      }
      list.appendChild(frag);
      return;
    }
    const scored=[];
    for(let i=0;i<lounges.length;i++){
      const s=scoreLounge(lounges[i],q);
      if(s>0)scored.push({l:lounges[i],s:s});
    }
    scored.sort(function(a,b){return b.s-a.s||a.l.name.localeCompare(b.l.name)});
    if(!scored.length){
      const empty=document.createElement('div');empty.className='empty';empty.textContent='No Matches';
      list.appendChild(empty);
      return;
    }
    const frag=document.createDocumentFragment();
    for(let i=0;i<scored.length;i++)frag.appendChild(buildCard(scored[i].l));
    list.appendChild(frag);
  }

  function scheduleRender(){
    clearTimeout(renderTimer);
    setClearVisible(!!input.value);
    renderTimer=setTimeout(function(){render(input.value)},80);
  }

  input.addEventListener('input',scheduleRender);
  input.addEventListener('keydown',function(e){
    if(e.key==='Escape'){clearTimeout(renderTimer);input.value='';setClearVisible(false);render('');input.blur()}
  });
  clearBtn.addEventListener('click',function(){
    clearTimeout(renderTimer);input.value='';setClearVisible(false);render('');input.focus();
  });

  _base.onKey({
    '/':function(e){e.preventDefault();input.focus()}
  });

  fetch('/lounge/lounges.json')
    .then(function(r){return r.json()})
    .then(function(data){
      lounges=data||[];
      render('');
    })
    .catch(function(){
      const empty=document.createElement('div');empty.className='empty';
      empty.textContent='Unable to load. Please check your connection.';
      list.replaceChildren(empty);
    });

  setClearVisible(false);
})();
</script>
</body>
</html>
