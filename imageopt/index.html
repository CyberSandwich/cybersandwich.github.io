<meta charset="UTF-8">

<title>ImageOpt | JPEG</title>
<style>
body{display:flex;align-items:center;justify-content:center;cursor:pointer}
body.has-files{align-items:flex-start;cursor:default}
.w{max-width:440px;padding:20px 20px 100px;width:100%}
.zone{border:2px dashed var(--bdr);border-radius:20px;padding:48px;text-align:center;transition:border-color .2s,background .2s}
.zone svg{color:var(--t4)}
.sum{padding:20px;display:none}
.sum-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sum-count{font:600 .9375rem/1 var(--font);color:var(--t1)}
.sum-save{font:700 .9375rem/1 var(--font);color:#34D399}
.sum-sizes{font:400 .8125rem/1 var(--font);color:var(--t3)}
.fcard{padding:16px 20px;margin-bottom:10px;animation:fi .25s ease}
.fc-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.fc-name{font:500 .875rem/1.2 var(--font);color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-orig{font:500 .75rem/1 var(--font);color:var(--t3);flex-shrink:0}
.fc-save{font:700 .8125rem/1 var(--font);color:#34D399;flex-shrink:0}
.fc-grow{font:700 .8125rem/1 var(--font);color:#F59E0B;flex-shrink:0}
.fc-err{font:500 .75rem/1 var(--font);color:#EF4444;flex-shrink:0}
.fc-bar{height:4px;background:var(--bdr);border-radius:4px;margin-top:10px;overflow:hidden}
.fc-fill{height:100%;background:var(--t4);border-radius:4px;transition:width .3s ease;width:0}
.fc-stage{font:400 .75rem/1 var(--font);color:var(--t3);margin-top:6px}
.fc-sizes{font:400 .8125rem/1 var(--font);color:var(--t3);margin-top:6px}
.fc-acts{display:flex;gap:8px;margin-top:10px}
.fc-acts button{flex:1;padding:10px;border-radius:12px;border:1px solid var(--bdr);background:none;font:500 .8125rem/1 var(--font);color:var(--t2);cursor:pointer;text-align:center;transition:background .2s,color .15s}
.links>button.danger{color:#EF4444}
.links>button.danger svg{color:#EF4444}
.notif{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:50px;font:500 .8125rem/1 var(--font);background:var(--card);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s;z-index:20;white-space:nowrap;color:var(--t2)}
.notif.show{opacity:1}
@media(hover:hover){
  .fc-acts button:hover{background:var(--bg2);color:var(--t1)}
  .zone:hover{border-color:var(--t4);background:var(--bg2)}
}
</style>
</head>
<body>
<div class="w">
  <div id="zone" class="zone" role="button" tabindex="0" aria-label="Upload Images">
    <svg width="48" height="48" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><path d="M12 3v12"/></svg>
  </div>
  <input id="fin" type="file" accept="image/*" multiple style="display:none">
  <div id="sum" class="card sum">
    <div class="sum-top">
      <span id="sum-count" class="sum-count"></span>
      <span id="sum-save" class="sum-save"></span>
    </div>
    <div id="sum-sizes" class="sum-sizes"></div>
  </div>
  <div id="files"></div>
  <div id="acts" class="card links" style="display:none">
    <button id="dl-all"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg><span>Download All</span></button>
    <button id="add-more"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>Add More Files</span></button>
    <button id="clear" class="danger"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><span>Clear All</span></button>
  </div>
</div>
<div id="drop-ov" class="drop-overlay">
  <svg width="48" height="48" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg>
  Drop Images Here
</div>

'  var e=p;',

'  else{e+=l}',

'}',

'  mem[d+n]=0;return n+1;',

'function simpleSprintf(mem,fmtPtr,argsPtr){',

'  var args=new Uint32Array(mem.buffer,argsPtr);',
'  var ai=0;',
'  return fmt.replace(/(.?)%(\\d*)([^%])/g,function(_,pre,pad,suf){',
'    if(pre==="%")return "%%";',
'    var a=args[ai++];',
'    if(suf==="s")return pre+getString(mem,a);',

async function compileWasm(){
  if(wasmCompiled)return;
  wasmCompiled=true;
  if(MJ_B64&&MJ_B64!=='MJ'+'TAG'){
    try{mjModule=await WebAssembly.compile(b64toAB(MJ_B64))}
    catch(e){console.warn('mozjpeg compile:',e)}
  }
  if(!mjModule)wasmFailed=true;
  workerUrl=URL.createObjectURL(new Blob([WORKER_SRC],{type:'application/javascript'}));
}

var queue=[],processing=false,results=[],notifTimer=null,abortGen=0;

function showNotif(msg){
  var el=$('notif');el.textContent=msg;el.classList.add('show');
  if(notifTimer)clearTimeout(notifTimer);
  notifTimer=setTimeout(function(){el.classList.remove('show')},3000);
}
function hideNotif(){$('notif').classList.remove('show');if(notifTimer)clearTimeout(notifTimer)}

function createCard(file){
  var d=document.createElement('div');d.className='card fcard';
  var top=document.createElement('div');top.className='fc-top';
  var name=document.createElement('span');name.className='fc-name';name.textContent=file.name;
  var orig=document.createElement('span');orig.className='fc-orig';orig.textContent=fmtSize(file.size);
  top.appendChild(name);
  top.appendChild(orig);
  var bar=document.createElement('div');bar.className='fc-bar';
  var fill=document.createElement('div');fill.className='fc-fill';
  bar.appendChild(fill);
  var stage=document.createElement('div');stage.className='fc-stage';stage.textContent='Queued';
  d.appendChild(top);d.appendChild(bar);d.appendChild(stage);
  d._fill=fill;d._stage=stage;d._orig=orig;d._top=top;d._name=file.name;d._origSize=file.size;
  $('files').appendChild(d);
  return d;
}

function updateCard(card,text,pct){card._fill.style.width=pct+'%';card._stage.textContent=text}

function completeCard(card,blob){
  var origSize=card._origSize,newSize=blob.size;
  var pct=Math.round((1-newSize/origSize)*100);
  card._fill.parentNode.remove();card._stage.remove();card._orig.remove();
  var save=document.createElement('span');
  save.className=pct>0?'fc-save':'fc-grow';
  save.textContent=(pct>0?'-':'+')+Math.abs(pct)+'%';
  card._top.appendChild(save);
  var sizes=document.createElement('div');sizes.className='fc-sizes';
  sizes.textContent=fmtSize(origSize)+' \u2192 '+fmtSize(newSize);
  card.appendChild(sizes);
  if(pct>0){
    var acts=document.createElement('div');acts.className='fc-acts';
    var dl=document.createElement('button');dl.textContent='Download';
    var outName=card._name.replace(/\.[^.]+$/,'')+'_optimized.jpeg';
    dl.addEventListener('click',function(){downloadBlob(blob,outName)});
    var cp=document.createElement('button');cp.textContent='Copy';
    cp.addEventListener('click',function(){copyBlob(blob,cp)});
    acts.appendChild(dl);acts.appendChild(cp);card.appendChild(acts);
    card._blob=blob;card._outName=outName;
  }else{
    var note=document.createElement('div');note.className='fc-sizes';
    note.textContent='Already Optimal';card.appendChild(note);
  }
}

function errorCard(card,msg){
  if(card._fill&&card._fill.parentNode)card._fill.parentNode.remove();
  if(card._stage&&card._stage.parentNode)card._stage.remove();
  if(card._orig&&card._orig.parentNode)card._orig.remove();
  var err=document.createElement('span');err.className='fc-err';err.textContent=msg;
  card._top.appendChild(err);
}

function updateSummary(){
  var done=results.filter(function(r){return r.blob});
  if(done.length===0){$('sum').style.display='none';return}
  var totOrig=0,totNew=0;
  done.forEach(function(r){totOrig+=r.origSize;totNew+=r.blob.size});
  var pct=Math.round((1-totNew/totOrig)*100);
  $('sum-count').textContent=done.length+' File'+(done.length>1?'s':'');
  var ss=$('sum-save');ss.textContent=pct>=0?'Saved '+pct+'%':'Grew '+Math.abs(pct)+'%';
  ss.style.color=pct>=0?'#34D399':'#F59E0B';
  $('sum-sizes').textContent=fmtSize(totOrig)+' \u2192 '+fmtSize(totNew);
  $('sum').style.display='';
}

function downloadBlob(blob,name){
  var a=document.createElement('a');var url=URL.createObjectURL(blob);
  a.href=url;a.download=name;document.body.appendChild(a);a.click();
  document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url)},100);
}

function downloadAll(){
  var items=results.filter(function(r){return r.blob});
  if(!items.length)return;
  var i=0;
  function next(){if(i>=items.length)return;downloadBlob(items[i].blob,items[i].outName);i++;setTimeout(next,200)}
  next();
}

function copyBlob(blob,btn){
  if(!navigator.clipboard||!navigator.clipboard.write){showNotif('Clipboard Not Available');return}
  var img=new Image();
  var url=URL.createObjectURL(blob);
  img.onload=function(){
    var cv=document.createElement('canvas');cv.width=img.naturalWidth;cv.height=img.naturalHeight;
    var ctx=cv.getContext('2d');ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    cv.toBlob(function(pngBlob){
      if(!pngBlob){showNotif('Copy Failed');return}
      navigator.clipboard.write([
        new ClipboardItem({'image/png':pngBlob})
      ]).then(function(){
        btn.textContent='Copied';setTimeout(function(){btn.textContent='Copy'},1500);
      }).catch(function(){showNotif('Copy Failed')});
    },'image/png');
  };
  img.onerror=function(){URL.revokeObjectURL(url);showNotif('Copy Failed')};
  img.src=url;
}

function copyTopImage(){
  var cards=$('files').children;
  for(var i=0;i<cards.length;i++){
    if(cards[i]._blob){
      var cp=cards[i].querySelector('.fc-acts button:last-child');
      if(cp)copyBlob(cards[i]._blob,cp);
      return;
    }
  }
}

function pasteImage(){
  if(!navigator.clipboard||!navigator.clipboard.read)return;
  navigator.clipboard.read().then(function(items){
    items.forEach(function(item){
      item.types.forEach(function(type){
        if(type.startsWith('image/')){
          item.getType(type).then(function(blob){
            enqueue([new File([blob],'clipboard.'+type.split('/')[1],{type:type})]);
          });
        }
      });
    });
  }).catch(function(){});
}

async function processFile(file,card){
  function aborted(){return !card.isConnected}
  updateCard(card,'Decoding...',5);await tick();
  if(aborted())throw new Error('Cancelled');
  var bmp;
  try{bmp=await createImageBitmap(file)}
  catch(e){throw new Error('Failed to Decode')}
  if(aborted()){bmp.close();throw new Error('Cancelled')}
  var cw=bmp.width,ch=bmp.height,maxDim=2560;
  if(Math.max(cw,ch)>maxDim){var sc=maxDim/Math.max(cw,ch);cw=Math.round(cw*sc);ch=Math.round(ch*sc)}
  updateCard(card,'Processing...',10);await tick();
  if(aborted()){bmp.close();throw new Error('Cancelled')}
  var cv=document.createElement('canvas');cv.width=cw;cv.height=ch;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,cw,ch);
  ctx.drawImage(bmp,0,0,cw,ch);bmp.close();
  var rgba=ctx.getImageData(0,0,cw,ch).data;
  updateCard(card,'Encoding...',20);await tick();
  if(aborted())throw new Error('Cancelled');
  if(wasmFailed){
    var canvasBlob=await new Promise(function(r){cv.toBlob(r,'image/jpeg',0.75)});
    updateCard(card,'Done',100);
    return canvasBlob;
  }
  return new Promise(function(resolve,reject){
    var w=new Worker(workerUrl);
    activeWorker=w;activeReject=reject;
    w.postMessage({type:'process',rgba:rgba.buffer,width:cw,height:ch,
      mjModule:mjModule},[rgba.buffer]);
    w.onmessage=function(e){
      var d=e.data;
      if(d.type==='progress'){updateCard(card,d.stage,d.pct)}
      else if(d.type==='done'){
        activeWorker=null;activeReject=null;w.terminate();
        updateCard(card,'Done',100);
        resolve(new Blob([d.jpeg],{type:'image/jpeg'}));
      }else if(d.type==='error'){
        activeWorker=null;activeReject=null;w.terminate();
        reject(new Error(d.msg));
      }
    };
    w.onerror=function(e){
      activeWorker=null;activeReject=null;w.terminate();
      reject(new Error('Worker Failed'));
    };
  });
}

function enqueue(fileList){
  for(var i=0;i<fileList.length;i++){
    var f=fileList[i],card;
    if(f.type==='image/heic'||f.type==='image/heif'||/\.hei[cf]$/i.test(f.name)){
      card=createCard(f);errorCard(card,'HEIC Not Supported');
      results.push({origSize:f.size,blob:null,outName:''});continue;
    }
    if(f.type&&!/^image\//.test(f.type)){
      card=createCard(f);errorCard(card,'Unsupported Format');
      results.push({origSize:f.size,blob:null,outName:''});continue;
    }
    if(f.size>52428800)showNotif('Large File \u2014 Processing May Be Slow');
    card=createCard(f);queue.push({file:f,card:card});
  }
  updateActions();
  if(!processing)drain();
}

async function drain(){
  processing=true;
  var gen=abortGen;
  if(!wasmCompiled){
    await compileWasm();
    if(gen!==abortGen){processing=false;return}
    if(wasmFailed)showNotif('Canvas-Only Mode');
  }
  while(queue.length&&gen===abortGen){
    var item=queue.shift();
    try{
      var blob=await processFile(item.file,item.card);
      if(gen!==abortGen)break;
      completeCard(item.card,blob);
      var grew=blob.size>=item.file.size;
      results.push({origSize:item.file.size,blob:grew?null:blob,outName:grew?'':item.card._outName});
    }catch(e){
      if(gen!==abortGen)break;
      errorCard(item.card,e.message||'Processing Failed');
      results.push({origSize:item.file.size,blob:null,outName:''});
    }
    updateSummary();
  }
  if(gen===abortGen){processing=false;updateActions()}
}

function updateActions(){
  var hasFiles=results.length>0||queue.length>0;
  $('acts').style.display=hasFiles?'':'none';
  $('zone').style.display=hasFiles?'none':'';
  document.body.classList.toggle('has-files',hasFiles);
  $('dl-all').disabled=!results.some(function(r){return r.blob});
}

function clearAll(){
  if(activeWorker){activeWorker.terminate();activeWorker=null}
  if(activeReject){activeReject(new Error('Cancelled'));activeReject=null}
  abortGen++;queue=[];results=[];processing=false;
  $('files').textContent='';$('sum').style.display='none';
  updateActions();showNotif('Cleared');
}

var fin=$('fin');
document.body.addEventListener('click',function(e){if(!document.body.classList.contains('has-files')&&!e.target.closest('nav,button,a'))fin.click()});
$('zone').addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();fin.click()}});
fin.addEventListener('change',function(){if(fin.files.length)enqueue(fin.files);fin.value=''});
$('dl-all').addEventListener('click',downloadAll);
$('add-more').addEventListener('click',function(){fin.click()});
$('clear').addEventListener('click',clearAll);

var dragCount=0,overlay=$('drop-ov');
document.addEventListener('dragenter',function(e){e.preventDefault();dragCount++;if(dragCount===1)overlay.classList.add('active')});
document.addEventListener('dragleave',function(e){e.preventDefault();dragCount--;if(dragCount<=0){dragCount=0;overlay.classList.remove('active')}});
document.addEventListener('dragover',function(e){e.preventDefault()});
document.addEventListener('drop',function(e){
  e.preventDefault();dragCount=0;overlay.classList.remove('active');
  if(e.dataTransfer.files&&e.dataTransfer.files.length)enqueue(e.dataTransfer.files);
});

document.addEventListener('paste',function(e){
  var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  var files=[];
  for(var i=0;i<items.length;i++){if(items[i].kind==='file'){var f=items[i].getAsFile();if(f)files.push(f)}}
  if(files.length){e.preventDefault();enqueue(files)}
});

document.addEventListener('keydown',function(e){
  var tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;
  var mod=e.metaKey||e.ctrlKey;
  if(mod&&!e.altKey&&!e.shiftKey){
    if(e.key==='s'){e.preventDefault();downloadAll();return}
    if(e.key==='c'){e.preventDefault();copyTopImage();return}
    if(e.key==='v'){e.preventDefault();pasteImage();return}
    return;
  }
  if(e.altKey||e.shiftKey)return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();fin.click()}
  else if(e.key==='s'||e.key==='d'){e.preventDefault();downloadAll()}
  else if(e.key==='c'){e.preventDefault();copyTopImage()}
  else if(e.key==='v'){e.preventDefault();pasteImage()}
  else if(e.key==='r'||e.key==='Escape'){e.preventDefault();clearAll()}
  else if(e.key==='t')_base.setTheme(_base.THEMES[(_base.THEMES.indexOf(_base.curTheme())+1)%_base.THEMES.length]);
  else if(e.key==='1')window.location.href='/';
  else if(e.key==='3'||e.key==='ArrowRight')window.location.href='/imageopt/png/';
});
window.addEventListener('unload',function(){if(workerUrl)URL.revokeObjectURL(workerUrl)});
</script>
</body>
</html>
