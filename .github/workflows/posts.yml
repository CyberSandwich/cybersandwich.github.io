name: Generate Posts Pipeline

on:
  push:
    paths:
      - 'updates/*.md'
      - 'updates/posts.json'
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: generate-posts-pipeline
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Auto-rename files without date prefix
        run: |
          renamed=0
          for f in updates/*.md; do
            [ -f "$f" ] || continue
            basename_f=$(basename "$f")
            if ! echo "$basename_f" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-'; then
              date_prefix=$(date +%Y-%m-%d)
              new_name="updates/${date_prefix}-${basename_f}"
              if [ -f "$new_name" ]; then
                echo "::warning::Skipping rename, target already exists: $new_name"
                continue
              fi
              mv "$f" "$new_name"
              echo "Renamed: $basename_f -> ${date_prefix}-${basename_f}"
              renamed=$((renamed + 1))
            fi
          done
          echo "Renamed $renamed file(s)"

      - name: Generate posts.json manifest
        run: |
          python3 << 'PYEOF'
          import json, os, re, glob

          # Load existing custom fields to preserve them (icon, slug, etc.)
          existing_meta = {}
          if os.path.exists('updates/posts.json'):
              with open('updates/posts.json') as f:
                  for p in json.load(f):
                      meta = {}
                      if p.get('icon'): meta['icon'] = p['icon']
                      if p.get('slug'): meta['slug'] = p['slug']
                      if meta: existing_meta[p['file']] = meta

          posts = []
          for filepath in sorted(glob.glob('updates/*.md')):
              basename = os.path.basename(filepath)

              date_match = re.match(r'^(\d{4}-\d{2}-\d{2})-', basename)
              if not date_match:
                  print(f"::warning::Skipping file without date prefix: {basename}")
                  continue
              date_val = date_match.group(1)

              title_val = None
              with open(filepath, 'r') as f:
                  content = f.read()

              content_body = re.sub(r'^---.*?---\n?', '', content, count=1, flags=re.DOTALL)

              h1_match = re.search(r'^# (.+)$', content_body, re.MULTILINE)
              if h1_match:
                  title_val = h1_match.group(1).strip()

              if not title_val:
                  slug = basename[11:].replace('.md', '')
                  title_val = slug.replace('-', ' ')

              words = len(re.sub(r'^#+ .+$', '', content_body, flags=re.MULTILINE).split())

              entry = {
                  'date': date_val,
                  'title': title_val,
                  'file': basename,
                  'words': words
              }
              # Restore preserved custom fields
              if basename in existing_meta:
                  entry.update(existing_meta[basename])

              posts.append(entry)

          posts.sort(key=lambda x: (-int(x['date'].replace('-', '')), x['title']))

          with open('updates/posts.json', 'w') as f:
              json.dump(posts, f, indent=2)
              f.write('\n')

          print(f"Generated manifest with {len(posts)} post(s)")
          PYEOF

      - name: Validate JSON output
        run: python3 -c "import json; d=json.load(open('updates/posts.json')); assert isinstance(d, list), 'Expected array'" || { echo "::error::Generated invalid posts.json"; exit 1; }

      - name: Build static post pages
        run: node scripts/build-posts.js

      - name: Update sitemap with post URLs
        run: |
          python3 << 'PYEOF'
          import json, re

          with open('updates/posts.json') as f:
              posts = json.load(f)

          with open('sitemap.xml') as f:
              sitemap = f.read()

          # Remove all existing /updates/ post URLs (but keep /updates page itself)
          sitemap = re.sub(
              r'\s*<url><loc>https://saputra\.co\.uk/updates/[^<]+</loc>[^<]*</url>',
              '', sitemap
          )

          # Build new post URL entries
          post_entries = ''
          for p in posts:
              slug = p.get('slug') or p['file'].replace('.md', '')
              post_entries += f'\n  <url><loc>https://saputra.co.uk/updates/{slug}</loc><lastmod>{p["date"]}</lastmod><priority>0.5</priority></url>'

          # Insert before closing tag
          sitemap = sitemap.replace(
              '</urlset>',
              post_entries + '\n</urlset>'
          )

          with open('sitemap.xml', 'w') as f:
              f.write(sitemap)

          print(f"Updated sitemap with {len(posts)} post URL(s)")
          PYEOF

      - name: Update llms.txt with post list
        run: |
          python3 << 'PYEOF'
          import json, re

          with open('updates/posts.json') as f:
              posts = json.load(f)

          with open('llms.txt') as f:
              content = f.read()

          # Remove existing post lines and marker if present
          content = re.sub(r'\n## Posts\n(?:- \[.*\n)*', '', content)

          # Build posts section
          if posts:
              post_section = '\n## Posts\n'
              for p in posts:
                  slug = p.get('slug') or p['file'].replace('.md', '')
                  post_section += f'- [{p["title"]}](https://saputra.co.uk/updates/{slug}) — {p["date"]}\n'
              # Insert before ## Contact
              content = content.replace('\n## Contact', post_section + '\n## Contact')

          with open('llms.txt', 'w') as f:
              f.write(content)

          print(f"Updated llms.txt with {len(posts)} post(s)")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/ sitemap.xml llms.txt
          git diff --staged --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "chore: update posts pipeline (manifest, static pages, sitemap, llms.txt)"
          git push

      - name: Job summary
        run: |
          python3 << 'PYEOF'
          import json, os

          with open('updates/posts.json') as f:
              posts = json.load(f)

          lines = []
          lines.append("## Posts Pipeline Updated")
          lines.append(f"**Total posts:** {len(posts)}")
          lines.append("")
          lines.append("| Date | Title | Slug | Words |")
          lines.append("|------|-------|------|-------|")
          for p in posts:
              slug = p.get('slug') or p['file'].replace('.md', '')
              words = p.get('words', '-')
              lines.append(f"| {p['date']} | {p['title']} | /{slug} | {words} |")

          total_words = sum(p.get('words', 0) for p in posts)
          lines.append(f"\n**Total words:** {total_words}")
          lines.append("\n**Generated:** posts.json, static HTML, sitemap.xml, llms.txt")

          summary = '\n'.join(lines)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if summary_file:
              with open(summary_file, 'a') as f:
                  f.write(summary + '\n')
          print(summary)
          PYEOF
