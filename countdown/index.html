.add-tall:active{opacity:.7}
@media(hover:hover){.add-tall:hover{color:var(--t1);background:var(--bg2)}}

.item-header{display:flex;align-items:center;padding:14px 16px 10px 20px}
.item-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.item-title{font:600 .9375rem/1.4 var(--font);color:var(--t1)}
.item-date{font:400 .75rem/1.3 var(--font);color:var(--t3)}
.item-cd-wrap{display:flex;gap:8px;padding:0 16px 14px 20px}
.item-cd-unit{flex:1;background:var(--bg);border-radius:12px;padding:8px 4px;text-align:center}
.item-cd-val{font:600 1.125rem/1.2 var(--font);color:var(--t1);font-variant-numeric:tabular-nums}
.item-cd-lbl{font:400 .625rem/1.2 var(--font);color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.item-cd-unit.zero{opacity:.3}
.item.done .item-cd-wrap{opacity:.4}
.item.done .item-title{color:var(--t3)}
.item .del{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--bdr);background:var(--bg2);cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:12px;transition:color .15s,background .15s,border-color .15s}
.item .del svg{width:14px;height:14px;pointer-events:none}
.item.removing{opacity:0;transition:opacity .1s ease}
.item.kb-focus{outline:2px solid var(--acc);outline-offset:2px}
.no-match{padding:32px 20px;text-align:center;color:var(--t4);font:500 .9375rem/1 var(--font)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.item:active{opacity:.85}
.item .del:active{opacity:.7}
.links>button:active:not([disabled]){opacity:.7}
.fire-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.fire-overlay.active{display:flex}
.fire-overlay:not(.active) .fire-icon{animation-play-state:paused}
.fire-card{background:var(--card);border-radius:24px;padding:clamp(32px,6vw,48px);text-align:center;max-width:380px;width:100%;animation:scaleUp .3s ease;box-shadow:0 20px 60px rgba(0,0,0,.15)}
@keyframes scaleUp{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.fire-icon{width:56px;height:56px;margin:0 auto 24px;color:var(--acc);animation:wiggle .4s ease infinite alternate}
@keyframes wiggle{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
.fire-title{font:600 1.25rem/1.3 var(--font);color:var(--t1);margin-bottom:4px}
.fire-label{font-size:.9375rem;color:var(--t2);margin-bottom:32px}
.fire-btns button{width:100%;padding:14px 28px;border:none;border-radius:var(--rr);font:600 .9375rem/1 var(--font);cursor:pointer;background:var(--tab-active);color:var(--tab-active-c);box-shadow:0 4px 14px rgba(0,0,0,.12);transition:box-shadow .15s}
.fire-btns button:hover{box-shadow:0 6px 20px rgba(0,0,0,.18)}
.fire-btns button:active{transform:scale(.985)}
@media(prefers-reduced-motion:reduce){
  .fire-icon{animation:none}
  .fire-card{animation:none}
  @keyframes scaleUp{from{opacity:1}to{opacity:1}}
}
@media(hover:hover){
  .item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.08)}
  .item .del:hover{color:var(--t1);background:var(--bg2);border-color:var(--t4)}
}
</style>

  <div class="card links" id="actions">
    <button type="button" id="pa-btn" aria-label="Paste"><svg aria-hidden="true" id="pa-i" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg><svg aria-hidden="true" id="pa-ck" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="4 12 9 17 20 6"/></svg><span id="pa-l">Paste</span></button>

      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </div>

<script>
(function(){'use strict';
function $(id){return document.getElementById(id)}
var parseDate=_dp.parseDate,parseTime=_dp.parseTime,splitTitleDate=_dp.splitTitleDate,extractDate=_dp.extractDate,formatLabel=_dp.formatLabel,fmtTime12=_dp.fmtTime12,MONTH_NAMES=_dp.MONTH_NAMES;
var items=[],searchTimer=null,tickTimer=null;
var kbIdx=-1;
var audioCtx,sndInt,wakeLock=null;
var mkX=_base.mkX;
var norm=_search.norm,scoreWord=_search.scoreWord;
var gran='d';

/* ── Storage ─────────────────────────────────────────────────────── */
function load(){
  var p=_base.load('countdown-items',[]);
  if(Array.isArray(p))items=p.filter(function(e){return e&&e.id&&e.target}).map(function(e){
    // Regenerate label to include time (migrates old items without time in label)
    e.dateLabel=formatLabel(new Date(e.target));return e;
  });
  var g;try{g=localStorage.getItem('countdown:gran')}catch(_){}
  if(g==='d'||g==='h'||g==='min'||g==='sec')gran=g;
}
function save(){
  try{localStorage.setItem('countdown-items',JSON.stringify(items))}
  catch(e){if(e.name==='QuotaExceededError')announce('Storage Full')}
}
function saveGran(){try{localStorage.setItem('countdown:gran',gran)}catch(_){}}

/* ── Unique ID ───────────────────────────────────────────────────── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ── Announce (a11y) ─────────────────────────────────────────────── */
function announce(msg){var el=$('status');el.textContent='';requestAnimationFrame(function(){el.textContent=msg})}

/* ── Countdown Calculation ───────────────────────────────────────── */
function calcCountdown(targetMs){
  var diff=targetMs-Date.now();
  if(diff<=0)return null;
  var s=Math.floor(diff/1000);
  if(gran==='sec')return[{v:s,l:s===1?'Sec':'Secs'}];
  if(gran==='min'){
    var m=Math.floor(s/60);s%=60;
    return[{v:m,l:m===1?'Min':'Mins'},{v:s,l:s===1?'Sec':'Secs'}];
  }
  if(gran==='h'){
    var h=Math.floor(s/3600);s%=3600;
    var m=Math.floor(s/60);s%=60;
    return[{v:h,l:h===1?'Hour':'Hours'},{v:m,l:m===1?'Min':'Mins'},{v:s,l:s===1?'Sec':'Secs'}];
  }
  var d=Math.floor(s/86400);s%=86400;
  var h=Math.floor(s/3600);s%=3600;
  var m=Math.floor(s/60);s%=60;
  return[{v:d,l:d===1?'Day':'Days'},{v:h,l:h===1?'Hour':'Hours'},{v:m,l:m===1?'Min':'Mins'},{v:s,l:s===1?'Sec':'Secs'}];
}

function buildCdWrap(units,done){
  var wrap=document.createElement('div');wrap.className='item-cd-wrap';
  if(done){
    var comp=document.createElement('div');
    comp.style.cssText='flex:1;text-align:center;padding:8px;color:var(--t4);font:500 .875rem/1.3 var(--font)';
    comp.textContent='Completed';
    wrap.appendChild(comp);
    return wrap;
  }
  if(!units)return wrap;
  for(var i=0;i<units.length;i++){
    var u=document.createElement('div');u.className='item-cd-unit'+(units[i].v===0?' zero':'');
    var v=document.createElement('div');v.className='item-cd-val';v.textContent=units[i].v;
    var l=document.createElement('div');l.className='item-cd-lbl';l.textContent=units[i].l;
    u.appendChild(v);u.appendChild(l);wrap.appendChild(u);
  }
  return wrap;
}

/* ── Alarm System ────────────────────────────────────────────────── */
function initAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function beep(){
  initAudio();
  if(audioCtx.state!=='running')return;
  var t=audioCtx.currentTime;
  [0,.2,.4].forEach(function(d){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=d===.2?1046:880;o.type='sine';
    g.gain.setValueAtTime(.4,t+d);g.gain.exponentialRampToValueAtTime(.01,t+d+.15);
    o.start(t+d);o.stop(t+d+.15);
  });
}
function playSound(){
  initAudio();
  var tries=0;
  var tryBeep=function(){
    if(audioCtx.state==='running'){beep();sndInt=setInterval(beep,2000)}
    else if(++tries<20){setTimeout(tryBeep,50)}
  };
  tryBeep();
}
function stopSound(){if(sndInt){clearInterval(sndInt);sndInt=null}}
function needsSound(){return firedItem!==null}
function checkSound(){if(needsSound()&&!sndInt)playSound();if(!needsSound()&&sndInt)stopSound()}

var firedItem=null;

async function updateWake(){
  if(firedItem){
    if(!wakeLock&&navigator.wakeLock){try{wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',function(){wakeLock=null})}catch(e){}}
  }else{
    if(wakeLock){try{wakeLock.release()}catch(e){}wakeLock=null}
  }
}

function fireItem(item){
  firedItem=item;
  $('fireTitle').textContent=item.title;
  $('fireLbl').textContent=item.dateLabel;
  $('fireOv').classList.add('active');
  $('dismiss-btn').focus();
  checkSound();updateWake();
  if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
}

function dismiss(){
  if(firedItem){
    for(var i=0;i<items.length;i++){
      if(items[i].id===firedItem.id){items[i].done=true;break}
    }
    save();
  }
  firedItem=null;
  $('fireOv').classList.remove('active');
  // Check for next expired
  var next=null;
  for(var i=0;i<items.length;i++){
    if(!items[i].done&&items[i].target<=Date.now()){next=items[i];break}
  }
  if(next)fireItem(next);
  else{checkSound();updateWake()}
  render();
}

/* ── Render ───────────────────────────────────────────────────────── */
function render(){
  _search.clearCache();
  var c=$('items'),q=norm($('search').value.trim().toLowerCase());
  var words=q.split(/\s+/).filter(Boolean);
  var hasItems=items.length>0;
  var frag=document.createDocumentFragment();

  var activeCount=items.filter(function(e){return!e.done}).length;
  $('ca-btn').disabled=!activeCount;$('ca-btn').style.display=activeCount?'':'none';
  $('ca-l').textContent=activeCount>1?'Copy All':'Copy';
  $('search-wrap').style.display=hasItems?'block':'none';

  if(!hasItems){c.textContent='';c.style.display='none';kbIdx=-1;return}

  var sorted=items.slice().sort(function(a,b){if(a.done!==b.done)return a.done?1:-1;return a.target-b.target});
  var list=sorted;
  if(words.length){
    var scored=[];
    for(var i=0;i<sorted.length;i++){
      var it=sorted[i],t=(it.title+' '+it.dateLabel).toLowerCase(),total=0,ok=true;
      for(var wi=0;wi<words.length;wi++){
        var sc=scoreWord(words[wi],t);
        if(sc<=0){ok=false;break}
        total+=sc;
      }
      if(ok)scored.push({it:it,score:total});
    }
    scored.sort(function(a,b){return b.score-a.score});
    list=scored.map(function(x){return x.it});
  }

  for(var i=0;i<list.length;i++){
    var it=list[i];
    var row=document.createElement('div');
    row.className='item'+(it.done?' done':'');
    row.setAttribute('role','listitem');
    row.setAttribute('data-id',it.id);

    var header=document.createElement('div');header.className='item-header';
    var info=document.createElement('div');info.className='item-info';
    var title=document.createElement('div');title.className='item-title';title.textContent=it.title;
    var date=document.createElement('div');date.className='item-date';date.textContent=it.dateLabel;
    info.appendChild(title);info.appendChild(date);

    var btn=document.createElement('button');btn.type='button';btn.className='del';btn.setAttribute('aria-label','Remove');
    btn.appendChild(mkX());
    header.appendChild(info);header.appendChild(btn);

    var units=it.done?null:calcCountdown(it.target);
    var cdWrap=buildCdWrap(units,it.done);
    cdWrap.setAttribute('data-id',it.id);

    row.appendChild(header);row.appendChild(cdWrap);frag.appendChild(row);
    if(i===kbIdx)row.classList.add('kb-focus');
  }

  if(list.length===0&&words.length){
    var nm=document.createElement('div');nm.className='no-match';nm.textContent='Nothing Found';frag.appendChild(nm);
    announce('Nothing Found');
  }else if(words.length){
    announce(list.length+' result'+(list.length===1?'':'s'));
  }

  c.textContent='';c.appendChild(frag);c.style.display='';
  if(kbIdx>=list.length)kbIdx=list.length-1;
}

/* ── Duplicate Detection ─────────────────────────────────────────── */
function isDupeExact(title,targetMs,extra){
  var t=title.toLowerCase(),tMin=Math.floor(targetMs/60000);
  for(var i=0;i<items.length;i++){
    if(items[i].title.toLowerCase()===t&&Math.floor(items[i].target/60000)===tMin)return true;
  }
  if(extra){for(var i=0;i<extra.length;i++){
    if(extra[i].title.toLowerCase()===t&&Math.floor(extra[i].parsed.date.getTime()/60000)===tMin)return true;
  }}
  return false;
}
function hasDupeTitle(title){
  var t=title.toLowerCase();
  for(var i=0;i<items.length;i++){if(items[i].title.toLowerCase()===t)return true}
  return false;
}

/* ── Add Item ────────────────────────────────────────────────────── */
function nextAutoTitle(claimed){
  var used=claimed||{};
  for(var i=0;i<items.length;i++){
    var m=items[i].title.match(/^Countdown\s+(\d+)$/);
    if(m)used[parseInt(m[1],10)]=1;
  }
  var n=1;while(used[n])n++;used[n]=1;
  return'Countdown '+n;
}
function addItem(){
  var title=$('inp-title').value.trim();
  var dateText=$('inp-date').value.trim();
  if(!dateText){_base.notify('Enter a Date or Duration',false);return}
  if(!title)title=nextAutoTitle();
  var parsed=parseDate(dateText);
  if(!parsed){_base.notify('Could Not Parse Date',false);return}
  if(parsed.date<=new Date()){_base.notify('Date Is in the Past',false);return}
  if(isDupeExact(title,parsed.date.getTime())){_base.notify('Duplicate Blocked',false);return}
  var titleWarn=hasDupeTitle(title);
  var id=uid();
  items.unshift({id:id,title:title,target:parsed.date.getTime(),dateLabel:parsed.label,ts:Date.now(),done:false});
  save();kbIdx=-1;render();
  $('inp-title').value='';$('inp-date').value='';
  $('inp-date').focus();
  if(titleWarn)_base.notify('Duplicate Title Exists','warn');
  else if(parsed.hint==='time')_base.notify('Current Time Used','warn');
  else if(parsed.hint==='date')_base.notify('Today\'s Date Used','warn');
  else announce('Added');
}

/* ── Remove Item ─────────────────────────────────────────────────── */
function removeItem(id){
  var row=$('items').querySelector('[data-id="'+id+'"]');
  if(row)row.classList.add('removing');
  for(var i=0;i<items.length;i++){if(items[i].id===id){items.splice(i,1);break}}
  save();
  setTimeout(function(){render();announce('Removed')},100);
}

/* ── Reset (two-press) ───────────────────────────────────────────── */
var resetCtrl=_base.twoPress($('rs-btn'),{
  label:$('rs-l'),
  guard:function(){return $('inp-title').value||$('inp-date').value||gran!=='d'},
  onConfirm:function(){
    $('inp-title').value='';$('inp-date').value='';
    if(gran!=='d'){gran='d';saveGran();updateGranUI();render()}
    $('inp-title').focus();
    announce('Reset');
  }
});
function doReset(){resetCtrl.press()}

/* ── Granularity Switching ───────────────────────────────────────── */
function updateGranUI(){
  var btns=$('gran-card').querySelectorAll('.seg');
  for(var i=0;i<btns.length;i++)
    btns[i].classList.toggle('active',btns[i].getAttribute('data-gran')===gran);
}
$('gran-card').addEventListener('click',function(e){
  var btn=e.target.closest('.seg');if(!btn)return;
  var g=btn.getAttribute('data-gran');
  if(!g||g===gran)return;
  gran=g;saveGran();updateGranUI();render();
});

/* ── Tick (live updates) ─────────────────────────────────────────── */
function tick(){
  var els=$('items').querySelectorAll('.item-cd-wrap[data-id]');
  for(var i=0;i<els.length;i++){
    var id=els[i].getAttribute('data-id');
    if(!id)continue;
    var item=null;
    for(var j=0;j<items.length;j++){if(items[j].id===id){item=items[j];break}}
    if(!item||item.done)continue;
    var units=calcCountdown(item.target);
    if(!units){
      if(!firedItem)fireItem(item);
      render();
      return;
    }
    var unitEls=els[i].querySelectorAll('.item-cd-unit');
    if(unitEls.length!==units.length){render();return}
    for(var k=0;k<units.length;k++){
      var valEl=unitEls[k].querySelector('.item-cd-val');
      var lblEl=unitEls[k].querySelector('.item-cd-lbl');
      var nv=''+units[k].v;
      if(valEl&&valEl.textContent!==nv)valEl.textContent=nv;
      if(lblEl&&lblEl.textContent!==units[k].l)lblEl.textContent=units[k].l;
      unitEls[k].classList.toggle('zero',units[k].v===0);
    }
  }
}

function startTick(){
  if(tickTimer)clearInterval(tickTimer);
  tickTimer=setInterval(tick,1000);
}
function stopTick(){if(tickTimer){clearInterval(tickTimer);tickTimer=null}}

/* ── Keyboard Navigation ─────────────────────────────────────────── */
function kbCards(){return $('items').querySelectorAll('.item')}
function kbClear(){
  kbIdx=-1;var all=kbCards();for(var i=0;i<all.length;i++)all[i].classList.remove('kb-focus');
}
function kbMove(dir){
  var cards=kbCards();if(!cards.length)return;
  if(kbIdx>=0&&kbIdx<cards.length)cards[kbIdx].classList.remove('kb-focus');
  kbIdx+=dir;
  if(kbIdx<0)kbIdx=cards.length-1;
  if(kbIdx>=cards.length)kbIdx=0;
  cards[kbIdx].classList.add('kb-focus');
  cards[kbIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
}

/* ── Input Handlers ──────────────────────────────────────────────── */
$('add-btn').addEventListener('click',addItem);
$('inp-date').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addItem()}});
$('inp-title').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();$('inp-date').focus()}});

/* ── Item Click Delegation ───────────────────────────────────────── */
$('items').addEventListener('click',function(e){
  var del=e.target.closest('.del');
  var row=e.target.closest('.item');
  if(!row)return;
  var id=row.getAttribute('data-id');
  kbClear();
  if(del){removeItem(id);return}
  // Tap card: populate inputs + copy to clipboard
  var item=null;
  for(var i=0;i<items.length;i++){if(items[i].id===id){item=items[i];break}}
  if(!item)return;
  var dt=new Date(item.target);
  var dateStr=dt.getDate()+' '+MONTH_NAMES[dt.getMonth()]+' '+dt.getFullYear()+', '+fmtTime12(dt.getHours(),dt.getMinutes());
  $('inp-title').value=item.title;
  $('inp-date').value=dateStr;
  $('inp-title').focus();
  _base.copyText(item.title+'\n'+dateStr,function(){_base.notify('Copied',true)});
});

/* ── Search ──────────────────────────────────────────────────────── */
var searchX=$('search-x');
function updateSearchX(){searchX.style.display=$('search').value?'flex':'none'}
$('search').addEventListener('input',function(){
  clearTimeout(searchTimer);kbIdx=-1;
  searchTimer=setTimeout(function(){render()},80);
  updateSearchX();
});
searchX.addEventListener('click',function(){
  $('search').value='';updateSearchX();kbIdx=-1;render();$('search').focus();
});

/* ── Paste Button ───────────────────────────────────────────────── */
var paTimer=null;
function paFeedback(){
  var btn=$('pa-btn'),pi=$('pa-i'),pk=$('pa-ck'),pl=$('pa-l');
  if(paTimer){clearTimeout(paTimer);btn.classList.remove('ok');pi.style.display='';pk.style.display='none';pl.textContent='Paste'}
  pi.style.display='none';pk.style.display='';pl.textContent='Pasted';
  btn.classList.remove('ok');btn.offsetWidth;btn.classList.add('ok');
  paTimer=setTimeout(function(){btn.classList.remove('ok');pi.style.display='';pk.style.display='none';pl.textContent='Paste';paTimer=null},800);
}
function addBulkPairs(pairs){
  var blocked=0,titleWarns=0,toAdd=[];
  for(var i=0;i<pairs.length;i++){
    if(isDupeExact(pairs[i].title,pairs[i].parsed.date.getTime(),toAdd)){blocked++;continue}
    if(hasDupeTitle(pairs[i].title))titleWarns++;
    toAdd.push(pairs[i]);
  }
  for(var i=0;i<toAdd.length;i++){
    var id=uid();
    items.unshift({id:id,title:toAdd[i].title,target:toAdd[i].parsed.date.getTime(),dateLabel:toAdd[i].parsed.label,ts:Date.now(),done:false});
  }
  save();kbIdx=-1;render();
  var bl=blocked===1?'Duplicate':'Duplicates';
  if(blocked&&!toAdd.length)_base.notify(blocked+' '+bl+' Blocked',false);
  else if(blocked)_base.notify(toAdd.length+' Added, '+blocked+' '+bl+' Blocked',false);
  else if(titleWarns)_base.notify(toAdd.length+' Event'+(toAdd.length!==1?'s':'')+' Added — '+titleWarns+' Duplicate Title'+(titleWarns!==1?'s':''),'warn');
  else _base.notify(toAdd.length+' Event'+(toAdd.length!==1?'s':'')+' Added',true);
}
function tryBulkPaste(text){
  var lines=text.split(/\n/).map(function(l){return l.trim()}).filter(Boolean);
  if(lines.length<2)return false;
  var pairs=[];

  // Format 1: alternating lines (title, date, title, date...)
  if(lines.length%2===0){
    var allAlt=true;
    for(var i=0;i<lines.length;i+=2){
      var parsed=parseDate(lines[i+1]);
      if(!parsed){allAlt=false;break}
      if(parsed.date>new Date())pairs.push({title:lines[i],parsed:parsed});
    }
    if(allAlt&&pairs.length){addBulkPairs(pairs);return true}
  }

  // Format 2: one per line with delimiter (title — date, title - date, title | date)
  pairs=[];
  for(var i=0;i<lines.length;i++){
    var split=splitTitleDate(lines[i]);
    if(!split||!split.title)return false;
    if(split.parsed.date>new Date())pairs.push({title:split.title,parsed:split.parsed});
  }
  if(pairs.length){addBulkPairs(pairs);return true}

  return false;
}
$('pa-btn').addEventListener('click',function(){
  if(!navigator.clipboard||!navigator.clipboard.readText){_base.notify('Clipboard Not Available',false);return}
  navigator.clipboard.readText().then(function(text){
    if(!text||!text.trim()){_base.notify('Clipboard Empty',false);return}
    handlePastedText(text.trim());
  },function(){_base.notify('Clipboard Access Denied',false)});
});

/* ── Paste Event (Cmd+V / Ctrl+V outside inputs) ────────────────── */
function handlePastedText(t){
  // Try bulk paste first
  if(t.indexOf('\n')!==-1&&tryBulkPaste(t)){paFeedback();return}
  // Single item: try smart split (single-line "title — date") first
  var titleEl=$('inp-title'),dateEl=$('inp-date');
  var split=t.indexOf('\n')===-1?splitTitleDate(t):null;
  if(split&&!titleEl.value&&!dateEl.value){
    if(split.title)titleEl.value=split.title;
    var dt=split.parsed.date;
    dateEl.value=formatLabel(dt);
    if(split.title)dateEl.focus();else titleEl.focus();
    paFeedback();return;
  }
  // Try extracting an embedded date from prose
  var ext=extractDate(t);
  if(ext){
    dateEl.value=formatLabel(ext.date);
    if(!titleEl.value)titleEl.focus();else dateEl.focus();
    paFeedback();return;
  }
  // No date anywhere — paste goes to title
  if(!titleEl.value){titleEl.value=t;dateEl.focus()}
  else if(!dateEl.value){dateEl.focus()}
  paFeedback();
}
document.addEventListener('paste',function(e){
  var tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  var text=(e.clipboardData||window.clipboardData).getData('text');
  if(text){e.preventDefault();handlePastedText(text.trim())}
});

/* ── Copy All ────────────────────────────────────────────────────── */
var caTimer=null;
$('ca-btn').addEventListener('click',function(){
  if(!items.length)return;
  var lines=[];
  var sorted=items.slice().sort(function(a,b){if(a.done!==b.done)return a.done?1:-1;return a.target-b.target});
  for(var i=0;i<sorted.length;i++){
    if(sorted[i].done)continue;
    lines.push(sorted[i].title);
    lines.push(sorted[i].dateLabel);
  }
  if(!lines.length){_base.notify('No Active Countdowns',false);return}
  var btn=$('ca-btn'),ci=$('ca-i'),ck=$('ca-ck'),cl=$('ca-l');
  _base.copyText(lines.join('\n'),function(){
    if(caTimer){clearTimeout(caTimer);btn.classList.remove('ok');ci.style.display='';ck.style.display='none'}
    ci.style.display='none';ck.style.display='';cl.textContent='Copied';
    btn.classList.remove('ok');btn.offsetWidth;btn.classList.add('ok');
    var ac=items.filter(function(e){return!e.done}).length;
    caTimer=setTimeout(function(){btn.classList.remove('ok');ci.style.display='';ck.style.display='none';cl.textContent=ac>1?'Copy All':'Copy';caTimer=null},800);
    announce('All Countdowns Copied');
  });
});

/* ── Action Buttons ──────────────────────────────────────────────── */
$('rs-btn').addEventListener('click',doReset);
$('dismiss-btn').addEventListener('click',dismiss);

/* ── Keyboard Shortcuts ──────────────────────────────────────────── */
// Escape needs to work even from inputs (for alarm dismiss), so handle separately
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(firedItem){dismiss();return}
    kbClear();document.activeElement.blur();
  }
});
_base.onKey({
  '/':function(e){e.preventDefault();kbClear();$('inp-title').focus()},
  's':function(e){e.preventDefault();if($('search-wrap').style.display!=='none'){kbClear();$('search').focus()}},
  'p':function(e){e.preventDefault();$('pa-btn').click()},
  'v':function(e){e.preventDefault();$('pa-btn').click()},
  'a':function(){$('ca-btn').click()},
  'j':function(e){e.preventDefault();kbMove(1)},
  'k':function(e){e.preventDefault();kbMove(-1)},
  'ArrowDown':function(e){e.preventDefault();kbMove(1)},
  'ArrowUp':function(e){e.preventDefault();kbMove(-1)},
  'd':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'Backspace':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'Delete':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'r':function(e){e.preventDefault();doReset()},
  ctrl:{
    'k':function(e){e.preventDefault();if($('search-wrap').style.display!=='none'){kbClear();$('search').focus()}else{$('inp-title').focus()}}
  }
});
document.addEventListener('mousemove',function(){if(kbIdx>=0)kbClear()},{passive:true});

/* ── Fire overlay focus trap ─────────────────────────────────────── */
$('fireOv').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();$('dismiss-btn').focus()}});

/* ── Cross-Tab Sync ──────────────────────────────────────────────── */
window.addEventListener('storage',function(e){
  if(e.key==='countdown-items'||e.key==='countdown:gran'){
    kbIdx=-1;load();updateGranUI();render();
  }
});

/* ── Visibility ──────────────────────────────────────────────────── */
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    stopTick();clearTimeout(searchTimer);clearTimeout(paTimer);
  }else{
    load();updateGranUI();render();tick();startTick();
    // Reset paste button state
    var pb=$('pa-btn'),pi=$('pa-i'),pk=$('pa-ck'),pl=$('pa-l');
    pb.classList.remove('ok');pi.style.display='';pk.style.display='none';pl.textContent='Paste';
    checkSound();updateWake();
  }
});

/* ── Init Audio on first click ───────────────────────────────────── */
document.addEventListener('click',function(){initAudio()},{once:true});

/* ── Init ────────────────────────────────────────────────────────── */
load();
updateGranUI();render();tick();startTick();
})();
