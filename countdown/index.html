.item-cd-unit.zero{opacity:.3}
.item.done .item-cd-wrap{opacity:.4}

.item .del{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--bdr);background:var(--bg2);cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:12px;transition:color .15s,background .15s,border-color .15s}

.item.kb-focus{outline:2px solid var(--acc);outline-offset:2px}
.no-match{padding:32px 20px;text-align:center;color:var(--t4);font:500 .9375rem/1 var(--font)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.item:active{opacity:.85}
.item .del:active{opacity:.7}
.links>button:active:not([disabled]){opacity:.7}
.fire-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}

.fire-overlay:not(.active) .fire-icon{animation-play-state:paused}

@keyframes wiggle{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
.fire-title{font:600 1.25rem/1.3 var(--font);color:var(--t1);margin-bottom:4px}
.fire-label{font-size:.9375rem;color:var(--t2);margin-bottom:32px}
.fire-btns button{width:100%;padding:14px 28px;border:none;border-radius:var(--rr);font:600 .9375rem/1 var(--font);cursor:pointer;background:var(--tab-active);color:var(--tab-active-c);box-shadow:0 4px 14px rgba(0,0,0,.12);transition:box-shadow .15s}
.fire-btns button:hover{box-shadow:0 6px 20px rgba(0,0,0,.18)}
.fire-btns button:active{transform:scale(.985)}
@media(prefers-reduced-motion:reduce){
  .fire-icon{animation:none}
  .fire-card{animation:none}
  @keyframes scaleUp{from{opacity:1}to{opacity:1}}
}

  .item .del:hover{color:var(--t1);background:var(--bg2);border-color:var(--t4)}
}

<script>
(function(){'use strict';
function $(id){return document.getElementById(id)}
var items=[],searchTimer=null,tickTimer=null;
var kbIdx=-1;
var audioCtx,sndInt,wakeLock=null;
var mkX=_base.mkX;
var norm=_search.norm,scoreWord=_search.scoreWord;

/* ── Storage ─────────────────────────────────────────────────────── */
function load(){
  var p=_base.load('countdown-items',[]);
  if(Array.isArray(p))items=p.filter(function(e){return e&&e.id&&e.target}).map(function(e){
    // Regenerate label to include time (migrates old items without time in label)
    e.dateLabel=formatLabel(new Date(e.target));return e;
  });
}
function save(){
  try{localStorage.setItem('countdown-items',JSON.stringify(items))}
  catch(e){if(e.name==='QuotaExceededError')announce('Storage Full')}
}

/* ── Unique ID ───────────────────────────────────────────────────── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ── Announce (a11y) ─────────────────────────────────────────────── */
function announce(msg){var el=$('status');el.textContent='';requestAnimationFrame(function(){el.textContent=msg})}

/* ── Date Parser ─────────────────────────────────────────────────── */
var MONTHS={jan:0,january:0,feb:1,february:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,august:7,sep:8,sept:8,september:8,oct:9,october:9,nov:10,november:10,dec:11,december:11};
var MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS={sun:0,sunday:0,mon:1,monday:1,tue:2,tuesday:2,wed:3,wednesday:3,thu:4,thursday:4,fri:5,friday:5,sat:6,saturday:6};

var EASTER={2025:[3,20],2026:[4,5],2027:[3,28],2028:[4,16],2029:[4,1],2030:[4,21],2031:[4,13],2032:[3,28],2033:[4,17],2034:[4,9],2035:[3,25],2036:[4,13],2037:[4,5],2038:[4,25],2039:[4,10],2040:[4,1]};
var CNY={2025:[1,29],2026:[2,17],2027:[2,6],2028:[1,26],2029:[2,13],2030:[2,3],2031:[1,23],2032:[2,11],2033:[1,31],2034:[2,19],2035:[2,8],2036:[1,28],2037:[2,15],2038:[2,4],2039:[1,24],2040:[2,12]};

function nextOccurrence(m,d){
  var now=new Date(),y=now.getFullYear();
  var dt=new Date(y,m,d);
  if(dt<now){dt=new Date(y+1,m,d)}
  return dt;
}

function nthWeekday(year,month,weekday,n){
  var d=new Date(year,month,1);
  var first=d.getDay();
  var offset=(weekday-first+7)%7;
  d.setDate(1+offset+(n-1)*7);
  return d;
}

function lastWeekday(year,month,weekday){
  var d=new Date(year,month+1,0);
  var diff=(d.getDay()-weekday+7)%7;
  d.setDate(d.getDate()-diff);
  return d;
}

function nextNthWeekday(month,weekday,n){
  var now=new Date(),y=now.getFullYear();
  var dt=nthWeekday(y,month,weekday,n);
  if(dt<now)dt=nthWeekday(y+1,month,weekday,n);
  return dt;
}

function nextLastWeekday(month,weekday){
  var now=new Date(),y=now.getFullYear();
  var dt=lastWeekday(y,month,weekday);
  if(dt<now)dt=lastWeekday(y+1,month,weekday);
  return dt;
}

function nextPrecomputed(table,offsetDays){
  var now=new Date();
  for(var y=now.getFullYear();y<=2040;y++){
    var e=table[y];if(!e)continue;
    var dt=new Date(y,e[0]-1,e[1]);
    if(offsetDays)dt.setDate(dt.getDate()+offsetDays);
    if(dt>=new Date(now.getFullYear(),now.getMonth(),now.getDate()))return dt;
  }
  return null;
}

function parseTime(text){
  var t=text.trim(),h,min,m;

  // noon / midday / midnight — anywhere in string
  if(/\bnoon\b/i.test(t)||/\bmidday\b/i.test(t))return{h:12,m:0,raw:t.match(/\b(?:noon|midday)\b/i)[0]};
  if(/\bmidnight\b/i.test(t))return{h:0,m:0,raw:t.match(/\bmidnight\b/i)[0]};

  // half past X, half X → X:30
  m=t.match(/\bhalf\s+past\s+(\d{1,2})\b/i)||t.match(/\bhalf\s+(\d{1,2})\b/i);
  if(m){h=parseInt(m[1],10);if(h>=1&&h<=12)return{h:h,m:30,raw:m[0]}}

  // quarter past X → X:15
  m=t.match(/\bquarter\s+past\s+(\d{1,2})\b/i);
  if(m){h=parseInt(m[1],10);if(h>=1&&h<=12)return{h:h,m:15,raw:m[0]}}

  // quarter to X → (X-1):45
  m=t.match(/\bquarter\s+to\s+(\d{1,2})\b/i);
  if(m){h=parseInt(m[1],10);if(h>=1&&h<=12)return{h:(h===1?12:h-1),m:45,raw:m[0]}}

  // X o'clock / X oclock
  m=t.match(/\b(\d{1,2})\s*o['']?clock\b/i);
  if(m){h=parseInt(m[1],10);if(h>=1&&h<=12)return{h:h,m:0,raw:m[0]}}

  // Standard: Xam/Xpm/Xa/Xp with optional minutes — try end then start
  m=t.match(/[\s,]+(\d{1,2})(?::(\d{2}))?\s*(am?|pm?)\s*$/i)||t.match(/[\s,]+(\d{1,2}):(\d{2})\s*$/i);
  if(!m){
    m=t.match(/^(\d{1,2})(?::(\d{2}))?\s*(am?|pm?)[\s,]+/i)||t.match(/^(\d{1,2}):(\d{2})[\s,]+/i);
  }
  // Also try standalone (entire string is just a time)
  if(!m){
    m=t.match(/^(\d{1,2})(?::(\d{2}))?\s*(am?|pm?)$/i)||t.match(/^(\d{1,2}):(\d{2})$/i);
  }
  if(!m)return null;
  h=parseInt(m[1],10);min=m[2]?parseInt(m[2],10):0;
  var ap=m[3]?m[3].toLowerCase():null;
  if(ap){ap=ap.charAt(0);if(ap==='p'&&h<12)h+=12;if(ap==='a'&&h===12)h=0}
  if(h>23||min>59)return null;
  return{h:h,m:min,raw:m[0]};
}

function stripTime(text){
  var s=text;
  // Strip word-based time expressions
  s=s.replace(/\b(?:noon|midday|midnight)\b/gi,'');
  s=s.replace(/\bhalf\s+past\s+\d{1,2}\b/gi,'');
  s=s.replace(/\bhalf\s+\d{1,2}\b/gi,'');
  s=s.replace(/\bquarter\s+(?:past|to)\s+\d{1,2}\b/gi,'');
  s=s.replace(/\b\d{1,2}\s*o['']?clock\b/gi,'');
  // Strip standard time from end
  s=s.replace(/[\s,]+(\d{1,2})(?::(\d{2}))?\s*(am?|pm?)\s*$/i,'').replace(/[\s,]+(\d{1,2}):(\d{2})\s*$/i,'');
  // Strip standard time from start
  s=s.replace(/^(\d{1,2})(?::(\d{2}))?\s*(am?|pm?)[\s,]+/i,'').replace(/^(\d{1,2}):(\d{2})[\s,]+/i,'');
  // Strip connecting words left behind (at, for, etc.)
  s=s.replace(/\s+at\s*$/i,'').replace(/^\s*at\s+/i,'');
  return s.trim();
}

function applyTime(date,time){
  if(time){date.setHours(time.h,time.m,0,0)}
  else{date.setHours(0,0,0,0)}
  return date;
}

function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}

function fmtTime12(h,m){
  var ap=h>=12?'PM':'AM';var hh=h%12;if(hh===0)hh=12;
  return m===0?hh+' '+ap:hh+':'+(m<10?'0':'')+m+' '+ap;
}
function formatLabel(date){
  return date.getDate()+' '+MONTH_NAMES[date.getMonth()]+' '+date.getFullYear()+', '+fmtTime12(date.getHours(),date.getMinutes());
}

function stripNoise(s){
  // Remove common noise words/prepositions to expose the date pattern
  // Strip "at" separately since it's also handled in stripTime
  return s.replace(/\b(?:on|at|the|for|by|until|from|to|my|our|with|and|is|a|an)\b/gi,' ').replace(/\s{2,}/g,' ').trim();
}

function tryMatch(s,now,today){
  var result=null;

  /* 1. Relative keywords */
  if(s==='today'){
    result=new Date(today);
  }else if(s==='tomorrow'||s==='tmr'||s==='tmrw'||s==='tmw'){
    result=new Date(today);result.setDate(result.getDate()+1);
  }else if(s==='yesterday'||s==='ytd'){
    result=new Date(today);result.setDate(result.getDate()-1);
  }else if(s==='next week'){
    result=new Date(today);
    var dw=(1-result.getDay()+7)%7;
    result.setDate(result.getDate()+(dw===0?7:dw));
  }else if(s==='next month'){
    result=new Date(today.getFullYear(),today.getMonth()+1,1);
  }else if(s==='next year'){
    result=new Date(today.getFullYear()+1,0,1);
  }
  if(!result){
    var rm=s.match(/(?:^|\s)in\s+(\d+)\s+(day|days|week|weeks|month|months|year|years)(?:\s|$)/);
    if(rm){
      var n=parseInt(rm[1],10),u=rm[2].replace(/s$/,'');
      result=new Date(today);
      if(u==='day')result.setDate(result.getDate()+n);
      else if(u==='week')result.setDate(result.getDate()+n*7);
      else if(u==='month')result.setMonth(result.getMonth()+n);
      else if(u==='year')result.setFullYear(result.getFullYear()+n);
    }
  }

  /* 2. Named days */
  if(!result){
    var dayMatch=s.match(/(?:^|\s)(?:next\s+|this\s+)?(\w+)$/);
    if(dayMatch){
      var dn=DAYS[dayMatch[1]];
      if(dn!==undefined){
        result=new Date(today);
        var diff=(dn-result.getDay()+7)%7;
        if(diff===0)diff=7;
        result.setDate(result.getDate()+diff);
      }
    }
  }

  /* 3. Holidays */
  if(!result){
    result=parseHoliday(s);
  }

  /* 4. Date formats */
  if(!result){
    result=parseDateFormats(s);
  }

  return result;
}

function parseDuration(s){
  var totalSec=0,found=false;
  var r=/(\d+(?:\.\d+)?)\s*(?:(h|hr|hrs|hours?)|(m|min|mins|minutes?)|(s|sec|secs|seconds?))\b/gi;
  var m;
  while((m=r.exec(s))!==null){
    var v=parseFloat(m[1]);
    if(m[2]){totalSec+=v*3600;found=true}
    else if(m[3]){totalSec+=v*60;found=true}
    else if(m[4]){totalSec+=v;found=true}
  }
  if(!found)return null;
  var dt=new Date(Date.now()+Math.round(totalSec*1000));
  return{date:dt,label:formatLabel(dt)};
}

function parseDate(text){
  if(!text||!text.trim())return null;
  var raw=text.trim();

  var dur=parseDuration(raw);
  if(dur){dur.hint=null;return dur}

  var time=parseTime(raw);
  var s=stripTime(raw).toLowerCase();
  if(!s&&time){
    // Time only — use today (or tomorrow if time already passed)
    var td=new Date();
    td.setHours(time.h,time.m,0,0);
    if(td<=new Date())td.setDate(td.getDate()+1);
    return{date:td,label:formatLabel(td),hint:'date'};
  }
  if(!s)s=raw.toLowerCase();
  var now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());

  var result=tryMatch(s,now,today);
  if(!result){
    var cleaned=stripNoise(s);
    if(cleaned&&cleaned!==s)result=tryMatch(cleaned,now,today);
  }
  if(!result){
    var words=s.split(/\s+/);
    for(var i=1;i<words.length&&!result;i++){
      var sub=words.slice(i).join(' ');
      result=tryMatch(sub,now,today);
      if(!result){
        var subClean=stripNoise(sub);
        if(subClean&&subClean!==sub)result=tryMatch(subClean,now,today);
      }
    }
  }

  if(!result)return null;

  applyTime(result,time);
  return{date:result,label:formatLabel(result),hint:time?null:'time'};
}

function parseHoliday(s){
  // Fixed-date holidays
  var fixed=[
    [/^(?:ny|new\s*year(?:'?s)?(?:\s*day)?|nyd)$/,0,1,'New Year\'s Day'],
    [/^(?:nye|new\s*year(?:'?s)?\s*eve)$/,11,31,'New Year\'s Eve'],
    [/^(?:valentine(?:'?s)?(?:\s*day)?|v-?day)$/,1,14,'Valentine\'s Day'],
    [/^(?:st\s*patrick(?:'?s)?(?:\s*day)?|paddy(?:'?s)?(?:\s*day)?|st\s*paddy(?:'?s)?(?:\s*day)?)$/,2,17,'St Patrick\'s Day'],
    [/^(?:april\s*fool(?:'?s)?(?:\s*day)?)$/,3,1,'April Fools'],
    [/^(?:may\s*the\s*4th|star\s*wars(?:\s*day)?)$/,4,4,'Star Wars Day'],
    [/^(?:4th\s*of\s*july|july\s*4th|independence\s*day)$/,6,4,'Independence Day'],
    [/^(?:bastille(?:\s*day)?)$/,6,14,'Bastille Day'],
    [/^(?:halloween|hallows?\s*eve)$/,9,31,'Halloween'],
    [/^(?:bonfire\s*night|guy\s*fawkes(?:\s*day)?|5th\s*of\s*november)$/,10,5,'Bonfire Night'],
    [/^(?:veterans?\s*day|armistice\s*day|remembrance\s*day)$/,10,11,'Remembrance Day'],
    [/^(?:christmas\s*eve|xmas\s*eve)$/,11,24,'Christmas Eve'],
    [/^(?:christmas(?:\s*day)?|xmas|x-mas)$/,11,25,'Christmas'],
    [/^(?:boxing\s*day)$/,11,26,'Boxing Day'],
    [/^(?:burns(?:\s*night|supper)?)$/,0,25,'Burns Night'],
    [/^(?:australia\s*day)$/,0,26,'Australia Day'],
    [/^(?:groundhog\s*day|groundhog)$/,1,2,'Groundhog Day']
  ];
  for(var i=0;i<fixed.length;i++){
    if(fixed[i][0].test(s))return nextOccurrence(fixed[i][1],fixed[i][2]);
  }

  // Nth-weekday holidays
  var nth=[
    [/^(?:mlk(?:\s*day)?|martin\s*luther\s*king(?:\s*(?:jr\.?)?(?:\s*day)?)?)$/,0,1,3],  // 3rd Mon Jan
    [/^(?:presidents?\s*day)$/,1,1,3],  // 3rd Mon Feb
    [/^(?:mother(?:'?s)?\s*day)$/,4,0,2],  // 2nd Sun May
    [/^(?:father(?:'?s)?\s*day)$/,5,0,3],  // 3rd Sun Jun
    [/^(?:labor\s*day|labour\s*day)$/,8,1,1],  // 1st Mon Sep
    [/^(?:columbus\s*day|indigenous\s*peoples?\s*day)$/,9,1,2],  // 2nd Mon Oct
    [/^(?:thanksgiving|turkey\s*day)$/,10,4,4],  // 4th Thu Nov
    [/^(?:early\s*may\s*bank\s*holiday|may\s*day)$/,4,1,1],  // 1st Mon May
  ];
  for(var i=0;i<nth.length;i++){
    if(nth[i][0].test(s))return nextNthWeekday(nth[i][1],nth[i][2],nth[i][3]);
  }

  // Last-weekday holidays
  if(/^(?:memorial\s*day)$/.test(s))return nextLastWeekday(4,1);
  if(/^(?:spring\s*bank\s*holiday)$/.test(s))return nextLastWeekday(4,1);
  if(/^(?:summer\s*bank\s*holiday|august\s*bank\s*holiday)$/.test(s))return nextLastWeekday(7,1);

  // Easter-based
  if(/^(?:easter(?:\s*sunday)?)$/.test(s))return nextPrecomputed(EASTER,0);
  if(/^(?:good\s*friday)$/.test(s))return nextPrecomputed(EASTER,-2);
  if(/^(?:easter\s*monday)$/.test(s))return nextPrecomputed(EASTER,1);

  // Chinese New Year
  if(/^(?:chinese\s*new\s*year|lunar\s*new\s*year|cny)$/.test(s))return nextPrecomputed(CNY,0);

  return null;
}

function parseDateFormats(s){
  var now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var m,day,mon,year,dt;

  // DA: 25 December 2025, 25th Dec, 1st Jan 2026
  m=s.match(/^(\d{1,2})(?:st|nd|rd|th)?\s+([a-z]+)(?:\s+(\d{4}))?$/);
  if(m){
    day=parseInt(m[1],10);mon=MONTHS[m[2]];year=m[3]?parseInt(m[3],10):null;
    if(mon!==undefined&&day>=1&&day<=31){
      if(!year){
        dt=new Date(now.getFullYear(),mon,day);
        if(dt<today)dt.setFullYear(dt.getFullYear()+1);
      }else{dt=new Date(year,mon,day)}
      if(day<=daysInMonth(dt.getFullYear(),dt.getMonth()))return dt;
    }
  }

  // DB: December 25 2025, Dec 25, June 5
  m=s.match(/^([a-z]+)\s+(\d{1,2})(?:st|nd|rd|th)?(?:\s+(\d{4}))?$/);
  if(m){
    mon=MONTHS[m[1]];day=parseInt(m[2],10);year=m[3]?parseInt(m[3],10):null;
    if(mon!==undefined&&day>=1&&day<=31){
      if(!year){
        dt=new Date(now.getFullYear(),mon,day);
        if(dt<today)dt.setFullYear(dt.getFullYear()+1);
      }else{dt=new Date(year,mon,day)}
      if(day<=daysInMonth(dt.getFullYear(),dt.getMonth()))return dt;
    }
  }

  // DC: 2025-12-25
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m){
    year=parseInt(m[1],10);mon=parseInt(m[2],10)-1;day=parseInt(m[3],10);
    if(mon>=0&&mon<=11&&day>=1&&day<=daysInMonth(year,mon))return new Date(year,mon,day);
  }

  // DC: 25/12/2025 (UK day/month/year)
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m){
    var a=parseInt(m[1],10),b=parseInt(m[2],10);year=parseInt(m[3],10);
    // If first > 12, must be day
    if(a>12){day=a;mon=b-1}
    else if(b>12){day=b;mon=a-1}
    else{day=a;mon=b-1}  // UK-first: day/month
    if(mon>=0&&mon<=11&&day>=1&&day<=daysInMonth(year,mon))return new Date(year,mon,day);
  }

  // DD: 15/03 (day/month, UK-first)
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if(m){
    day=parseInt(m[1],10);mon=parseInt(m[2],10)-1;
    // If first number > 12, it's definitely day. If second > 12, swap.
    if(m[1]>12){day=parseInt(m[1],10);mon=parseInt(m[2],10)-1}
    else if(m[2]>12){mon=parseInt(m[1],10)-1;day=parseInt(m[2],10)}
    // else UK-first: day/month (already set)
    if(mon>=0&&mon<=11&&day>=1&&day<=31){
      dt=new Date(now.getFullYear(),mon,day);
      if(dt<today)dt.setFullYear(dt.getFullYear()+1);
      if(day<=daysInMonth(dt.getFullYear(),dt.getMonth()))return dt;
    }
  }

  return null;
}

/* ── Countdown Calculation ───────────────────────────────────────── */
function calcCountdown(targetMs){
  var diff=targetMs-Date.now();
  if(diff<=0)return null;
  var s=Math.floor(diff/1000);
  var d=Math.floor(s/86400);s%=86400;
  var h=Math.floor(s/3600);s%=3600;
  var m=Math.floor(s/60);s%=60;
  return{d:d,h:h,m:m,s:s};
}

function fmtCountdown(c){
  if(!c)return null;
  return[
    {v:c.d,l:c.d===1?'Day':'Days'},
    {v:c.h,l:c.h===1?'Hour':'Hours'},
    {v:c.m,l:c.m===1?'Min':'Mins'},
    {v:c.s,l:c.s===1?'Sec':'Secs'}
  ];
}

function buildCdWrap(units,done){
  var wrap=document.createElement('div');wrap.className='item-cd-wrap';
  if(done){
    var comp=document.createElement('div');
    comp.style.cssText='flex:1;text-align:center;padding:8px;color:var(--t4);font:500 .875rem/1.3 var(--font)';
    comp.textContent='Completed';
    wrap.appendChild(comp);
    return wrap;
  }
  if(!units)return wrap;
  for(var i=0;i<units.length;i++){
    var u=document.createElement('div');u.className='item-cd-unit'+(units[i].v===0?' zero':'');
    var v=document.createElement('div');v.className='item-cd-val';v.textContent=units[i].v;
    var l=document.createElement('div');l.className='item-cd-lbl';l.textContent=units[i].l;
    u.appendChild(v);u.appendChild(l);wrap.appendChild(u);
  }
  return wrap;
}

/* ── Alarm System ────────────────────────────────────────────────── */
function initAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function beep(){
  initAudio();
  if(audioCtx.state!=='running')return;
  var t=audioCtx.currentTime;
  [0,.2,.4].forEach(function(d){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=d===.2?1046:880;o.type='sine';
    g.gain.setValueAtTime(.4,t+d);g.gain.exponentialRampToValueAtTime(.01,t+d+.15);
    o.start(t+d);o.stop(t+d+.15);
  });
}
function playSound(){
  initAudio();
  var tries=0;
  var tryBeep=function(){
    if(audioCtx.state==='running'){beep();sndInt=setInterval(beep,2000)}
    else if(++tries<20){setTimeout(tryBeep,50)}
  };
  tryBeep();
}
function stopSound(){if(sndInt){clearInterval(sndInt);sndInt=null}}
function needsSound(){return firedItem!==null}
function checkSound(){if(needsSound()&&!sndInt)playSound();if(!needsSound()&&sndInt)stopSound()}

var firedItem=null;

async function updateWake(){
  if(firedItem){
    if(!wakeLock&&navigator.wakeLock){try{wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',function(){wakeLock=null})}catch(e){}}
  }else{
    if(wakeLock){try{wakeLock.release()}catch(e){}wakeLock=null}
  }
}

function fireItem(item){

  $('fireLbl').textContent=item.dateLabel;
  $('fireOv').classList.add('active');

function dismiss(){
  if(firedItem){
    for(var i=0;i<items.length;i++){
      if(items[i].id===firedItem.id){items[i].done=true;break}
    }
    save();
  }
  firedItem=null;
  $('fireOv').classList.remove('active');
  // Check for next expired
  var next=null;
  for(var i=0;i<items.length;i++){
    if(!items[i].done&&items[i].target<=Date.now()){next=items[i];break}
  }
  if(next)fireItem(next);
  else{checkSound();updateWake()}
  render();
}

/* ── Render ───────────────────────────────────────────────────────── */
function render(){
  _search.clearCache();
  var c=$('items'),q=norm($('search').value.trim().toLowerCase());
  var words=q.split(/\s+/).filter(Boolean);
  var hasItems=items.length>0;
  var frag=document.createDocumentFragment();

  var activeCount=items.filter(function(e){return!e.done}).length;
  $('ca-btn').disabled=!activeCount;$('ca-btn').style.display=activeCount?'':'none';
  $('ca-l').textContent=activeCount>1?'Copy All':'Copy';
  $('search-wrap').style.display=hasItems?'block':'none';

  if(!hasItems){c.textContent='';c.style.display='none';kbIdx=-1;return}

  var sorted=items.slice().sort(function(a,b){if(a.done!==b.done)return a.done?1:-1;return a.target-b.target});
  var list=sorted;
  if(words.length){
    var scored=[];
    for(var i=0;i<sorted.length;i++){
      var it=sorted[i],t=(it.title+' '+it.dateLabel).toLowerCase(),total=0,ok=true;
      for(var wi=0;wi<words.length;wi++){
        var sc=scoreWord(words[wi],t);
        if(sc<=0){ok=false;break}
        total+=sc;
      }
      if(ok)scored.push({it:it,score:total});
    }
    scored.sort(function(a,b){return b.score-a.score});
    list=scored.map(function(x){return x.it});
  }

  for(var i=0;i<list.length;i++){
    var it=list[i];
    var row=document.createElement('div');
    row.className='item'+(it.done?' done':'');
    row.setAttribute('role','listitem');
    row.setAttribute('data-id',it.id);

    var header=document.createElement('div');header.className='item-header';
    var info=document.createElement('div');info.className='item-info';
    var title=document.createElement('div');title.className='item-title';title.textContent=it.title;
    var date=document.createElement('div');date.className='item-date';date.textContent=it.dateLabel;
    info.appendChild(title);info.appendChild(date);

    var btn=document.createElement('button');btn.type='button';btn.className='del';btn.setAttribute('aria-label','Remove');
    btn.appendChild(mkX());
    header.appendChild(info);header.appendChild(btn);

    var units=it.done?null:fmtCountdown(calcCountdown(it.target));
    var cdWrap=buildCdWrap(units,it.done);
    cdWrap.setAttribute('data-id',it.id);

    row.appendChild(header);row.appendChild(cdWrap);frag.appendChild(row);
    if(i===kbIdx)row.classList.add('kb-focus');
  }

  if(list.length===0&&words.length){
    var nm=document.createElement('div');nm.className='no-match';nm.textContent='Nothing Found';frag.appendChild(nm);
    announce('Nothing Found');
  }else if(words.length){
    announce(list.length+' result'+(list.length===1?'':'s'));
  }

  c.textContent='';c.appendChild(frag);c.style.display='';
  if(kbIdx>=list.length)kbIdx=list.length-1;
}

/* ── Smart Split (title + date from one string) ─────────────────── */
function splitTitleDate(text){
  // Whole string is a date?
  var full=parseDate(text);
  if(full)return{title:null,date:text,parsed:full};

  // Try splitting on em dash, en dash, pipe, or spaced hyphen first
  var delims=[/\s*\u2014\s*/,/\s*\u2013\s*/,/\s*\|\s*/,/\s+[-]\s+/];
  for(var di=0;di<delims.length;di++){
    var parts=text.split(delims[di]);
    if(parts.length===2){
      // Try right as date
      var p=parseDate(parts[1].trim());
      if(p&&!parseDate(parts[0].trim()))return{title:parts[0].trim(),date:parts[1].trim(),parsed:p};
      // Try left as date
      p=parseDate(parts[0].trim());
      if(p&&!parseDate(parts[1].trim()))return{title:parts[1].trim(),date:parts[0].trim(),parsed:p};
    }
  }

  // Word-by-word splitting
  var words=text.split(/\s+/);
  var bestRight=null,bestRightIdx=-1;
  for(var i=1;i<words.length;i++){
    var right=words.slice(i).join(' ');
    var p=parseDate(right);
    if(p){bestRight=p;bestRightIdx=i;break}
  }
  var bestLeft=null,bestLeftIdx=-1;
  for(var i=words.length-1;i>=1;i--){
    var left=words.slice(0,i).join(' ');
    var p=parseDate(left);
    if(p){bestLeft=p;bestLeftIdx=i;break}
  }
  if(bestRight&&bestRightIdx>0){
    var titlePart=words.slice(0,bestRightIdx).join(' ');
    if(!parseDate(titlePart)&&!parseTime(titlePart))
      return{title:titlePart,date:words.slice(bestRightIdx).join(' '),parsed:bestRight};
  }
  if(bestLeft&&bestLeftIdx<words.length){
    var titlePart=words.slice(bestLeftIdx).join(' ');
    if(!parseDate(titlePart)&&!parseTime(titlePart))
      return{title:titlePart,date:words.slice(0,bestLeftIdx).join(' '),parsed:bestLeft};
  }
  if(bestRight)return{title:null,date:text,parsed:bestRight};
  if(bestLeft)return{title:null,date:text,parsed:bestLeft};
  return null;
}

/* ── Duplicate Detection ─────────────────────────────────────────── */
function isDupeExact(title,targetMs,extra){
  var t=title.toLowerCase(),tMin=Math.floor(targetMs/60000);
  for(var i=0;i<items.length;i++){
    if(items[i].title.toLowerCase()===t&&Math.floor(items[i].target/60000)===tMin)return true;
  }
  if(extra){for(var i=0;i<extra.length;i++){
    if(extra[i].title.toLowerCase()===t&&Math.floor(extra[i].parsed.date.getTime()/60000)===tMin)return true;
  }}
  return false;
}
function hasDupeTitle(title){
  var t=title.toLowerCase();
  for(var i=0;i<items.length;i++){if(items[i].title.toLowerCase()===t)return true}
  return false;
}

/* ── Add Item ────────────────────────────────────────────────────── */
var autoIdx=0;
function nextAutoTitle(){autoIdx++;return'Countdown '+autoIdx}
function addItem(){
  var title=$('inp-title').value.trim();
  var dateText=$('inp-date').value.trim();
  if(!dateText){_base.notify('Enter a Date or Duration',false);return}
  if(!title)title=nextAutoTitle();
  var parsed=parseDate(dateText);
  if(!parsed){_base.notify('Could Not Parse Date',false);return}
  if(parsed.date<=new Date()){_base.notify('Date Is in the Past',false);return}
  if(isDupeExact(title,parsed.date.getTime())){_base.notify('Duplicate Blocked',false);return}
  var titleWarn=hasDupeTitle(title);
  var id=uid();
  items.unshift({id:id,title:title,target:parsed.date.getTime(),dateLabel:parsed.label,ts:Date.now(),done:false});
  save();kbIdx=-1;render();
  $('inp-title').value='';$('inp-date').value='';
  $('inp-date').focus();
  if(titleWarn)_base.notify('Duplicate Title Exists','warn');
  else if(parsed.hint==='time')_base.notify('Current Time Used','warn');
  else if(parsed.hint==='date')_base.notify('Today\'s Date Used','warn');
  else announce('Added');
}

function removeItem(id){
  var row=$('items').querySelector('[data-id="'+id+'"]');
  if(row)row.classList.add('removing');
  for(var i=0;i<items.length;i++){if(items[i].id===id){items.splice(i,1);break}}

}

/* ── Tick (live updates) ─────────────────────────────────────────── */
function tick(){
  var els=$('items').querySelectorAll('.item-cd-wrap[data-id]');
  for(var i=0;i<els.length;i++){
    var id=els[i].getAttribute('data-id');
    if(!id)continue;
    var item=null;
    for(var j=0;j<items.length;j++){if(items[j].id===id){item=items[j];break}}
    if(!item||item.done)continue;
    var calc=calcCountdown(item.target);
    if(!calc){
      if(!firedItem)fireItem(item);
      render();
      return;
    }
    var unitEls=els[i].querySelectorAll('.item-cd-unit');
    if(unitEls.length===4){
      var units=[calc.d,calc.h,calc.m,calc.s];
      var labels=[calc.d===1?'Day':'Days',calc.h===1?'Hour':'Hours',calc.m===1?'Min':'Mins',calc.s===1?'Sec':'Secs'];
      for(var k=0;k<4;k++){
        var valEl=unitEls[k].querySelector('.item-cd-val');
        var lblEl=unitEls[k].querySelector('.item-cd-lbl');
        var nv=''+units[k];
        if(valEl&&valEl.textContent!==nv)valEl.textContent=nv;
        if(lblEl&&lblEl.textContent!==labels[k])lblEl.textContent=labels[k];
        unitEls[k].classList.toggle('zero',units[k]===0);
      }
    }
  }
}

function startTick(){
  if(tickTimer)clearInterval(tickTimer);
  tickTimer=setInterval(tick,1000);
}
function stopTick(){if(tickTimer){clearInterval(tickTimer);tickTimer=null}}

function kbMove(dir){
  var cards=kbCards();if(!cards.length)return;
  if(kbIdx>=0&&kbIdx<cards.length)cards[kbIdx].classList.remove('kb-focus');

  if(kbIdx<0)kbIdx=cards.length-1;

}

function addBulkPairs(pairs){
  var blocked=0,titleWarns=0,toAdd=[];
  for(var i=0;i<pairs.length;i++){
    if(isDupeExact(pairs[i].title,pairs[i].parsed.date.getTime(),toAdd)){blocked++;continue}
    if(hasDupeTitle(pairs[i].title))titleWarns++;
    toAdd.push(pairs[i]);
  }
  for(var i=0;i<toAdd.length;i++){
    var id=uid();
    items.unshift({id:id,title:toAdd[i].title,target:toAdd[i].parsed.date.getTime(),dateLabel:toAdd[i].parsed.label,ts:Date.now(),done:false});
  }
  save();kbIdx=-1;render();
  var bl=blocked===1?'Duplicate':'Duplicates';
  if(blocked&&!toAdd.length)_base.notify(blocked+' '+bl+' Blocked',false);
  else if(blocked)_base.notify(toAdd.length+' Added, '+blocked+' '+bl+' Blocked',false);
  else if(titleWarns)_base.notify(toAdd.length+' Event'+(toAdd.length!==1?'s':'')+' Added — '+titleWarns+' Duplicate Title'+(titleWarns!==1?'s':''),'warn');
  else _base.notify(toAdd.length+' Event'+(toAdd.length!==1?'s':'')+' Added',true);
}
function tryBulkPaste(text){
  var lines=text.split(/\n/).map(function(l){return l.trim()}).filter(Boolean);
  if(lines.length<2)return false;
  var pairs=[];

  // Format 1: alternating lines (title, date, title, date...)
  if(lines.length%2===0){
    var allAlt=true;
    for(var i=0;i<lines.length;i+=2){
      var parsed=parseDate(lines[i+1]);
      if(!parsed){allAlt=false;break}
      if(parsed.date>new Date())pairs.push({title:lines[i],parsed:parsed});
    }
    if(allAlt&&pairs.length){addBulkPairs(pairs);return true}
  }

  // Format 2: one per line with delimiter (title — date, title - date, title | date)
  pairs=[];
  for(var i=0;i<lines.length;i++){
    var split=splitTitleDate(lines[i]);
    if(!split||!split.title)return false;
    if(split.parsed.date>new Date())pairs.push({title:split.title,parsed:split.parsed});
  }
  if(pairs.length){addBulkPairs(pairs);return true}

  return false;
}
$('pa-btn').addEventListener('click',function(){
  if(!navigator.clipboard||!navigator.clipboard.readText){_base.notify('Clipboard Not Available',false);return}
  navigator.clipboard.readText().then(function(text){
    if(!text||!text.trim()){_base.notify('Clipboard Empty',false);return}
    handlePastedText(text.trim());
  },function(){_base.notify('Clipboard Access Denied',false)});
});

/* ── Paste Event (Cmd+V / Ctrl+V outside inputs) ────────────────── */
function handlePastedText(t){
  // Try bulk paste first
  if(t.indexOf('\n')!==-1&&tryBulkPaste(t)){paFeedback();return}
  // Single item: smart split
  var titleEl=$('inp-title'),dateEl=$('inp-date');
  if(!titleEl.value&&!dateEl.value){
    var split=splitTitleDate(t);
    if(split){
      if(split.title)titleEl.value=split.title;
      var dt=split.parsed.date;
      dateEl.value=dt.getDate()+' '+MONTH_NAMES[dt.getMonth()]+' '+dt.getFullYear()+', '+fmtTime12(dt.getHours(),dt.getMinutes());
      if(split.title)dateEl.focus();else titleEl.focus();
    }else{
      titleEl.value=t;dateEl.focus();
    }
  }else if(!dateEl.value){dateEl.value=t}
  else if(!titleEl.value){titleEl.value=t}
  else{dateEl.value=t}
  paFeedback();
}
document.addEventListener('paste',function(e){
  var tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  var text=(e.clipboardData||window.clipboardData).getData('text');
  if(text){e.preventDefault();handlePastedText(text.trim())}
});

/* ── Copy All ────────────────────────────────────────────────────── */
var caTimer=null;
$('ca-btn').addEventListener('click',function(){
  if(!items.length)return;
  var lines=[];
  var sorted=items.slice().sort(function(a,b){if(a.done!==b.done)return a.done?1:-1;return a.target-b.target});
  for(var i=0;i<sorted.length;i++){
    if(sorted[i].done)continue;
    lines.push(sorted[i].title);
    lines.push(sorted[i].dateLabel);
  }
  if(!lines.length){_base.notify('No Active Countdowns',false);return}
  var btn=$('ca-btn'),ci=$('ca-i'),ck=$('ca-ck'),cl=$('ca-l');
  _base.copyText(lines.join('\n'),function(){
    if(caTimer){clearTimeout(caTimer);btn.classList.remove('ok');ci.style.display='';ck.style.display='none'}
    ci.style.display='none';ck.style.display='';cl.textContent='Copied';
    btn.classList.remove('ok');btn.offsetWidth;btn.classList.add('ok');
    var ac=items.filter(function(e){return!e.done}).length;
    caTimer=setTimeout(function(){btn.classList.remove('ok');ci.style.display='';ck.style.display='none';cl.textContent=ac>1?'Copy All':'Copy';caTimer=null},800);
    announce('All Countdowns Copied');
  });
});

/* ── Action Buttons ──────────────────────────────────────────────── */
$('rs-btn').addEventListener('click',doReset);
$('dismiss-btn').addEventListener('click',dismiss);

/* ── Keyboard Shortcuts ──────────────────────────────────────────── */
// Escape needs to work even from inputs (for alarm dismiss), so handle separately
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(firedItem){dismiss();return}
    kbClear();document.activeElement.blur();
  }
});
_base.onKey({
  '/':function(e){e.preventDefault();kbClear();$('inp-title').focus()},
  's':function(e){e.preventDefault();if($('search-wrap').style.display!=='none'){kbClear();$('search').focus()}},
  'p':function(e){e.preventDefault();$('pa-btn').click()},
  'v':function(e){e.preventDefault();$('pa-btn').click()},
  'a':function(){$('ca-btn').click()},
  'j':function(e){e.preventDefault();kbMove(1)},
  'k':function(e){e.preventDefault();kbMove(-1)},
  'ArrowDown':function(e){e.preventDefault();kbMove(1)},
  'ArrowUp':function(e){e.preventDefault();kbMove(-1)},
  'd':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'Backspace':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'Delete':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'r':function(e){e.preventDefault();doReset()},
  ctrl:{
    'k':function(e){e.preventDefault();if($('search-wrap').style.display!=='none'){kbClear();$('search').focus()}else{$('inp-title').focus()}}
  }
});
document.addEventListener('mousemove',function(){if(kbIdx>=0)kbClear()},{passive:true});

/* ── Fire overlay focus trap ─────────────────────────────────────── */
$('fireOv').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();$('dismiss-btn').focus()}});

/* ── Cross-Tab Sync ──────────────────────────────────────────────── */
window.addEventListener('storage',function(e){
  if(e.key==='countdown-items'){
    kbIdx=-1;load();render();
  }
});

/* ── Visibility ──────────────────────────────────────────────────── */
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    stopTick();clearTimeout(searchTimer);clearTimeout(paTimer);
  }else{
    load();render();tick();startTick();
    // Reset paste button state
    var pb=$('pa-btn'),pi=$('pa-i'),pk=$('pa-ck'),pl=$('pa-l');
    pb.classList.remove('ok');pi.style.display='';pk.style.display='none';pl.textContent='Paste';
    checkSound();updateWake();
  }
});

/* ── Init Audio on first click ───────────────────────────────────── */
document.addEventListener('click',function(){initAudio()},{once:true});

/* ── Init ────────────────────────────────────────────────────────── */
load();
// Set autoIdx from existing Countdown N titles
items.forEach(function(it){var m=it.title.match(/^Countdown\s+(\d+)$/);if(m){var n=parseInt(m[1],10);if(n>autoIdx)autoIdx=n}});
render();tick();startTick();
})();
</script>
