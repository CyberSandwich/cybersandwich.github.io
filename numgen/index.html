<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>UK Number Generator</title>
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" type="image/png" href="/favicon.png">
<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(_){}if(t&&t!=='light')document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="/shared/base.css?v=16">
<style>
:root{--num-bg:#48484A}
html[data-theme="sepia"]{--num-bg:#6B5744}
body{display:flex;align-items:center;justify-content:center}
.w{width:100%;max-width:440px;padding:20px 20px 100px}
.num{
  background:var(--num-bg);border-radius:20px;
  box-shadow:var(--shadow);
  padding:24px;margin-bottom:14px
}
#n{
  display:block;
  font:600 clamp(1.4rem,8vw,2.25rem)/1 'SF Mono',ui-monospace,Menlo,Monaco,'Cascadia Code','Courier New',monospace;
  font-variant-numeric:tabular-nums;letter-spacing:.04em;
  white-space:nowrap;text-align:center;
  color:#fff;text-decoration:none
}
#n:active{opacity:.7}
#n::selection{background:#636366;color:#fff}
.fi{animation:fi .25s ease}
.links{margin-bottom:0}
.regen{background:#FEF9C3!important}
.regen svg{color:#CA8A04!important;animation:spin .4s ease}
.regen span{color:#CA8A04}
#ck{stroke-width:2.5}
</style>
</head>
<body>
<div class="w">
<div class="num" aria-live="polite">
<a id="n"></a>
</div>
<div class="card links">
<button id="g" type="button" aria-label="Regenerate number"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 2v6h-6M21 13a9 9 0 1 1-3-7.7L21 8"/></svg><span id="gl">Regenerate</span></button>
<button id="c" type="button" aria-label="Copy number to clipboard"><svg id="ci" aria-hidden="true" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg id="ck" aria-hidden="true" viewBox="0 0 24 24" style="display:none"><polyline points="4 12 9 17 20 6"/></svg><span id="cl">Copy</span></button>
</div>
</div>
<nav>
<div class="tabs">
<a href="/">Home</a>
<a class="active">NumGen</a>
</div>
<div class="tabs"><button id="theme-btn" class="theme-toggle" aria-label="Toggle Theme"></button></div>
</nav>
<script src="/shared/base.js?v=18"></script>
<script>
var $=s=>document.getElementById(s),
/* reserved/invalid UK 07 area codes */ X=new Set([700,781,797,829,839,911,924,937]),
el=$('n'),gb=$('g'),gs=$('gl'),cb=$('c'),si=$('ci'),sk=$('ck'),sl=$('cl'),gm,cur;
function gen(){var r=new Uint8Array(9),a,b,c,s,i;do{crypto.getRandomValues(r);a=7+r[0]%3;b=r[1]%10;c=r[2]%10}while(X.has(a*100+b*10+c));s='07'+a+b+c;for(i=3;i<9;i++)s+=r[i]%10;return s}
function render(){cur=gen();el.textContent=cur.slice(0,5)+' '+cur.slice(5);el.href='tel:+44'+cur.slice(1);el.classList.remove('fi');el.offsetWidth;el.classList.add('fi')}
function doCopy(){_base.copyText(cur,function(){si.style.display='none';sk.style.display='';sl.textContent='Copied';_base.btnFeedback(cb,'ok',800,function(){si.style.display='';sk.style.display='none';sl.textContent='Copy'})},function(){sl.textContent='Failed';setTimeout(function(){sl.textContent='Copy'},800)})}
render();
el.onclick=e=>{e.preventDefault();doCopy()};
gb.onclick=function(){clearTimeout(gm);render();gs.textContent='Regenerated';gb.classList.remove('regen');gb.offsetWidth;gb.classList.add('regen');gm=setTimeout(function(){gs.textContent='Regenerate';gb.classList.remove('regen')},800)};
cb.onclick=doCopy;
_base.onKey({' ':function(e){e.preventDefault();gb.click()},Enter:function(e){e.preventDefault();gb.click()},r:function(e){e.preventDefault();gb.click()},c:function(e){e.preventDefault();doCopy()}});
</script>
</body>
</html>
