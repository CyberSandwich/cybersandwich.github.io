// Layout: place glyphs by advance width (space = advance only), center at
// origin, scale to unit sphere including tube radius.
// step: world-unit sampling interval along strokes (default 0.022).
function buildGeometry(FONT, text, thickness, step = 0.022) {
  const chars = [...text].map(ch => FONT[ch.charCodeAt(0)] || FONT[63]); // '?' fallback
  let x = 0; const placed = [];
  for (const gl of chars) { placed.push({ gl, x }); x += gl.w; }
  const totalW = x, CAP = 21;
  const cx = totalW / 2, cy = CAP / 2 - 2; // optical vertical center
  // Pre-scale so raw glyph units -> world units where final R (incl tube) ~= 1.
  // First pass: find max centerline radius in glyph units.
  let maxR = 0;
  for (const { gl, x: gx } of placed)
    for (const st of gl.s)
      for (let i = 0; i < st.length; i += 2)
        maxR = Math.max(maxR, Math.hypot(gx + st[i] - cx, st[i+1] - cy));
  if (maxR === 0) maxR = 1;
  const rG = thickness * 8;              // tube radius in glyph units (cap height = 21)
  const scale = 1 / (maxR + rG);         // centerline extent + tube fits the unit sphere
  const tubeR = rG * scale;
  // Sampling density: adjacent samples < ~0.75 projected cells apart at the
  // nearest z (K2 - 1) under the max safe projection (see safeK). Callers
  // pass step = 0.75 * (K2 - 1) / k1x for their grid; the 0.022 default
  // matches the legacy 96x34 grid (~0.6 cells at k1x≈110):
  const RING = Math.max(22, Math.ceil((2 * Math.PI * tubeR) / step));
  const pts = [], nrm = [];
  for (const { gl, x: gx } of placed) {
    for (const st of gl.s) {
      for (let i = 0; i + 3 < st.length; i += 2) {
        const x0 = (gx + st[i] - cx) * scale, y0 = (st[i+1] - cy) * scale;
        const x1 = (gx + st[i+2] - cx) * scale, y1 = (st[i+3] - cy) * scale;
        const dx = x1 - x0, dy = y1 - y0, len = Math.hypot(dx, dy) || 1e-9;
        const tx = dx / len, ty = dy / len;      // tangent
        const nxx = -ty, nxy = tx;               // in-plane normal
        const steps = Math.max(1, Math.ceil(len / step));
        for (let s2 = 0; s2 <= steps; s2++) {
          const px = x0 + dx * (s2 / steps), py = y0 + dy * (s2 / steps);
          for (let r2 = 0; r2 < RING; r2++) {
            const a = (2 * Math.PI * r2) / RING, ca = Math.cos(a), sa = Math.sin(a);
            pts.push(px + tubeR * ca * nxx, py + tubeR * ca * nxy, tubeR * sa);
            nrm.push(ca * nxx, ca * nxy, sa);
          }
        }
      }
    }
  }
  // Exact normalization: the pre-scale pass above only accounts for the
  // centerline radius plus a flat tube allowance, but tube offsets are
  // rarely radial at the point that achieves the centerline's max radius,
  // so the true max |p| across all emitted points can land noticeably
  // below 1. Measure it directly and rescale positions by 1/maxTrueR so
  // max(|p|) === 1 exactly (unit bounding sphere including tube radius).
  // Normals are unit directions already; uniform position scaling doesn't
  // change them, so nrm is left untouched.
  let maxTrueR = 0;
  for (let i = 0; i < pts.length; i += 3)
    maxTrueR = Math.max(maxTrueR, Math.hypot(pts[i], pts[i+1], pts[i+2]));
  if (maxTrueR === 0) maxTrueR = 1;
  const fix = 1 / maxTrueR;
  for (let i = 0; i < pts.length; i++) pts[i] *= fix;
  return { pts: new Float32Array(pts), nrm: new Float32Array(nrm), n: pts.length / 3 };
}

// Max projection scales guaranteeing no crop for a unit sphere at distance K2.
// Worst case: tangent ray from the sphere, max |x|/(z+K2) = 1/sqrt(K2*K2-1).
// Extra -1 cell absorbs Math.floor's negative-side rounding in renderFrame.
function safeK(W, H, K2, margin, aspect) {
  if (aspect === undefined) aspect = 0.6;
  const kx = (W / 2 - margin - 1) * Math.sqrt(K2 * K2 - 1);
  const ky = (H / 2 - margin - 1) * Math.sqrt(K2 * K2 - 1);
  // Preserve char-cell aspect: k1y = aspect * k1x (cell ~1:1.667). Bind on both.
  const k1x = Math.min(kx, ky / aspect);
  return { k1x, k1y: aspect * k1x };
}

// One frame. Lambert floor: L <= 0 -> ramp[0] (never dropped).
function renderFrame(pts, nrm, n, A, B, o) {
  const { W, H, k1x, k1y, K2, ramp, buf, zb } = o;
  const cA = Math.cos(A), sA = Math.sin(A), cB = Math.cos(B), sB = Math.sin(B);
  const lx = 0, ly = 0.7071, lz = -0.7071, top = ramp.length - 1;
  buf.fill(' '); zb.fill(0);
  for (let i = 0; i < n; i++) {
    const px = pts[i*3], py = pts[i*3+1], pz = pts[i*3+2];
    const p1x = cA*px + sA*pz, p1z = -sA*px + cA*pz;
    const p2y = cB*py - sB*p1z, p2z = sB*py + cB*p1z;
    const z = p2z + K2; if (z < 0.5) continue;
    const ooz = 1 / z;
    const xp = (W >> 1) + Math.floor(k1x * ooz * p1x);
    const yp = (H >> 1) - Math.floor(k1y * ooz * p2y);
    if (xp < 0 || xp >= W || yp < 0 || yp >= H) continue;
    const idx = yp * W + xp;
    if (ooz <= zb[idx]) continue;
    zb[idx] = ooz;
    const nx = nrm[i*3], ny = nrm[i*3+1], nz = nrm[i*3+2];
    const n1x = cA*nx + sA*nz, n1z = -sA*nx + cA*nz;
    const n2y = cB*ny - sB*n1z, n2z = sB*ny + cB*n1z;
    const L = n1x*lx + n2y*ly + n2z*lz;
    let ci = L <= 0 ? 0 : (L * top) | 0;
    if (ci > top) ci = top;
    buf[idx] = ramp[ci];
  }
  const rows = [];
  for (let j = 0; j < H; j++) {
    let row = '';
    for (let i = 0; i < W; i++) row += buf[j * W + i];
    rows.push(row.replace(/ +$/, ''));
  }
  return rows.join('\n');
}

  if (!dragging) {
    if (st.spin === 0) {
      const tgt = -spinSpeed;
      Av += (tgt - Av) * 0.025;
      Bv += (B_TARGET - B) * 0.006;
      Bv *= 0.94;
      A += Av;
      let nB = B + Bv;
      if (nB > 1.4) { nB = 1.4; Bv = -Math.abs(Bv) * 0.55; }
      if (nB < -1.4) { nB = -1.4; Bv = Math.abs(Bv) * 0.55; }
      B = nB;
    } else {
      A = Math.atan2(Math.sin(A), Math.cos(A));
      A += (0 - A) * 0.08;
      B += (0 - B) * 0.08;
      Av *= 0.8; Bv *= 0.8;
    }
  }
  const faceOnSettled = st.spin === 1 && Math.abs(Av) + Math.abs(Bv) < 1e-4 &&
    Math.abs(Math.atan2(Math.sin(A), Math.cos(A))) < 0.001 && Math.abs(B) < 0.001;
  if (faceOnSettled) { A = 0; B = 0; }
  draw();
  const active = dragging || st.spin === 0 || !faceOnSettled;
  if (active || dirty) { dirty = false; schedule(); }
}
function schedule() { if (!rafId) rafId = requestAnimationFrame(frame); }
function wake() { dirty = true; schedule(); }
document.addEventListener('visibilitychange', () => { if (!document.hidden) wake(); });

out.addEventListener('pointerdown', e => {
  dragging = true;
  lastX = e.clientX; lastY = e.clientY; lastMoveTime = performance.now();
  Av = 0; Bv = 0;
  out.classList.add('grabbing');
  try { out.setPointerCapture(e.pointerId); } catch (_) {}
  wake();
});
out.addEventListener('pointermove', e => {
  if (!dragging) return;
  const now = performance.now();
  const dt = Math.max(8, now - lastMoveTime);
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  const sens = 0.01;
  A -= dx * sens;
  let nB = B - dy * sens;
  if (nB > 1.4) nB = 1.4; if (nB < -1.4) nB = -1.4; B = nB;
  Av = -(dx * sens) * (16 / dt);
  Bv = -(dy * sens) * (16 / dt);
  lastX = e.clientX; lastY = e.clientY; lastMoveTime = now;
  wake();
});
function endDrag() { if (!dragging) return; dragging = false; out.classList.remove('grabbing'); wake(); }
out.addEventListener('pointerup', endDrag);
out.addEventListener('pointercancel', endDrag);

/* ── Text input (filter, truncate, geometry rebuild) ──────────────────────── */
let warnUnsupported = false, warnTrunc = false, warnTimer = 0;
function armWarnReset() { clearTimeout(warnTimer); warnTimer = setTimeout(() => { warnUnsupported = false; warnTrunc = false; }, 1200); }
function updateRenderText() {
  let t = st.text.trim();
  if (t.length > 16) {
    t = t.slice(0, 16);
    if (!warnTrunc) { _base.notify('Showing First 16 Characters', 'warn'); warnTrunc = true; }
  }
  if (!t) t = 'Hello';
  if (t !== renderText) { renderText = t; scheduleRebuild(); }
}
function grow() {
  txt.style.height = 'auto';
  txt.style.height = Math.min(txt.scrollHeight, 140) + 'px';
  txt.classList.toggle('scroll', txt.scrollHeight > 140);
}
function onInput() {
  const raw = txt.value;
  const filtered = raw.replace(/[^\x20-\x7E]/g, '');
  if (filtered !== raw) {
    if (!warnUnsupported) { _base.notify('Unsupported Characters Removed', 'warn'); warnUnsupported = true; }
    txt.value = filtered;
  }
  armWarnReset();
  st.text = filtered; saveState();
  updateRenderText();
  grow();
}
txt.addEventListener('input', onInput);

function insertText(str) {
  if (str == null) return;
  const s = txt.selectionStart, e = txt.selectionEnd;
  txt.value = txt.value.slice(0, s) + str + txt.value.slice(e);
  const pos = s + str.length;
  try { txt.setSelectionRange(pos, pos); } catch (_) {}
  onInput();
}
document.addEventListener('paste', e => {
  const cd = e.clipboardData; if (!cd) return;
  const text = cd.getData('text');
  if (!text) { _base.notify('Unsupported Content', 'warn'); return; }
  e.preventDefault();
  insertText(text);
});

/* ── Actions ──────────────────────────────────────────────────────────────── */
// Drop leading/trailing all-blank lines, then strip the common leading-space
// count from every remaining line (interior blank lines stay empty). Trailing
// spaces are already stripped by renderFrame.
function crop(frame) {
  const lines = frame.split('\n');
  let start = 0, end = lines.length - 1;
  while (start <= end && lines[start] === '') start++;
  while (end >= start && lines[end] === '') end--;
  const kept = lines.slice(start, end + 1);
  let indent = Infinity;
  for (const line of kept) if (line !== '') indent = Math.min(indent, line.length - line.trimStart().length);
  if (!isFinite(indent)) indent = 0;
  return kept.map(line => line === '' ? '' : line.slice(indent)).join('\n');
}
function doPaste() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(t => {
      txt.focus(); insertText(t);
      if (t.replace(/[^\x20-\x7E]/g, '')) _base.feedback(pasteBtn, 'ps-fb', 'Pasted');
    }).catch(() => _base.notify('Clipboard Not Available', false));
  } else _base.notify('Clipboard Not Available', false);
}
function assembleDoc(engineSrc, fontJson, cfgJson) {
  const lines = [
    "var K2=5,B_TARGET=0.22;",
    "var o=document.getElementById('o');",
    "var W=CFG.W,Hh=CFG.H;",
    "var buf=new Array(W*Hh),zb=new Float32Array(W*Hh);",
    "var geo=buildGeometry(FONT,CFG.text,CFG.thick,CFG.step);",
    "var opts={W:W,H:Hh,k1x:0,k1y:0,K2:K2,ramp:CFG.ramp,buf:buf,zb:zb};",
    "var advanceEm=0.6,safe=safeK(W,Hh,K2,1,advanceEm),mctx=null;",
    "function getCtx(){if(mctx)return mctx;try{mctx=new OffscreenCanvas(1,1).getContext('2d');return mctx;}catch(e){}var c=document.createElement('canvas');c.width=1;c.height=1;mctx=c.getContext('2d');return mctx;}",
    "function applySize(){opts.k1x=safe.k1x*CFG.sizePct/100;opts.k1y=safe.k1y*CFG.sizePct/100;}",
    "function measure(){var ctx=getCtx();ctx.font='100px monospace';var adv=ctx.measureText('MMMMMMMMMM').width/10;advanceEm=adv>0?Math.min(0.9,Math.max(0.4,adv/100)):0.6;safe=safeK(W,Hh,K2,1,advanceEm);applySize();}",
    "function fit(){var cw=Math.min(window.innerWidth-32,900);if(cw<=0)return;var fs=Math.floor((cw/W)/advanceEm*100)/100;o.style.fontSize=fs+'px';}",
    "var A=0,B=B_TARGET,Av=0,Bv=0,dragging=false,rafId=0,dirty=true,lastX=0,lastY=0,lastMoveTime=0;",
    "function draw(){o.textContent=renderFrame(geo.pts,geo.nrm,geo.n,A,B,opts);}",
    "function frame(){rafId=0;if(document.hidden)return;",
    "if(!dragging){",
    "if(CFG.spin===0){",
    "var tgt=-CFG.spinSpeed;Av+=(tgt-Av)*0.025;Bv+=(B_TARGET-B)*0.006;Bv*=0.94;A+=Av;",
    "var nB=B+Bv;if(nB>1.4){nB=1.4;Bv=-Math.abs(Bv)*0.55;}if(nB<-1.4){nB=-1.4;Bv=Math.abs(Bv)*0.55;}B=nB;",
    "}else{",
    "A=Math.atan2(Math.sin(A),Math.cos(A));A+=(0-A)*0.08;B+=(0-B)*0.08;Av*=0.8;Bv*=0.8;",
    "}}",
    "var faceOnSettled=CFG.spin===1&&Math.abs(Av)+Math.abs(Bv)<1e-4&&Math.abs(Math.atan2(Math.sin(A),Math.cos(A)))<0.001&&Math.abs(B)<0.001;",
    "if(faceOnSettled){A=0;B=0;}",
    "draw();",
    "var active=dragging||CFG.spin===0||!faceOnSettled;",
    "if(active||dirty){dirty=false;schedule();}}",
    "function schedule(){if(!rafId)rafId=requestAnimationFrame(frame);}",
    "function wake(){dirty=true;schedule();}",
    "document.addEventListener('visibilitychange',function(){if(!document.hidden)wake();});",
    "o.addEventListener('pointerdown',function(e){dragging=true;lastX=e.clientX;lastY=e.clientY;lastMoveTime=performance.now();Av=0;Bv=0;o.style.cursor='grabbing';try{o.setPointerCapture(e.pointerId);}catch(_){}wake();});",
    "o.addEventListener('pointermove',function(e){if(!dragging)return;var now=performance.now();var dt=Math.max(8,now-lastMoveTime);var dx=e.clientX-lastX,dy=e.clientY-lastY,sens=0.01;A-=dx*sens;var nB=B-dy*sens;if(nB>1.4)nB=1.4;if(nB<-1.4)nB=-1.4;B=nB;Av=-(dx*sens)*(16/dt);Bv=-(dy*sens)*(16/dt);lastX=e.clientX;lastY=e.clientY;lastMoveTime=now;wake();});",
    "function endDrag(){if(!dragging)return;dragging=false;o.style.cursor='grab';wake();}",
    "o.addEventListener('pointerup',endDrag);o.addEventListener('pointercancel',endDrag);",
    "var resizeRaf=0;window.addEventListener('resize',function(){if(resizeRaf)return;resizeRaf=requestAnimationFrame(function(){resizeRaf=0;fit();wake();});});",
    "measure();fit();draw();schedule();"
  ].join('\n');
  const css = 'body{margin:0;min-height:100vh;display:grid;place-items:center;background:#FFF}'
    + '@media (prefers-color-scheme:dark){body{background:#111}pre{color:#EEE}}'
    + 'pre{font-family:monospace;line-height:1;letter-spacing:0;color:#111;user-select:none;-webkit-user-select:none;touch-action:none;cursor:grab;margin:0}';
  const js = 'var FONT=' + fontJson + ';\nvar CFG=' + cfgJson + ';\n' + engineSrc + '\n' + lines;
  return [
    '<!DOCTYPE html>',
    '<html lang="en">',
    '<head>',
    '<meta charset="utf-8">',
    '<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">',
    '<meta name="color-scheme" content="light dark">',
    '<title>ASCIIverse</title>',
    '<style>' + css + '</style>',
    '</head>',
    '<body>',
    '<pre id="o"></pre>',
    '<script>',
    js,
    '</scr' + 'ipt>',
    '</body>',
    '</html>',
    ''
  ].join('\n');
}
function buildInteractiveDoc() {
  const cfg = { text: renderText, ramp: RAMPS[st.fmt], thick: st.thick, step: geoStep(), W, H, sizePct: st.size, spin: st.spin, spinSpeed };
  const engineSrc = buildGeometry.toString() + '\n' + safeK.toString() + '\n' + renderFrame.toString();
  return assembleDoc(engineSrc, JSON.stringify(FONT), JSON.stringify(cfg));
}
function outContent(cropped) {
  if (st.out === 1) return '<pre style="font-family:monospace;line-height:1;letter-spacing:0">\n' + cropped + '\n</pre>';
  if (st.out === 2) return buildInteractiveDoc();
  return cropped;
}
function outFilename() {
  return st.out === 1 ? 'asciiverse-embed.html' : st.out === 2 ? 'index.html' : 'asciiverse.txt';
}
function doCopy() {
  const text = outContent(crop(lastFrame));
  _base.copyText(text, () => _base.feedback(copyBtn, 'ok', 'Copied'), () => _base.notify('Copy Failed', false));
}
function doDownload() {
  const text = outContent(crop(lastFrame));
  const blob = new Blob([text], { type: st.out === 0 ? 'text/plain' : 'text/html' });
  const u = URL.createObjectURL(blob);
  dlA.download = outFilename(); dlA.href = u; dlA.click();
  setTimeout(() => URL.revokeObjectURL(u), 1e4);
  _base.feedback(dlBtn, 'dl-fb', 'Downloaded');
}
pasteBtn.addEventListener('click', doPaste);
copyBtn.addEventListener('click', doCopy);
dlBtn.addEventListener('click', doDownload);

function isDefault() {
  return st.text === DEFAULTS.text && st.fmt === DEFAULTS.fmt && st.size === DEFAULTS.size &&
    st.detail === DEFAULTS.detail && st.thick === DEFAULTS.thick && st.speed === DEFAULTS.speed &&
    st.spin === DEFAULTS.spin && st.out === DEFAULTS.out;
}
const resetCtrl = _base.twoPress(resetBtn, {
  text: 'Reset',
  guard: () => !isDefault(),
  onConfirm: () => {
    Object.assign(st, DEFAULTS);
    txt.value = st.text;
    spinSpeed = 0.001 * st.speed;
    opts.ramp = RAMPS[st.fmt];
    applySize();
    syncControls();
    A = 0; B = B_TARGET; Av = 0; Bv = 0;
    updateRenderText();
    scheduleRebuild();   // thickness may have changed even when text did not
    grow();
    saveState();
    wake();
  }
});
resetBtn.addEventListener('click', e => { e.preventDefault(); resetCtrl.press(); });

/* ── Segmented controls (Format, Spin, Copy As) ───────────────────────────── */
function syncSeg(row, idx, sel = '.seg') {
  const btns = row.querySelectorAll(sel);
  btns.forEach((b, i) => { b.classList.toggle('active', i === idx); b.setAttribute('aria-checked', i === idx ? 'true' : 'false'); });
}
function setFmt(i) { st.fmt = i; opts.ramp = RAMPS[i]; syncSeg(fmtRow, i); saveState(); wake(); }
function setSpin(i) { st.spin = i; syncSeg(spinRow, i); saveState(); wake(); }
function setOut(i) { st.out = i; syncSeg(outRow, i); saveState(); }
fmtRow.addEventListener('click', e => { const b = e.target.closest('.seg'); if (b) setFmt([...fmtRow.children].indexOf(b)); });
spinRow.addEventListener('click', e => { const b = e.target.closest('.seg'); if (b) setSpin([...spinRow.children].indexOf(b)); });
outRow.addEventListener('click', e => { const b = e.target.closest('.seg'); if (b) setOut([...outRow.children].indexOf(b)); });

/* ── Steppers (Size, Thickness, Speed) + tap-label-to-reset ───────────────── */
const RESET_IC = '<svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>';
function updateSize() { sizeVal.textContent = 'Size: ' + st.size + '%'; $('size-dec').disabled = st.size <= SIZE_MIN; $('size-inc').disabled = st.size >= SIZE_MAX; }
function updateDetail() { detailVal.textContent = 'Detail: ' + st.detail + 'x'; $('detail-dec').disabled = st.detail <= DETAIL_MIN; $('detail-inc').disabled = st.detail >= DETAIL_MAX; }
function updateThick() { thickVal.textContent = 'Thickness: ' + st.thick.toFixed(2); $('thick-dec').disabled = st.thick <= THICK_MIN + 1e-9; $('thick-inc').disabled = st.thick >= THICK_MAX - 1e-9; }
function updateSpeed() { speedVal.textContent = 'Speed: ' + st.speed; $('speed-dec').disabled = st.speed <= SPEED_MIN; $('speed-inc').disabled = st.speed >= SPEED_MAX; }
function setSize(v) { v = clamp(v, SIZE_MIN, SIZE_MAX); if (v === st.size) return; st.size = v; applySize(); updateSize(); saveState(); wake(); }
function setDetail(v) { v = clamp(Math.round(v), DETAIL_MIN, DETAIL_MAX); if (v === st.detail) return; st.detail = v; updateDetail(); saveState(); scheduleRebuild(); }
function setThick(v) { v = clamp(roundThick(v), THICK_MIN, THICK_MAX); if (Math.abs(v - st.thick) < 1e-9) return; st.thick = v; updateThick(); saveState(); scheduleRebuild(); }
function setSpeed(v) { v = clamp(v, SPEED_MIN, SPEED_MAX); if (v === st.speed) return; st.speed = v; spinSpeed = 0.001 * v; updateSpeed(); saveState(); wake(); }
$('size-dec').addEventListener('click', () => setSize(st.size - SIZE_STEP));
$('size-inc').addEventListener('click', () => setSize(st.size + SIZE_STEP));
$('detail-dec').addEventListener('click', () => setDetail(st.detail - DETAIL_STEP));
$('detail-inc').addEventListener('click', () => setDetail(st.detail + DETAIL_STEP));
$('thick-dec').addEventListener('click', () => setThick(st.thick - THICK_STEP));
$('thick-inc').addEventListener('click', () => setThick(st.thick + THICK_STEP));
$('speed-dec').addEventListener('click', () => setSpeed(st.speed - 1));
$('speed-inc').addEventListener('click', () => setSpeed(st.speed + 1));

const groups = [
  { row: $('sr-size'), reset: () => setSize(DEFAULTS.size) },
  { row: $('sr-detail'), reset: () => setDetail(DEFAULTS.detail) },
  { row: $('sr-thick'), reset: () => setThick(DEFAULTS.thick) },
  { row: $('sr-speed'), reset: () => setSpeed(DEFAULTS.speed) }
];
function animateReset(g) {
  const lbl = g.row.querySelector('.slbl'), ic = lbl.querySelector('svg'), orig = ic.outerHTML;
  ic.outerHTML = RESET_IC;
  g.row.classList.remove('rs-fb'); void g.row.offsetWidth; g.row.classList.add('rs-fb');
  clearTimeout(g._ft);
  g._ft = setTimeout(() => { g.row.classList.remove('rs-fb'); lbl.querySelector('svg').outerHTML = orig; }, 600);
}
groups.forEach(g => g.row.addEventListener('click', e => { if (!e.target.closest('button')) { g.reset(); animateReset(g); } }));

/* ── Keyboard ─────────────────────────────────────────────────────────────── */
_base.onKey({
  c: doCopy,
  v: doPaste,
  p: doPaste,
  r: () => resetCtrl.press(),
  s: () => setSpin(st.spin === 0 ? 1 : 0),
  f: () => setFmt((st.fmt + 1) % RAMPS.length),
  '=': () => setSize(st.size + SIZE_STEP),
  '+': () => setSize(st.size + SIZE_STEP),
  '-': () => setSize(st.size - SIZE_STEP),
  ',': () => setDetail(st.detail - DETAIL_STEP),
  '.': () => setDetail(st.detail + DETAIL_STEP),
  '[': () => setThick(st.thick - THICK_STEP),
  ']': () => setThick(st.thick + THICK_STEP),
  ';': () => setSpeed(st.speed - 1),
  "'": () => setSpeed(st.speed + 1),
  ctrl: {
    c: e => { if (getSelection().toString()) return; if (document.activeElement === txt && txt.selectionStart !== txt.selectionEnd) return; e.preventDefault(); doCopy(); },
    s: e => { e.preventDefault(); doDownload(); }
  }
});

/* ── Control sync + init ──────────────────────────────────────────────────── */
function syncControls() {
  syncSeg(fmtRow, st.fmt);
  syncSeg(spinRow, st.spin);
  syncSeg(outRow, st.out);
  updateSize(); updateDetail(); updateThick(); updateSpeed();
}

txt.value = st.text;
measure();
fit();
syncControls();
grow();
updateRenderText();               // sets renderText; schedules first geometry build
applyGrid();                      // size the grid to renderText before the first frame
geo = buildGeoCapped(renderText, st.thick, geoStep());   // build synchronously for first frame
if (geoRaf) { cancelAnimationFrame(geoRaf); geoRaf = 0; }
draw();
schedule();

let resizeRaf = 0;
new ResizeObserver(() => {
  if (resizeRaf) return;
  resizeRaf = requestAnimationFrame(() => { resizeRaf = 0; fit(); wake(); });
}).observe(viewer);
})();
</script>
</body>
</html>
