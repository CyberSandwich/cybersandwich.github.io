<style>
body{display:flex;flex-direction:column;align-items:center;min-height:-webkit-fill-available}
.w{max-width:440px;width:100%;padding:20px 20px calc(88px + env(safe-area-inset-bottom,0px))}
.card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.pv-card{padding:0}
.scene{position:relative;height:clamp(420px,62vh,560px);border-radius:20px;transition:background .2s;overflow:hidden;cursor:grab}
.scene:active{cursor:grabbing}
.scene canvas{display:block;width:100%!important;height:100%!important;touch-action:none}
.bg-white .scene{background:#fff}
.bg-black .scene{background:#000}
.bg-none .scene{background:transparent}
.actions button{display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;font:500 .9375rem/1 var(--font);color:var(--t2);background:none;border:none;border-bottom:1px solid var(--bdr2);cursor:pointer;text-align:left;transition:background .25s}
.actions button:last-child{border-bottom:none}
.actions button:active{opacity:.7}
.slbl svg,.id,.ic{width:18px;height:18px;flex-shrink:0;color:var(--t4)}
.ic{stroke-width:2.5;display:none}
.ok{background:#DCFCE7!important}
.ps-fb{background:#DBEAFE!important}
.dl-fb{background:#EDE9FE!important}
.ok .id,.ps-fb .id,.dl-fb .id{display:none}
.ok .ic,.ps-fb .ic,.dl-fb .ic{display:inline}
.ok .ic,.ok span{color:#34D399!important}
.ps-fb .ic,.ps-fb span{color:#60A5FA!important}
.dl-fb .ic,.dl-fb span{color:#A78BFA!important}
.ok polyline,.ps-fb polyline,.dl-fb polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
.rs-fb{background:#FEF9C3!important}
.rs-fb .id{color:#CA8A04!important;animation:spin .4s ease}
.rs-fb span{color:#CA8A04!important}
.srow.rs-fb .slbl svg{animation:spin .4s ease;color:#CA8A04}
.srow.rs-fb .slbl span{color:#CA8A04}
.err-fb{background:#FEE2E2!important}
.err-fb span{color:#C41E3A!important}
.ld{background:#DBEAFE!important}
.ld .id{animation:pulse 1s ease-in-out infinite;color:#60A5FA!important}
.ld span{color:#60A5FA!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;min-height:46px;border-bottom:1px solid var(--bdr2);user-select:none;-webkit-user-select:none;transition:background .15s}
.srow:last-child{border-bottom:none}
.srow:active{opacity:.7}
.bg-chk{padding:5px 10px;border:1.5px solid var(--bdr);border-radius:var(--rr);background:none;flex-shrink:0;transition:.2s ease}
.bg-chk svg{width:14px;height:14px;display:block;margin:0 auto;color:var(--t4);opacity:.2}
.srow.sel .bg-chk{background:#DCFCE7;color:#34D399;border-color:#A7F3D0;animation:copyPop .35s ease}
.srow.sel .bg-chk svg{color:#34D399;opacity:1}
.srow.sel .bg-chk polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
@keyframes copyPop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
html[data-theme="dark"] .srow.sel .bg-chk{background:#1A3A2A;border-color:#2D5A3E}
html[data-theme="dark"] .srow.sel .bg-chk svg{color:#34D399}
html[data-theme="sepia"] .srow.sel .bg-chk{background:#E8E0CE;border-color:#DDD4C0}
html[data-theme="sepia"] .srow.sel .bg-chk svg{color:#2D7D46}
.slbl{display:flex;align-items:center;gap:12px;font:500 .9375rem/1 var(--font);color:var(--t2)}
.schips{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.chip{padding:5px 10px;border-radius:var(--rr);border:1.5px solid var(--bdr);background:none;font:500 .8125rem/1 var(--font);color:var(--t3);cursor:pointer;transition:background .15s,color .15s,border-color .15s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.stepper{display:flex;align-items:center;gap:6px}
.step-btn{width:28px;height:28px;border-radius:var(--rr);border:1.5px solid var(--bdr);background:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s,opacity .15s;padding:0}
.step-btn svg{fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;width:14px;height:14px}
.step-btn:active:not(:disabled){transform:scale(.9)}
.step-btn:disabled{opacity:.3;cursor:default}
.step-val{min-width:36px;text-align:center;font:600 .8125rem/1 var(--font);color:var(--t1);font-variant-numeric:tabular-nums}
.drop-overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(250,250,250,.95);font:600 1.25rem/1 var(--font);color:var(--t3);opacity:0;pointer-events:none;transition:opacity .2s}
.drop-overlay.active{opacity:1;pointer-events:auto}
html[data-theme="dark"] .drop-overlay{background:rgba(28,28,30,.95)}
html[data-theme="sepia"] .drop-overlay{background:rgba(245,237,218,.95)}
.notif{z-index:9;padding:0 20px calc(86px + env(safe-area-inset-bottom,0px));animation:notifIn .25s ease;cursor:pointer}
.notif-pill{display:flex;align-items:center;justify-content:center;padding:12px 22px;border-radius:var(--rr);font:500 .875rem/1 var(--font);white-space:nowrap;box-shadow:var(--shadow2);border:1px solid rgba(255,255,255,.45)}
.notif-pill.nf-ok{background:#DCFCE7;color:#16A34A}
.notif-pill.nf-err{background:#FEE2E2;color:#C41E3A}
.notif-pill:active{transform:scale(.95);opacity:.8}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes notifOut{to{opacity:0;transform:translateX(-50%) translateY(10px)}}
@media(hover:hover){.actions button:hover{background:var(--bg2);color:var(--t1)}.srow:hover{background:var(--bg2)}.chip:hover:not(.active){border-color:var(--t4);color:var(--t2)}.step-btn:hover:not(:disabled){border-color:var(--t4);color:var(--t2)}.notif-pill:hover{opacity:.9}}
::selection{background:rgba(72,72,74,.15)}
button:focus:not(:focus-visible){outline:none}
</style>

<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';
import{RoomEnvironment}from'three/addons/environments/RoomEnvironment.js';

var $=function(s){return document.getElementById(s)};

/* Device configs: screen dims, dynamic island, 3D surface, camera, normalization, material */
var DEVICES=[
{name:'iPhone 17 Pro Max',url:'/mockup/iphone_17_pro_max.glb',pw:440,ph:956,iw:126,ih:37,iy:14,irx:19,sw:7.28,sh:15.77,sz:0.44,so:0.005,sr:1.22,cz:28.6,ns:100,ry:0,mm:1.0,mr:0.7,ei:2.5},
{name:'iPhone 17 Pro',url:'/mockup/iphone_17_pro.glb',pw:402,ph:874,iw:126,ih:37,iy:14,irx:19,sw:6.67,sh:14.43,sz:0.44,so:0.005,sr:1.22,cz:26.3,ns:100,ry:Math.PI,mm:1.0,mr:0.65,ei:2.5},
{name:'iPhone 16',url:'/mockup/iphone_16.glb',pw:393,ph:852,iw:126,ih:37,iy:22,irx:19,sw:6.59,sh:14.14,sz:0.3927,so:0.005,sr:1.02,cz:25.81,ns:1,ry:0,mm:0.8,mr:0.2,ei:1}
];
var curDev=0;
var PW,PH,IW,IH,IX,IY,IRX;

var STEP=5,DEG=Math.PI/180;
var BG_CLS=['bg-white','bg-black','bg-none'];
var BG_CLR=[0xFFFFFF,0x000000,null];

var img=null,blobUrl=null,bgM=2;
var modelReady=false,screenMesh=null,phoneModel=null;

var pv=$('pv'),sceneEl=$('scene');
var cpBtn=$('cpBtn'),dlBtn=$('dlBtn'),psBtn=$('psBtn'),rsBtn=$('rsBtn');
var rxV=$('rx-val'),ryV=$('ry-val'),ov=$('drop-ov');
var dlA=document.createElement('a');dlA.style.display='none';document.body.appendChild(dlA);
var tm={},toastT,toastFadeT;

/* ---- Three.js Scene ---- */
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(35,1,0.1,100);
camera.position.set(0,0,DEVICES[0].cz);

var renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
renderer.toneMapping=THREE.NeutralToneMapping;
renderer.toneMappingExposure=1.0;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
sceneEl.appendChild(renderer.domElement);

/* Subtle environment for metallic reflections */
var pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment()).texture;
scene.environmentIntensity=0.5;
pmrem.dispose();

var controls=new OrbitControls(camera,renderer.domElement);
controls.enableZoom=false;
controls.enablePan=false;
controls.enableDamping=true;
controls.dampingFactor=0.05;
controls.rotateSpeed=0.5;
controls.addEventListener('change',function(){updateAngles()});

/* Lighting — studio key/fill/rim/bounce */
scene.add(new THREE.AmbientLight(0xffffff,0.1));
var keyL=new THREE.DirectionalLight(0xffffff,1.3);keyL.position.set(3,4,5);keyL.castShadow=true;scene.add(keyL);
var fillL=new THREE.DirectionalLight(0xffffff,0.35);fillL.position.set(-3,1,3);scene.add(fillL);
var rimL=new THREE.DirectionalLight(0xffffff,0.6);rimL.position.set(-4,2,-2);scene.add(rimL);
var rimR=new THREE.DirectionalLight(0xffffff,0.6);rimR.position.set(4,2,-2);scene.add(rimR);
var btmL=new THREE.DirectionalLight(0xffffff,0.3);btmL.position.set(0,-4,2);scene.add(btmL);

/* Screen canvas texture */
var scrCanvas=document.createElement('canvas');
var scrS=6;
scrCanvas.width=DEVICES[0].pw*scrS;scrCanvas.height=DEVICES[0].ph*scrS;
var scrCtx=scrCanvas.getContext('2d');
var scrTex=new THREE.CanvasTexture(scrCanvas);
scrTex.colorSpace=THREE.SRGBColorSpace;
scrTex.minFilter=THREE.LinearMipmapLinearFilter;
scrTex.magFilter=THREE.LinearFilter;
scrTex.generateMipmaps=true;
scrTex.anisotropy=renderer.capabilities.getMaxAnisotropy();

function rrPath(ctx,x,y,w,h,r){
r=Math.min(r,w/2,h/2);
ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
ctx.arcTo(x,y,x+r,y,r);ctx.closePath()
}
function drawCover(ctx,im,dx,dy,dw,dh){
var iw=im.naturalWidth,ih=im.naturalHeight,ir=iw/ih,dr=dw/dh;
var cx,cy,cw,ch;
if(ir>dr){ch=ih;cw=ih*dr;cx=(iw-cw)/2;cy=0}
else{cw=iw;ch=iw/dr;cx=0;cy=(ih-ch)/2}
ctx.drawImage(im,cx,cy,cw,ch,dx,dy,dw,dh)
}
function updateScreen(){
var s=scrS,ctx=scrCtx;
ctx.clearRect(0,0,PW*s,PH*s);
if(img){
ctx.fillStyle='#000';ctx.fillRect(0,0,PW*s,PH*s);
drawCover(ctx,img,0,0,PW*s,PH*s);
if(IW&&IH){ctx.fillStyle='#000';rrPath(ctx,IX*s,IY*s,IW*s,IH*s,IRX*s);ctx.fill()}
if(screenMesh)screenMesh.visible=true;
}else{
if(screenMesh)screenMesh.visible=false;
}
scrTex.needsUpdate=true;
render()
}

function rrShape(w,h,r){
var s=new THREE.Shape();var hw=w/2,hh=h/2;
r=Math.min(r,hw,hh);
s.moveTo(-hw+r,-hh);s.lineTo(hw-r,-hh);
s.quadraticCurveTo(hw,-hh,hw,-hh+r);
s.lineTo(hw,hh-r);s.quadraticCurveTo(hw,hh,hw-r,hh);
s.lineTo(-hw+r,hh);s.quadraticCurveTo(-hw,hh,-hw,hh-r);
s.lineTo(-hw,-hh+r);s.quadraticCurveTo(-hw,-hh,-hw+r,-hh);
return s
}

/* ---- Load Device Model ---- */
var gltfLoader=new GLTFLoader();
function loadModel(idx){
curDev=idx;var d=DEVICES[idx];
PW=d.pw;PH=d.ph;IW=d.iw;IH=d.ih;IX=(PW-IW)/2;IY=d.iy;IRX=d.irx;
scrCanvas.width=PW*scrS;scrCanvas.height=PH*scrS;
if(phoneModel){scene.remove(phoneModel);phoneModel.traverse(function(c){if(c.isMesh){c.geometry.dispose();(Array.isArray(c.material)?c.material:[c.material]).forEach(function(m){if(m)m.dispose()})}});phoneModel=null}
if(screenMesh){scene.remove(screenMesh);screenMesh.geometry.dispose();screenMesh=null}
modelReady=false;
camera.position.set(0,0,d.cz);controls.update();
gltfLoader.load(d.url,function(gltf){
phoneModel=gltf.scene;
if(d.ns&&d.ns!==1)phoneModel.scale.multiplyScalar(d.ns);
if(d.ry)phoneModel.rotation.y=d.ry;
gltf.scene.traverse(function(child){
if(child.isMesh){
child.castShadow=d.ns===1;child.receiveShadow=d.ns===1;
var mats=Array.isArray(child.material)?child.material:[child.material];
mats.forEach(function(m){if(m&&m.isMeshStandardMaterial){m.metalness=d.mm;m.roughness=d.mr;m.envMapIntensity=d.ei;m.side=THREE.DoubleSide;m.needsUpdate=true}})
}});
scene.add(gltf.scene);
var geom=new THREE.ShapeGeometry(rrShape(d.sw,d.sh,d.sr));
var uvAttr=geom.attributes.uv;
for(var i=0;i<uvAttr.count;i++){
uvAttr.setXY(i,(uvAttr.getX(i)+d.sw/2)/d.sw,(uvAttr.getY(i)+d.sh/2)/d.sh)}
uvAttr.needsUpdate=true;
var mat=new THREE.MeshBasicMaterial({map:scrTex,transparent:true,toneMapped:false});
screenMesh=new THREE.Mesh(geom,mat);
screenMesh.position.set(0,0,d.sz+d.so);
screenMesh.visible=!!img;
scene.add(screenMesh);
modelReady=true;
updateScreen();render()
},undefined,function(){notify('Failed to Load Model',false)})
}
loadModel(0);

/* Resize */
function resize(){
var w=sceneEl.clientWidth,h=sceneEl.clientHeight;
camera.aspect=w/h;camera.updateProjectionMatrix();
renderer.setSize(w,h);render()
}
new ResizeObserver(resize).observe(sceneEl);
resize();

function render(){renderer.render(scene,camera)}
function tick(){requestAnimationFrame(tick);controls.update();render()}
tick();

function updateAngles(){
var sph=new THREE.Spherical().setFromVector3(camera.position);
var ry=Math.round(sph.theta/DEG);
var rx=Math.round((sph.phi-Math.PI/2)/DEG);
rxV.textContent='Rotation X: '+rx+'\u00B0';
ryV.textContent='Rotation Y: '+ry+'\u00B0'
}

function setOrbit(rx,ry){
var r=camera.position.length();
var phi=Math.PI/2+rx*DEG;
var theta=ry*DEG;
camera.position.setFromSpherical(new THREE.Spherical(r,phi,theta));
camera.lookAt(0,0,0);controls.update();render();updateAngles()
}

function resetView(){setOrbit(0,0)}

function getAngles(){
var sph=new THREE.Spherical().setFromVector3(camera.position);
return{rx:(sph.phi-Math.PI/2)/DEG,ry:sph.theta/DEG}
}

/* ---- Notify / Feedback ---- */
function notify(msg,ok){
var old=document.querySelector('.notif');if(old)old.remove();
clearTimeout(toastT);clearTimeout(toastFadeT);
var w=document.createElement('div');w.className='notif fx-bottom';w.setAttribute('role','status');
var p=document.createElement('div');p.className='notif-pill '+(ok?'nf-ok':'nf-err');
p.textContent=msg;w.appendChild(p);
var dis=function(){clearTimeout(toastT);clearTimeout(toastFadeT);w.style.animation='notifOut .2s ease forwards';toastFadeT=setTimeout(function(){w.remove()},200)};
w.addEventListener('click',dis);document.body.appendChild(w);
toastT=setTimeout(dis,5000)
}
function feedback(btn,cls,text){
clearTimeout(tm[btn.id]);
var sp=btn.querySelector('span');
btn.classList.remove('ok','ps-fb','dl-fb','rs-fb','err-fb','ld');
var pl=btn.querySelector('.ic polyline');
if(pl){var n=pl.cloneNode(true);pl.parentNode.replaceChild(n,pl)}
btn.classList.add(cls);sp.textContent=text;
tm[btn.id]=setTimeout(function(){btn.classList.remove(cls);sp.textContent=btn.dataset.l},800)
}

/* ---- Image Loading ---- */
function loadImg(file){
if(!file||!file.type.startsWith('image/')){notify('Invalid Image',false);return}
if(blobUrl)URL.revokeObjectURL(blobUrl);
blobUrl=URL.createObjectURL(file);
var i=new Image();
i.onload=function(){img=i;updateScreen()};
i.onerror=function(){URL.revokeObjectURL(blobUrl);blobUrl=null;notify('Failed to Load Image',false)};
i.src=blobUrl
}

/* ---- Drag & Drop ---- */
var dc=0;
document.addEventListener('dragenter',function(e){e.preventDefault();dc++;if(dc===1)ov.classList.add('active')});
document.addEventListener('dragleave',function(e){e.preventDefault();dc--;if(dc<=0){dc=0;ov.classList.remove('active')}});
document.addEventListener('dragover',function(e){e.preventDefault()});
document.addEventListener('drop',function(e){e.preventDefault();dc=0;ov.classList.remove('active');if(e.dataTransfer.files&&e.dataTransfer.files.length){var f=e.dataTransfer.files[0];if(f.type.startsWith('image/'))loadImg(f)}});

/* ---- Paste (keyboard Cmd+V) ---- */
document.addEventListener('paste',function(e){
var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
for(var i=0;i<items.length;i++){if(items[i].type.startsWith('image/')){e.preventDefault();var f=items[i].getAsFile();if(f){loadImg(f);feedback(psBtn,'ps-fb','Pasted')}return}}
});

/* ---- Paste button (Clipboard API) ---- */
function pasteClipboard(){
if(!navigator.clipboard||!navigator.clipboard.read){notify('Clipboard Not Available',false);return}
psBtn.classList.add('ld');psBtn.querySelector('span').textContent='Reading\u2026';
navigator.clipboard.read().then(function(items){
for(var i=0;i<items.length;i++){var types=items[i].types;for(var j=0;j<types.length;j++){if(types[j].startsWith('image/')){items[i].getType(types[j]).then(function(blob){
loadImg(new File([blob],'paste.png',{type:blob.type}));
feedback(psBtn,'ps-fb','Pasted')
});return}}}
psBtn.classList.remove('ld');psBtn.querySelector('span').textContent=psBtn.dataset.l;
notify('No Image in Clipboard',false)
}).catch(function(){
psBtn.classList.remove('ld');psBtn.querySelector('span').textContent=psBtn.dataset.l;
notify('Clipboard Not Available',false)
})
}
psBtn.addEventListener('click',pasteClipboard);

/* ---- Background (codegen format pattern) ---- */
var BG_NAMES=['Light','Dark','Clear'];
var BG_ICS=[
'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>'
];
function buildBgChips(){
var el=$('bg-chips');el.textContent='';
BG_NAMES.forEach(function(n,i){
if(i===bgM)return;
var b=document.createElement('button');b.type='button';b.className='chip';b.textContent=n;
b.addEventListener('click',function(){setBg(i)});
el.appendChild(b)
})
}
function setBg(m){
bgM=m;BG_CLS.forEach(function(c){pv.classList.remove(c)});pv.classList.add(BG_CLS[m]);
$('bg-ic').innerHTML=BG_ICS[m];
var nm=$('bg-nm');nm.style.opacity='.3';
setTimeout(function(){nm.textContent=BG_NAMES[m];nm.style.opacity='1'},100);
buildBgChips()
}
setBg(2);

/* ---- Steppers ---- */
function stepAngle(axis,delta){
var a=getAngles();
if(axis==='x')a.rx=Math.max(-85,Math.min(85,Math.round(a.rx)+delta));
else a.ry=Math.round(a.ry)+delta;
setOrbit(a.rx,a.ry)
}
$('rx-dec').addEventListener('click',function(){stepAngle('x',-STEP)});
$('rx-inc').addEventListener('click',function(){stepAngle('x',STEP)});
$('ry-dec').addEventListener('click',function(){stepAngle('y',-STEP)});
$('ry-inc').addEventListener('click',function(){stepAngle('y',STEP)});

/* ---- Device Selection ---- */
function setDevice(idx){
if(idx===curDev)return;
loadModel(idx);
DEVICES.forEach(function(d,i){$('dv-'+i).classList.toggle('sel',i===idx)});
var chk=$('dv-'+idx).querySelector('.bg-chk');
if(chk){chk.style.animation='none';void chk.offsetWidth;chk.style.animation='';
var pl=chk.querySelector('polyline');if(pl){var n=pl.cloneNode(true);pl.parentNode.replaceChild(n,pl)}}
}
DEVICES.forEach(function(d,i){$('dv-'+i).addEventListener('click',function(){setDevice(i)})});

/* ---- Format (codegen format pattern) ---- */
var FMT_MIME=['image/png','image/jpeg','image/webp'];
var FMT_QUAL=[undefined,0.92,0.92];
var FMT_EXT=['png','jpeg','webp'];
var FMT_NAMES=['PNG','JPEG','WebP'];
var FMT_ICS=[
'<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
'<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>'
];
var fmtIdx=0;
function buildFmtChips(){
var el=$('fmt-chips');el.textContent='';
FMT_NAMES.forEach(function(n,i){
if(i===fmtIdx)return;
var b=document.createElement('button');b.type='button';b.className='chip';b.textContent=n;
b.addEventListener('click',function(){setFmt(i)});
el.appendChild(b)
})
}
function setFmt(i){
fmtIdx=i;
$('fmt-ic').innerHTML=FMT_ICS[i];
var nm=$('fmt-nm');nm.style.opacity='.3';
setTimeout(function(){nm.textContent=FMT_NAMES[i];nm.style.opacity='1'},100);
buildFmtChips()
}
setFmt(0);

/* ---- Resolution ---- */
var RES_W=[1080,1440,1920,2560,3840];
var resIdx=3;
function resLabel(){
var w=RES_W[resIdx],ar=sceneEl.clientHeight/sceneEl.clientWidth;
return w+' \u00D7 '+Math.round(w*ar)
}
function updateResUI(){
$('res-val').textContent=resLabel();
$('res-dec').disabled=resIdx===0;
$('res-inc').disabled=resIdx===RES_W.length-1
}
updateResUI();
new ResizeObserver(function(){updateResUI()}).observe(sceneEl);
$('res-dec').addEventListener('click',function(){if(resIdx>0){resIdx--;updateResUI()}});
$('res-inc').addEventListener('click',function(){if(resIdx<RES_W.length-1){resIdx++;updateResUI()}});

/* ---- Srow tap-to-reset (codegen pattern) ---- */
var RESET_IC='<svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>';
var groups=[
{_row:$('sr-bg'),_reset:function(){setBg(2)}},
{_row:$('sr-rx'),_reset:function(){var a=getAngles();setOrbit(0,a.ry)}},
{_row:$('sr-ry'),_reset:function(){var a=getAngles();setOrbit(a.rx,0)}},
{_row:$('sr-fmt'),_reset:function(){setFmt(0)}},
{_row:$('sr-res'),_reset:function(){resIdx=3;updateResUI()}}
];
function animateReset(g){
var row=g._row,lbl=row.querySelector('.slbl'),ic=lbl.querySelector('svg'),orig=ic.outerHTML;
ic.outerHTML=RESET_IC;
row.classList.remove('rs-fb');void row.offsetWidth;row.classList.add('rs-fb');
clearTimeout(g._ft);
g._ft=setTimeout(function(){row.classList.remove('rs-fb');lbl.querySelector('svg').outerHTML=orig},600)
}
function resetGroup(g){g._reset();animateReset(g)}
groups.forEach(function(g){
g._row.addEventListener('click',function(e){if(!e.target.closest('button')&&g._reset)resetGroup(g)})
});

/* ---- Export ---- */
function doExport(cb){
var w=sceneEl.clientWidth,h=sceneEl.clientHeight;
var ar=h/w;
var ow=RES_W[resIdx],oh=Math.round(ow*ar);
var dpr=renderer.getPixelRatio();
renderer.setPixelRatio(1);
renderer.setSize(ow,oh,false);
var prevBg=scene.background;
if(BG_CLR[bgM]!=null)scene.background=new THREE.Color(BG_CLR[bgM]);
else scene.background=fmtIdx===1?new THREE.Color(0xFFFFFF):null;
renderer.render(scene,camera);
renderer.domElement.toBlob(function(blob){
scene.background=prevBg;
renderer.setPixelRatio(dpr);
renderer.setSize(w,h);
render();
cb(blob)
},FMT_MIME[fmtIdx],FMT_QUAL[fmtIdx])
}

cpBtn.addEventListener('click',function(){
if(!img){notify('No Screenshot Loaded',false);return}
if(!navigator.clipboard||!navigator.clipboard.write){notify('Clipboard Not Available',false);return}
navigator.clipboard.write([new ClipboardItem({'image/png':new Promise(function(resolve,reject){
doExport(function(b){if(b)resolve(b);else reject()})
})})]).then(
function(){feedback(cpBtn,'ok','Copied')},
function(){notify('Copy Failed',false)})
});

dlBtn.addEventListener('click',function(){
if(!img){notify('No Screenshot Loaded',false);return}
doExport(function(b){
if(!b){notify('Export Failed',false);return}
var u=URL.createObjectURL(b);
dlA.download='mockup.'+FMT_EXT[fmtIdx];dlA.href=u;dlA.click();
setTimeout(function(){URL.revokeObjectURL(u)},1e4);
feedback(dlBtn,'dl-fb','Downloaded')
})
});

/* ---- Reset All ---- */
function resetAll(){
resetView();setBg(2);setFmt(0);resIdx=3;updateResUI();
if(curDev!==0)setDevice(0);
groups.forEach(function(g){if(g._ft)clearTimeout(g._ft)});
groups.forEach(function(g){animateReset(g)});
feedback(rsBtn,'rs-fb','Reset')
}
rsBtn.addEventListener('click',resetAll);

/* ---- Keyboard ---- */
document.addEventListener('keydown',function(e){
if(e.metaKey||e.ctrlKey){
if(e.key==='s'){e.preventDefault();if(img)dlBtn.click();return}
if(e.key==='c'&&!getSelection().toString()){e.preventDefault();if(img)cpBtn.click();return}
return}
if(e.altKey)return;
var tag=document.activeElement&&document.activeElement.tagName;
if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'){if(e.key==='Escape')document.activeElement.blur();return}
if(e.key==='1'){location.href='/';return}
if(e.key==='t'){_base.setTheme(_base.THEMES[(_base.THEMES.indexOf(_base.curTheme())+1)%_base.THEMES.length]);return}
if(e.key==='Escape'){var n=document.querySelector('.notif');if(n){n.click();return}return}
if(e.key==='v'){pasteClipboard();return}
if(!img)return;
if(e.key==='d'){dlBtn.click();return}
if(e.key==='c'){cpBtn.click();return}
if(e.key==='r'||e.key==='0'){resetAll();return}
if(e.key==='l'){setBg(0);return}
if(e.key==='b'){setBg(1);return}
if(e.key==='x'){setBg(2);return}
if(e.key==='p'){setFmt(0);return}
if(e.key==='j'){setFmt(1);return}
if(e.key==='w'){setFmt(2);return}
if(e.key==='='){stepAngle('y',STEP);return}
if(e.key==='-'){stepAngle('y',-STEP);return}
if(e.key===']'){stepAngle('x',STEP);return}
if(e.key==='['){stepAngle('x',-STEP);return}
if(e.key===';'){if(resIdx>0){resIdx--;updateResUI()}return}
if(e.key==='\''){if(resIdx<RES_W.length-1){resIdx++;updateResUI()}return}
});

/* ---- Double-click reset ---- */
renderer.domElement.addEventListener('dblclick',resetView);

/* ---- Init ---- */
updateAngles();
render();
</script>
</body>
</html>
