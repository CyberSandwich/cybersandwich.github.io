<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Clock</title>
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" href="data:,">
<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(_){}if(t&&t!=='light')document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="/shared/base.css?v=26">
<style>
:root{--bg3:#EFEFEF;--accl:rgba(72,72,74,.06);--ok:#2D7D46;--err:#C41E3A;--mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace}
html[data-theme="dark"]{--bg3:#3A3A3C;--accl:rgba(100,181,246,.08);--ok:#4ADE80;--err:#F87171}
html[data-theme="sepia"]{--bg3:#E5DDCA;--acc:#6B5744;--accl:rgba(107,87,68,.08)}
html{height:100%;overflow-x:hidden}
body{min-height:100%;overflow-x:hidden}
main{max-width:960px;margin:0 auto;padding:20px 24px 100px}
.view{display:none}.view.active{display:block;animation:fi .2s ease}
@media(min-width:768px){main{padding:32px 48px 100px}}
#v-clock{position:fixed;inset:0;align-items:center;justify-content:center;background:var(--bg);transition:background .3s}
#v-clock.active{display:flex;animation:none}
.hero-time{font-size:clamp(4rem,14vw,12rem);font-variant-numeric:tabular-nums;letter-spacing:-.04em;line-height:1;text-align:center;user-select:none}
.hero-sec{color:var(--t3)}
.btn{padding:14px 28px;border:none;border-radius:var(--rr);font:600 .9375rem/1 var(--font);cursor:pointer;transition:background .15s,box-shadow .15s,transform .1s;touch-action:manipulation}
.btn-p{background:var(--tab-active);color:var(--tab-active-c);box-shadow:0 4px 14px rgba(0,0,0,.12)}
.btn-p:hover{box-shadow:0 6px 20px rgba(0,0,0,.18)}
.btn-p:active,.btn-s:active,.btn-stop:active{transform:scale(.985)}
.btn-p:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-s{background:var(--bg3);color:var(--t2)}
.btn-s:hover{background:var(--bg2)}
.btn-stop{background:#CF4050;color:#fff;box-shadow:0 4px 14px rgba(207,64,80,.3)}
.btn-stop:hover{background:#BE3948}
.alarm-form{display:flex;flex-direction:column;align-items:center;padding:clamp(24px,6vh,48px) 0 clamp(20px,4vh,32px)}
.alarm-form .t-digit input{font-size:clamp(3.5rem,12vw,9rem)}
.alarm-form .t-colon{font-size:clamp(2.5rem,8vw,6rem)}
.alarm-form .t-digit label{display:none}
.alarm-form .t-input{gap:clamp(8px,2vw,16px)}
.af-actions{max-width:200px;width:100%}
.af-actions button{width:100%;padding:16px 24px;font-size:1rem}
.alarm-list{display:flex;flex-direction:column;gap:14px;max-width:400px;margin:0 auto}
.alarm-card{position:relative;background:var(--card);border-radius:16px;padding:20px 24px;display:flex;align-items:center;justify-content:center;transition:box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04)}
.alarm-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.08)}
.ac-time{font-size:clamp(1.75rem,5vw,2.25rem);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.ac-del{position:absolute;right:16px;top:50%;transform:translateY(-50%);border:none;background:var(--bg2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t4);transition:opacity .15s,background .15s,color .15s;opacity:0}
.alarm-card:hover .ac-del,.ac-del:focus-visible{opacity:1}
.ac-del:hover{background:var(--bg3);color:var(--err)}
.ac-del svg{width:18px;height:18px}
.fire-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.fire-overlay.active{display:flex}
.fire-overlay:not(.active) .fire-icon{animation-play-state:paused}
.fire-card{background:var(--card);border-radius:24px;padding:clamp(32px,6vw,48px);text-align:center;max-width:380px;width:100%;animation:scaleUp .3s ease;box-shadow:0 20px 60px rgba(0,0,0,.15)}
@keyframes scaleUp{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.fire-icon{width:56px;height:56px;margin:0 auto 24px;color:var(--acc);animation:wiggle .4s ease infinite alternate}
@keyframes wiggle{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
.fire-time{font-size:2.75rem;margin-bottom:4px}
.fire-label{font-size:.9375rem;color:var(--t2);margin-bottom:32px}
.fire-btns button{width:100%}
#v-sw{position:fixed;inset:0;overflow:hidden;padding:20px 24px 0;background:var(--bg);transition:background .3s}
#v-sw.active{animation:none}
.sw-wrap{display:flex;flex-direction:column;align-items:center;height:100%;max-width:960px;margin:0 auto;padding-bottom:80px}
.sw-hero{display:flex;align-items:center;justify-content:center;width:100%;height:38vh;flex-shrink:0}
.sw-display{font-size:clamp(4rem,15vw,9rem);font-variant-numeric:tabular-nums;letter-spacing:-.03em;line-height:1;user-select:none}
.sw-ms{color:var(--t3)}
.sw-controls{display:flex;gap:10px;width:100%;max-width:440px;margin-bottom:20px;flex-shrink:0}
.sw-controls button{flex:1;padding:18px;font-size:1rem}
#lapWrap{flex:1;min-height:0;overflow:hidden;width:100%;max-width:640px;padding-bottom:16px}
.lap-section{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;max-height:100%}
.lap-hdr{display:grid;grid-template-columns:1fr 1fr;padding:14px 28px;font-size:.75rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bdr2);flex-shrink:0}
.lap-hdr span:last-child,.laps .l span:last-child{text-align:right}
.laps{display:flex;flex-direction:column;overflow-y:auto;flex:1;min-height:0}
.laps .l{display:grid;grid-template-columns:1fr 1fr;padding:14px 28px;border-bottom:1px solid var(--bdr2);font-size:1rem;font-variant-numeric:tabular-nums}
.laps .l:last-child{border:none}
.laps .l span:first-child{color:var(--t2)}
.laps .l.best span:last-child{color:var(--ok)}
.laps .l.worst span:last-child{color:var(--err)}
.t-setup{display:flex;flex-direction:column;align-items:center;padding:clamp(24px,5vh,56px) 0 clamp(20px,3vh,32px)}
.t-input{display:flex;align-items:center;gap:clamp(4px,1.2vw,10px);margin-bottom:clamp(24px,4vh,40px)}
.t-digit{display:flex;flex-direction:column;align-items:center;gap:8px}
.t-digit input{width:2.6ch;padding:clamp(10px,2vw,20px) 4px;text-align:center;border:1.5px solid var(--bdr);border-radius:16px;font:400 clamp(3rem,9vw,6rem)/1 var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.03em;color:var(--t1);background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);-moz-appearance:textfield;touch-action:manipulation}
.t-digit input::-webkit-inner-spin-button,.t-digit input::-webkit-outer-spin-button{-webkit-appearance:none}
.t-digit input:focus{border-color:var(--acc);box-shadow:0 0 0 4px rgba(72,72,74,.08)}
.t-digit label{font-size:.6875rem;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.t-colon{font-size:clamp(2rem,6vw,4rem);color:var(--t4)}
.t-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:clamp(20px,4vh,36px);max-width:540px}
.t-chips button{padding:11px 24px;border:1.5px solid var(--bdr);border-radius:var(--rr);background:var(--card);font:500 .875rem/1 var(--font);color:var(--t2);cursor:pointer;transition:border-color .15s,color .15s,background .15s,box-shadow .15s,transform .1s;box-shadow:0 1px 2px rgba(0,0,0,.03);touch-action:manipulation}
.t-chips button:hover{border-color:var(--acc);color:var(--acc);background:var(--accl);box-shadow:0 2px 8px var(--accl)}
.t-chips button:active{transform:scale(.96)}
.t-setup-btns{display:flex;gap:10px;width:100%;max-width:440px}
.t-setup-btns .btn{flex:1;padding:16px 28px;font-size:1rem}
.t-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding-bottom:40px}
.t-card{position:relative;background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;padding:clamp(24px,3vw,36px);display:flex;flex-direction:column;align-items:center;transition:border-color .3s,box-shadow .3s}
.t-card.done{border-color:var(--acc);animation:pulse-glow 2s ease infinite}
.t-card.done .tc-val{color:var(--acc)}
@keyframes pulse-glow{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.tc-ring{position:relative;width:clamp(160px,35vw,240px);height:clamp(160px,35vw,240px);margin-bottom:clamp(16px,2.5vw,28px)}
.tc-ring svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(72,72,74,.08))}
.tc-track{opacity:.1}
.tc-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.tc-val{font-size:clamp(2rem,5.5vw,3.25rem);font-variant-numeric:tabular-nums;letter-spacing:-.02em;transition:color .3s}
.tc-btns{display:flex;gap:10px;width:100%;max-width:340px}
.tc-btns button{flex:1}
.t-expand{position:absolute;top:12px;right:12px;border:none;background:var(--bg2);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:background .15s,color .15s}
.t-expand:hover{background:var(--bg3);color:var(--t2)}
.t-expand svg{width:15px;height:15px}
.t-full{display:none;position:relative}
.t-full.active{display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - 68px);min-height:calc(100dvh - 68px);justify-content:center;padding:0 0 40px}
.t-full.done .tf-val{color:var(--acc)}
.t-back{position:absolute;top:0;left:0;display:flex;align-items:center;gap:6px;border:none;background:none;padding:8px 4px;font:500 .875rem/1 var(--font);color:var(--t3);cursor:pointer;transition:color .15s}
.t-back:hover{color:var(--t1)}
.t-back svg{width:18px;height:18px}
.tf-ring{position:relative;width:clamp(280px,60vw,440px);height:clamp(280px,60vw,440px);margin-bottom:clamp(36px,6vh,60px)}
.tf-ring svg{width:100%;height:100%;filter:drop-shadow(0 0 12px rgba(72,72,74,.12))}
.tf-val{font-size:clamp(3.25rem,10vw,6rem);font-variant-numeric:tabular-nums;letter-spacing:-.02em;transition:color .3s}
.tf-btns{display:flex;gap:10px;width:100%;max-width:440px}
.tf-btns button{flex:1;padding:16px;font-size:.9375rem}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.18)}
@media(hover:none){.ac-del{opacity:1}}
.kb-focus{outline:2px solid var(--acc);outline-offset:2px;border-radius:16px}
</style>
</head>
<body>
<nav>
  <div class="tabs">
    <a href="/">Home</a>
    <button class="active" data-tab="clock">Clock</button>
    <button data-tab="alarm">Alarm</button>
    <button data-tab="sw">Stopwatch</button>
    <button data-tab="timer">Timer</button>
  </div>
  <div class="tabs"><button id="theme-btn" class="theme-toggle" aria-label="Toggle Theme"></button></div>
</nav>
<section id="v-clock" class="view active" role="tabpanel">
  <div class="hero-time"><span id="heroHM"></span><span class="hero-sec" id="heroS"></span></div>
</section>
<section id="v-sw" class="view" role="tabpanel">
  <div class="sw-wrap">
    <div class="sw-hero">
      <div class="sw-display"><span id="swMain">00:00</span><span class="sw-ms" id="swMs">.00</span></div>
    </div>
    <div class="sw-controls">
      <button class="btn btn-s" id="swBtnL" onclick="swLap()" disabled aria-label="Lap">Lap</button>
      <button class="btn btn-p" id="swBtnS" onclick="swToggle()" aria-label="Start stopwatch">Start</button>
    </div>
    <div id="lapWrap" style="display:none">
      <div class="lap-section">
        <div class="lap-hdr"><span>Lap</span><span>Time</span></div>
        <div class="laps" id="lapList"></div>
      </div>
    </div>
  </div>
</section>
<main>
  <section id="v-alarm" class="view" role="tabpanel">
    <div class="alarm-form">
      <div class="t-input">
        <div class="t-digit">
          <input type="number" id="afH" min="0" max="23" placeholder="00" inputmode="numeric" aria-label="Hours">
          <label>Hours</label>
        </div>
        <span class="t-colon">:</span>
        <div class="t-digit">
          <input type="number" id="afM" min="0" max="59" placeholder="00" inputmode="numeric" aria-label="Minutes">
          <label>Min</label>
        </div>
      </div>
      <div class="af-actions">
        <button class="btn btn-p" onclick="saveAlarm()">Set</button>
      </div>
    </div>
    <div class="alarm-list" id="alarmList"></div>
  </section>
  <section id="v-timer" class="view" role="tabpanel">
    <div class="t-setup" id="tSetup">
      <div class="t-chips">
        <button onclick="tGo(60)">1 min</button>
<button onclick="tGo(300)">5 min</button>
        <button onclick="tGo(1500)">25 min</button>
      </div>
      <div class="t-input">
        <div class="t-digit">
          <input type="number" id="cH" min="0" max="99" placeholder="0" aria-label="Hours" inputmode="numeric">
          <label>Hours</label>
        </div>
        <span class="t-colon">:</span>
        <div class="t-digit">
          <input type="number" id="cM" min="0" max="59" placeholder="0" aria-label="Minutes" inputmode="numeric">
          <label>Min</label>
        </div>
        <span class="t-colon">:</span>
        <div class="t-digit">
          <input type="number" id="cS" min="0" max="59" placeholder="0" aria-label="Seconds" inputmode="numeric">
          <label>Sec</label>
        </div>
      </div>
      <div class="t-setup-btns">
        <button class="btn btn-s" onclick="tClear()">Clear</button>
        <button class="btn btn-p" onclick="tStartCustom()">Start</button>
      </div>
    </div>
    <div class="t-grid" id="tGrid"></div>
    <div class="t-full" id="tFull">
      <button class="t-back" onclick="tExitFull()" aria-label="Back to timer list">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>
      <div class="tf-ring">
        <svg aria-hidden="true" viewBox="0 0 200 200">
          <circle class="tc-track" cx="100" cy="100" r="90" fill="none" stroke="var(--acc)" stroke-width="5"/>
          <circle id="tfArc" cx="100" cy="100" r="90" fill="none" stroke="var(--acc)" stroke-width="5" stroke-dasharray="565.49" stroke-linecap="round" transform="rotate(-90 100 100)"/>
        </svg>
        <div class="tc-center">
          <div class="tf-val" id="tfVal">0:00</div>
        </div>
      </div>
      <div class="tf-btns" id="tfBtns"></div>
    </div>
  </section>
</main>
<div class="fire-overlay" id="fireOv" role="alertdialog" aria-modal="true" aria-labelledby="fireTime">
  <div class="fire-card">
    <div class="fire-icon">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </div>
    <div class="fire-time" id="fireTime"></div>
    <div class="fire-label" id="fireLbl"></div>
    <div class="fire-btns">
      <button class="btn btn-p" onclick="dismiss()">Dismiss</button>
    </div>
  </div>
</div>
<script src="/shared/base.js?v=25"></script>
<script>
const CIRC=565.49,$=id=>document.getElementById(id),pad=n=>String(n).padStart(2,'0'),q=s=>document.querySelector(s),qa=s=>document.querySelectorAll(s);
const SA='aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"';
const SVG_X='<svg '+SA+'><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
const SVG_EXPAND='<svg '+SA+' stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
let alarms=[],aNextId=0;
let swOn=false,swT0=0,swE=0,swLaps=[],swRaf=null,swLastDisplay='';
let timers=[],tNextId=0,tArcRaf=null,tFullId=null;
let audioCtx,sndInt,fired=null,firedTid=null,lastChk='';
var wakeLock=null;
function needsWake(){return swOn||fired||firedTid!==null||timers.some(function(t){return !t.done&&!t.paused})}
async function updateWake(){
  if(needsWake()){
    if(!wakeLock&&navigator.wakeLock){try{wakeLock=await navigator.wakeLock.request('screen');wakeLock.addEventListener('release',function(){wakeLock=null})}catch(e){}}
  }else{
    if(wakeLock){try{wakeLock.release()}catch(e){}wakeLock=null}
  }
}
const heroHM=$('heroHM'),heroS=$('heroS'),swMainEl=$('swMain'),swMsEl=$('swMs');
function save(){_base.save('clk',{alarms,aNextId})}
function load(){const d=_base.load('clk');if(d){alarms=d.alarms||[];aNextId=d.aNextId||0}}
function switchTab(name){
  if(swRaf){cancelAnimationFrame(swRaf);swRaf=null}
  qa('.tabs button').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  qa('.view').forEach(v=>v.classList.toggle('active',v.id==='v-'+name));
  kbClear();
  if(name==='clock')tick();
  if(name==='sw'&&swOn)swTick();
}
q('.tabs').addEventListener('click',e=>{
  const b=e.target.closest('button[data-tab]');if(!b)return;
  switchTab(b.dataset.tab);
});
function tick(){
  const now=new Date(),hm=pad(now.getHours())+':'+pad(now.getMinutes());
  if(heroHM.textContent!==hm)heroHM.textContent=hm;
  heroS.textContent=':'+pad(now.getSeconds());
}
function initAlarmTime(){
  const now=new Date();
  $('afH').value=pad(now.getHours());
  $('afM').value=pad(now.getMinutes());
}
function saveAlarm(){
  const h=parseInt($('afH').value)||0,m=parseInt($('afM').value)||0;
  alarms.push({id:++aNextId,time:pad(Math.max(0,Math.min(23,h)))+':'+pad(Math.max(0,Math.min(59,m)))});
  save();renderAlarms();initAlarmTime();
}
function rmAlarm(id){alarms=alarms.filter(a=>a.id!==id);save();renderAlarms()}
function renderAlarms(){
  const el=$('alarmList');
  if(!alarms.length){el.innerHTML='';return}
  el.innerHTML=alarms.map(a=>
    '<div class="alarm-card"><div class="ac-time">'+a.time+'</div><button class="ac-del" onclick="rmAlarm('+a.id+')" aria-label="Delete alarm">'+SVG_X+'</button></div>'
  ).join('');
}
function chkAlarms(){
  const n=new Date(),hm=pad(n.getHours())+':'+pad(n.getMinutes());
  if(hm===lastChk)return;lastChk=hm;
  alarms.forEach(a=>{if(a.time===hm&&!fired)fireAlarm(a)});
}
function fireAlarm(a){
  fired=a;firedTid=null;
  $('fireTime').textContent=a.time;
  $('fireLbl').textContent='Alarm';
  $('fireOv').classList.add('active');$('fireOv').querySelector('.btn').focus();checkSound();updateWake();
}
function fireTimer(t){
  firedTid=t.id;fired=null;
  $('fireTime').textContent=fmtTimer(t.dur);
  $('fireLbl').textContent='Timer';
  $('fireOv').classList.add('active');$('fireOv').querySelector('.btn').focus();checkSound();updateWake();
}
function dismiss(){
  if(firedTid!==null){tRemove(firedTid);firedTid=null}
  fired=null;
  $('fireOv').classList.remove('active');
  const next=timers.find(t=>t.done);
  if(next)fireTimer(next);
  else{checkSound();updateWake()}
}
function initAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function beep(){
  initAudio();
  if(audioCtx.state!=='running')return;
  const t=audioCtx.currentTime;
  [0,.2,.4].forEach(d=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=d===.2?1046:880;o.type='sine';
    g.gain.setValueAtTime(.4,t+d);g.gain.exponentialRampToValueAtTime(.01,t+d+.15);
    o.start(t+d);o.stop(t+d+.15);
  });
}
function playSound(){
  initAudio();
  let tries=0;
  const tryBeep=()=>{if(audioCtx.state==='running'){beep();sndInt=setInterval(beep,2000)}else if(++tries<20){setTimeout(tryBeep,50)}};
  tryBeep();
}
function stopSound(){if(sndInt){clearInterval(sndInt);sndInt=null}}
function needsSound(){return !!(fired||firedTid!==null||timers.some(t=>t.done))}
function checkSound(){if(needsSound()&&!sndInt)playSound();if(!needsSound()&&sndInt)stopSound()}
function swToggle(){swOn?swStop():swStart()}
function swStart(){
  swOn=true;swT0=performance.now()-swE;
  const b=$('swBtnS');b.textContent='Stop';b.ariaLabel='Stop stopwatch';b.classList.add('btn-stop');
  $('swBtnL').disabled=false;$('swBtnL').textContent='Lap';$('swBtnL').ariaLabel='Lap';swTick();updateWake();
}
function swStop(){
  swOn=false;swE=performance.now()-swT0;cancelAnimationFrame(swRaf);swRaf=null;
  const b=$('swBtnS');b.textContent='Start';b.ariaLabel='Start stopwatch';b.classList.remove('btn-stop');
  $('swBtnL').textContent='Reset';$('swBtnL').ariaLabel='Reset stopwatch';updateWake();
}
function swLap(){
  if(!swOn){swE=0;swLaps=[];swLastDisplay='';swMainEl.textContent='00:00';swMsEl.textContent='.00';$('swBtnL').disabled=true;$('swBtnL').textContent='Lap';$('swBtnL').ariaLabel='Lap';$('lapWrap').style.display='none';updateWake();return}
  const tot=performance.now()-swT0,prev=swLaps.reduce((s,l)=>s+l,0);
  swLaps.push(tot-prev);renderLaps();
}
function decomp(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return{h,m,s,cs}}
function fmtSw(ms){const d=decomp(ms);return(d.h>0?d.h+':'+pad(d.m)+':'+pad(d.s):pad(d.m)+':'+pad(d.s))+'.'+pad(d.cs)}
function swTick(ts){
  if(!swOn)return;
  if(!ts)ts=performance.now();
  var display=fmtSw(ts-swT0);
  if(display!==swLastDisplay){swLastDisplay=display;var p=display.lastIndexOf('.');swMainEl.textContent=display.slice(0,p);swMsEl.textContent=display.slice(p)}
  swRaf=requestAnimationFrame(swTick);
}
function fmtLap(ms){
  const d=decomp(ms);
  return d.h>0?d.h+':'+pad(d.m)+':'+pad(d.s)+'.'+pad(d.cs):pad(d.m)+':'+pad(d.s)+'.'+pad(d.cs);
}
function renderLaps(){
  if(!swLaps.length){$('lapWrap').style.display='none';return}
  $('lapWrap').style.display='';
  let best=Infinity,worst=0;
  if(swLaps.length>1)swLaps.forEach(l=>{if(l<best)best=l;if(l>worst)worst=l});
  $('lapList').innerHTML=swLaps.map((l,i)=>{
    let c='';if(swLaps.length>1){if(l===best)c=' best';if(l===worst)c=' worst'}
    return '<div class="l'+c+'"><span>Lap '+(i+1)+'</span><span>'+fmtLap(l)+'</span></div>';
  }).reverse().join('');
}
function timerCarry(){
  let s=parseInt($('cS').value)||0,m=parseInt($('cM').value)||0,h=parseInt($('cH').value)||0;
  if(s>=60){m+=Math.floor(s/60);s%=60}
  if(m>=60){h+=Math.floor(m/60);m%=60}
  if(h>99)h=99;
  $('cS').value=s||'';$('cM').value=m||'';$('cH').value=h||'';
}
function limitLen(id,n){$(id).addEventListener('input',()=>{const v=$(id);if(v.value.length>n)v.value=v.value.slice(0,n)})}
['cH','cM','cS'].forEach(id=>{$(id).addEventListener('blur',timerCarry);limitLen(id,3)});
['afH','afM'].forEach((id,i)=>{$(id).addEventListener('blur',()=>{$(id).value=pad(Math.max(0,Math.min(i?59:23,parseInt($(id).value)||0)))});limitLen(id,2)});
function arcOff(t){return CIRC*(1-(t.dur>0?t.rem/t.dur:0))}
function fmtTimer(rem){
  const ts=Math.floor(rem+0.01),h=Math.floor(ts/3600),m=Math.floor((ts%3600)/60),s=ts%60;
  if(h>0)return h+':'+pad(m)+':'+pad(s);
  if(m>0)return m+':'+pad(s);
  return '0:'+pad(s);
}
function tBtns(t){
  return t.done
    ?'<button class="btn btn-p" onclick="tRemove('+t.id+')">Dismiss</button>'
    :'<button class="btn btn-s" onclick="tRemove('+t.id+')">Cancel</button><button class="btn btn-p" onclick="tToggle('+t.id+')">'+(t.paused?'Resume':'Pause')+'</button>';
}
function tScheduleBg(t){
  if(t._bgTO)clearTimeout(t._bgTO);
  if(t.done||t.paused)return;
  t._bgTO=setTimeout(()=>{t._bgTO=null;if(t.done||t.paused)return;t.rem=Math.max(0,(t.end-performance.now())/1000);if(t.rem<=0)tFinish(t)},t.rem*1000+50);
}
function tGo(sec){
  const t={id:++tNextId,dur:sec,rem:sec,end:performance.now()+sec*1000,paused:false,done:false,_card:null,_arc:null,_val:null,_bgTO:null};
  timers.push(t);renderTimerGrid();tEnsureLoops();tScheduleBg(t);tEnterFull(t.id);updateWake();
}
function tClear(){$('cH').value='';$('cM').value='';$('cS').value=''}
function tStartCustom(){
  const h=parseInt($('cH').value)||0,m=parseInt($('cM').value)||0,s=parseInt($('cS').value)||0;
  const sec=h*3600+m*60+s;if(sec<=0)return;
  tClear();tGo(sec);
}
function tHasActive(){return timers.some(t=>!t.done&&!t.paused)}
function tEnsureLoops(){if(!tArcRaf)tArcRaf=requestAnimationFrame(tTickArcs)}
function tTickArcs(ts){
  tArcRaf=null;
  if(!timers.length)return;
  if(!ts)ts=performance.now();
  let any=false;const inFull=tFullId!==null;
  timers.forEach(t=>{
    if(t.done||t.paused)return;
    t.rem=Math.max(0,(t.end-ts)/1000);
    if(t.rem<=0){tFinish(t);return}
    any=true;
    if(!inFull&&t._arc){t._arc.style.strokeDashoffset=arcOff(t);const txt=fmtTimer(t.rem);if(t._val.textContent!==txt)t._val.textContent=txt}
    if(t.id===tFullId){$('tfArc').style.strokeDashoffset=arcOff(t);const txt=fmtTimer(t.rem);if($('tfVal').textContent!==txt)$('tfVal').textContent=txt}
  });
  if(any)tArcRaf=requestAnimationFrame(tTickArcs);
}
function tFinish(t){
  t.done=true;t.rem=0;
  if(t._bgTO){clearTimeout(t._bgTO);t._bgTO=null}
  if(t._card){
    t._card.classList.add('done');
    t._val.textContent='0:00';
    t._arc.style.strokeDashoffset=CIRC;
    t._card.querySelector('.tc-btns').innerHTML=tBtns(t);
  }
  if(tFullId===t.id)updateFullView();
  const inFull=tFullId===t.id&&$('v-timer').classList.contains('active');
  if(!fired&&firedTid===null&&!inFull)fireTimer(t);
  else checkSound();
  if(navigator.vibrate)navigator.vibrate([300,100,300,100,300]);
  updateWake();
}

function tToggle(id){
  const t=timers.find(x=>x.id===id);if(!t||t.done)return;
  if(t.paused){t.end=performance.now()+t.rem*1000;t.paused=false;tEnsureLoops();tScheduleBg(t)}
  else{t.paused=true;if(t._bgTO){clearTimeout(t._bgTO);t._bgTO=null}}
  if(t._card)t._card.querySelector('.tc-btns .btn-p').textContent=t.paused?'Resume':'Pause';
  if(tFullId===id)updateFullView();updateWake();
}
function tRemove(id){
  if(tFullId===id)tExitFull();
  const rm=timers.find(t=>t.id===id);if(rm&&rm._bgTO){clearTimeout(rm._bgTO);rm._bgTO=null}
  timers=timers.filter(t=>t.id!==id);
  renderTimerGrid();checkSound();updateWake();
  if(!tHasActive()){if(tArcRaf){cancelAnimationFrame(tArcRaf);tArcRaf=null}}
}
function renderTimerGrid(){
  const grid=$('tGrid');
  if(!timers.length){grid.innerHTML='';return}
  grid.innerHTML=timers.map(t=>{
    const time=fmtTimer(t.rem),off=arcOff(t),dc=t.done?' done':'';
    return '<div class="t-card'+dc+'" id="t'+t.id+'"><button class="t-expand" onclick="tEnterFull('+t.id+')" title="Full screen" aria-label="Expand timer">'+SVG_EXPAND+'</button><div class="tc-ring"><svg aria-hidden="true" viewBox="0 0 200 200"><circle class="tc-track" cx="100" cy="100" r="90" fill="none" stroke="var(--acc)" stroke-width="5"/><circle class="tc-arc" cx="100" cy="100" r="90" fill="none" stroke="var(--acc)" stroke-width="5" stroke-dasharray="'+CIRC+'" stroke-dashoffset="'+off+'" stroke-linecap="round" transform="rotate(-90 100 100)"/></svg><div class="tc-center"><div class="tc-val">'+time+'</div></div></div><div class="tc-btns">'+tBtns(t)+'</div></div>';
  }).join('');
  timers.forEach(t=>{const c=$('t'+t.id);if(c){t._card=c;t._arc=c.querySelector('.tc-arc');t._val=c.querySelector('.tc-val')}});
}
function tEnterFull(id){
  tFullId=id;
  $('tSetup').style.display='none';$('tGrid').style.display='none';
  $('tFull').classList.add('active');updateFullView();
}
function tExitFull(){
  tFullId=null;
  $('tFull').classList.remove('active','done');
  $('tSetup').style.display='';$('tGrid').style.display='';
}
function updateFullView(){
  if(tFullId===null)return;
  const t=timers.find(x=>x.id===tFullId);
  if(!t){tExitFull();return}
  $('tfVal').textContent=t.done?'0:00':fmtTimer(t.rem);
  $('tfArc').style.strokeDashoffset=t.done?CIRC:arcOff(t);
  $('tFull').classList.toggle('done',t.done);
  $('tfBtns').innerHTML=tBtns(t);
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    if(tArcRaf){cancelAnimationFrame(tArcRaf);tArcRaf=null}if(timers.length)tTickArcs(performance.now());checkSound();updateWake();
    if(alarms.length&&!fired&&lastChk){
      const n=new Date(),hm=pad(n.getHours())+':'+pad(n.getMinutes());
      if(lastChk!==hm){
        const lo=lastChk;
        lastChk=hm;
        alarms.forEach(a=>{if(!fired){const missed=lo<hm?(a.time>lo&&a.time<=hm):(a.time>lo||a.time<=hm);if(missed)fireAlarm(a)}});
      }
    }
  }
});
var kbIdx=-1,kbCards=[],kbPrev=-1;
function kbGetCards(){
  var at=q('.tabs button.active')?.dataset.tab;
  if(at==='alarm')return [].slice.call(qa('.alarm-card'));
  if(at==='sw')return [].slice.call(qa('.laps .l'));
  if(at==='timer'&&tFullId===null)return [].slice.call(qa('.t-chips button'));
  return[];
}
function kbClear(remember){
  if(kbIdx>=0&&kbCards[kbIdx])kbCards[kbIdx].classList.remove('kb-focus');
  kbPrev=remember?kbIdx:-1;kbIdx=-1;kbCards=[];
}
function kbMove(dir){
  kbCards=kbGetCards();if(!kbCards.length)return;
  if(kbIdx>=0&&kbCards[kbIdx])kbCards[kbIdx].classList.remove('kb-focus');
  if(kbIdx<0){
    if(kbPrev>=0&&kbPrev<kbCards.length)kbIdx=kbPrev;
    else kbIdx=dir>0?0:kbCards.length-1;
    kbPrev=-1;
  }else{
    kbIdx+=dir;
    if(kbIdx<0)kbIdx=kbCards.length-1;
    if(kbIdx>=kbCards.length)kbIdx=0;
  }
  kbCards[kbIdx].classList.add('kb-focus');
  kbCards[kbIdx].scrollIntoView({block:'nearest'});
}
document.addEventListener('mousemove',()=>{if(kbIdx>=0)kbClear(true)},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  var tag=e.target.tagName,at=q('.tabs button.active')?.dataset.tab;
  if(tag==='INPUT'){
    if(e.key==='Enter'){e.preventDefault();if(at==='alarm')saveAlarm();else if(at==='timer')tStartCustom()}
    if(e.key==='Escape'){e.preventDefault();e.target.blur()}
    return;
  }
  var tabIds=['clock','alarm','sw','timer'];
  if(e.key==='1'){location.href='/';return}
  if(e.key>='2'&&e.key<='5'){switchTab(tabIds[+e.key-2]);return}
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    var ci=tabIds.indexOf(at);
    ci+=e.key==='ArrowRight'?1:-1;
    if(ci<0)ci=tabIds.length-1;if(ci>=tabIds.length)ci=0;
    switchTab(tabIds[ci]);return;
  }
  if(e.key==='j'||e.key==='ArrowDown'||e.key==='k'||e.key==='ArrowUp'){
    e.preventDefault();kbMove((e.key==='j'||e.key==='ArrowDown')?1:-1);return;
  }
  if(e.key==='Enter'&&kbIdx>=0&&kbCards[kbIdx]){e.preventDefault();kbCards[kbIdx].click();kbClear();return}
  if(at==='clock'&&(e.key==='Enter'||e.key==='c')){
    e.preventDefault();
    var now=new Date();
    _base.copyText(pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds()));
    return;
  }
  if(at==='sw'){
    if(e.key===' '||e.key==='Enter'){e.preventDefault();swToggle();return}
    if(e.key==='r'){if(swOn)swStop();swLap();return}
    if(e.key==='l'&&swOn){swLap();return}
    if(e.key==='Escape'){e.preventDefault();swLap();return}
  }
  if(at==='timer'){
    if(tFullId!==null){
      if(e.key===' '||e.key==='Enter'){e.preventDefault();tToggle(tFullId);return}
      if(e.key==='Escape'){e.preventDefault();tRemove(tFullId);return}
    }else{
      if(e.key==='h'){$('cH').focus();return}
      if(e.key==='m'){$('cM').focus();return}
      if(e.key==='s'){$('cS').focus();return}
      if(e.key==='q'){tGo(60);return}
      if(e.key==='w'){tGo(300);return}
      if(e.key==='e'){tGo(1500);return}
      if(e.key===' '||e.key==='Enter'){e.preventDefault();tStartCustom();return}
      if(e.key==='Escape'){e.preventDefault();tClear();return}
    }
  }
  if(at==='alarm'){
    if(e.key===' '||e.key==='Enter'){e.preventDefault();saveAlarm();return}
  }
  if(e.key==='t'){_base.setTheme(_base.THEMES[(_base.THEMES.indexOf(_base.curTheme())+1)%_base.THEMES.length]);return}
  if(e.key==='Escape'){if(kbIdx>=0){kbClear();return}}
});
$('fireOv').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();$('fireOv').querySelector('.btn').focus()}});
load();tick();initAlarmTime();renderAlarms();
(function clockLoop(){if(!document.hidden){tick();chkAlarms()}setTimeout(clockLoop,1000-Date.now()%1000)})();
document.addEventListener('click',()=>initAudio(),{once:true});
</script>
