<script>
(function(){
'use strict';
var $=function(id){return document.getElementById(id)};

/* ── State ──────────────────────────────────────────────────────── */
var W=[],WC=0,AI=null,SG=null,WL=null;
var ready=false,mode=_base.load('resolve:mode','single');
var lastInput=_base.load('resolve:input','');
var allRes=[],visRes=[],kbIdx=-1;
var cpTimer=null,paTimer=null,filterTimer=null;
var GROUP_CAP=30,GROUP_MAX=100;

/* ── DOM ────────────────────────────────────────────────────────── */
var inp=$('inp'),goBtn=$('go-btn');
var stsCard=$('status-card'),sts=$('sts');
var rc=$('rc');
var filterWrap=$('filter-wrap'),filterInp=$('filter'),filterX=$('filter-x');
var modeRow=$('mode-row');
var cpBtn=$('cp-btn'),cpI=$('cp-i'),cpCk=$('cp-ck'),cpL=$('cp-l');
var paBtn=$('pa-btn'),paI=$('pa-i'),paCk=$('pa-ck'),paL=$('pa-l');
var rsBtn=$('rs-btn'),rsL=$('rs-l');

/* ── Utilities ──────────────────────────────────────────────────── */
function clean(s){return s.replace(/[^a-zA-Z?*]/g,'').toLowerCase()}
function lc(s){var c=new Int8Array(26);for(var i=0;i<s.length;i++)c[s.charCodeAt(i)-97]++;return c}
/* ── Dictionary & Index ─────────────────────────────────────────── */
function buildIndex(text){
  var lines=text.split('\n'),i,j,w,off,key;
  W=[];AI=new Map();
  for(i=0;i<lines.length;i++){w=lines[i].trim();if(w.length>=2)W.push(w)}
  WC=W.length;
  SG=new Int8Array(WC*26);WL=new Uint8Array(WC);
  for(i=0;i<WC;i++){
    w=W[i];off=i*26;key=w.split('').sort().join('');
    for(j=0;j<w.length;j++)SG[off+w.charCodeAt(j)-97]++;
    WL[i]=w.length;
    var arr=AI.get(key);if(arr)arr.push(i);else AI.set(key,[i]);
  }
  ready=true;stsCard.style.display='none';
  if(lastInput){inp.value=lastInput;solve()}
  else showEmpty();
}
function showEmpty(){
  stsCard.style.display='none';
  rc.textContent='';filterWrap.style.display='none';updateActions(false);
}
function showStatus(msg,loading){
  stsCard.style.display='';sts.className=loading?'sts ld':'sts';sts.textContent=msg;
  rc.textContent='';filterWrap.style.display='none';
}

/* ── Single Word Solver ─────────────────────────────────────────── */
function solveSingle(input){
  // Count blanks (? or *), strip from letter counts
  var blanks=0;
  for(var b=0;b<input.length;b++){if(input[b]==='?'||input[b]==='*')blanks++}
  var alpha=input.replace(/[?*]/g,'');
  var ic=lc(alpha),il=input.length,results=[],found=new Set();
  var letters=[],maxC=[],c;
  for(c=0;c<26;c++){if(ic[c]>0){letters.push(c);maxC.push(ic[c])}}
  var n=letters.length;

  if(blanks===0){
    // Fast path: sub-multiset enumeration
    (function rec(d,key){
      if(d===n){
        if(key.length>=2){
          var arr=AI.get(key);
          if(arr)for(var i=0;i<arr.length;i++){
            var idx=arr[i];
            if(!found.has(idx)){
              found.add(idx);
              var off=idx*26,ul='';
              for(var c2=0;c2<26;c2++){var d2=ic[c2]-SG[off+c2];if(d2>0)for(var j=0;j<d2;j++)ul+=String.fromCharCode(65+c2)}
              results.push({idx:idx,type:WL[idx]===il?'exact':'subset',wl:WL[idx],ul:ul,dl:''});
            }
          }
        }
        return;
      }
      var ch=String.fromCharCode(97+letters[d]);
      for(var c=0;c<=maxC[d];c++)rec(d+1,c===0?key:key+ch.repeat(c));
    })(0,'');
  }else{
    // Wildcard mode: scan dictionary, blanks fill any letter deficit
    var wMinLen=Math.max(2,Math.ceil(il/3));
    for(var w=0;w<WC;w++){
      var wl=WL[w];if(wl>il||wl<wMinLen)continue;
      var off=w*26,def=0;
      for(c=0;c<26;c++){if(SG[off+c]>ic[c])def+=SG[off+c]-ic[c];if(def>blanks)break}
      if(def<=blanks){
        found.add(w);
        var ul='';
        for(c=0;c<26;c++){var d2=ic[c]-Math.min(SG[off+c],ic[c]);if(d2>0)for(var j=0;j<d2;j++)ul+=String.fromCharCode(65+c)}
        var blanksUsed=def,lettersUnused=il-wl-blanks+def;
        results.push({idx:w,type:wl===il&&def===blanks?'exact':'subset',wl:wl,ul:ul+(blanksUsed<blanks?'?'.repeat(blanks-blanksUsed):''),dl:''});
      }
    }
  }

  // Close match scan (skip if wildcards — already covered above)
  if(blanks>0)return results;
  var closeMin=Math.max(3,Math.floor(il*0.7));
  var closeUseMin=Math.max(3,il-Math.max(1,Math.floor(il/6)));
  for(var w=0;w<WC;w++){
    if(found.has(w))continue;
    var wl=WL[w];
    if(wl>il+2||wl<closeMin)continue;
    var off=w*26,def=0,used=0;
    for(c=0;c<26;c++){
      var need=SG[off+c],have=ic[c];
      if(need>have)def+=need-have;
      used+=Math.min(need,have);
      if(def>2)break;
    }
    if(def>0&&def<=2&&used>=closeUseMin){
      var dl='',ul='';
      for(c=0;c<26;c++){
        var d=SG[off+c]-ic[c];
        if(d>0)for(var j=0;j<d;j++)dl+=String.fromCharCode(65+c);
        var u=ic[c]-Math.min(SG[off+c],ic[c]);
        if(u>0)for(var j=0;j<u;j++)ul+=String.fromCharCode(65+c);
      }
      results.push({idx:w,type:'close',wl:wl,ul:ul,dl:dl,deficit:def,used:used});
    }
  }
  return results;
}

function rankScore(r,il){
  var freq=Math.log(r.idx+2);
  if(r.type==='close')return freq-r.used*0.8;
  return freq-r.wl*0.5;
}

/* ── Multi-Word Solver (dedup by anagram key) ───────────────────── */
function multiScore(idxs){
  var n=idxs.length,maxLog=0,k;
  for(k=0;k<n;k++){
    var li=Math.log(idxs[k]+2);
    if(li>maxLog)maxLog=li;
  }
  var wordPenalty=(n-2)*15;
  return wordPenalty+maxLog;
}

function solveMulti(input,singleResults){
  var ic=lc(input),il=input.length,i,c;
  var FREQ_CAP=40000;
  var keyMap=new Map();
  for(i=0;i<singleResults.length;i++){
    var r=singleResults[i];
    if(r.type==='close'||WL[r.idx]<2||r.idx>=FREQ_CAP)continue;
    var key=W[r.idx].split('').sort().join('');
    var entry=keyMap.get(key);
    if(!entry){keyMap.set(key,{rep:r.idx,all:[r.idx]})}
    else{entry.all.push(r.idx);if(r.idx<entry.rep)entry.rep=r.idx}
  }
  var cands=[];keyMap.forEach(function(v){cands.push(v)});
  cands.sort(function(a,b){return WL[b.rep]-WL[a.rep]||a.rep-b.rep});
  var cSigs=new Int8Array(cands.length*26);
  for(i=0;i<cands.length;i++){var off=cands[i].rep*26;for(c=0;c<26;c++)cSigs[i*26+c]=SG[off+c]}

  var combos=[],deadline=Date.now()+2000,nodes=0;
  (function dfs(rem,remLen,chosen,start){
    if(remLen===0&&chosen.length>=2){combos.push(chosen.slice());return}
    if(chosen.length>=4||remLen<2||combos.length>=500)return;
    for(var i=start;i<cands.length;i++){
      if(++nodes%1000===0&&Date.now()>deadline)return;
      var wl=WL[cands[i].rep];if(wl>remLen)continue;
      var co=i*26,fits=true;
      for(c=0;c<26;c++){if(cSigs[co+c]>rem[c]){fits=false;break}}
      if(!fits)continue;
      for(c=0;c<26;c++)rem[c]-=cSigs[co+c];
      chosen.push(i);dfs(rem,remLen-wl,chosen,i);chosen.pop();
      for(c=0;c<26;c++)rem[c]+=cSigs[co+c];
      if(combos.length>=500||(nodes%1000===0&&Date.now()>deadline))return;
    }
  })(new Int8Array(ic),il,[],0);

  var expanded=[];
  for(i=0;i<combos.length&&expanded.length<800;i++){
    var gs=combos[i].map(function(ci){return cands[ci].all.sort(function(a,b){return a-b}).slice(0,3)});
    (function ep(d,cur){
      if(expanded.length>=800)return;
      if(d===gs.length){expanded.push(cur.slice());return}
      for(var k=0;k<gs[d].length&&expanded.length<800;k++){cur.push(gs[d][k]);ep(d+1,cur);cur.pop()}
    })(0,[]);
  }
  expanded.sort(function(a,b){return multiScore(a)-multiScore(b)});
  return expanded.slice(0,200);
}

/* ── Solve Orchestrator ─────────────────────────────────────────── */
function solve(){
  var raw=inp.value,input=clean(raw);
  if(!input){showEmpty();return}
  if(input.length>20){_base.notify('20 Letters Max',false);return}
  if(!ready){_base.notify('Dictionary Loading...',false);return}
  _base.save('resolve:input',raw);

  var singles=solveSingle(input),il=input.length,i,j;
  var minLen=Math.max(2,Math.ceil(il/3));
  allRes=[];

  for(i=0;i<singles.length;i++){
    var r=singles[i];
    if(r.type!=='close'&&r.wl<minLen)continue;
    r.word=W[r.idx].toUpperCase();
    if(r.type==='close'){r.removed=il-r.used;r.added=r.deficit}
    else{r.removed=r.type==='exact'?0:il-r.wl;r.added=0}
    r.dist=r.removed+r.added;
    r.changeType=r.added===0?0:r.removed===0?1:2;
    r.rank=rankScore(r,il);
    allRes.push(r);
  }

  if(mode==='multi'){
    var combos=solveMulti(input,singles);
    for(i=0;i<combos.length;i++){
      var c=combos[i],ws=[],tl=0,best=Infinity;
      for(j=0;j<c.length;j++){ws.push(W[c[j]].toUpperCase());tl+=W[c[j]].length;if(c[j]<best)best=c[j]}
      allRes.push({type:'multi',wl:tl,wc:c.length,bestRank:best,ms:multiScore(c),word:ws.join(' + '),words:ws,idxs:c,ul:'',dl:'',idx:best,dist:il-tl});
    }
  }

  allRes.sort(function(a,b){
    if(a.dist!==b.dist)return a.dist-b.dist;
    var ma=a.type==='multi'?1:0,mb=b.type==='multi'?1:0;
    if(ma!==mb)return ma-mb;
    if(ma&&mb)return a.ms-b.ms;
    if(a.changeType!==b.changeType)return a.changeType-b.changeType;
    if(a.wl!==b.wl)return b.wl-a.wl;
    return a.rank-b.rank;
  });

  filterInp.value='';filterX.style.display='none';
  visRes=allRes;kbIdx=-1;render(false);
}

/* ── Grouping (interleaved by distance) ─────────────────────────── */
function groupResults(list,il){
  var map=new Map(),order=[];
  for(var i=0;i<list.length;i++){
    var r=list[i],key,label;
    if(r.dist===0){key='exact';label=il+' Letters (Exact)'}
    else{key='away'+r.dist;label=r.dist===1?'1 Letter Away':r.dist+' Letters Away'}
    if(!map.has(key)){
      map.set(key,{key:key,label:label,items:[]});order.push(map.get(key));
    }
    map.get(key).items.push(r);
  }
  return order;
}

/* ── Render ──────────────────────────────────────────────────────── */
function render(flat){
  var il=clean(inp.value).length;
  if(!visRes.length){
    if(il>0){showStatus('No Matches Found',false);updateActions(false)}
    else showEmpty();
    return;
  }
  stsCard.style.display='none';
  filterWrap.style.display=allRes.length>0?'':'none';
  updateActions(true);
  rc.textContent='';

  if(flat){
    var card=document.createElement('div');card.className='card fi';
    var limit=Math.min(visRes.length,GROUP_MAX);
    for(var i=0;i<limit;i++)card.appendChild(mkItem(visRes[i]));
    if(!visRes.length){var nm=document.createElement('div');nm.className='no-match';nm.textContent='Nothing Found';card.appendChild(nm)}
    rc.appendChild(card);
  }else{
    var groups=groupResults(visRes,il);
    for(var g=0;g<groups.length;g++){
      var gr=groups[g],items=gr.items;
      var hdr=document.createElement('div');hdr.className='rh';
      hdr.textContent=gr.label+' ';
      var hn=document.createElement('span');hn.textContent='('+items.length+')';
      hdr.appendChild(hn);rc.appendChild(hdr);
      var card=document.createElement('div');card.className='card fi';
      var cap=Math.min(items.length,GROUP_CAP);
      for(var i=0;i<cap;i++)card.appendChild(mkItem(items[i]));
      if(items.length>GROUP_CAP){
        var more=Math.min(items.length,GROUP_MAX)-GROUP_CAP;
        var mb=document.createElement('button');mb.className='mb';
        mb.textContent='Show '+more+' More';
        mb.dataset.gkey=gr.key;card.appendChild(mb);
      }
      rc.appendChild(card);
    }
  }
}

function mkItem(r){
  var div=document.createElement('div');div.className='ri';
  div.dataset.w=r.words?r.words.join(' '):r.word;
  var wSpan=document.createElement('span');wSpan.className='rw';
  if(r.words){
    for(var i=0;i<r.words.length;i++){
      if(i>0){var pl=document.createElement('span');pl.className='plus';pl.textContent='+';wSpan.appendChild(pl)}
      var ws=document.createElement('span');ws.textContent=r.words[i];wSpan.appendChild(ws);
    }
  }else{wSpan.textContent=r.word}
  div.appendChild(wSpan);
  if(r.type==='close'&&r.dl){
    if(r.ul){var bm=document.createElement('span');bm.className='rb sub';bm.textContent='\u2212'+r.ul;div.appendChild(bm)}
    var bp=document.createElement('span');bp.className='rb cl';bp.textContent='+'+r.dl;div.appendChild(bp);
  }else if(r.type==='subset'&&r.ul){
    var badge=document.createElement('span');badge.className='rb sub';
    badge.textContent='\u2212'+r.ul;div.appendChild(badge);
  }
  return div;
}

/* ── Show More ──────────────────────────────────────────────────── */
rc.addEventListener('click',function(e){
  var mb=e.target.closest('.mb');
  if(mb){
    var gkey=mb.dataset.gkey,il=clean(inp.value).length;
    var groups=groupResults(visRes,il);
    var gr;for(var i=0;i<groups.length;i++){if(groups[i].key===gkey){gr=groups[i];break}}
    if(!gr)return;
    var frag=document.createDocumentFragment();
    var end=Math.min(gr.items.length,GROUP_MAX);
    for(var i=GROUP_CAP;i<end;i++){var el=mkItem(gr.items[i]);el.classList.add('fi');frag.appendChild(el)}
    mb.parentNode.insertBefore(frag,mb);mb.remove();
    return;
  }
  var ri=e.target.closest('.ri');
  if(ri)doCopyWord(ri.dataset.w,ri);
});

/* ── Action Buttons ──────────────────────────────────────────────── */
function updateActions(hasResults){
  cpBtn.disabled=!hasResults;cpBtn.style.display=hasResults?'':'none';
  cpL.textContent=visRes.length>1?'Copy All':'Copy';
  rsBtn.style.display=hasResults||clean(inp.value)?'':'none';
}

var rowTimer=null;
function doCopyWord(w,row){
  _base.copyText(w,function(){
    // Copy button feedback
    if(cpTimer){clearTimeout(cpTimer);cpBtn.classList.remove('ok');cpI.style.display='';cpCk.style.display='none'}
    cpI.style.display='none';cpCk.style.display='';cpL.textContent='Copied';
    cpBtn.classList.remove('ok');void cpBtn.offsetWidth;cpBtn.classList.add('ok');
    cpTimer=setTimeout(function(){cpBtn.classList.remove('ok');cpI.style.display='';cpCk.style.display='none';cpL.textContent=visRes.length>1?'Copy All':'Copy';cpTimer=null},800);
    // Row highlight
    if(row){
      if(rowTimer){clearTimeout(rowTimer);var old=rc.querySelector('.ri.ok');if(old)old.classList.remove('ok')}
      row.classList.remove('ok');void row.offsetWidth;row.classList.add('ok');
      rowTimer=setTimeout(function(){row.classList.remove('ok');rowTimer=null},800);
    }
  });
}

function doCopyAll(){
  var items=rc.querySelectorAll('.ri');if(!items.length)return;
  var all=[];for(var i=0;i<items.length;i++)all.push(items[i].dataset.w);
  doCopyWord(all.join('\n'));
}

function doPaste(){
  if(!navigator.clipboard||!navigator.clipboard.readText){_base.notify('Clipboard Not Available',false);return}
  navigator.clipboard.readText().then(function(text){
    if(!text||!text.trim()){_base.notify('Clipboard Empty',false);return}
    inp.value=text;if(ready)solve();
    if(paTimer){clearTimeout(paTimer);paBtn.classList.remove('ok');paI.style.display='';paCk.style.display='none'}
    paI.style.display='none';paCk.style.display='';paL.textContent='Pasted';
    paBtn.classList.remove('ok');void paBtn.offsetWidth;paBtn.classList.add('ok');
    paTimer=setTimeout(function(){paBtn.classList.remove('ok');paI.style.display='';paCk.style.display='none';paL.textContent='Paste';paTimer=null},800);
  },function(){_base.notify('Clipboard Access Denied',false)});
}

function doReset(){
  inp.value='';filterInp.value='';filterX.style.display='none';
  allRes=[];visRes=[];kbIdx=-1;_base.save('resolve:input','');
  showEmpty();inp.focus();
}

/* ── Reset (two-press) ──────────────────────────────────────────── */
var resetH=_base.twoPress(rsBtn,{label:rsL,guard:function(){return allRes.length>0||clean(inp.value).length>0},onConfirm:doReset});
var navActive=$('nav-active');
var navResetH=_base.twoPress(navActive,{label:navActive,text:'ReSolve',onConfirm:doReset,guard:function(){return allRes.length>0||clean(inp.value).length>0}});
navActive.addEventListener('click',function(e){e.preventDefault();navResetH.press()});

/* ── Filter ──────────────────────────────────────────────────────── */
function applyFilter(){
  var q=_search.norm(filterInp.value.trim().toLowerCase());
  if(!q){visRes=allRes;kbIdx=-1;render(false);return}
  var words=q.split(/\s+/).filter(Boolean),scored=[];
  for(var i=0;i<allRes.length;i++){
    var r=allRes[i],txt=_search.normC(r.word.toLowerCase()),total=0,ok=true;
    for(var j=0;j<words.length;j++){
      var s=_search.scoreWord(words[j],txt);
      if(s<=0){ok=false;break}
      total+=s;
    }
    if(ok)scored.push({r:r,fs:total});
  }
  scored.sort(function(a,b){return b.fs-a.fs});
  visRes=scored.map(function(s){return s.r});
  kbIdx=-1;render(true);
}
filterInp.addEventListener('input',function(){
  filterX.style.display=filterInp.value?'flex':'none';
  clearTimeout(filterTimer);filterTimer=setTimeout(applyFilter,80);
});
filterX.addEventListener('click',function(){filterInp.value='';filterX.style.display='none';applyFilter();filterInp.focus()});

/* ── Events ──────────────────────────────────────────────────────── */
function doSolve(){if(!clean(inp.value)){_base.notify('Enter Some Letters',false);return};solve()}
goBtn.addEventListener('click',doSolve);
inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSolve()}});
modeRow.addEventListener('click',function(e){
  var b=e.target.closest('.seg[data-mode]');if(!b)return;
  var m=b.dataset.mode;
  if(m===mode){if(clean(inp.value))solve();else showEmpty();return}
  mode=m;_base.save('resolve:mode',mode);
  modeRow.querySelectorAll('.seg').forEach(function(s){s.classList.toggle('active',s.dataset.mode===mode)});
  if(clean(inp.value))solve();else showEmpty();
});
paBtn.addEventListener('click',doPaste);
cpBtn.addEventListener('click',doCopyAll);
rsBtn.addEventListener('click',function(){resetH.press()});
document.addEventListener('paste',function(e){
  if(document.activeElement===inp||document.activeElement===filterInp)return;
  var text=e.clipboardData&&e.clipboardData.getData('text');
  if(text){e.preventDefault();inp.value=text;if(ready)solve()}
});

/* ── Keyboard Navigation ────────────────────────────────────────── */
function getVisItems(){return rc.querySelectorAll('.ri')}
function setKb(idx){
  var items=getVisItems();
  if(kbIdx>=0&&kbIdx<items.length)items[kbIdx].classList.remove('kf');
  kbIdx=idx;
  if(kbIdx>=0&&kbIdx<items.length){items[kbIdx].classList.add('kf');items[kbIdx].scrollIntoView({block:'nearest'})}
}
function moveKb(dir){
  var items=getVisItems();if(!items.length)return;
  var next=kbIdx+dir;if(next<0)next=items.length-1;if(next>=items.length)next=0;setKb(next);
}

/* ── Keyboard Shortcuts ─────────────────────────────────────────── */
_base.onKey({
  '/':function(e){e.preventDefault();inp.focus()},
  'r':function(e){e.preventDefault();doReset()},
  's':function(e){if(filterWrap.style.display!=='none'){e.preventDefault();filterInp.focus()}},
  'm':function(){
    var next=mode==='single'?'multi':'single';mode=next;_base.save('resolve:mode',mode);
    modeRow.querySelectorAll('.seg').forEach(function(s){s.classList.toggle('active',s.dataset.mode===mode)});
    if(clean(inp.value))solve();
  },
  'v':doPaste,'p':doPaste,
  'a':function(){doCopyAll()},
  'j':function(){moveKb(1)},'k':function(){moveKb(-1)},
  'ArrowDown':function(){moveKb(1)},'ArrowUp':function(){moveKb(-1)},
  'Enter':function(){if(kbIdx>=0){var items=getVisItems();if(items[kbIdx])doCopyWord(items[kbIdx].dataset.w,items[kbIdx])}},
  'Escape':function(){
    if(filterInp===document.activeElement){filterInp.value='';filterX.style.display='none';applyFilter();filterInp.blur()}
    else{kbIdx=-1;var items=getVisItems();for(var i=0;i<items.length;i++)items[i].classList.remove('kf')}
  }
});

/* ── Init ────────────────────────────────────────────────────────── */
modeRow.querySelectorAll('.seg').forEach(function(s){s.classList.toggle('active',s.dataset.mode===mode)});
if(lastInput)inp.value=lastInput;

_swr('/resolve/words.txt',{parse:function(t){return t},key:'resolve:dict'}).then(function(text){
  if(text)buildIndex(text);else showStatus('Failed to Load Dictionary',false);
}).catch(function(){showStatus('Failed to Load Dictionary',false)});

})();
</script>
