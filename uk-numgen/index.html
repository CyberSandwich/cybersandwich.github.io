<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<title>UK Number Generator</title>
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" type="image/png" href="/ds-favicon.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAFA;--bg2:#F5F5F5;--card:#FFF;
  --t1:#1A1A1A;--t2:#6B6B6B;--t3:#9A9A9A;--t4:#C7C7CC;
  --bdr2:#F0F0F0;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  --mono:'SF Mono',ui-monospace,Menlo,Monaco,'Cascadia Code','Courier New',monospace
}
::selection{background:rgba(59,130,246,.12);color:var(--t1)}
body{
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
  background:var(--bg);color:var(--t1);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation
}
.w{width:100%;max-width:400px;padding:20px 20px 100px}
.num{
  background:var(--card);border-radius:20px;
  box-shadow:var(--shadow);
  padding:36px 24px;text-align:center;
  margin-bottom:14px
}
#n{
  display:block;
  font:600 clamp(1.75rem,6vw,2.25rem)/1 var(--mono);
  letter-spacing:.05em;
  font-variant-numeric:tabular-nums;
  color:var(--t1)
}
.fi{animation:fi .25s ease}
.links{
  background:var(--card);border-radius:20px;
  box-shadow:var(--shadow);overflow:hidden
}
.links button{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:14px 20px;
  font:500 .9375rem/1 var(--font);
  color:var(--t2);background:none;border:none;
  border-bottom:1px solid var(--bdr2);
  cursor:pointer;text-align:left;
  transition:background .15s,color .15s
}
.links button:last-child{border-bottom:none}
.links button:hover{background:var(--bg2);color:var(--t1)}
.links svg{width:18px;height:18px;flex-shrink:0;color:var(--t4)}
.links button.ok{background:#DCFCE7}
.links button.ok svg{color:#34D399}
.links button.ok span{color:#34D399}
.ok polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:10;
  padding:0 20px calc(20px + env(safe-area-inset-bottom,0px))
}
.tabs{
  display:flex;
  background:rgba(245,245,245,.92);
  border-radius:50px;padding:5px;
  box-shadow:0 2px 6px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.06);
  border:1px solid rgba(255,255,255,.45)
}
@supports(backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px)){
  .tabs{background:rgba(255,255,255,.35);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6)}
}
.tabs a{
  display:inline-flex;align-items:center;gap:6px;
  padding:12px 22px;border-radius:50px;
  font:500 .875rem/1 var(--font);
  color:var(--t3);text-decoration:none;
  transition:color .15s;white-space:nowrap
}
.tabs a:hover{color:var(--t2)}
.tabs a:active{opacity:.7}
.tabs svg{width:14px;height:14px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes draw{to{stroke-dashoffset:0}}
:focus{outline:2px solid #3B82F6;outline-offset:3px}
:focus:not(:focus-visible){outline:none}
:focus-visible{outline:2px solid #3B82F6;outline-offset:3px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="w">
<div class="num">
<output id="n" aria-live="polite"></output>
</div>
<div class="links">
<button id="g" type="button"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-9-9"/><path d="M21 3v9h-9"/></svg>Regenerate</button>
<button id="c" type="button"><svg id="ci" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg id="ck" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg><span id="cl">Copy</span></button>
</div>
</div>
<nav aria-label="Navigation">
<div class="tabs">
<a href="/"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>Home</a>
</div>
</nav>
<script>
/* UK mobile generator — full libphonenumber GB mobile regex compliance.
   10 invalid 3-digit combos rejected via Set lookup:
   509 524 700 781 797 829 839 911 924 937
   98.75% first-try acceptance. CSPRNG via crypto.getRandomValues.
   Bitmask &7 on pool[8] for zero modulo bias (256%8=0). */
var X=new Set([509,524,700,781,797,829,839,911,924,937]),
P=[1,2,3,4,5,7,8,9],
el=document.getElementById('n'),
cb=document.getElementById('c'),
si=document.getElementById('ci'),
sk=document.getElementById('ck'),
sl=document.getElementById('cl'),
tm,cur;
function gen(){var r=new Uint8Array(9),a,b,c;do{crypto.getRandomValues(r);a=P[r[0]&7];b=r[1]%10;c=r[2]%10}while(X.has(a*100+b*10+c));var s='07'+a+b+c;for(var i=3;i<9;i++)s+=r[i]%10;return s}
function show(){cur=gen();el.textContent=cur.slice(0,5)+'\u00A0'+cur.slice(5,8)+'\u00A0'+cur.slice(8);el.classList.remove('fi');void el.offsetWidth;el.classList.add('fi')}
show();
document.getElementById('g').onclick=show;
cb.onclick=function(){clearTimeout(tm);navigator.clipboard.writeText(cur).then(function(){si.style.display='none';sk.style.display='';sl.textContent='Copied';cb.classList.add('ok');tm=setTimeout(function(){si.style.display='';sk.style.display='none';sl.textContent='Copy';cb.classList.remove('ok')},1500)},function(){sl.textContent='Failed';tm=setTimeout(function(){sl.textContent='Copy'},1500)})}
</script>
</body>
</html>
