<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<title>UK Number Generator</title>
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" type="image/png" href="/ds-favicon.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAFA;--bg2:#F5F5F5;--card:#FFF;
  --t1:#1A1A1A;--t2:#6B6B6B;--t3:#9A9A9A;--t4:#C7C7CC;
  --bdr2:#F0F0F0;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif
}
body{
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
  background:var(--bg);color:var(--t1);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation
}
svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.w{width:100%;max-width:440px;padding:20px 20px 100px}
.num{
  background:#48484A;border-radius:20px;
  box-shadow:var(--shadow);
  padding:24px;margin-bottom:14px
}
#n{
  display:block;
  font:600 clamp(1.4rem,8vw,2.25rem)/1 'SF Mono',ui-monospace,Menlo,Monaco,'Cascadia Code','Courier New',monospace;
  letter-spacing:.04em;
  white-space:nowrap;text-align:center;
  color:#fff;text-decoration:none
}
#n:active{opacity:.7}
.fi{animation:fi .25s ease}
.links{
  background:var(--card);border-radius:20px;
  box-shadow:var(--shadow);overflow:hidden
}
.links button{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:14px 20px;
  font:500 .9375rem/1 var(--font);
  color:var(--t2);background:none;border:none;
  border-bottom:1px solid var(--bdr2);
  cursor:pointer;text-align:left;
  transition:background .25s,color .15s
}
.links button:last-child{border-bottom:none}
.links button:hover{background:var(--bg2);color:var(--t1)}
.links svg{width:18px;height:18px;flex-shrink:0;color:var(--t4)}
.ok{background:#DCFCE7!important}
.ok svg,.ok span{color:#34D399!important}
.ok polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
.regen{background:#FEF9C3!important}
.regen svg{color:#CA8A04!important;animation:spin .4s ease}
.regen span{color:#CA8A04}
#ck{stroke-width:2.5}
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:10;
  padding:0 20px calc(20px + env(safe-area-inset-bottom,0px))
}
.tabs{
  display:flex;
  background:rgba(245,245,245,.92);
  border-radius:50px;padding:5px;
  box-shadow:0 2px 6px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.06);
  border:1px solid rgba(255,255,255,.45)
}
@supports(backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px)){
  .tabs{background:rgba(255,255,255,.35);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6)}
}
.tabs a{
  padding:12px 22px;border-radius:50px;
  font:500 .875rem/1 var(--font);
  color:var(--t3);
  transition:color .15s,background .15s,box-shadow .15s;
  white-space:nowrap;text-decoration:none
}
.tabs a.active{
  background:rgba(50,50,52,.85);
  color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15)
}
.tabs a:active{opacity:.7}
@media(hover:hover){.tabs a:hover:not(.active){color:var(--t2)}}
@media(max-width:480px){.tabs a{padding:14px 16px;font-size:.8125rem}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes spin{to{transform:rotate(360deg)}}
:focus-visible{outline:2px solid #3B82F6;outline-offset:3px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="w">
<div class="num" aria-live="polite">
<a id="n"></a>
</div>
<div class="links">
<button id="g" type="button"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 2v6h-6M21 13a9 9 0 1 1-3-7.7L21 8"/></svg><span id="gl">Regenerate</span></button>
<button id="c" type="button"><svg id="ci" aria-hidden="true" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg id="ck" aria-hidden="true" viewBox="0 0 24 24" style="display:none"><polyline points="4 12 9 17 20 6"/></svg><span id="cl">Copy</span></button>
</div>
</div>
<nav>
<div class="tabs">
<a href="/">Home</a>
<a href="/projects" class="active">Projects</a>
</div>
</nav>
<script>
var $=s=>document.getElementById(s),
X=new Set([509,524,700,781,797,829,839,911,924,937]),
P=[1,2,3,4,5,7,8,9],
el=$('n'),gb=$('g'),gs=$('gl'),cb=$('c'),si=$('ci'),sk=$('ck'),sl=$('cl'),gm,cm,cur;
function gen(){var r=new Uint8Array(9),a,b,c,s,i;do{crypto.getRandomValues(r);a=P[r[0]&7];b=r[1]%10;c=r[2]%10}while(X.has(a*100+b*10+c));s='07'+a+b+c;for(i=3;i<9;i++)s+=r[i]%10;return s}
function render(){cur=gen();el.textContent=cur.slice(0,5)+'-'+cur.slice(5,8)+'-'+cur.slice(8);el.href='tel:+44'+cur.slice(1);el.classList.remove('fi');el.offsetWidth;el.classList.add('fi')}
function doCopy(){clearTimeout(cm);navigator.clipboard.writeText(cur).then(function(){si.style.display='none';sk.style.display='';sl.textContent='Copied';cb.classList.remove('ok');cb.offsetWidth;cb.classList.add('ok');cm=setTimeout(function(){si.style.display='';sk.style.display='none';sl.textContent='Copy';cb.classList.remove('ok')},800)},function(){sl.textContent='Failed';cm=setTimeout(function(){sl.textContent='Copy'},800)})}
render();
el.onclick=e=>{e.preventDefault();doCopy()};
gb.onclick=function(){clearTimeout(gm);render();gs.textContent='Regenerated';gb.classList.remove('regen');gb.offsetWidth;gb.classList.add('regen');gm=setTimeout(function(){gs.textContent='Regenerate';gb.classList.remove('regen')},800)};
cb.onclick=doCopy;
</script>
</body>
</html>
