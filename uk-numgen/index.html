<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>UK Number Generator</title>
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" type="image/png" href="/ds-favicon.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAFA;--bg2:#F5F5F5;--card:#FFF;
  --t1:#1A1A1A;--t2:#6B6B6B;--t3:#9A9A9A;--t4:#C7C7CC;
  --bdr2:#F0F0F0;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  --num-bg:#48484A;
  --tab-bg:rgba(245,245,245,.92);--tab-blur:rgba(255,255,255,.35);--tab-border:rgba(255,255,255,.45);--tab-shadow:0 2px 6px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.06);--tab-active:rgba(50,50,52,.85);--tab-active-c:#fff
}
html[data-theme="dark"]{
  --bg:#1C1C1E;--bg2:#2C2C2E;--card:#2C2C2E;
  --t1:#D4D4D4;--t2:#8A8A8A;--t3:#6E6E6E;--t4:#444;
  --bdr2:#2C2C2E;--num-bg:#48484A;
  --shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15);
  --tab-bg:rgba(38,38,38,.92);--tab-blur:rgba(30,30,30,.55);--tab-border:rgba(255,255,255,.06);--tab-shadow:0 2px 6px rgba(0,0,0,.2),0 8px 20px rgba(0,0,0,.3);--tab-active:rgba(255,255,255,.12);--tab-active-c:#E4E4E4
}
html[data-theme="sepia"]{
  --bg:#F5EDDA;--bg2:#EDE5D0;--card:#FAF4E6;
  --t1:#5B4636;--t2:#8B7355;--t3:#AB9B85;--t4:#C8B99E;
  --bdr2:#E8E0CE;--num-bg:#6B5744;
  --shadow:0 1px 3px rgba(91,70,54,.06),0 4px 12px rgba(91,70,54,.06);
  --tab-bg:rgba(240,232,216,.92);--tab-blur:rgba(245,237,218,.55);--tab-border:rgba(255,255,255,.35);--tab-shadow:0 2px 6px rgba(91,70,54,.06),0 8px 20px rgba(91,70,54,.08);--tab-active:rgba(91,70,54,.8);--tab-active-c:#F5EDDA
}
html{background:var(--bg)}
body{
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  background:var(--bg);color:var(--t1);transition:background .3s,color .3s;
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation
}
svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.w{width:100%;max-width:440px;padding:20px 20px 100px}
.num{
  background:var(--num-bg);border-radius:20px;
  box-shadow:var(--shadow);
  padding:24px;margin-bottom:14px
}
#n{
  display:block;
  font:600 clamp(1.4rem,8vw,2.25rem)/1 'SF Mono',ui-monospace,Menlo,Monaco,'Cascadia Code','Courier New',monospace;
  font-variant-numeric:tabular-nums;letter-spacing:.04em;
  white-space:nowrap;text-align:center;
  color:#fff;text-decoration:none
}
#n:active{opacity:.7}
#n::selection{background:#636366;color:#fff}
.fi{animation:fi .25s ease}
.links{
  background:var(--card);border-radius:20px;
  box-shadow:var(--shadow);overflow:hidden
}
.links button{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:14px 20px;
  font:500 .9375rem/1 var(--font);
  color:var(--t2);background:none;border:none;
  border-bottom:1px solid var(--bdr2);
  cursor:pointer;text-align:left;
  transition:background .25s,color .15s
}
.links button:last-child{border-bottom:none}
.links button:hover{background:var(--bg2);color:var(--t1)}
.links svg{width:18px;height:18px;flex-shrink:0;color:var(--t4)}
.ok{background:#DCFCE7!important}
.ok svg,.ok span{color:#34D399!important}
.ok polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
.regen{background:#FEF9C3!important}
.regen svg{color:#CA8A04!important;animation:spin .4s ease}
.regen span{color:#CA8A04}
#ck{stroke-width:2.5}
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:10;
  padding:0 20px calc(20px + env(safe-area-inset-bottom,0px));
  display:flex;gap:8px;align-items:center
}
.tabs{
  display:flex;
  background:var(--tab-bg);
  border-radius:50px;padding:5px;
  box-shadow:var(--tab-shadow);
  border:1px solid var(--tab-border);
  max-width:calc(100vw - 40px)
}
@supports(backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px)){
  .tabs{background:var(--tab-blur);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6)}
}
.tabs a{
  padding:12px clamp(10px,3vw,22px);border-radius:50px;
  font:500 clamp(.75rem,2.2vw,.875rem)/1 var(--font);
  color:var(--t3);
  transition:color .15s,background .15s,box-shadow .15s;
  white-space:nowrap;text-decoration:none
}
.tabs a.active{
  background:var(--tab-active);
  color:var(--tab-active-c);
  box-shadow:0 2px 8px rgba(0,0,0,.15)
}
.tabs a:active{opacity:.7}
@media(hover:hover){.tabs a:hover:not(.active){color:var(--t2)}}
.theme-toggle{display:flex;align-items:center;justify-content:center;padding:12px;border:none;border-radius:50%;cursor:pointer;color:var(--t3);background:none;transition:color .15s}
.theme-toggle:active{opacity:.7}
@media(hover:hover){.theme-toggle:hover{color:var(--t1)}}
@media(max-width:480px){.tabs{max-width:calc(100vw - 28px)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes spin{to{transform:rotate(360deg)}}
:focus-visible{outline:2px solid #3B82F6;outline-offset:3px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="w">
<div class="num" aria-live="polite">
<a id="n"></a>
</div>
<div class="links">
<button id="g" type="button" aria-label="Regenerate number"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 2v6h-6M21 13a9 9 0 1 1-3-7.7L21 8"/></svg><span id="gl">Regenerate</span></button>
<button id="c" type="button" aria-label="Copy number to clipboard"><svg id="ci" aria-hidden="true" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg id="ck" aria-hidden="true" viewBox="0 0 24 24" style="display:none"><polyline points="4 12 9 17 20 6"/></svg><span id="cl">Copy</span></button>
</div>
</div>
<nav>
<div class="tabs">
<a href="/">Home</a>
<a href="/projects" class="active">NumGen</a>
</div>
<div class="tabs"><button id="theme-btn" class="theme-toggle" aria-label="Toggle Theme"></button></div>
</nav>
<script>
var THEMES=['light','sepia','dark'],THEME_COLORS={light:'#FAFAFA',dark:'#1C1C1E',sepia:'#F5EDDA'};
var THEME_ICONS={
  sepia:'<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>',
  dark:'<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 3z"/></svg>',
  light:'<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
};
function curTheme(){return document.documentElement.getAttribute('data-theme')||'light'}
function setThemeIcon(next){document.getElementById('theme-btn').innerHTML=THEME_ICONS[next]}
function setTheme(t){
  if(t==='light')document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',t);
  document.querySelector('meta[name="theme-color"]').content=THEME_COLORS[t];
  setThemeIcon(THEMES[(THEMES.indexOf(t)+1)%THEMES.length]);
  try{localStorage.setItem('theme',t)}catch(_){}
}
(function(){var t;try{t=localStorage.getItem('theme')}catch(_){}setTheme(t&&THEMES.includes(t)?t:'light')})();
document.getElementById('theme-btn').addEventListener('click',function(){setTheme(THEMES[(THEMES.indexOf(curTheme())+1)%THEMES.length])});
document.addEventListener('visibilitychange',function(){if(document.hidden)return;var s=localStorage.getItem('theme')||'light';if(s!==curTheme())setTheme(s);var n=document.querySelector('nav');if(n){n.style.display='none';n.offsetHeight;n.style.display=''}});
var $=s=>document.getElementById(s),
/* reserved/invalid UK 07 area codes */ X=new Set([700,781,797,829,839,911,924,937]),
el=$('n'),gb=$('g'),gs=$('gl'),cb=$('c'),si=$('ci'),sk=$('ck'),sl=$('cl'),gm,cm,cur;
function gen(){var r=new Uint8Array(9),a,b,c,s,i;do{crypto.getRandomValues(r);a=7+r[0]%3;b=r[1]%10;c=r[2]%10}while(X.has(a*100+b*10+c));s='07'+a+b+c;for(i=3;i<9;i++)s+=r[i]%10;return s}
function render(){cur=gen();el.textContent=cur.slice(0,5)+' '+cur.slice(5);el.href='tel:+44'+cur.slice(1);el.classList.remove('fi');el.offsetWidth;el.classList.add('fi')}
function doCopy(){clearTimeout(cm);navigator.clipboard.writeText(cur).then(function(){si.style.display='none';sk.style.display='';sl.textContent='Copied';cb.classList.remove('ok');cb.offsetWidth;cb.classList.add('ok');cm=setTimeout(function(){si.style.display='';sk.style.display='none';sl.textContent='Copy';cb.classList.remove('ok')},800)},function(){sl.textContent='Failed';cm=setTimeout(function(){sl.textContent='Copy'},800)})}
render();
el.onclick=e=>{e.preventDefault();doCopy()};
gb.onclick=function(){clearTimeout(gm);render();gs.textContent='Regenerated';gb.classList.remove('regen');gb.offsetWidth;gb.classList.add('regen');gm=setTimeout(function(){gs.textContent='Regenerate';gb.classList.remove('regen')},800)};
cb.onclick=doCopy;
document.addEventListener('keydown',function(e){var t=document.activeElement&&document.activeElement.tagName;if(t==='INPUT'||t==='TEXTAREA')return;if(e.metaKey||e.ctrlKey||e.altKey)return;if(e.key==='1'||e.key==='ArrowLeft'){location.href='/';return}if(e.key==='2'||e.key==='ArrowRight'){location.href='/projects';return}if(e.key===' '||e.key==='Enter'||e.key==='r'){e.preventDefault();gb.click()}if(e.key==='c'){e.preventDefault();doCopy()}if(e.key==='t'){setTheme(THEMES[(THEMES.indexOf(curTheme())+1)%THEMES.length])}});
</script>
</body>
</html>
