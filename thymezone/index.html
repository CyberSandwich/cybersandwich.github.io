<style>
body{display:flex;align-items:flex-start;justify-content:center}
.w{max-width:440px;padding:20px 20px calc(100px + env(safe-area-inset-bottom,0px));width:100%}
@media(min-width:768px){.w{padding:32px 48px calc(100px + env(safe-area-inset-bottom,0px))}}

:root{
  --tz-noon:#FF9500;
  --tz-now:#3B82F6;
  --tz-now-bg:rgba(59,130,246,.06);
  --tz-stripe:rgba(0,0,0,.02)
}
html[data-theme="dark"]{
  --tz-noon:#FFB340;
  --tz-now:#64B5F6;
  --tz-now-bg:rgba(100,181,246,.08);
  --tz-stripe:rgba(255,255,255,.02)
}
html[data-theme="sepia"]{
  --tz-noon:#D4851F;
  --tz-now:#A67B5B;
  --tz-now-bg:rgba(166,123,91,.15);
  --tz-stripe:rgba(91,70,54,.03)
}

.tz-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tz-inp-wrap{position:relative;min-width:0}
.tz-inp-wrap .inp{margin-bottom:0}
.tz-inp-wrap .inp input{padding:12px 16px;min-width:0}

.tz-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:20;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow2);max-height:320px;overflow-y:auto;display:none}
.tz-drop.open{display:block}
.tz-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bdr2)}
.tz-opt:last-child{border-bottom:none}
.tz-opt.tz-active{background:var(--bg2)}
.tz-city{font:500 .875rem/1.2 var(--font);color:var(--t1)}
.tz-meta{font:400 .75rem/1.2 var(--font);color:var(--t3);text-align:right;flex-shrink:0;margin-left:12px}
.tz-empty{padding:20px 16px;text-align:center;color:var(--t4);font:500 .875rem/1 var(--font)}
@media(hover:hover){.tz-opt:hover{background:var(--bg2)}}

#tz-sum strong{color:var(--t1);font-weight:600}

.links>button{transition:background .25s,color .25s}
.links>button.ok{animation:none}
.links>button:active:not([disabled]){opacity:.7}


.tz-gh{display:grid;grid-template-columns:1fr 1fr;padding:10px 20px;font:600 .8125rem/1 var(--font);color:var(--t2);border-bottom:1px solid var(--bdr2);text-align:center}
.tz-gf{border-bottom:none;border-top:1px solid var(--bdr2)}
.tz-gh .tz-warn{color:#E06B50}
html[data-theme="dark"] .tz-gh .tz-warn{color:#F08A72}
html[data-theme="sepia"] .tz-gh .tz-warn{color:#C2614A}
.tz-row{display:grid;grid-template-columns:1fr 1fr;padding:10px 20px;cursor:pointer;transition:background .15s;font-variant-numeric:tabular-nums;user-select:none;border-left:3px solid transparent;border-right:3px solid transparent}
.tz-row:nth-child(odd){background:var(--tz-stripe)}
.tz-row .tz-h{font-size:.9375rem;line-height:1.4;font-family:var(--font);font-weight:400;color:var(--t3);text-align:center}
.tz-wk{color:var(--t1)!important}
.tz-row.wk-l{border-left-color:var(--t3)}
.tz-row.wk-r{border-right-color:var(--t3)}
.tz-row.wk-r-off{border-right-color:#E06B50}
html[data-theme="dark"] .tz-row.wk-r-off{border-right-color:#F08A72}
html[data-theme="sepia"] .tz-row.wk-r-off{border-right-color:#C2614A}
.tz-noon{color:var(--tz-noon)!important;font-weight:600}
.tz-dusk{color:#7C6AE8!important;font-weight:600}
html[data-theme="dark"] .tz-dusk{color:#A594F9!important}
html[data-theme="sepia"] .tz-dusk{color:#7C5BAD!important}
.tz-row{position:relative}
.tz-row.tz-mid::after{content:'';position:absolute;top:0;left:50%;right:0;border-top:2px dashed #E06B50}
html[data-theme="dark"] .tz-row.tz-mid::after{border-top-color:#F08A72}
html[data-theme="sepia"] .tz-row.tz-mid::after{border-top-color:#C2614A}
.tz-day{font-size:.625rem;color:var(--t4);vertical-align:super;margin-left:2px}
.tz-row.mtg-top::before{content:'';position:absolute;top:0;left:0;right:0;border-top:2px dashed var(--t3)}
.tz-row.mtg-btm::before{content:'';position:absolute;bottom:0;left:0;right:0;border-bottom:2px dashed var(--t3)}
.tz-row.tz-now{background:var(--tz-now-bg)}
.tz-row.ok{background:var(--tz-now-bg);transition:background .25s}
.tz-row:active{opacity:.85}
@media(hover:hover){.tz-row:hover{background:var(--bg2)}}
@media(hover:hover){.tz-row.tz-now:hover{background:var(--tz-now-bg)}}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

// Runtime offset computation -- DST-aware via Intl
function getOffset(tz,date){
  try{
    var parts=new Intl.DateTimeFormat('en-GB',{timeZone:tz,timeZoneName:'shortOffset'}).formatToParts(date||new Date());
    var tzn=parts.find(function(p){return p.type==='timeZoneName'});
    return tzn?tzn.value:'GMT';
  }catch(e){return'GMT'}
}

function getOffsetMin(tz,date){
  var s=getOffset(tz,date);
  if(s==='GMT'||s==='UTC')return 0;
  var m=s.match(/GMT([+-])(\d{1,2})(?::(\d{2}))?/);
  if(!m)return 0;
  return(m[1]==='+'?1:-1)*(parseInt(m[2],10)*60+parseInt(m[3]||'0',10));
}

function getAbbr(tz,date){
  try{
    var parts=new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'short'}).formatToParts(date||new Date());
    var tzn=parts.find(function(p){return p.type==='timeZoneName'});
    return tzn?tzn.value:'';
  }catch(e){return''}
}

function getOffsetForAbbr(tz,abbr){
  var y=new Date().getFullYear();
  var jan=new Date(y,0,15),jul=new Date(y,6,15);
  if(getAbbr(tz,jan)===abbr)return getOffsetMin(tz,jan);
  if(getAbbr(tz,jul)===abbr)return getOffsetMin(tz,jul);
  return getOffsetMin(tz);
}

function getCurrentHour(tz){
  try{
    var parts=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',minute:'numeric',hour12:false}).formatToParts(new Date());
    var h=parseInt(parts.find(function(p){return p.type==='hour'}).value,10);
    var min=parseInt(parts.find(function(p){return p.type==='minute'}).value,10);
    return{h:h===24?0:h,m:min};
  }catch(e){return{h:0,m:0}}
}

// Build a Date for a specific hour (0-23) in a timezone, using today's date in that tz
function dateForHour(tz,h){
  var now=new Date();
  // Get today's date in the target timezone
  var parts=new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).format(now).split('-');
  // Build an ISO string and adjust — use noon to avoid DST edge, then shift
  var base=new Date(parts[0]+'-'+parts[1]+'-'+parts[2]+'T12:00:00Z');
  // Get the offset at noon to find the UTC equivalent of midnight
  var noonOff=getOffsetMin(tz,base);
  // Midnight in this tz = midnight_utc - offset
  var midnight=new Date(base.getTime()-noonOff*60000-12*3600000);
  // The target hour
  return new Date(midnight.getTime()+h*3600000);
}

// Get tz2 hour/min and day offset for a specific tz1 hour
function tz2ForHour(tz1,tz2,h){
  var d=dateForHour(tz1,h);
  var off1=getOffsetMin(tz1,d),off2=getOffsetMin(tz2,d);
  var diff=off2-off1;
  var t2min=((h*60+diff)%1440+1440)%1440;
  var raw=h*60+diff;
  var dayOff=raw>=0?Math.floor(raw/1440):-Math.ceil(-raw/1440);
  return{h2:Math.floor(t2min/60),m2:t2min%60,diff:diff,dayOff:dayOff};
}

// -- Time Formatting --
function fmtHour(h,m,forceMin){
  var ap=h>=12?'PM':'AM';
  var hh=h%12;if(hh===0)hh=12;
  if((m&&m>0)||forceMin)return hh+':'+(m<10?'0':'')+(m||0)+' '+ap;
  return hh+' '+ap;
}

function fmtOffset(min){
  if(min===0)return'GMT';
  var sign=min>0?'+':'-';
  var abs=Math.abs(min);
  var h=Math.floor(abs/60);
  var m=abs%60;
  return'GMT'+sign+h+(m?':'+(m<10?'0':'')+m:'');
}

function fmtDiffShort(diffMin){
  if(diffMin===0)return'Same Time';
  var abs=Math.abs(diffMin);
  var h=Math.floor(abs/60);
  var m=abs%60;
  var dir=diffMin>0?'Ahead':'Behind';
  var parts=[];
  if(h)parts.push(h+'h');
  if(m)parts.push(m+'m');
  return parts.join(' ')+' '+dir;
}

function fmtDiffLong(diffMin){
  if(diffMin===0)return'the Same Time as';
  var abs=Math.abs(diffMin);
  var h=Math.floor(abs/60);
  var m=abs%60;
  var dir=diffMin>0?'Ahead of':'Behind';
  var parts=[];
  if(h===1)parts.push('1 Hour');
  else if(h)parts.push(h+' Hours');
  if(m===1)parts.push('1 Minute');
  else if(m)parts.push(m+' Minutes');
  return parts.join(' ')+' '+dir;
}

// -- Selection --
function tzLabel(zone){return zone.city+' ('+getAbbr(zone.tz)+')'}

function selectTz(slot,zone,abbr){
  if(slot===1){
    sel1=zone;sel1Abbr=abbr||null;
    sel1Off=abbr&&abbr!==getAbbr(zone.tz)?getOffsetForAbbr(zone.tz,abbr):null;
    tz1Inp.value='';
    tz1Inp.placeholder=tzLabel(zone);
  }else{
    sel2=zone;sel2Abbr=abbr||null;
    sel2Off=abbr&&abbr!==getAbbr(zone.tz)?getOffsetForAbbr(zone.tz,abbr):null;
    tz2Inp.value='';
    tz2Inp.placeholder=tzLabel(zone);
  }
  _base.save('tz:pair',{tz1:sel1?{tz:sel1.tz,city:sel1.city}:null,tz2:sel2?{tz:sel2.tz,city:sel2.city}:null,a1:sel1Abbr,a2:sel2Abbr});
  renderAll();
  // Sync URL so it's always shareable
  if(sel1&&sel2){
    var p=new URLSearchParams();
    p.set('tz1',sel1Abbr||sel1.city);
    p.set('tz2',sel2Abbr||sel2.city);
    history.replaceState(null,'',location.pathname+'?'+p.toString());
  }
}

function findZone(tz,city){
  if(city){for(var i=0;i<zones.length;i++){if(zones[i].tz===tz&&zones[i].city===city)return zones[i]}}
  for(var i=0;i<zones.length;i++){if(zones[i].tz===tz)return zones[i]}
  return null;
}

// -- Init --
function abbrForParam(zone,param){
  // Check if the URL param matches an abbreviation of the resolved zone
  if(!param||!zone)return null;
  var qu=param.trim().toUpperCase();
  for(var a=0;a<zone.abbr.length;a++){if(zone.abbr[a]===qu)return qu}
  return null;
}

function init(){
  // URL params take priority over localStorage
  var params=new URLSearchParams(location.search);
  var p1=params.get('tz1'),p2=params.get('tz2');
  var z1=null,z2=null,a1=null,a2=null;

  if(p1||p2){
    // Resolve from URL
    if(p1){z1=matchZone(p1);a1=abbrForParam(z1,p1)}
    if(p2){z2=matchZone(p2);a2=abbrForParam(z2,p2)}
  }else{
    // Fall back to localStorage
    var saved=_base.load('tz:pair',null);
    if(saved){
      if(typeof saved.tz1==='string')z1=findZone(saved.tz1);
      else if(saved.tz1)z1=findZone(saved.tz1.tz,saved.tz1.city);
      if(typeof saved.tz2==='string')z2=findZone(saved.tz2);
      else if(saved.tz2)z2=findZone(saved.tz2.tz,saved.tz2.city);
      a1=saved&&saved.a1||null;
      a2=saved&&saved.a2||null;
    }
  }

  if(!z1){
    var local;
    try{local=Intl.DateTimeFormat().resolvedOptions().timeZone}catch(e){local='UTC'}
    z1=findZone(local)||findZone('UTC')||zones[0];
  }
  if(!z2)z2=findZone('UTC')||zones[0];
  selectTz(1,z1,a1);
  selectTz(2,z2,a2);
}

function tick(){
  if(!sel1||!sel2)return;
  var now1=getCurrentHour(sel1.tz),now2=getCurrentHour(sel2.tz);
  var now1Min=now1.h*60+now1.m;
  var rows=gridEl.children;
  for(var i=0;i<rows.length;i++){
    var r=rows[i],h=parseInt(r.dataset.h,10),sm=parseInt(r.dataset.m||'0',10);
    var slotMin=h*60+sm;
    var isNow=now1Min>=slotMin&&now1Min<slotMin+incMin;
    if(isNow){
      if(!r.classList.contains('tz-now'))r.classList.add('tz-now');
      var spans=r.querySelectorAll('.tz-h');
      var t1Txt=fmtHour(now1.h,now1.m),t2Txt=fmtHour(now2.h,now2.m);
      if(spans[0]&&spans[0].textContent!==t1Txt)spans[0].textContent=t1Txt;
      if(spans[1]&&spans[1].textContent!==t2Txt)spans[1].textContent=t2Txt;
    }else{
      if(r.classList.contains('tz-now')){
        r.classList.remove('tz-now');
        var spans=r.querySelectorAll('.tz-h');
        if(spans[0])spans[0].textContent=fmtHour(h,sm);
        if(useFixed||!sel1||!sel2){
          if(spans[1])spans[1].textContent=fmtHour(h,sm);
        }else{
          var rv=tz2ForHour(sel1.tz,sel2.tz,h);
          var t2min=((slotMin+(rv.diff||0))%1440+1440)%1440;
          if(spans[1])spans[1].textContent=fmtHour(Math.floor(t2min/60),t2min%60);
        }
      }
    }
  }
}
(function tickLoop(){if(!document.hidden)tick();setTimeout(tickLoop,1000-Date.now()%1000)})();
document.addEventListener('visibilitychange',function(){if(!document.hidden)tick()});

// -- Search --
var activeDropSlot=0,dropIdx=-1,dropResults=[];

function parseOffsetQuery(q){
  q=q.replace(/\s+/g,'').toLowerCase();
  var stripped=q.replace(/^(?:gmt|utc)/,'');
  if(!stripped&&(q==='gmt'||q==='utc'))return 0;
  if(!stripped)return null;
  var m=stripped.match(/^([+-]?)(\d{1,2})(?::(\d{2}))?$/);
  if(!m)return null;
  var h=parseInt(m[2],10);
  var min=parseInt(m[3]||'0',10);
  if(h>14||min>59)return null;
  var sign=m[1]==='-'?-1:1;
  return sign*(h*60+min);
}

function searchZones(query){
  var q=norm(query.trim().toLowerCase());
  if(!q)return[];

  // Offset search (fast — only checks primary zones)
  var offsetMin=parseOffsetQuery(q);
  var offsetResults=[];
  if(offsetMin!==null){
    var seen={},qu=q.toUpperCase();
    for(var i=0;i<zones.length;i++){
      if(seen[zones[i].tz])continue;
      if(getOffsetMin(zones[i].tz)===offsetMin){
        seen[zones[i].tz]=true;
        // Bonus for direct name match so "gmt" → UTC first, not London
        var bonus=0;
        if(zones[i].city.toLowerCase()===q)bonus=0.4;
        else{for(var a=0;!bonus&&a<zones[i].aliases.length;a++){if(norm(zones[i].aliases[a].toLowerCase())===q)bonus=0.3}
          for(var a=0;!bonus&&a<zones[i].abbr.length;a++){if(zones[i].abbr[a]===qu)bonus=0.2}}
        offsetResults.push({z:zones[i],s:(i<primaryCount?9.5:9)+bonus});
      }
    }
  }

  // Abbreviation search — exact match on primary zones ranks high
  var abbrResults=[];
  if(q.length>=2&&q.length<=5&&offsetMin===null){
    var qu=q.toUpperCase();
    for(var i=0;i<primaryCount;i++){
      for(var a=0;a<zones[i].abbr.length;a++){
        if(zones[i].abbr[a]===qu){abbrResults.push({z:zones[i],s:10});break}
      }
    }
  }

  // Text search — skip for single-char queries (only offset meaningful)
  // and skip if offset already found enough results
  var scored=[];
  if(q.length>=2&&offsetResults.length<8){
    var words=q.split(/\s+/).filter(Boolean);
    // Search primary zones first, then places
    for(var i=0;i<zones.length;i++){
      var z=zones[i],total=0,ok=true;
      for(var j=0;j<words.length;j++){
        var s=scoreWord(words[j],z.q);
        var ts=scoreWord(words[j],z.tl)*1.5;
        var best=Math.max(s,ts);
        if(best<=0){ok=false;break}
        total+=best;
      }
      if(ok)scored.push({z:z,s:total});
    }
  }

  // Merge and dedupe
  var all=abbrResults.concat(offsetResults).concat(scored);
  all.sort(function(a,b){return b.s-a.s||a.z.city.localeCompare(b.z.city)});
  var merged=[],seenTz={};
  for(var i=0;i<all.length;i++){
    if(seenTz[all[i].z.tz])continue;
    seenTz[all[i].z.tz]=true;
    merged.push(all[i]);
    if(merged.length>=8)break;
  }
  return merged;
}

function renderDrop(drop,results){
  drop.scrollTop=0;
  if(!results.length){
    drop.innerHTML='<div class="tz-empty">No Timezones Found</div>';
    drop.classList.add('open');return;
  }
  /* Trusted first-party strings from embedded timezone data */
  var html='';
  for(var i=0;i<results.length;i++){
    var z=results[i].z;
    var offset=fmtOffset(getOffsetMin(z.tz));
    var abbrStr=getAbbr(z.tz);abbrStr=abbrStr?abbrStr+', ':'';
    html+='<div class="tz-opt'+(i===dropIdx?' tz-active':'')+'" role="option" data-i="'+i+'">';
    html+='<span class="tz-city">'+z.city+', '+z.country+'</span>';
    html+='<span class="tz-meta">'+abbrStr+offset+'</span>';
    html+='</div>';
  }
  drop.innerHTML=html;
  drop.classList.add('open');
}

function closeDrop(slot){
  var drop=slot===1?tz1Drop:tz2Drop;
  var inp=slot===1?tz1Inp:tz2Inp;
  drop.classList.remove('open');drop.innerHTML='';
  inp.setAttribute('aria-expanded','false');
  if(activeDropSlot===slot){activeDropSlot=0;dropIdx=-1;dropResults=[]}
}

function closeAllDrops(){closeDrop(1);closeDrop(2)}

function openDrop(slot,query){
  var drop=slot===1?tz1Drop:tz2Drop;
  var inp=slot===1?tz1Inp:tz2Inp;
  closeDrop(slot===1?2:1);
  activeDropSlot=slot;dropIdx=-1;
  dropResults=searchZones(query);
  inp.setAttribute('aria-expanded','true');
  renderDrop(drop,dropResults);
}

function selectFromDrop(slot,idx){
  if(idx<0||idx>=dropResults.length)return;
  var zone=dropResults[idx].z;
  var inp=slot===1?tz1Inp:tz2Inp;
  var searchQ=inp.value.trim().toUpperCase();
  var abbrMatch=null;
  for(var a=0;a<zone.abbr.length;a++){if(zone.abbr[a]===searchQ){abbrMatch=searchQ;break}}
  selectTz(slot,zone,abbrMatch);
  closeDrop(slot);
}

function updateDropHighlight(drop){
  var opts=drop.querySelectorAll('.tz-opt');
  for(var i=0;i<opts.length;i++)opts[i].classList.toggle('tz-active',i===dropIdx);
  if(dropIdx>=0&&opts[dropIdx])opts[dropIdx].scrollIntoView({block:'nearest'});
}

// -- Search Input Handlers --
var searchTimer=null,searchRaf=0;

function handleSearchInput(slot){
  var inp=slot===1?tz1Inp:tz2Inp;
  clearTimeout(searchTimer);
  cancelAnimationFrame(searchRaf);
  searchTimer=setTimeout(function(){
    // Yield to browser for repaint, then run search
    searchRaf=requestAnimationFrame(function(){
      var v=inp.value.trim();
      if(v.length>0)openDrop(slot,v);
      else closeDrop(slot);
    });
  },120);
}

tz1Inp.addEventListener('input',function(){handleSearchInput(1)});
tz2Inp.addEventListener('input',function(){handleSearchInput(2)});

function handleSearchKey(e,slot){
  var drop=slot===1?tz1Drop:tz2Drop;
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(activeDropSlot!==slot)return;
    dropIdx=Math.min(dropIdx+1,dropResults.length-1);
    updateDropHighlight(drop);
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(activeDropSlot!==slot)return;
    dropIdx=Math.max(dropIdx-1,0);
    updateDropHighlight(drop);
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(activeDropSlot===slot&&dropIdx>=0)selectFromDrop(slot,dropIdx);
    else if(activeDropSlot===slot&&dropResults.length>0)selectFromDrop(slot,0);
  }else if(e.key==='Escape'){
    closeDrop(slot);
    (slot===1?tz1Inp:tz2Inp).blur();
  }
}

tz1Inp.addEventListener('keydown',function(e){handleSearchKey(e,1)});
tz2Inp.addEventListener('keydown',function(e){handleSearchKey(e,2)});

tz1Drop.addEventListener('click',function(e){
  var opt=e.target.closest('.tz-opt');
  if(opt)selectFromDrop(1,parseInt(opt.dataset.i,10));
});
tz2Drop.addEventListener('click',function(e){
  var opt=e.target.closest('.tz-opt');
  if(opt)selectFromDrop(2,parseInt(opt.dataset.i,10));
});

document.addEventListener('click',function(e){
  if(!e.target.closest('.tz-inp-wrap'))closeAllDrops();
});

// -- Copy --
var cpTimer=null;

function padTime(s){var w=incMin<60?8:5;while(s.length<w)s=' '+s;return s}

function buildCopyTable(){
  if(!sel1||!sel2)return'';
  var a1=sel1Abbr||getAbbr(sel1.tz),a2=sel2Abbr||getAbbr(sel2.tz);
  var o1=sel1Off!==null?sel1Off:getOffsetMin(sel1.tz);
  var o2=sel2Off!==null?sel2Off:getOffsetMin(sel2.tz);
  var diff=o2-o1;
  var header=sel1.city+' ('+a1+') \u2192 '+sel2.city+' ('+a2+') | '+fmtDiffShort(diff);
  var lines=[header];
  var useFixed=sel1Off!==null||sel2Off!==null;
  var totalSlots=1440/incMin;
  for(var si=0;si<totalSlots;si++){
    var m=si*incMin,h1=Math.floor(m/60),m1=m%60;
    var r;
    if(useFixed){
      var t2min=((m+diff)%1440+1440)%1440;
      var raw=m+diff;
      r={h2:Math.floor(t2min/60),m2:t2min%60,dayOff:raw>=0?Math.floor(raw/1440):-Math.ceil(-raw/1440)};
    }else{
      r=tz2ForHour(sel1.tz,sel2.tz,h1);
      if(m1>0){var t2m=((m+(r.diff||0))%1440+1440)%1440;var rw=m+(r.diff||0);r={h2:Math.floor(t2m/60),m2:t2m%60,dayOff:rw>=0?Math.floor(rw/1440):-Math.ceil(-rw/1440)}}
    }
    var t1=padTime(fmtHour(h1,m1));
    var t2=padTime(fmtHour(r.h2,r.m2));
    var dayStr=r.dayOff>0?' (+'+r.dayOff+'d)':r.dayOff<0?' ('+r.dayOff+'d)':'';
    lines.push(t1+'  \u2192  '+t2+dayStr);
  }
  return lines.join('\n');
}

function doCopy(){
  var text=buildCopyTable();
  if(!text){_base.notify('Select Both Timezones',false);return}
  var span=copyBtn.querySelector('span');
  _base.copyText(text,function(){
    copyBtn.classList.remove('ok');copyBtn.offsetWidth;copyBtn.classList.add('ok');
    span.textContent='Copied';
    clearTimeout(cpTimer);
    cpTimer=setTimeout(function(){copyBtn.classList.remove('ok');span.textContent='Copy Table'},800);
  },function(){_base.notify('Copy Failed',false)});
}

copyBtn.addEventListener('click',doCopy);

gridEl.addEventListener('click',function(e){
  var row=e.target.closest('.tz-row');
  if(!row||!sel1||!sel2)return;
  var h=parseInt(row.dataset.h,10),sm=parseInt(row.dataset.m||'0',10);
  var slotMin=h*60+sm;
  var r;
  if(sel1Off!==null||sel2Off!==null){
    var o1=sel1Off!==null?sel1Off:getOffsetMin(sel1.tz),o2=sel2Off!==null?sel2Off:getOffsetMin(sel2.tz);
    var d=o2-o1,t2=((slotMin+d)%1440+1440)%1440;
    r={h2:Math.floor(t2/60),m2:t2%60};
  }else{
    var rv=tz2ForHour(sel1.tz,sel2.tz,h);
    var t2=((slotMin+(rv.diff||0))%1440+1440)%1440;
    r={h2:Math.floor(t2/60),m2:t2%60};
  }
  var text=fmtHour(h,sm)+' ('+sel1.city+') \u2192 '+fmtHour(r.h2,r.m2)+' ('+sel2.city+')';
  _base.copyText(text,function(){
    row.classList.remove('ok');row.offsetWidth;row.classList.add('ok');
    _base.notify('Copied',true);
    setTimeout(function(){row.classList.remove('ok')},400);
  });
});

// -- Paste --
var paTimer=null;

function matchZone(text){
  if(!text)return null;
  text=text.trim().toLowerCase();
  if(!text)return null;
  var t=norm(text);

  // 1. Exact IANA match
  for(var i=0;i<zones.length;i++)if(zones[i].tz.toLowerCase()===text)return zones[i];
  // 2. City name match
  for(var i=0;i<zones.length;i++)if(norm(zones[i].city.toLowerCase())===t)return zones[i];
  // 3. Abbreviation match
  var upper=text.toUpperCase();
  for(var i=0;i<zones.length;i++)for(var j=0;j<zones[i].abbr.length;j++)if(zones[i].abbr[j]===upper)return zones[i];
  // 4. Country match
  for(var i=0;i<zones.length;i++)if(norm(zones[i].country.toLowerCase())===t)return zones[i];
  // 5. Alias match
  for(var i=0;i<zones.length;i++)for(var j=0;j<zones[i].aliases.length;j++)if(norm(zones[i].aliases[j].toLowerCase())===t)return zones[i];

  // 6. GMT/UTC offset notation: "gmt+7", "utc-5", "utc7", "+5:30"
  // Checked after exact matches so "UTC" resolves to the UTC zone, not Azores-in-summer
  var offMin=parseOffsetQuery(text);
  if(offMin!==null&&/(?:^[+-]|^(?:gmt|utc)|^\d{1,2}(?::\d{2})$)/.test(text.replace(/\s+/g,''))){
    for(var i=0;i<primaryCount;i++){if(getOffsetMin(zones[i].tz)===offMin)return zones[i]}
    for(var i=primaryCount;i<zones.length;i++){if(getOffsetMin(zones[i].tz)===offMin)return zones[i]}
  }

  // 7. Fuzzy -- scoreWord with city boost, threshold 3 for typo tolerance
  var best=null,bs=0;
  for(var i=0;i<zones.length;i++){
    var s=scoreWord(t,zones[i].q);
    var ts=scoreWord(t,zones[i].tl)*1.5;
    var ms=Math.max(s,ts);
    if(ms>bs){bs=ms;best=zones[i]}
  }
  return bs>=3?best:null;
}

function stripTzNoise(s){
  return s
    .replace(/\b\d{1,2}(?::\d{2})?\s*(?:am|pm|a\.m\.|p\.m\.)\b/gi,'')
    .replace(/\b([2-9]\d|1[3-9]):\d{2}\b/g,'')
    .replace(/\([+-]\d+d\)/g,'')
    .replace(/\b\d+h\b/gi,'').replace(/\b\d+m\b/gi,'')
    .replace(/\b(?:ahead|behind|now|currently|same\s+time|time\s+in)\b/gi,'')
    .replace(/\s+/g,' ').trim();
}

function hasTz(found,z){
  for(var i=0;i<found.length;i++)if(found[i].tz===z.tz)return true;
  return false;
}

function parseTzFromText(text){
  var found=[];
  var raw=text.trim();
  if(!raw)return found;

  // Strategy A: Header-line format — "City1 (X) → City2 (Y) ..."
  var hm=raw.match(/^(.+?)\s*\(([^)]+)\)\s*(?:\u2192|->)\s*(.+?)\s*\(([^)]+)\)/);
  if(hm){
    var z1=matchZone(hm[1].trim())||matchZone(hm[2].trim());
    var z2=matchZone(hm[3].trim())||matchZone(hm[4].trim());
    if(z1)found.push(z1);
    if(z2&&!hasTz(found,z2))found.push(z2);
    if(found.length>=2)return found;
  }

  // Strategy B: Parenthetical extraction — "(City1)", "(ABBR)", "(GMT+7)"
  var parens=[];
  raw.replace(/\(([^)]+)\)/g,function(_,p){parens.push(p)});
  for(var i=0;i<parens.length&&found.length<2;i++){
    var z=matchZone(parens[i].trim());
    if(z&&!hasTz(found,z))found.push(z);
  }
  if(found.length>=2)return found;

  // Strategy C: Delimiter split with noise stripping
  var parts=raw.split(/\s*(?:\u2192|\u2014|\u2013|->|--|,|\||\t|\n)\s*/);
  if(parts.length<2){
    var toParts=raw.split(/\s+to\s+/i);
    if(toParts.length>=2)parts=toParts;
  }
  for(var i=0;i<parts.length&&found.length<2;i++){
    var clean=stripTzNoise(parts[i]);
    if(!clean)continue;
    var z=matchZone(clean);
    if(z&&!hasTz(found,z))found.push(z);
  }
  if(found.length>=2)return found;

  // Strategy D: Freeform — try full cleaned text
  if(found.length<1){
    var clean=stripTzNoise(raw);
    if(clean){
      var z=matchZone(clean);
      if(z&&!hasTz(found,z))found.push(z);
    }
  }

  return found;
}

function doPaste(){
  var span=pasteBtn.querySelector('span');
  navigator.clipboard.readText().then(function(text){
    if(!text||!text.trim()){_base.notify('Clipboard Empty','warn');return}
    var found=parseTzFromText(text);
    if(found.length>=2){
      selectTz(1,found[0]);selectTz(2,found[1]);
    }else if(found.length===1){
      selectTz(2,found[0]);
    }else{_base.notify('No Timezone Found',false);return}
    pasteBtn.classList.remove('ok');pasteBtn.offsetWidth;pasteBtn.classList.add('ok');
    span.textContent='Pasted';
    clearTimeout(paTimer);
    paTimer=setTimeout(function(){pasteBtn.classList.remove('ok');span.textContent='Paste'},800);
  }).catch(function(){_base.notify('Clipboard Access Denied','warn')});
}

pasteBtn.addEventListener('click',doPaste);

document.addEventListener('paste',function(e){
  if(document.activeElement===tz1Inp||document.activeElement===tz2Inp)return;
  var text=e.clipboardData&&e.clipboardData.getData('text');
  if(text){
    e.preventDefault();
    var found=parseTzFromText(text);
    if(found.length>=2){selectTz(1,found[0]);selectTz(2,found[1]);_base.notify('Pasted',true)}
    else if(found.length===1){selectTz(2,found[0]);_base.notify('Pasted',true)}
  }
});

// -- Reset --
var resetCtrl=_base.twoPress(resetBtn,{
  onConfirm:function(){
    var local;
    try{local=Intl.DateTimeFormat().resolvedOptions().timeZone}catch(e){local='UTC'}
    selectTz(1,findZone(local)||findZone('UTC')||zones[0]);
    selectTz(2,findZone('UTC')||zones[0]);
    closeAllDrops();
    incMin=60;rangeMode='24';
    for(var j=0;j<incBtns.length;j++)incBtns[j].classList.toggle('active',parseInt(incBtns[j].dataset.inc,10)===60);
    for(var j=0;j<rangeBtns.length;j++)rangeBtns[j].classList.toggle('active',rangeBtns[j].dataset.range==='24');
  }
});
resetBtn.addEventListener('click',function(){resetCtrl.press()});

// -- Swap --
function doSwap(){
  if(!sel1||!sel2)return;
  var tmp=sel1,tmpA=sel1Abbr;
  selectTz(1,sel2,sel2Abbr);
  selectTz(2,tmp,tmpA);
  closeAllDrops();
}
swapBtn.addEventListener('click',doSwap);

// -- Increment & Range --
var incBtns=document.querySelectorAll('[data-inc]');
var rangeBtns=document.querySelectorAll('[data-range]');
for(var i=0;i<incBtns.length;i++){
  incBtns[i].addEventListener('click',function(){
    var v=parseInt(this.dataset.inc,10);
    if(v===incMin)return;
    incMin=v;
    for(var j=0;j<incBtns.length;j++)incBtns[j].classList.toggle('active',parseInt(incBtns[j].dataset.inc,10)===v);
    renderGrid();
  });
}
for(var i=0;i<rangeBtns.length;i++){
  rangeBtns[i].addEventListener('click',function(){
    var v=this.dataset.range;
    if(v===rangeMode)return;
    rangeMode=v;
    for(var j=0;j<rangeBtns.length;j++)rangeBtns[j].classList.toggle('active',rangeBtns[j].dataset.range===v);
    renderGrid();
  });
}

// -- Keyboard Shortcuts --
_base.onKey({
  '/':function(e){e.preventDefault();tz1Inp.focus();tz1Inp.select()},
  's':function(e){e.preventDefault();tz1Inp.focus();tz1Inp.select()},
  'c':function(){doCopy()},
  'v':function(){doPaste()},
  'p':function(){doPaste()},
  'r':function(){resetCtrl.press()},
  'x':function(){doSwap()},
  ctrl:{'k':function(e){e.preventDefault();tz1Inp.focus();tz1Inp.select()}}
});

// -- Cross-tab sync --
window.addEventListener('storage',function(e){
  if(e.key==='tz:pair'){
    var saved=_base.load('tz:pair',null);
    if(saved){
      var z1,z2;
      if(typeof saved.tz1==='string')z1=findZone(saved.tz1);
      else if(saved.tz1)z1=findZone(saved.tz1.tz,saved.tz1.city);
      if(typeof saved.tz2==='string')z2=findZone(saved.tz2);
      else if(saved.tz2)z2=findZone(saved.tz2.tz,saved.tz2.city);
      if(z1)selectTz(1,z1);
      if(z2)selectTz(2,z2);
    }
  }
});
})();
