<script>
(function(){
'use strict';

/* ── Constants ───────────────────────────────────────────────────── */
var ITEM_H=52,BUFFER=10;
var SIZES=[16,20,24,32,48,64,72,96,128,192,256,512,1024];
var SIZE_DEF=8; // 128px
var STROKES=[0.5,0.75,1,1.25,1.5,1.75,2,2.25,2.5,2.75,3];
var STROKE_DEF=6; // index 6 = 2px
var MARGINS=[0,4,8,12,16,24,32,48,64];
var MARGIN_DEF=0;
var RESET_SVG='<path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/>';

/* ── DOM Cache ───────────────────────────────────────────────────── */
var $=function(id){return document.getElementById(id)};
var list=$('list'),listCard=$('list-card'),searchEl=$('search'),statusEl=$('status');
var paBtn=$('pa-btn'),paI=$('pa-i'),paCk=$('pa-ck'),paL=$('pa-l');
var rsBtn=$('rs-btn'),rsL=$('rs-l');
var settingsCard=$('settings'),actionRow=$('action-row'),fmtRow=$('fmt-row'),modeRow=$('mode-row'),sizeCard=$('size-card');
var sizeVal=$('size-val'),sizeDec=$('size-dec'),sizeInc=$('size-inc'),sizeLbl=$('size-lbl'),sizeRow=$('size-row');
var strokeVal=$('stroke-val'),strokeDec=$('stroke-dec'),strokeInc=$('stroke-inc'),strokeLbl=$('stroke-lbl'),strokeRow=$('stroke-row');
var marginVal=$('margin-val'),marginDec=$('margin-dec'),marginInc=$('margin-inc'),marginLbl=$('margin-lbl'),marginRow=$('margin-row');

/* ── State ───────────────────────────────────────────────────────── */
var icons=[];
var filtered=[];
var svgCache={};
var pendingFetch={};
var scrollRAF=0;
var searchTimer=0;
var kbIdx=-1;
var lastStart=-1,lastEnd=-1;
var copyTimers={};
var norm=_search.norm,scoreWord=_search.scoreWord;

// Format settings (persisted)
var st=_base.load('iconic:settings',{action:'copy',fmt:'png',mode:'clear',sizeIdx:SIZE_DEF,strokeIdx:STROKE_DEF,marginIdx:MARGIN_DEF});
var action=st.action||'copy',fmt=st.fmt,mode=st.mode,sizeIdx=st.sizeIdx;
var strokeIdx=st.strokeIdx!=null?st.strokeIdx:STROKE_DEF;
var marginIdx=st.marginIdx!=null?st.marginIdx:MARGIN_DEF;
if(sizeIdx<0||sizeIdx>=SIZES.length)sizeIdx=SIZE_DEF;
if(strokeIdx<0||strokeIdx>=STROKES.length)strokeIdx=STROKE_DEF;
if(marginIdx<0||marginIdx>=MARGINS.length)marginIdx=MARGIN_DEF;

function saveSt(){_base.save('iconic:settings',{action:action,fmt:fmt,mode:mode,sizeIdx:sizeIdx,strokeIdx:strokeIdx,marginIdx:marginIdx})}

/* ── Announce (a11y) ─────────────────────────────────────────────── */
function announce(msg){statusEl.textContent='';requestAnimationFrame(function(){statusEl.textContent=msg})}

/* ── Title Case ──────────────────────────────────────────────────── */
function titleCase(s){return s.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()})}

/* ── Settings UI ─────────────────────────────────────────────────── */
function applyFmtVisibility(){
  var isInline=fmt==='inline';
  modeRow.style.display=isInline?'none':'';
  sizeCard.style.display=isInline?'none':'';
  // JPEG has no Clear option — force Light if Clear+JPEG
  var clearBtn=modeRow.querySelector('[data-mode="clear"]');
  if(clearBtn)clearBtn.disabled=fmt==='jpeg';
  if(fmt==='jpeg'&&mode==='clear'){
    mode='light';
    modeRow.querySelectorAll('.seg').forEach(function(b){b.classList.toggle('active',b.dataset.mode===mode)});
    saveSt();
  }
}

function initSettings(){
  actionRow.querySelectorAll('.seg').forEach(function(b){b.classList.toggle('active',b.dataset.action===action)});
  fmtRow.querySelectorAll('.seg').forEach(function(b){b.classList.toggle('active',b.dataset.fmt===fmt)});
  modeRow.querySelectorAll('.seg').forEach(function(b){b.classList.toggle('active',b.dataset.mode===mode)});
  applyFmtVisibility();
  updateStrokeLabel();
  updateSizeLabel();
  updateMarginLabel();
}

function updateSizeLabel(){
  var sz=SIZES[sizeIdx];
  sizeVal.textContent=sz+' \u00d7 '+sz;
  sizeDec.disabled=sizeIdx===0;
  sizeInc.disabled=sizeIdx===SIZES.length-1;
}

function updateMarginLabel(){
  marginVal.textContent=MARGINS[marginIdx]+' px Margin';
  marginDec.disabled=marginIdx===0;
  marginInc.disabled=marginIdx===MARGINS.length-1;
}

/* Reset animation — swaps icon to spinner, shows rs-fb, restores after 600ms */
function resetStepper(row,lbl,resetFn){
  resetFn();
  var ic=lbl.querySelector('svg'),orig=ic.outerHTML;
  ic.outerHTML='<svg aria-hidden="true" viewBox="0 0 24 24">'+RESET_SVG+'</svg>';
  row.classList.remove('rs-fb');
  void row.offsetWidth;
  row.classList.add('rs-fb');
  clearTimeout(row._ft);
  row._ft=setTimeout(function(){row.classList.remove('rs-fb');lbl.querySelector('svg').outerHTML=orig},600);
}

actionRow.addEventListener('click',function(e){
  var b=e.target.closest('.seg');if(!b)return;
  action=b.dataset.action;
  actionRow.querySelectorAll('.seg').forEach(function(s){s.classList.toggle('active',s===b)});
  saveSt();
});

fmtRow.addEventListener('click',function(e){
  var b=e.target.closest('.seg');if(!b||b.disabled)return;
  fmt=b.dataset.fmt;
  fmtRow.querySelectorAll('.seg').forEach(function(s){s.classList.toggle('active',s===b)});
  applyFmtVisibility();
  saveSt();
});

modeRow.addEventListener('click',function(e){
  var b=e.target.closest('.seg');if(!b||b.disabled)return;
  mode=b.dataset.mode;
  modeRow.querySelectorAll('.seg').forEach(function(s){s.classList.toggle('active',s===b)});
  saveSt();
});

function updateStrokeLabel(){
  strokeVal.textContent=STROKES[strokeIdx]+' px Stroke';
  strokeDec.disabled=strokeIdx===0;
  strokeInc.disabled=strokeIdx===STROKES.length-1;
}

strokeDec.addEventListener('click',function(){if(strokeIdx>0){strokeIdx--;updateStrokeLabel();saveSt();lastStart=lastEnd=-1;renderVisible()}});
strokeInc.addEventListener('click',function(){if(strokeIdx<STROKES.length-1){strokeIdx++;updateStrokeLabel();saveSt();lastStart=lastEnd=-1;renderVisible()}});
strokeRow.addEventListener('click',function(e){
  if(e.target.closest('.step-btn'))return;
  if(strokeIdx===STROKE_DEF)return;
  resetStepper(strokeRow,strokeLbl,function(){strokeIdx=STROKE_DEF;updateStrokeLabel();saveSt();lastStart=lastEnd=-1;renderVisible()});
});
strokeLbl.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();strokeRow.click()}});

sizeDec.addEventListener('click',function(){if(sizeIdx>0){sizeIdx--;updateSizeLabel();saveSt()}});
sizeInc.addEventListener('click',function(){if(sizeIdx<SIZES.length-1){sizeIdx++;updateSizeLabel();saveSt()}});
sizeRow.addEventListener('click',function(e){
  if(e.target.closest('.step-btn'))return;
  if(sizeIdx===SIZE_DEF)return;
  resetStepper(sizeRow,sizeLbl,function(){sizeIdx=SIZE_DEF;updateSizeLabel();saveSt()});
});
sizeLbl.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();sizeRow.click()}});

marginDec.addEventListener('click',function(){if(marginIdx>0){marginIdx--;updateMarginLabel();saveSt()}});
marginInc.addEventListener('click',function(){if(marginIdx<MARGINS.length-1){marginIdx++;updateMarginLabel();saveSt()}});
marginRow.addEventListener('click',function(e){
  if(e.target.closest('.step-btn'))return;
  if(marginIdx===MARGIN_DEF)return;
  resetStepper(marginRow,marginLbl,function(){marginIdx=MARGIN_DEF;updateMarginLabel();saveSt()});
});
marginLbl.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();marginRow.click()}});

/* ── Build Standalone SVG Document (with margin via viewBox) ──────── */
function buildSvgDoc(inner){
  var sz=SIZES[sizeIdx],mg=MARGINS[marginIdx],sw=STROKES[strokeIdx];
  var pad=sz>0?mg*24/sz:0;
  var vbSz=24+2*pad;
  var stroke=mode==='dark'?'#FFFFFF':'#000000';
  var bg='';
  if(mode==='dark')bg='<rect x="'+(-pad)+'" y="'+(-pad)+'" width="'+vbSz+'" height="'+vbSz+'" fill="#1C1C1E"/>';
  else if(mode==='light')bg='<rect x="'+(-pad)+'" y="'+(-pad)+'" width="'+vbSz+'" height="'+vbSz+'" fill="#FFFFFF"/>';
  return'<svg xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'" viewBox="'+(-pad)+' '+(-pad)+' '+vbSz+' '+vbSz+'" fill="none" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round">'+bg+inner+'</svg>';
}

/* ── Copy Formatted (respects format/mode/size) ──────────────────── */
function copyFormatted(inner,onDone,onErr){
  if(fmt==='inline'){
    _base.copyText(fullSvg(inner),onDone,onErr);return;
  }
  if(fmt==='svg'){
    _base.copyText(buildSvgDoc(inner),onDone,onErr);return;
  }
  // PNG or JPEG → render to canvas via ClipboardItem Promise (CodeGen pattern)
  if(!navigator.clipboard||!navigator.clipboard.write){
    _base.copyText(buildSvgDoc(inner),onDone,onErr);return;
  }
  var sz=SIZES[sizeIdx],mg=MARGINS[marginIdx],sw=STROKES[strokeIdx];
  var pad=sz>0?mg*24/sz:0,vbSz=24+2*pad;
  var stroke=mode==='dark'?'#FFFFFF':'#000000';
  var bg='';
  if(mode==='dark')bg='<rect x="'+(-pad)+'" y="'+(-pad)+'" width="'+vbSz+'" height="'+vbSz+'" fill="#1C1C1E"/>';
  else if(mode==='light'||(mode==='clear'&&fmt==='jpeg'))bg='<rect x="'+(-pad)+'" y="'+(-pad)+'" width="'+vbSz+'" height="'+vbSz+'" fill="#FFFFFF"/>';
  var svgDoc='<svg xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'" viewBox="'+(-pad)+' '+(-pad)+' '+vbSz+' '+vbSz+'" fill="none" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round">'+bg+inner+'</svg>';

  navigator.clipboard.write([
    new ClipboardItem({'image/png':new Promise(function(resolve,reject){
      var canvas=document.createElement('canvas');
      canvas.width=sz;canvas.height=sz;
      var ctx=canvas.getContext('2d');
      var img=new Image();
      var url=URL.createObjectURL(new Blob([svgDoc],{type:'image/svg+xml;charset=utf-8'}));
      img.onload=function(){
        ctx.drawImage(img,0,0,sz,sz);
        URL.revokeObjectURL(url);
        canvas.toBlob(function(b){b?resolve(b):reject()},'image/png');
      };
      img.onerror=function(){URL.revokeObjectURL(url);reject()};
      img.src=url;
    })})
  ]).then(onDone).catch(function(){
    _base.copyText(buildSvgDoc(inner),onDone,onErr);
  });
}

/* ── IndexedDB (L2 cache for SVG content) ────────────────────────── */
var idb=null;
var IDB_NAME='iconic',IDB_STORE='svgs',IDB_VER=1;

function openIDB(){
  return new Promise(function(resolve){
    try{
      var req=indexedDB.open(IDB_NAME,IDB_VER);
      req.onupgradeneeded=function(e){e.target.result.createObjectStore(IDB_STORE)};
      req.onsuccess=function(e){idb=e.target.result;resolve(idb)};
      req.onerror=function(){resolve(null)};
    }catch(e){resolve(null)}
  });
}

function idbGet(name){
  if(!idb)return Promise.resolve(null);
  return new Promise(function(resolve){
    try{
      var tx=idb.transaction(IDB_STORE,'readonly');
      var req=tx.objectStore(IDB_STORE).get(name);
      req.onsuccess=function(){resolve(req.result||null)};
      req.onerror=function(){resolve(null)};
    }catch(e){resolve(null)}
  });
}

function idbPut(name,inner){
  if(!idb)return;
  try{idb.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(inner,name)}catch(e){}
}

/* ── Fetch SVG (L1: memory → L2: IndexedDB → L3: network) ───────── */
function fetchSvg(name){
  if(svgCache[name])return Promise.resolve(svgCache[name]);
  if(pendingFetch[name])return pendingFetch[name];
  pendingFetch[name]=idbGet(name).then(function(cached){
    if(cached){svgCache[name]=cached;delete pendingFetch[name];return cached}
    return fetch('icons/'+name+'.svg').then(function(r){return r.text()}).then(function(svg){
      var m=svg.match(/<svg[^>]*>([\s\S]*?)<\/svg>/);
      var inner=m?m[1].trim().replace(/\n\s*/g,''):'';
      svgCache[name]=inner;
      idbPut(name,inner);
      delete pendingFetch[name];
      return inner;
    });
  }).catch(function(){delete pendingFetch[name];return''});
  return pendingFetch[name];
}

/* ── Build Full SVG String (for inline clipboard) ────────────────── */
function fullSvg(inner){
  var sw=STROKES[strokeIdx];
  return'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
}

/* ── Render Icon Into Element (trusted SVG from own files) ───────── */
function setIco(el,inner){
  el.textContent='';
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 24 24');
  svg.setAttribute('fill','none');
  svg.setAttribute('stroke','currentColor');
  svg.setAttribute('stroke-width',String(STROKES[strokeIdx]));
  svg.setAttribute('stroke-linecap','round');
  svg.setAttribute('stroke-linejoin','round');
  svg.innerHTML=inner;
  el.appendChild(svg);
}

/* ── Title ───────────────────────────────────────────────────────── */
function updateTitle(){
  var q=searchEl.value.trim();
  document.title=q&&filtered.length?'Iconic ('+filtered.length+')':'Iconic';
}

/* ── Virtual Scroll Render ───────────────────────────────────────── */
function renderVisible(){
  if(!filtered.length){
    list.style.height='0';
    var existing=list.querySelectorAll('.ii');
    for(var x=existing.length-1;x>=0;x--)existing[x].remove();
    if(!list.querySelector('.no-match')&&searchEl.value.trim()){
      var nm=document.createElement('div');nm.className='no-match';nm.textContent='Nothing Found';
      list.appendChild(nm);
    }
    lastStart=lastEnd=-1;
    return;
  }

  // Clear no-match / loading
  var nmEl=list.querySelector('.no-match');if(nmEl)nmEl.remove();
  var ldEl=list.querySelector('.loading');if(ldEl)ldEl.remove();

  var totalH=filtered.length*ITEM_H;
  list.style.height=totalH+'px';

  var rect=listCard.getBoundingClientRect();
  var viewTop=Math.max(0,-rect.top);
  var viewBot=viewTop+window.innerHeight;

  var start=Math.max(0,Math.floor(viewTop/ITEM_H)-BUFFER);
  var end=Math.min(filtered.length,Math.ceil(viewBot/ITEM_H)+BUFFER);

  if(start===lastStart&&end===lastEnd)return;
  lastStart=start;lastEnd=end;

  // Remove out-of-range items
  var existing=list.querySelectorAll('.ii');
  for(var j=existing.length-1;j>=0;j--)existing[j].remove();

  var frag=document.createDocumentFragment();
  for(var i=start;i<end;i++){
    var ic=filtered[i];
    var name=ic[0];
    var row=document.createElement('div');
    row.className='ii'+(i===kbIdx?' kb':'');
    row.setAttribute('role','listitem');
    row.setAttribute('data-idx',i);
    row.style.top=i*ITEM_H+'px';

    var ico=document.createElement('div');
    ico.className='ico';
    ico.setAttribute('aria-hidden','true');

    var nmSpan=document.createElement('span');
    nmSpan.className='nm';
    nmSpan.textContent=titleCase(name);

    row.appendChild(ico);
    row.appendChild(nmSpan);
    frag.appendChild(row);

    // Lazy-load SVG into icon element
    (function(icoEl,n){
      if(svgCache[n]){
        setIco(icoEl,svgCache[n]);
      }else{
        fetchSvg(n).then(function(inner){
          if(inner&&icoEl.parentNode)setIco(icoEl,inner);
        });
      }
    })(ico,name);
  }

  list.appendChild(frag);
}

/* ── Scroll Handler (rAF throttled) ──────────────────────────────── */
function onScroll(){
  if(scrollRAF)return;
  scrollRAF=requestAnimationFrame(function(){
    scrollRAF=0;
    renderVisible();
  });
}

/* ── Search ──────────────────────────────────────────────────────── */
function doSearch(){
  _search.clearCache();
  var q=norm(searchEl.value.trim().toLowerCase());
  var words=q.split(/\s+/).filter(Boolean);
  kbIdx=-1;lastStart=lastEnd=-1;

  if(!words.length){
    filtered=icons;
    updateTitle();renderVisible();
    return;
  }

  var scored=[];
  for(var i=0;i<icons.length;i++){
    var ic=icons[i];
    var total=0,ok=true;
    var nameText=ic[0].replace(/-/g,' ');
    var fullText=ic[1];
    for(var w=0;w<words.length;w++){
      var fs=scoreWord(words[w],fullText);
      var ns=scoreWord(words[w],nameText)*1.5;
      var s=Math.max(fs,ns);
      if(s<=0){ok=false;break}
      total+=s;
    }
    if(ok)scored.push({i:i,score:total});
  }
  scored.sort(function(a,b){return b.score-a.score||icons[a.i][0].localeCompare(icons[b.i][0])});
  filtered=scored.map(function(s){return icons[s.i]});

  updateTitle();renderVisible();

  if(!filtered.length)announce('Nothing Found');
  else announce(filtered.length+' result'+(filtered.length===1?'':'s'));

  // Pre-fetch top 5 for instant copy
  for(var p=0;p<Math.min(5,filtered.length);p++)fetchSvg(filtered[p][0]);
}

/* ── Download Icon ───────────────────────────────────────────────── */
function downloadFormatted(inner,name){
  var ext=fmt==='jpeg'?'.jpg':fmt==='png'?'.png':'.svg';
  if(fmt==='inline'||fmt==='svg'){
    var text=fmt==='inline'?fullSvg(inner):buildSvgDoc(inner);
    var blob=new Blob([text],{type:'image/svg+xml'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=name+'.svg';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    return Promise.resolve();
  }
  // PNG or JPEG
  return new Promise(function(resolve){
    var sz=SIZES[sizeIdx],mg=MARGINS[marginIdx],sw=STROKES[strokeIdx];
    var pad=sz>0?mg*24/sz:0,vbSz=24+2*pad;
    var stroke=mode==='dark'?'#FFFFFF':'#000000';
    var bg='';
    if(mode==='dark')bg='<rect x="'+(-pad)+'" y="'+(-pad)+'" width="'+vbSz+'" height="'+vbSz+'" fill="#1C1C1E"/>';
    else if(mode==='light'||(mode==='clear'&&fmt==='jpeg'))bg='<rect x="'+(-pad)+'" y="'+(-pad)+'" width="'+vbSz+'" height="'+vbSz+'" fill="#FFFFFF"/>';
    var svgDoc='<svg xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'" viewBox="'+(-pad)+' '+(-pad)+' '+vbSz+' '+vbSz+'" fill="none" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round">'+bg+inner+'</svg>';
    var canvas=document.createElement('canvas');canvas.width=sz;canvas.height=sz;
    var ctx=canvas.getContext('2d');
    var img=new Image();
    var url=URL.createObjectURL(new Blob([svgDoc],{type:'image/svg+xml;charset=utf-8'}));
    img.onload=function(){
      ctx.drawImage(img,0,0,sz,sz);
      URL.revokeObjectURL(url);
      var mime=fmt==='jpeg'?'image/jpeg':'image/png';
      canvas.toBlob(function(blob){
        var dl=URL.createObjectURL(blob);
        var a=document.createElement('a');a.href=dl;a.download=name+ext;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        URL.revokeObjectURL(dl);
        resolve();
      },mime,fmt==='jpeg'?0.95:undefined);
    };
    img.onerror=function(){URL.revokeObjectURL(url);resolve()};
    img.src=url;
  });
}

/* ── Handle Icon Tap (copy or download based on action mode) ─────── */
function handleIcon(idx,rowEl){
  if(idx<0||idx>=filtered.length)return;
  var name=filtered[idx][0];
  fetchSvg(name).then(function(inner){
    if(!inner){announce('Failed to Load Icon');return}
    var done=function(){
      if(rowEl){
        rowEl.classList.remove('ok');rowEl.offsetWidth;rowEl.classList.add('ok');
        if(copyTimers[idx])clearTimeout(copyTimers[idx]);
        copyTimers[idx]=setTimeout(function(){if(rowEl.parentNode)rowEl.classList.remove('ok');delete copyTimers[idx]},800);
      }
      var msg=action==='download'?'Downloaded':'Copied';
      _base.notify(msg,true);
      announce(msg+' '+titleCase(name));
    };
    if(action==='download'){
      downloadFormatted(inner,name).then(done);
    }else{
      copyFormatted(inner,done);
    }
  });
}

/* ── Paste ────────────────────────────────────────────────────────── */
var paTimer=null;
function doPaste(){
  if(!navigator.clipboard||!navigator.clipboard.readText){announce('Clipboard Not Available');return}
  navigator.clipboard.readText().then(function(text){
    if(!text||!text.trim()){announce('Clipboard Empty');return}
    searchEl.value=text.trim();
    doSearch();
    if(paTimer){clearTimeout(paTimer);paBtn.classList.remove('ok');paI.style.display='';paCk.style.display='none';paL.textContent='Paste'}
    paI.style.display='none';paCk.style.display='';paL.textContent='Pasted';
    paBtn.classList.remove('ok');paBtn.offsetWidth;paBtn.classList.add('ok');
    paTimer=setTimeout(function(){paBtn.classList.remove('ok');paI.style.display='';paCk.style.display='none';paL.textContent='Paste';paTimer=null},800);
  },function(){announce('Clipboard Access Denied')});
}

/* ── Reset ────────────────────────────────────────────────────────── */
var resetCtrl=_base.twoPress(rsBtn,{
  label:rsL,
  guard:function(){return searchEl.value.length>0},
  onConfirm:function(){
    searchEl.value='';
    kbIdx=-1;lastStart=lastEnd=-1;
    filtered=icons;
    updateTitle();renderVisible();
    window.scrollTo({top:0,behavior:'smooth'});
    announce('Reset');
  }
});

/* ── Keyboard Navigation ─────────────────────────────────────────── */
function kbClear(){
  kbIdx=-1;
  var all=list.querySelectorAll('.ii.kb');
  for(var i=0;i<all.length;i++)all[i].classList.remove('kb');
}
function kbMove(dir){
  if(!filtered.length)return;
  kbIdx+=dir;
  if(kbIdx<0)kbIdx=filtered.length-1;
  if(kbIdx>=filtered.length)kbIdx=0;

  var rows=list.querySelectorAll('.ii');
  for(var i=0;i<rows.length;i++){
    var ri=parseInt(rows[i].getAttribute('data-idx'),10);
    rows[i].classList.toggle('kb',ri===kbIdx);
  }

  var itemTop=kbIdx*ITEM_H;
  var cardRect=listCard.getBoundingClientRect();
  var absTop=cardRect.top+window.scrollY+itemTop;
  var viewTop=window.scrollY;
  var viewBot=viewTop+window.innerHeight-100;
  if(absTop<viewTop||absTop>viewBot){
    window.scrollTo({top:absTop-window.innerHeight/3,behavior:'smooth'});
  }

  lastStart=lastEnd=-1;
  renderVisible();
}

/* ── Click Delegation ────────────────────────────────────────────── */
listCard.addEventListener('click',function(e){
  var row=e.target.closest('.ii');
  if(!row)return;
  var idx=parseInt(row.getAttribute('data-idx'),10);
  kbClear();
  handleIcon(idx,row);
});

/* ── Event Listeners ─────────────────────────────────────────────── */
searchEl.addEventListener('input',function(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(doSearch,80);
});

paBtn.addEventListener('click',doPaste);
rsBtn.addEventListener('click',function(e){e.preventDefault();resetCtrl.press()});

window.addEventListener('scroll',onScroll,{passive:true});
window.addEventListener('resize',function(){lastStart=lastEnd=-1;renderVisible()},{passive:true});

document.addEventListener('paste',function(e){
  var tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  var text=(e.clipboardData||window.clipboardData).getData('text');
  if(text){
    e.preventDefault();
    searchEl.value=text.trim();
    doSearch();
  }
});

/* ── Keyboard Shortcuts ──────────────────────────────────────────── */
_base.onKey({
  '/':function(e){e.preventDefault();kbClear();searchEl.focus()},
  's':function(e){e.preventDefault();kbClear();searchEl.focus()},
  'p':function(){doPaste()},
  'v':function(){doPaste()},
  'c':function(){if(filtered.length)handleIcon(0,list.querySelector('.ii[data-idx="0"]'))},
  'r':function(){resetCtrl.press()},
  'j':function(e){e.preventDefault();kbMove(1)},
  'k':function(e){e.preventDefault();kbMove(-1)},
  'ArrowDown':function(e){e.preventDefault();kbMove(1)},
  'ArrowUp':function(e){e.preventDefault();kbMove(-1)},
  'Enter':function(e){
    e.preventDefault();
    if(kbIdx>=0){
      var rows=list.querySelectorAll('.ii');
      var target=null;
      for(var i=0;i<rows.length;i++){if(parseInt(rows[i].getAttribute('data-idx'),10)===kbIdx){target=rows[i];break}}
      handleIcon(kbIdx,target);
    }else if(filtered.length){
      handleIcon(0,list.querySelector('.ii[data-idx="0"]'));
    }
  },
  'Escape':function(){
    if(searchEl.value){
      searchEl.value='';kbIdx=-1;lastStart=lastEnd=-1;
      filtered=icons;updateTitle();renderVisible();
    }
    kbClear();document.activeElement.blur();
  }
});

document.addEventListener('mousemove',function(){if(kbIdx>=0)kbClear()},{passive:true});

/* ── Visibility Cleanup ──────────────────────────────────────────── */
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    cancelAnimationFrame(scrollRAF);scrollRAF=0;
    clearTimeout(searchTimer);clearTimeout(paTimer);
    Object.keys(copyTimers).forEach(function(k){clearTimeout(copyTimers[k])});
  }
  if(!document.hidden){
    resetCtrl.clear();
    paBtn.classList.remove('ok');paI.style.display='';paCk.style.display='none';paL.textContent='Paste';
    copyTimers={};
    lastStart=lastEnd=-1;
    renderVisible();
  }
});

/* ── Init ────────────────────────────────────────────────────────── */
function onData(data){
  icons=data;
  filtered=icons;
  var ld=$('loading');if(ld)ld.remove();
  updateTitle();
  requestAnimationFrame(function(){
    renderVisible();
    var prefetch=Math.min(20,icons.length);
    for(var i=0;i<prefetch;i++)fetchSvg(icons[i][0]);
  });
}

initSettings();

// SWR: instant from localStorage on repeat visits, revalidate in background
var getManifest=_swr.loader('manifest.json',onData);
getManifest.onFresh=function(data){onData(data)};

// Open IndexedDB, then load manifest
openIDB().then(function(){
  getManifest().catch(function(){
    var ld=$('loading');
    if(ld)ld.textContent='Failed to Load Icons';
    announce('Failed to Load Icons');
  });
});

})();
</script>
</body>
</html>
