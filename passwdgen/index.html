<style>
:root{--num-bg:#48484A}
html[data-theme="sepia"]{--num-bg:#6B5744}
body{display:flex;align-items:flex-start;justify-content:center}
.w{max-width:440px;width:100%;padding:20px 20px calc(100px + env(safe-area-inset-bottom,0px))}
.out{
  background:var(--num-bg);border-radius:20px;
  box-shadow:var(--shadow);
  padding:20px 24px;margin-bottom:14px;
  transition:background .3s;cursor:pointer;
  height:98px;display:flex;align-items:center;justify-content:center;
  overflow:hidden
}
.out:active{opacity:.85}
.out.cp-fb{animation:cpFlash .35s ease}
@keyframes cpFlash{0%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 3px rgba(52,211,153,.4),var(--shadow)}100%{box-shadow:var(--shadow)}}
#pw{
  font:500 clamp(1rem,5vw,1.375rem)/1.3 'SF Mono',ui-monospace,Menlo,Monaco,'Cascadia Code','Courier New',monospace;
  color:#fff;text-align:center;
  word-break:break-all;overflow-wrap:break-word;
  transition:font-size .15s;
  user-select:all;-webkit-user-select:all;
  width:100%
}
#pw::selection{background:rgba(255,255,255,.2)}
.links{margin-bottom:0}
.links button{transition:background .25s,color .25s}
.links button.ok{animation:pop .35s ease}
#len-l,#wrd-l{cursor:pointer}
#cp-k{stroke-width:2.5}
.str-w{color:#DC2626}.str-f{color:#D97706}.str-s{color:#16A34A}.str-v{color:#0891B2}.str-m{color:#7C3AED}

}

/* Character sets */
var LOWER='abcdefghijklmnopqrstuvwxyz',UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ',
DIGITS='0123456789',SYMBOLS='!@#$%^&*-_+=.?',AMBIG='0OoIl1|';

/* Element refs */
var $=function(id){return document.getElementById(id)},
pwEl=$('pw'),outEl=$('out'),
lenL=$('len-l'),wrdL=$('wrd-l'),
pwSet=$('pw-set'),ppSet=$('pp-set'),
genBtn=$('gen-btn'),genL=$('gen-l'),
cpBtn=$('cp-btn'),cpI=$('cp-i'),cpK=$('cp-k'),cpL=$('cp-l'),
rsL=$('rs-l'),strL=$('str-l');

/* State */
var mode=0,cur='',
pwLen=20,pwUpper=true,pwLower=true,pwDigits=true,pwSymbols=true,pwExclude=false,
ppWords=6,ppSep='-',ppCap=true,ppNum=false,
clipTimer=null,clipCount=0,cpTm,genTm;

/* Persistence */
function loadSettings(){
  mode=_base.load('pwdgen:mode',0);
  var pw=_base.load('pwdgen:pw',{});
  pwLen=pw.len!==undefined?pw.len:20;
  pwUpper=pw.upper!==undefined?pw.upper:true;
  pwLower=pw.lower!==undefined?pw.lower:true;
  pwDigits=pw.digits!==undefined?pw.digits:true;
  pwSymbols=pw.symbols!==undefined?pw.symbols:true;
  pwExclude=pw.exclude!==undefined?pw.exclude:false;
  var pp=_base.load('pwdgen:pp',{});
  ppWords=pp.words!==undefined?pp.words:6;
  ppSep=pp.sep!==undefined?pp.sep:'-';
  ppCap=pp.cap!==undefined?pp.cap:true;
  ppNum=pp.num!==undefined?pp.num:false;
}
function saveSettings(){
  _base.save('pwdgen:mode',mode);
  _base.save('pwdgen:pw',{len:pwLen,upper:pwUpper,lower:pwLower,digits:pwDigits,symbols:pwSymbols,exclude:pwExclude});
  _base.save('pwdgen:pp',{words:ppWords,sep:ppSep,cap:ppCap,num:ppNum});
}

/* CSPRNG: unbiased random integer in [0, n) via rejection sampling */
function randBelow(n){
  var lim=256-(256%n),b=new Uint8Array(1);
  do{crypto.getRandomValues(b)}while(b[0]>=lim);
  return b[0]%n;
}

/* Build charset from current settings */
function buildCharset(){
  var cs='';
  if(pwLower)cs+=LOWER;
  if(pwUpper)cs+=UPPER;
  if(pwDigits)cs+=DIGITS;
  if(pwSymbols)cs+=SYMBOLS;
  if(pwExclude)for(var i=0;i<AMBIG.length;i++)cs=cs.split(AMBIG[i]).join('');
  return cs;
}

/* Check that all enabled character types appear in the password */
function meetsConstraints(pw){
  var types=0;
  if(pwUpper)types++;if(pwLower)types++;if(pwDigits)types++;if(pwSymbols)types++;
  if(pwLen<types)return true;
  if(pwUpper&&!/[A-Z]/.test(pw))return false;
  if(pwLower&&!/[a-z]/.test(pw))return false;
  if(pwDigits&&!/[0-9]/.test(pw))return false;
  if(pwSymbols&&!/[!@#$%^&*\-_+=.?]/.test(pw))return false;
  return true;
}

/* Generate random password with batched CSPRNG + rejection sampling */
function generatePw(){
  var cs=buildCharset();
  if(!cs.length)return'';
  var N=cs.length,lim=256-(256%N);
  var buf=new Uint8Array(Math.ceil(pwLen*1.5)+16);
  for(var a=0;a<100;a++){
    var r='',idx=0;
    crypto.getRandomValues(buf);
    while(r.length<pwLen){
      if(idx>=buf.length){crypto.getRandomValues(buf);idx=0}
      if(buf[idx]<lim)r+=cs[buf[idx]%N];
      idx++;
    }
    if(meetsConstraints(r))return r;
  }
  return r;
}

/* Generate random passphrase (2048 = 2^11, zero modulo bias with Uint32) */
function generatePp(){
  var n=ppWords+(ppNum?2:0);
  var buf=new Uint32Array(n);
  crypto.getRandomValues(buf);
  var parts=[],i,w;
  for(i=0;i<ppWords;i++){
    w=WORDS[buf[i]%2048];
    if(ppCap)w=w[0].toUpperCase()+w.slice(1);
    parts.push(w);
  }
  var result=parts.join(ppSep);
  if(ppNum)result+=ppSep+(buf[ppWords]%10)+''+(buf[ppWords+1]%10);
  return result;
}

/* Entropy: H = L * log2(C) for passwords, N * log2(W) for passphrases */
function calcEntropy(){
  if(mode===0){
    var cs=buildCharset();
    return cs.length?pwLen*Math.log2(cs.length):0;
  }
  var h=ppWords*Math.log2(2048);
  if(ppNum)h+=Math.log2(100);
  return h;
}
function strengthLabel(bits){
  if(bits>=128)return['Maximum Strength','str-m'];
  if(bits>=80)return['Very Strong Strength','str-v'];
  if(bits>=60)return['Strong Strength','str-s'];
  if(bits>=40)return['Fair Strength','str-f'];
  return['Weak Strength','str-w'];
}
function updateStrength(){
  var bits=calcEntropy(),s=strengthLabel(bits);
  strL.textContent='';
  strL.appendChild(document.createTextNode(bits.toFixed(1)+' Bits \u00B7 '));
  var sp=document.createElement('span');
  sp.className=s[1];sp.textContent=s[0];
  strL.appendChild(sp);
}

/* Adaptive font size — pick largest size that fits within the box (98px - 40px pad = 58px content) */
var SIZES=['1.375rem','1.2rem','1.05rem','.95rem','.85rem','.75rem','.65rem','.55rem'];
var MAX_H=58;
function sizePw(){
  pwEl.style.wordBreak=mode===1?'normal':'break-all';
  for(var i=0;i<SIZES.length;i++){
    pwEl.style.fontSize=SIZES[i];
    if(pwEl.scrollHeight<=MAX_H)return;
  }
  if(mode===1){
    pwEl.style.wordBreak='break-all';
    for(var j=0;j<SIZES.length;j++){
      pwEl.style.fontSize=SIZES[j];
      if(pwEl.scrollHeight<=MAX_H)return;
    }
  }
}

/* Render: generate + display */
function render(){
  cur=mode===0?generatePw():generatePp();
  pwEl.classList.remove('fi');pwEl.offsetWidth;
  pwEl.textContent=cur;
  sizePw();
  pwEl.classList.add('fi');
  updateStrength();
}

/* Mode switching */
function switchMode(m){
  if(mode===m){doGenerate();return}
  mode=m;
  var segs=document.querySelectorAll('#md-card .seg');
  for(var i=0;i<segs.length;i++)segs[i].classList.toggle('active',parseInt(segs[i].dataset.m)===m);
  pwSet.style.display=m===0?'':'none';
  ppSet.style.display=m===1?'':'none';
  saveSettings();render();
}

/* Update all settings UI from state */
function updateSettingsUI(){
  var segs=document.querySelectorAll('#md-card .seg');
  for(var i=0;i<segs.length;i++)segs[i].classList.toggle('active',parseInt(segs[i].dataset.m)===mode);
  pwSet.style.display=mode===0?'':'none';
  ppSet.style.display=mode===1?'':'none';
  lenL.textContent=pwLen+(pwLen===1?' Character':' Characters');
  setRow('t-uc',pwUpper);setRow('t-lc',pwLower);setRow('t-dg',pwDigits);
  setRow('t-sy',pwSymbols);setRow('t-ex',pwExclude);
  wrdL.textContent=ppWords+(ppWords===1?' Word':' Words');
  var sepSegs=document.querySelectorAll('#pp-set .seg[data-s]');
  for(var j=0;j<sepSegs.length;j++)sepSegs[j].classList.toggle('active',sepSegs[j].dataset.s===ppSep);
  setRow('t-cap',ppCap);setRow('t-num',ppNum);
}
function setRow(id,on){
  var row=$(id);row.classList.toggle('sel',on);row.setAttribute('aria-checked',on?'true':'false');
}

/* Toggle a setting row with checkmark animation */
function doToggle(id,getter,setter){
  var isOn=getter();
  if(isOn&&(id==='t-uc'||id==='t-lc'||id==='t-dg'||id==='t-sy')){
    var on=0;
    if(pwUpper)on++;if(pwLower)on++;if(pwDigits)on++;if(pwSymbols)on++;
    if(on<=1){_base.notify('At Least One Type Required',false);return}
  }
  var newOn=!isOn;
  setter(newOn);
  var row=$(id);
  row.classList.toggle('sel',newOn);
  row.setAttribute('aria-checked',newOn?'true':'false');
  if(newOn){
    var pl=row.querySelector('.bg-chk polyline');
    if(pl){var n=pl.cloneNode(true);pl.parentNode.replaceChild(n,pl)}
  }
  saveSettings();render();
}

/* Clipboard auto-clear */
function clearClipTimer(){
  if(clipTimer){clearInterval(clipTimer);clipTimer=null}
  clipCount=0;
}
function startClipTimer(){
  clearClipTimer();clipCount=30;
  clipTimer=setInterval(function(){
    clipCount--;
    if(clipCount<=0){
      clearClipTimer();
      navigator.clipboard.writeText('').catch(function(){});
      cpI.style.display='';cpK.style.display='none';
      cpL.textContent='Copy';
    }else{
      cpL.textContent='Copied ('+clipCount+'s)';
    }
  },1000);
}

/* Copy password */
var cpFb;
function doCopy(){
  if(!cur)return;
  _base.copyText(cur,function(){
    cpI.style.display='none';cpK.style.display='';
    cpL.textContent='Copied (30s)';
    cpBtn.classList.remove('ok');cpBtn.offsetWidth;cpBtn.classList.add('ok');
    clearTimeout(cpFb);
    cpFb=setTimeout(function(){
      cpBtn.classList.remove('ok');
      cpI.style.display='';cpK.style.display='none';
    },800);
    startClipTimer();
  },function(){
    cpL.textContent='Failed';
    clearTimeout(cpTm);
    cpTm=setTimeout(function(){cpL.textContent='Copy'},800);
  });
}

/* Generate with feedback */
function doGenerate(){
  clearTimeout(genTm);
  render();
  genL.textContent='Generated';
  genBtn.classList.remove('ok');genBtn.offsetWidth;genBtn.classList.add('ok');
  genTm=setTimeout(function(){genL.textContent='Generate';genBtn.classList.remove('ok')},800);
}

/* Reset */
var resetCtrl=_base.twoPress($('rs-btn'),{
  label:rsL,
  onConfirm:function(){
    mode=0;pwLen=20;pwUpper=true;pwLower=true;pwDigits=true;pwSymbols=true;pwExclude=false;
    ppWords=6;ppSep='-';ppCap=true;ppNum=false;
    clearClipTimer();
    cpI.style.display='';cpK.style.display='none';cpL.textContent='Copy';cpBtn.classList.remove('ok');
    saveSettings();updateSettingsUI();render();
  }
});

/* Steppers */
function stepLen(d){
  pwLen=Math.max(8,Math.min(128,pwLen+d));
  lenL.textContent=pwLen+(pwLen===1?' Character':' Characters');
  saveSettings();render();
}
function stepWrd(d){
  ppWords=Math.max(3,Math.min(12,ppWords+d));
  wrdL.textContent=ppWords+(ppWords===1?' Word':' Words');
  saveSettings();render();
}
function stepUp(){mode===0?stepLen(1):stepWrd(1)}
function stepDn(){mode===0?stepLen(-1):stepWrd(-1)}

/* Events: mode switch */
document.querySelector('#md-card .seg-row').addEventListener('click',function(e){
  var seg=e.target.closest('.seg[data-m]');
  if(seg)switchMode(parseInt(seg.dataset.m));
});

/* Events: separator switch */
document.querySelector('#pp-set .seg-row').addEventListener('click',function(e){
  var seg=e.target.closest('.seg[data-s]');
  if(!seg)return;
  ppSep=seg.dataset.s;
  var all=document.querySelectorAll('#pp-set .seg[data-s]');
  for(var i=0;i<all.length;i++)all[i].classList.toggle('active',all[i]===seg);
  saveSettings();render();
});

/* Events: toggle rows */
function bindToggle(id,getter,setter){
  $(id).addEventListener('click',function(){doToggle(id,getter,setter)});
}
bindToggle('t-uc',function(){return pwUpper},function(v){pwUpper=v});
bindToggle('t-lc',function(){return pwLower},function(v){pwLower=v});
bindToggle('t-dg',function(){return pwDigits},function(v){pwDigits=v});
bindToggle('t-sy',function(){return pwSymbols},function(v){pwSymbols=v});
bindToggle('t-ex',function(){return pwExclude},function(v){pwExclude=v});
bindToggle('t-cap',function(){return ppCap},function(v){ppCap=v});
bindToggle('t-num',function(){return ppNum},function(v){ppNum=v});

/* Events: steppers */
$('len-dn').onclick=function(){stepLen(-1)};
$('len-up').onclick=function(){stepLen(1)};
$('wrd-dn').onclick=function(){stepWrd(-1)};
$('wrd-up').onclick=function(){stepWrd(1)};

/* Srow tap-to-reset (mockupgen pattern) */
var RESET_IC='<svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>';
var lenRow=$('pw-set').querySelector('.srow'),wrdRow=$('pp-set').querySelector('.srow'),_rft1,_rft2;
function animateReset(row){
  var lbl=row.querySelector('.slbl'),ic=lbl.querySelector('svg'),orig=ic.outerHTML;
  ic.outerHTML=RESET_IC;
  row.classList.remove('rs-fb');void row.offsetWidth;row.classList.add('rs-fb');
  var ft=row===lenRow?'_rft1':'_rft2';
  clearTimeout(window[ft]);
  window[ft]=setTimeout(function(){row.classList.remove('rs-fb');lbl.querySelector('svg').outerHTML=orig},600);
}
lenRow.addEventListener('click',function(e){
  if(e.target.closest('button'))return;
  pwLen=20;lenL.textContent='20 Characters';saveSettings();render();animateReset(lenRow);
});
wrdRow.addEventListener('click',function(e){
  if(e.target.closest('button'))return;
  ppWords=6;wrdL.textContent='6 Words';saveSettings();render();animateReset(wrdRow);
});

/* Events: action buttons */
genBtn.onclick=doGenerate;
cpBtn.onclick=doCopy;
$('rs-btn').onclick=function(){resetCtrl.press()};

/* Events: click output to copy */
outEl.onclick=function(){
  if(!cur)return;
  doCopy();
  outEl.classList.remove('cp-fb');outEl.offsetWidth;outEl.classList.add('cp-fb');
  clearTimeout(cpTm);
  cpTm=setTimeout(function(){outEl.classList.remove('cp-fb')},400);
};

/* Keyboard: Enter/Space on toggle rows */
function rowKey(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();e.target.closest('.srow').click()}}
var toggleRows=document.querySelectorAll('.srow[role="switch"]');
for(var i=0;i<toggleRows.length;i++)toggleRows[i].addEventListener('keydown',rowKey);

/* Keyboard shortcuts */
var _su=function(e){e.preventDefault();stepUp()},_sd=function(e){e.preventDefault();stepDn()};
_base.onKey({
  ' ':function(e){e.preventDefault();doGenerate()},
  Enter:function(e){e.preventDefault();doGenerate()},
  g:function(e){e.preventDefault();doGenerate()},
  c:function(e){e.preventDefault();doCopy()},
  r:function(){resetCtrl.press()},
  m:function(){switchMode(mode===0?1:0)},
  ArrowUp:_su,'=':_su,'+':_su,
  ArrowDown:_sd,'-':_sd,
  u:function(){if(mode===0)doToggle('t-uc',function(){return pwUpper},function(v){pwUpper=v})},
  l:function(){if(mode===0)doToggle('t-lc',function(){return pwLower},function(v){pwLower=v})},
  d:function(){if(mode===0)doToggle('t-dg',function(){return pwDigits},function(v){pwDigits=v})},
  s:function(){if(mode===0)doToggle('t-sy',function(){return pwSymbols},function(v){pwSymbols=v})},
  x:function(){if(mode===0)doToggle('t-ex',function(){return pwExclude},function(v){pwExclude=v})}
});

/* Init */
loadSettings();
updateSettingsUI();
render();

})();
