.item .del svg{width:14px;height:14px;pointer-events:none}

.item.kb-focus{outline:2px solid var(--acc);outline-offset:2px}
.no-match{padding:32px 20px;text-align:center;color:var(--t4);font:500 .9375rem/1 var(--font)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.item:active{opacity:.85}
.item .del:active{opacity:.7}
.links>button:active:not([disabled]){opacity:.7}
@media(hover:hover){
  .item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.08)}
  .item .del:hover{color:var(--t1);background:var(--bg2);border-color:var(--t4)}
}

<script>
(function(){'use strict';
function $(id){return document.getElementById(id)}
var parseDate=_dp.parseDate,splitTitleDate=_dp.splitTitleDate,extractDate=_dp.extractDate,formatLabel=_dp.formatLabel,fmtTime12=_dp.fmtTime12,MONTH_NAMES=_dp.MONTH_NAMES;
var items=[],searchTimer=null;
var kbIdx=-1;
var gran='y';
var mkX=_base.mkX;
var norm=_search.norm,scoreWord=_search.scoreWord;

/* ── Storage ─────────────────────────────────────────────────────── */
function load(){
  var p=_base.load('diffy:items',[]);
  if(Array.isArray(p))items=p.filter(function(e){return e&&e.id&&typeof e.start==='number'&&typeof e.end==='number'}).map(function(e){
    var s=new Date(e.start),en=new Date(e.end);
    e.label=formatRange(s,en);
    e.diffMs=Math.abs(e.end-e.start);
    return e;
  });
  var g;try{g=localStorage.getItem('diffy:gran')}catch(_){}
  if(g==='y'||g==='mo'||g==='d'||g==='h')gran=g;
}
function save(){
  try{localStorage.setItem('diffy:items',JSON.stringify(items))}
  catch(e){if(e.name==='QuotaExceededError')announce('Storage Full')}
}
function saveGran(){try{localStorage.setItem('diffy:gran',gran)}catch(_){}}

/* ── Unique ID ───────────────────────────────────────────────────── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ── Announce (a11y) ─────────────────────────────────────────────── */
function announce(msg){var el=$('status');el.textContent='';requestAnimationFrame(function(){el.textContent=msg})}

/* ── Date Helpers ────────────────────────────────────────────────── */
function sameYMD(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function sameYear(a,b){return a.getFullYear()===b.getFullYear()}
function fmtDateOnly(d){return d.getDate()+' '+MONTH_NAMES[d.getMonth()]+' '+d.getFullYear()}
function formatRange(start,end){
  var bothMidnight=start.getHours()===0&&start.getMinutes()===0&&end.getHours()===0&&end.getMinutes()===0;
  if(bothMidnight){
    if(sameYMD(start,end))return fmtDateOnly(start);
    if(sameYear(start,end))return fmtDateOnly(start)+' → '+end.getDate()+' '+MONTH_NAMES[end.getMonth()];
    return fmtDateOnly(start)+' → '+fmtDateOnly(end);
  }
  var sStr=formatLabel(start);
  if(sameYMD(start,end))
    return sStr+' → '+fmtTime12(end.getHours(),end.getMinutes());
  if(sameYear(start,end))
    return sStr+' → '+end.getDate()+' '+MONTH_NAMES[end.getMonth()]+', '+fmtTime12(end.getHours(),end.getMinutes());
  return sStr+' → '+formatLabel(end);
}

/* ── Diff Calculation (granularity-aware) ────────────────────────── */
function calcDiff(startMs,endMs,g){
  var a=new Date(Math.min(startMs,endMs));
  var b=new Date(Math.max(startMs,endMs));
  var diffMs=b.getTime()-a.getTime();
  if(g==='h'){
    var hrs=Math.round(diffMs/360000)/10;
    return[{v:hrs,l:hrs===1?'Hour':'Hours'}];
  }
  if(g==='d'){
    var days=Math.floor(diffMs/86400000);
    var hrs=Math.floor((diffMs%86400000)/360000)/10;
    return[
      {v:days,l:days===1?'Day':'Days'},
      {v:hrs,l:hrs===1?'Hour':'Hours'}
    ];
  }
  if(g==='mo'){
    var months=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
    var pivot=new Date(a);pivot.setMonth(a.getMonth()+months);
    if(pivot>b){months--;pivot=new Date(a);pivot.setMonth(a.getMonth()+months)}
    var rem=b.getTime()-pivot.getTime();
    var days=Math.floor(rem/86400000);
    var hrs=Math.floor((rem%86400000)/360000)/10;
    return[
      {v:months,l:months===1?'Month':'Months'},
      {v:days,l:days===1?'Day':'Days'},
      {v:hrs,l:hrs===1?'Hour':'Hours'}
    ];
  }
  // 'y' calendar-aware: years, then months, days, hours
  var years=b.getFullYear()-a.getFullYear();
  var pivot=new Date(a);pivot.setFullYear(a.getFullYear()+years);
  if(pivot>b){years--;pivot=new Date(a);pivot.setFullYear(a.getFullYear()+years)}
  var months=(b.getFullYear()-pivot.getFullYear())*12+(b.getMonth()-pivot.getMonth());
  var pivot2=new Date(pivot);pivot2.setMonth(pivot.getMonth()+months);
  if(pivot2>b){months--;pivot2=new Date(pivot);pivot2.setMonth(pivot.getMonth()+months)}
  var rem=b.getTime()-pivot2.getTime();
  var days=Math.floor(rem/86400000);
  var hrs=Math.floor((rem%86400000)/360000)/10;
  return[
    {v:years,l:years===1?'Year':'Years'},
    {v:months,l:months===1?'Month':'Months'},
    {v:days,l:days===1?'Day':'Days'},
    {v:hrs,l:hrs===1?'Hour':'Hours'}
  ];
}

function buildCdWrap(units){
  var wrap=document.createElement('div');wrap.className='item-cd-wrap';
  if(!units)return wrap;
  for(var i=0;i<units.length;i++){
    var u=document.createElement('div');u.className='item-cd-unit'+(units[i].v===0?' zero':'');
    var v=document.createElement('div');v.className='item-cd-val';v.textContent=units[i].v;
    var l=document.createElement('div');l.className='item-cd-lbl';l.textContent=units[i].l;
    u.appendChild(v);u.appendChild(l);wrap.appendChild(u);
  }
  return wrap;
}

/* ── Render ───────────────────────────────────────────────────────── */
function render(){
  _search.clearCache();
  var c=$('items'),q=norm($('search').value.trim().toLowerCase());
  var words=q.split(/\s+/).filter(Boolean);
  var hasItems=items.length>0;
  var frag=document.createDocumentFragment();

  var cnt=items.length;
  $('ca-btn').disabled=!cnt;$('ca-btn').style.display=cnt?'':'none';
  $('ca-l').textContent=cnt>1?'Copy All':'Copy';
  $('search-wrap').style.display=hasItems?'block':'none';

  if(!hasItems){c.textContent='';c.style.display='none';kbIdx=-1;return}

  var sorted=items.slice().sort(function(a,b){return a.diffMs-b.diffMs});
  var list=sorted;
  if(words.length){
    var scored=[];
    for(var i=0;i<sorted.length;i++){
      var it=sorted[i],t=(it.title+' '+it.label).toLowerCase(),total=0,ok=true;
      for(var wi=0;wi<words.length;wi++){
        var sc=scoreWord(words[wi],t);
        if(sc<=0){ok=false;break}
        total+=sc;
      }
      if(ok)scored.push({it:it,score:total});
    }
    scored.sort(function(a,b){return b.score-a.score});
    list=scored.map(function(x){return x.it});
  }

  for(var i=0;i<list.length;i++){
    var it=list[i];
    var row=document.createElement('div');
    row.className='item';
    row.setAttribute('role','listitem');
    row.setAttribute('data-id',it.id);

    var header=document.createElement('div');header.className='item-header';
    var info=document.createElement('div');info.className='item-info';
    var title=document.createElement('div');title.className='item-title';title.textContent=it.title;
    var date=document.createElement('div');date.className='item-date';date.textContent=it.label;
    info.appendChild(title);info.appendChild(date);

    var btn=document.createElement('button');btn.type='button';btn.className='del';btn.setAttribute('aria-label','Remove');
    btn.appendChild(mkX());
    header.appendChild(info);header.appendChild(btn);

    var units=calcDiff(it.start,it.end,gran);
    var cdWrap=buildCdWrap(units);
    cdWrap.setAttribute('data-id',it.id);

    row.appendChild(header);row.appendChild(cdWrap);frag.appendChild(row);
    if(i===kbIdx)row.classList.add('kb-focus');
  }

  if(list.length===0&&words.length){
    var nm=document.createElement('div');nm.className='no-match';nm.textContent='Nothing Found';frag.appendChild(nm);
    announce('Nothing Found');
  }else if(words.length){
    announce(list.length+' result'+(list.length===1?'':'s'));
  }

  c.textContent='';c.appendChild(frag);c.style.display='';
  if(kbIdx>=list.length)kbIdx=list.length-1;
}

/* ── Duplicate Detection ─────────────────────────────────────────── */
function isDupeExact(title,startMs,endMs,extra){
  var t=title.toLowerCase(),sMin=Math.floor(startMs/60000),eMin=Math.floor(endMs/60000);
  for(var i=0;i<items.length;i++){
    if(items[i].title.toLowerCase()===t&&Math.floor(items[i].start/60000)===sMin&&Math.floor(items[i].end/60000)===eMin)return true;
  }
  if(extra){for(var i=0;i<extra.length;i++){
    if(extra[i].title.toLowerCase()===t&&Math.floor(extra[i].startMs/60000)===sMin&&Math.floor(extra[i].endMs/60000)===eMin)return true;
  }}
  return false;
}

/* ── Add Item ────────────────────────────────────────────────────── */
function nextAutoTitle(claimed){
  var used=claimed||{};
  for(var i=0;i<items.length;i++){
    var m=items[i].title.match(/^Comparison\s+(\d+)$/);
    if(m)used[parseInt(m[1],10)]=1;
  }
  var n=1;while(used[n])n++;used[n]=1;
  return'Comparison '+n;
}
function addItem(){
  var title=$('inp-title').value.trim();
  var startText=$('inp-start').value.trim();
  var endText=$('inp-end').value.trim();
  if(!startText&&!endText){_base.notify('Enter a Start or End Date',false);return}
  var startNow=!startText,endNow=!endText;
  var nowSnap=new Date();
  var pStart=startNow?{date:nowSnap,label:formatLabel(nowSnap),hint:null}:parseDate(startText);
  if(!pStart){_base.notify('Could Not Parse Start',false);return}
  var pEnd=endNow?{date:nowSnap,label:formatLabel(nowSnap),hint:null}:parseDate(endText);
  if(!pEnd){_base.notify('Could Not Parse End',false);return}
  var sMs=pStart.date.getTime(),eMs=pEnd.date.getTime();
  if(Math.floor(sMs/60000)===Math.floor(eMs/60000)){_base.notify('Start and End Are Identical',false);return}
  if(!title)title=nextAutoTitle();
  if(isDupeExact(title,sMs,eMs)){_base.notify('Duplicate Blocked',false);return}
  var id=uid();
  items.unshift({
    id:id,title:title,
    start:sMs,end:eMs,
    diffMs:Math.abs(eMs-sMs),
    label:formatRange(pStart.date,pEnd.date),
    ts:Date.now()
  });
  save();kbIdx=-1;render();
  $('inp-title').value='';$('inp-start').value='';$('inp-end').value='';
  $('inp-start').focus();
  if(startNow&&endNow)_base.notify('Both Sides Set to Now','warn');
  else if(startNow)_base.notify('Current Time Used as Start','warn');
  else if(endNow)_base.notify('Current Time Used as End','warn');
  else announce('Added');
}

/* ── Remove Item ─────────────────────────────────────────────────── */
function removeItem(id){
  var row=$('items').querySelector('[data-id="'+id+'"]');
  if(row)row.classList.add('removing');
  for(var i=0;i<items.length;i++){if(items[i].id===id){items.splice(i,1);break}}
  save();
  setTimeout(function(){render();announce('Removed')},100);
}

/* ── Reset (two-press) ───────────────────────────────────────────── */
var resetCtrl=_base.twoPress($('rs-btn'),{
  label:$('rs-l'),
  guard:function(){return $('inp-title').value||$('inp-start').value||$('inp-end').value||gran!=='y'},
  onConfirm:function(){
    $('inp-title').value='';$('inp-start').value='';$('inp-end').value='';
    if(gran!=='y'){gran='y';saveGran();updateGranUI();render()}
    $('inp-title').focus();
    announce('Reset');
  }
});
function doReset(){resetCtrl.press()}

/* ── Granularity Switching ───────────────────────────────────────── */
function updateGranUI(){
  var btns=$('gran-card').querySelectorAll('.seg');
  for(var i=0;i<btns.length;i++){
    btns[i].classList.toggle('active',btns[i].getAttribute('data-gran')===gran);
  }
}
$('gran-card').addEventListener('click',function(e){
  var btn=e.target.closest('.seg');if(!btn)return;
  var g=btn.getAttribute('data-gran');
  if(!g||g===gran)return;
  gran=g;saveGran();updateGranUI();render();
});

/* ── Keyboard Navigation ─────────────────────────────────────────── */
function kbCards(){return $('items').querySelectorAll('.item')}
function kbClear(){
  kbIdx=-1;var all=kbCards();for(var i=0;i<all.length;i++)all[i].classList.remove('kb-focus');
}
function kbMove(dir){
  var cards=kbCards();if(!cards.length)return;
  if(kbIdx>=0&&kbIdx<cards.length)cards[kbIdx].classList.remove('kb-focus');
  kbIdx+=dir;
  if(kbIdx<0)kbIdx=cards.length-1;
  if(kbIdx>=cards.length)kbIdx=0;
  cards[kbIdx].classList.add('kb-focus');
  cards[kbIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
}

/* ── Input Handlers ──────────────────────────────────────────────── */
$('add-btn').addEventListener('click',addItem);
$('inp-title').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();$('inp-start').focus()}});
$('inp-start').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();$('inp-end').focus()}});
$('inp-end').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addItem()}});

/* ── Item Click Delegation ───────────────────────────────────────── */
$('items').addEventListener('click',function(e){
  var del=e.target.closest('.del');
  var row=e.target.closest('.item');
  if(!row)return;
  var id=row.getAttribute('data-id');
  kbClear();
  if(del){removeItem(id);return}
  // Tap card: populate inputs + copy to clipboard
  var item=null;
  for(var i=0;i<items.length;i++){if(items[i].id===id){item=items[i];break}}
  if(!item)return;
  var sd=new Date(item.start),ed=new Date(item.end);
  var sStr=sd.getDate()+' '+MONTH_NAMES[sd.getMonth()]+' '+sd.getFullYear()+', '+fmtTime12(sd.getHours(),sd.getMinutes());
  var eStr=ed.getDate()+' '+MONTH_NAMES[ed.getMonth()]+' '+ed.getFullYear()+', '+fmtTime12(ed.getHours(),ed.getMinutes());
  $('inp-title').value=item.title;
  $('inp-start').value=sStr;
  $('inp-end').value=eStr;
  $('inp-title').focus();
  _base.copyText(item.title+'\n'+sStr+'\n'+eStr,function(){_base.notify('Copied',true)});
});

/* ── Search ──────────────────────────────────────────────────────── */
var searchX=$('search-x');
function updateSearchX(){searchX.style.display=$('search').value?'flex':'none'}
$('search').addEventListener('input',function(){
  clearTimeout(searchTimer);kbIdx=-1;
  searchTimer=setTimeout(function(){render()},80);
  updateSearchX();
});
searchX.addEventListener('click',function(){
  $('search').value='';updateSearchX();kbIdx=-1;render();$('search').focus();
});

/* ── Paste / Bulk ────────────────────────────────────────────────── */
var paTimer=null;
function paFeedback(){
  var btn=$('pa-btn'),pi=$('pa-i'),pk=$('pa-ck'),pl=$('pa-l');
  if(paTimer){clearTimeout(paTimer);btn.classList.remove('ok');pi.style.display='';pk.style.display='none';pl.textContent='Paste'}
  pi.style.display='none';pk.style.display='';pl.textContent='Pasted';
  btn.classList.remove('ok');btn.offsetWidth;btn.classList.add('ok');
  paTimer=setTimeout(function(){btn.classList.remove('ok');pi.style.display='';pk.style.display='none';pl.textContent='Paste';paTimer=null},800);
}

function splitRange(line){
  // Split on right-arrow, ->, ' to ', em-dash, en-dash
  var idx=-1,delim='',m;
  m=line.match(/\s*→\s*/);if(m){idx=m.index;delim=m[0]}
  if(idx<0){m=line.match(/\s*->\s*/);if(m){idx=m.index;delim=m[0]}}
  if(idx<0){m=line.match(/\s+to\s+/i);if(m){idx=m.index;delim=m[0]}}
  if(idx<0){m=line.match(/\s*—\s*/);if(m){idx=m.index;delim=m[0]}}
  if(idx<0){m=line.match(/\s*–\s*/);if(m){idx=m.index;delim=m[0]}}
  if(idx<0)return null;
  return{left:line.slice(0,idx).trim(),right:line.slice(idx+delim.length).trim()};
}

function addBulkRecords(records,invalid){
  invalid=invalid||0;
  var blocked=0,toAdd=[];
  for(var i=0;i<records.length;i++){
    var r=records[i];
    if(isDupeExact(r.title,r.startMs,r.endMs,toAdd)){blocked++;continue}
    toAdd.push(r);
  }
  for(var i=0;i<toAdd.length;i++){
    var r=toAdd[i],id=uid();
    items.unshift({
      id:id,title:r.title,
      start:r.startMs,end:r.endMs,
      diffMs:Math.abs(r.endMs-r.startMs),
      label:formatRange(new Date(r.startMs),new Date(r.endMs)),
      ts:Date.now()
    });
  }
  save();kbIdx=-1;render();
  var bl=blocked===1?'Duplicate':'Duplicates';
  var parts=[];
  if(toAdd.length)parts.push(toAdd.length+' Added');
  if(invalid)parts.push(invalid+' Invalid Skipped');
  if(blocked)parts.push(blocked+' '+bl+' Blocked');
  if(!toAdd.length&&!blocked&&invalid)_base.notify('No Valid Comparisons',false);
  else if(invalid||blocked)_base.notify(parts.join(', '),false);
  else _base.notify(toAdd.length+' Comparison'+(toAdd.length!==1?'s':'')+' Added',true);
}

function tryBulkPaste(text){
  var lines=text.split(/\n/).map(function(l){return l.trim()}).filter(Boolean);
  if(lines.length<2)return false;
  var records=[];

  // Format A: triplets — title, start, end
  if(lines.length%3===0){
    var ok=true,recs=[],invalid=0;
    for(var i=0;i<lines.length;i+=3){
      var t=lines[i],sP=parseDate(lines[i+1]),eP=parseDate(lines[i+2]);
      if(!sP||!eP){ok=false;break}
      var sMs=sP.date.getTime(),eMs=eP.date.getTime();
      if(Math.floor(sMs/60000)===Math.floor(eMs/60000)){invalid++;continue}
      recs.push({title:t||null,startMs:sMs,endMs:eMs});
    }
    if(ok&&(recs.length||invalid)){
      var claimed={};
      for(var j=0;j<recs.length;j++)recs[j].title=recs[j].title||nextAutoTitle(claimed);
      addBulkRecords(recs,invalid);return true;
    }
  }

  // Format B: pairs of dates only — start, end
  if(lines.length%2===0){
    var ok=true,recs=[],invalid=0;
    for(var i=0;i<lines.length;i+=2){
      var sP=parseDate(lines[i]),eP=parseDate(lines[i+1]);
      if(!sP||!eP){ok=false;break}
      var sMs=sP.date.getTime(),eMs=eP.date.getTime();
      if(Math.floor(sMs/60000)===Math.floor(eMs/60000)){invalid++;continue}
      recs.push({title:null,startMs:sMs,endMs:eMs});
    }
    if(ok&&(recs.length||invalid)){
      var claimed={};
      for(var j=0;j<recs.length;j++)recs[j].title=recs[j].title||nextAutoTitle(claimed);
      addBulkRecords(recs,invalid);return true;
    }
  }

  // Format C: one record per line, "title: start → end" or "start → end"
  var recs=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    var rng=splitRange(line);
    if(!rng)return false;
    // Left side may itself contain "title: date" or "title - date" (try splitTitleDate)
    var leftSplit=splitTitleDate(rng.left);
    var t='',sStr=rng.left,eStr=rng.right;
    if(leftSplit&&leftSplit.title){
      t=leftSplit.title;
      // Use leftSplit.parsed if it returns a date — leftSplit.parsed.date exists
      var sP=leftSplit.parsed,eP=parseDate(eStr);
      if(!sP||!eP)return false;
      var sMs=sP.date.getTime(),eMs=eP.date.getTime();
      if(Math.floor(sMs/60000)===Math.floor(eMs/60000))return false;
      recs.push({title:t,startMs:sMs,endMs:eMs});
    }else{
      var sP=parseDate(sStr),eP=parseDate(eStr);
      if(!sP||!eP)return false;
      var sMs=sP.date.getTime(),eMs=eP.date.getTime();
      if(Math.floor(sMs/60000)===Math.floor(eMs/60000))return false;
      recs.push({title:null,startMs:sMs,endMs:eMs});
    }
  }
  if(recs.length){
    var claimed={};
    for(var j=0;j<recs.length;j++)recs[j].title=recs[j].title||nextAutoTitle(claimed);
    addBulkRecords(recs);return true;
  }

  return false;
}

function handlePastedText(t){
  // Multi-line bulk first
  if(t.indexOf('\n')!==-1&&tryBulkPaste(t)){paFeedback();return}
  var titleEl=$('inp-title'),startEl=$('inp-start'),endEl=$('inp-end');
  // Single-line "start → end" range
  var rng=t.indexOf('\n')===-1?splitRange(t):null;
  if(rng){
    var leftSplit=splitTitleDate(rng.left);
    if(leftSplit&&leftSplit.title){
      if(!titleEl.value)titleEl.value=leftSplit.title;
      startEl.value=formatLabel(leftSplit.parsed.date);
    }else{
      var sP=parseDate(rng.left);
      startEl.value=sP?formatLabel(sP.date):rng.left;
    }
    var eP=parseDate(rng.right);
    endEl.value=eP?formatLabel(eP.date):rng.right;
    endEl.focus();
    paFeedback();return;
  }
  // Try extracting an embedded date from prose; fill End (Start can default to now)
  var ext=extractDate(t);
  if(ext){
    endEl.value=formatLabel(ext.date);
    if(!titleEl.value)titleEl.focus();else endEl.focus();
    paFeedback();return;
  }
  // No date anywhere — paste goes to title
  if(!titleEl.value){titleEl.value=t;startEl.focus()}
  paFeedback();
}

$('pa-btn').addEventListener('click',function(){
  if(!navigator.clipboard||!navigator.clipboard.readText){_base.notify('Clipboard Not Available',false);return}
  navigator.clipboard.readText().then(function(text){
    if(!text||!text.trim()){_base.notify('Clipboard Empty',false);return}
    handlePastedText(text.trim());
  },function(){_base.notify('Clipboard Access Denied',false)});
});
document.addEventListener('paste',function(e){
  var tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  var text=(e.clipboardData||window.clipboardData).getData('text');
  if(text){e.preventDefault();handlePastedText(text.trim())}
});

/* ── Copy All ────────────────────────────────────────────────────── */
var caTimer=null;
$('ca-btn').addEventListener('click',function(){
  if(!items.length)return;
  var lines=[];
  var sorted=items.slice().sort(function(a,b){return a.diffMs-b.diffMs});
  for(var i=0;i<sorted.length;i++){
    var it=sorted[i];
    var sd=new Date(it.start),ed=new Date(it.end);
    var sStr=sd.getDate()+' '+MONTH_NAMES[sd.getMonth()]+' '+sd.getFullYear()+', '+fmtTime12(sd.getHours(),sd.getMinutes());
    var eStr=ed.getDate()+' '+MONTH_NAMES[ed.getMonth()]+' '+ed.getFullYear()+', '+fmtTime12(ed.getHours(),ed.getMinutes());
    lines.push(it.title);lines.push(sStr);lines.push(eStr);
  }
  if(!lines.length){_base.notify('No Comparisons',false);return}
  var btn=$('ca-btn'),ci=$('ca-i'),ck=$('ca-ck'),cl=$('ca-l');
  _base.copyText(lines.join('\n'),function(){
    if(caTimer){clearTimeout(caTimer);btn.classList.remove('ok');ci.style.display='';ck.style.display='none'}
    ci.style.display='none';ck.style.display='';cl.textContent='Copied';
    btn.classList.remove('ok');btn.offsetWidth;btn.classList.add('ok');
    var n=items.length;
    caTimer=setTimeout(function(){btn.classList.remove('ok');ci.style.display='';ck.style.display='none';cl.textContent=n>1?'Copy All':'Copy';caTimer=null},800);
    announce('All Comparisons Copied');
  });
});

/* ── Action Buttons ──────────────────────────────────────────────── */
$('rs-btn').addEventListener('click',doReset);

/* ── Keyboard Shortcuts ──────────────────────────────────────────── */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){kbClear();document.activeElement.blur()}
});
_base.onKey({
  '/':function(e){e.preventDefault();kbClear();$('inp-title').focus()},
  's':function(e){e.preventDefault();if($('search-wrap').style.display!=='none'){kbClear();$('search').focus()}},
  'p':function(e){e.preventDefault();$('pa-btn').click()},
  'v':function(e){e.preventDefault();$('pa-btn').click()},
  'a':function(){$('ca-btn').click()},
  'j':function(e){e.preventDefault();kbMove(1)},
  'k':function(e){e.preventDefault();kbMove(-1)},
  'ArrowDown':function(e){e.preventDefault();kbMove(1)},
  'ArrowUp':function(e){e.preventDefault();kbMove(-1)},
  'd':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'Backspace':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'Delete':function(e){if(kbIdx>=0){e.preventDefault();var cards=kbCards();if(kbIdx<cards.length)removeItem(cards[kbIdx].getAttribute('data-id'))}},
  'r':function(e){e.preventDefault();doReset()},
  ctrl:{
    'k':function(e){e.preventDefault();if($('search-wrap').style.display!=='none'){kbClear();$('search').focus()}else{$('inp-title').focus()}}
  }
});
document.addEventListener('mousemove',function(){if(kbIdx>=0)kbClear()},{passive:true});

/* ── Cross-Tab Sync ──────────────────────────────────────────────── */
window.addEventListener('storage',function(e){
  if(e.key==='diffy:items'||e.key==='diffy:gran'){
    kbIdx=-1;load();updateGranUI();render();
  }
});

/* ── Visibility ──────────────────────────────────────────────────── */
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    clearTimeout(searchTimer);clearTimeout(paTimer);
  }else{
    load();updateGranUI();render();
    var pb=$('pa-btn'),pi=$('pa-i'),pk=$('pa-ck'),pl=$('pa-l');
    pb.classList.remove('ok');pi.style.display='';pk.style.display='none';pl.textContent='Paste';
  }
});

/* ── Init ────────────────────────────────────────────────────────── */
load();
updateGranUI();render();
})();
