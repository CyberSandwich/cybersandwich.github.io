<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FAFAFA">
<title>Meet</title>
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meet">
<meta name="description" content="Find a time to meet. Paint your availability, share one link, see the overlap. No accounts, no server. The whole event lives in the link.">
<meta property="og:title" content="Meet">
<meta property="og:description" content="Find a time to meet. Paint your availability, share one link, see the overlap. No accounts, no server. The whole event lives in the link.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(_){}if(t&&t!=='light')document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="/shared/base.css?v=27">
<style>
body{display:flex;align-items:flex-start;justify-content:center}
.w{max-width:440px;padding:20px 20px calc(100px + env(safe-area-inset-bottom,0px));width:100%}
@media(min-width:768px){.w{max-width:640px;padding:32px 48px calc(100px + env(safe-area-inset-bottom,0px))}}
@media(min-width:1024px){
  .w{max-width:960px}
  #v-create,#v-error{max-width:544px;margin:0 auto}
  #v-event.active{display:grid;grid-template-columns:1fr 1fr;column-gap:14px;align-items:start;grid-auto-flow:row dense}
  #v-event>*{grid-column:1/-1;min-width:0}
  #v-event>#e-id,#v-event>#e-bt-card{grid-column:1}
  #v-event>#e-tools,#v-event>#e-pp-card{grid-column:2}
  .mg{--cw:clamp(52px,calc((min(100vw,960px) - 200px)/var(--cols)),140px)}
  .mg.many{--cw:64px}
}

:root{
  --mt-line:#F0F0F0;--mt-line-strong:#E2E2E2;
  --mt-stripe:rgba(0,0,0,.02);
  --mt-heat:42,157,143;
  --mt-av:#34D399;--mt-av-f:rgba(52,211,153,.34);
  --mt-bs:#F87171;--mt-bs-f:rgba(248,113,113,.30);--mt-bs-w:rgba(248,113,113,.10);
  --mt-av-seg:#DCFCE7;--mt-av-seg-c:#16A34A;
  --mt-bs-seg:#FEE2E2;--mt-bs-seg-c:#C41E3A;
  --mt-win:#2A9D8F;--mt-win-f:rgba(42,157,143,.16);
  --mt-hero:#E7F4F2;
  --mt-kc:#3B82F6
}
html[data-theme="dark"]{
  --mt-line:#333336;--mt-line-strong:#48484A;
  --mt-stripe:rgba(255,255,255,.02);
  --mt-heat:94,196,182;
  --mt-av:#34D399;--mt-av-f:rgba(52,211,153,.34);
  --mt-bs:#F87171;--mt-bs-f:rgba(248,113,113,.30);--mt-bs-w:rgba(248,113,113,.13);
  --mt-av-seg:#1A3A2A;--mt-av-seg-c:#34D399;
  --mt-bs-seg:#3A2020;--mt-bs-seg-c:#F87171;
  --mt-win:#5EC4B6;--mt-win-f:rgba(94,196,182,.18);
  --mt-hero:#1E3230;
  --mt-kc:#64B5F6
}
html[data-theme="sepia"]{
  --mt-line:#E8E0CE;--mt-line-strong:#DDD4C0;
  --mt-stripe:rgba(91,70,54,.03);
  --mt-heat:166,123,91;
  --mt-av:#7A9B5C;--mt-av-f:rgba(160,190,130,.32);
  --mt-bs:#BC6A4F;--mt-bs-f:rgba(210,140,110,.28);--mt-bs-w:rgba(188,106,79,.12);
  --mt-av-seg:#D5E0C8;--mt-av-seg-c:#3F6212;
  --mt-bs-seg:#E8D5C8;--mt-bs-seg-c:#9A3412;
  --mt-win:#A67B5B;--mt-win-f:rgba(166,123,91,.16);
  --mt-hero:#EDE5D0;
  --mt-kc:#A67B5B
}

.links>button{transition:background .25s,color .25s}
.links>button.ok{animation:none}
.links>button:active:not([disabled]){opacity:.7}

.view{display:none}
.view.active{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* -- Create: calendar -- */
.cal{padding:6px 10px 12px}
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:8px 6px}
.cal-ttl{font:600 .9375rem/1 var(--font);color:var(--t1)}
.cal-nav{width:32px;height:32px;border-radius:50%;border:none;background:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-nav:disabled{opacity:.3;cursor:default}
.cal-nav svg{width:18px;height:18px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font:600 .6875rem/1 var(--font);color:var(--t4);padding:6px 0;user-select:none}
.cal-dow.we{color:var(--t2)}
.cal-d{height:38px;display:flex;align-items:center;justify-content:center;font:500 .875rem/1 var(--font);color:var(--t2);border-radius:10px;cursor:pointer;position:relative;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:pan-x pan-y}
.cal-d.out{opacity:0;pointer-events:none}
.cal-d.off{color:var(--t4);opacity:.35;pointer-events:none}
.cal-d.today{font-weight:700;color:var(--t1)}
.cal-d.sel{background:var(--mt-win-f);border:2px solid var(--mt-win);border-radius:10px;color:var(--mt-win);font-weight:600}
.cal-d.sel-s{border-right-width:0;border-top-right-radius:0;border-bottom-right-radius:0}
.cal-d.sel-e{border-left-width:0;border-top-left-radius:0;border-bottom-left-radius:0}
.cal-d.sel-m{border-left-width:0;border-right-width:0;border-radius:0}
.cal-d.pv{outline:2px dashed var(--mt-win);outline-offset:-3px}
@media(hover:hover){.cal-d:hover:not(.off):not(.out){background:var(--bg2)}.cal-d.sel:hover{background:var(--mt-win-f)}}
.dow-row{display:flex;gap:8px;flex-wrap:wrap;padding:14px 20px}
.dow-row .chip.active{background:var(--mt-win);border-color:var(--mt-win)}
#c-st,#c-en{font-variant-numeric:tabular-nums}

/* -- Timezone picker (thymezone idiom) -- */
.tz-wrap{position:relative;margin-bottom:14px}
.tz-wrap .inp{margin-bottom:0}
.tz-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:20;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--shadow2);max-height:320px;overflow-y:auto;display:none}
.tz-drop.open{display:block}
.tz-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bdr2)}
.tz-opt:last-child{border-bottom:none}
.tz-opt.tz-active{background:var(--bg2)}
.tz-city{font:500 .875rem/1.2 var(--font);color:var(--t1)}
.tz-meta{font:400 .75rem/1.2 var(--font);color:var(--t3);text-align:right;flex-shrink:0;margin-left:12px}
.tz-empty{padding:20px 16px;text-align:center;color:var(--t4);font:500 .875rem/1 var(--font)}
@media(hover:hover){.tz-opt:hover{background:var(--bg2)}}

/* -- Event header -- */
.ev-head{padding:16px 20px}
.ev-ttl{font:700 1.125rem/1.3 var(--font);color:var(--t1);overflow-wrap:anywhere}
.ev-meta{font:400 .8125rem/1.5 var(--font);color:var(--t3);margin-top:2px}
.ev-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ev-chips:empty{display:none}
.chip.on{background:var(--mt-win-f);color:var(--mt-win);border-color:var(--mt-win)}
.chip.warn-chip{background:none;color:var(--t3);border-style:dashed;cursor:default}

/* -- Finalize hero -- */
.hero{background:var(--mt-hero);border-radius:20px;box-shadow:var(--shadow);margin-bottom:14px;display:none}
.hero.on{display:block;animation:fi .25s ease}
.hero-in{padding:18px 22px 6px}
.hero-k{font:600 .75rem/1 var(--font);color:var(--mt-win);text-transform:uppercase;letter-spacing:.06em}
.hero-t{font:700 clamp(1.125rem,4.5vw,1.375rem)/1.3 var(--font);color:var(--t1);margin-top:6px}
.hero-s{font:400 .875rem/1.5 var(--font);color:var(--t2);margin-top:2px}
.hero .links{margin-top:8px}
.hero .links>button{border-bottom-color:rgba(0,0,0,.05)}
html[data-theme="dark"] .hero .links>button{border-bottom-color:rgba(255,255,255,.06)}
html[data-theme="sepia"] .hero .links>button{border-bottom-color:rgba(91,70,54,.08)}

/* -- Identity row -- */
#e-id .srow{cursor:auto}
#e-id .srow:active{opacity:1}
#e-id .slbl{flex-shrink:0}
.id-inp{flex:1;min-width:0;border:none;background:none;font:500 .9375rem/1.3 var(--font);color:var(--t1);text-align:right;padding:8px 0;outline:none}
.id-inp::placeholder{color:var(--t4)}
#e-tools .seg:disabled{opacity:.35;cursor:default}
#e-tools .seg-row:last-child{border-bottom:none}
.mg-card #e-view{border-bottom:1px solid var(--mt-line)}

/* -- Grid -- */
.mg-card{contain:content}
.mg-scroll{overflow:auto;overscroll-behavior:contain;max-height:min(560px,calc(100dvh - 300px))}
@media(min-width:768px){.mg-scroll{max-height:min(720px,calc(100dvh - 260px))}}
.mg{display:grid;grid-template-columns:var(--tw) repeat(var(--cols),minmax(var(--cw),1fr));grid-template-rows:44px;grid-auto-rows:var(--rh);--tw:48px;--rh:26px;--cw:clamp(42px,calc((100vw - 140px)/var(--cols)),96px);position:relative;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;min-width:min-content}
.mg.many{--cw:52px}
@media(min-width:768px){.mg{--cw:clamp(52px,calc((min(100vw,640px) - 160px)/var(--cols)),110px)}.mg.many{--cw:56px}}
.mg.g60{--rh:34px}
.mg.g30{--rh:26px}
.mg.g15{--rh:20px}
.mh{position:sticky;top:0;z-index:3;background:var(--card);border-bottom:1px solid var(--mt-line-strong);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;overflow:hidden}
.mh0{position:sticky;top:0;left:0;z-index:4;background:var(--card);border-bottom:1px solid var(--mt-line-strong)}
.mh b{font:600 .8125rem/1 var(--font);color:var(--t1)}
.mh span{font:400 .6875rem/1 var(--font);color:var(--t3)}
.mt-l{position:sticky;left:0;z-index:2;background:var(--card);border-right:1px solid var(--mt-line-strong);font:400 .6875rem/1 var(--font);color:var(--t3);display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 6px 0 0;font-variant-numeric:tabular-nums;white-space:nowrap}
.mt-l i{font-style:normal;font-size:.5625rem;color:var(--t4);vertical-align:super;margin-left:1px}
.mc{border-bottom:1px solid var(--mt-line);border-right:1px solid var(--mt-line);touch-action:pan-x pan-y;background-clip:padding-box}
.mc.hb{border-bottom-color:var(--mt-line-strong)}
.mc.oh{background-color:var(--mt-stripe)}
.mt-l.oh{background-image:linear-gradient(var(--mt-stripe),var(--mt-stripe))}
.mh.we{background:var(--bg2)}
.mc.h1{background-color:rgba(var(--mt-heat),.14)}
.mc.h2{background-color:rgba(var(--mt-heat),.23)}
.mc.h3{background-color:rgba(var(--mt-heat),.33)}
.mc.h4{background-color:rgba(var(--mt-heat),.42)}
.mc.h5{background-color:rgba(var(--mt-heat),.52)}
.mc.h6{background-color:rgba(var(--mt-heat),.61)}
.mc.h7{background-color:rgba(var(--mt-heat),.71)}
.mc.h8{background-color:rgba(var(--mt-heat),.8)}
.mc.me-a{background-image:linear-gradient(var(--mt-av-f),var(--mt-av-f));box-shadow:inset 0 0 0 2px var(--mt-av)}
.mc.me-b{background-image:linear-gradient(var(--mt-bs-w),var(--mt-bs-w))}
.mc.pv{outline:2px dashed var(--mt-av);outline-offset:-2px;z-index:1}
.mc.pv.pv-b{outline-color:var(--mt-bs)}
.mc.win{box-shadow:inset 0 0 0 2px var(--mt-win);background-image:linear-gradient(var(--mt-win-f),var(--mt-win-f))}
.mc.kc{outline:2px solid var(--mt-kc);outline-offset:-2px;z-index:1}
.mc.fl{animation:mcfl .6s ease}
@keyframes mcfl{0%,100%{filter:none}40%{filter:brightness(.8)}}
.picking .mc{cursor:pointer}
body.pickmode .dim{opacity:.35;pointer-events:none}

/* -- Pick confirm bar -- */
.pick-bar{position:sticky;top:8px;z-index:5;display:none;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border-radius:16px;box-shadow:var(--shadow2);padding:10px 10px 10px 16px;margin-bottom:14px}
.pick-bar.on{display:flex;animation:fi .2s ease}
.pick-lbl{font:500 .875rem/1.3 var(--font);color:var(--t1);min-width:0}
.pick-btns{display:flex;gap:6px;flex-shrink:0}
.pick-btns button{border:none;border-radius:50px;padding:9px 14px;font:500 .8125rem/1 var(--font);cursor:pointer}
.pick-ok{background:var(--mt-win);color:#fff}
html[data-theme="dark"] .pick-ok{color:#0D1B2A}
html[data-theme="sepia"] .pick-ok{color:#F5EDDA}
.pick-no{background:var(--bg);color:var(--t2)}

/* -- Popover -- */
#dcm{position:fixed;z-index:40;display:none;background:var(--card);border:1px solid var(--bdr2);border-radius:var(--r);box-shadow:var(--shadow2);min-width:180px;max-height:50vh;overflow-y:auto;padding:4px 0}
#dcm.on{display:block}
#dcm .dcm-h{font:600 .6875rem/1 var(--font);color:var(--t4);text-transform:uppercase;letter-spacing:.04em;padding:9px 16px 5px}
#dcm button{display:block;width:100%;border:none;background:none;font:500 .875rem/1.3 var(--font);color:var(--t1);padding:9px 16px;cursor:pointer;text-align:left;transition:background .1s}
@media(hover:hover){#dcm button:hover{background:var(--bg2)}}
.mh[data-d]{cursor:pointer}
#pop{position:fixed;z-index:30;pointer-events:none;background:var(--card);border:1px solid var(--bdr2);border-radius:var(--r);box-shadow:var(--shadow2);padding:10px 12px;max-width:240px;opacity:0;transition:opacity .15s;--caret-x:50%}
#pop.on{opacity:1}
#pop::after{content:'';position:absolute;left:var(--caret-x);bottom:-5px;width:8px;height:8px;background:var(--card);border-right:1px solid var(--bdr2);border-bottom:1px solid var(--bdr2);transform:translateX(-50%) rotate(45deg)}
#pop.below::after{bottom:auto;top:-5px;transform:translateX(-50%) rotate(225deg)}
#pop.side::after{display:none}
.pop-h{font:600 .75rem/1.2 var(--font);color:var(--t1);margin-bottom:6px;white-space:nowrap}
.pop-sec{font:600 .625rem/1 var(--font);text-transform:uppercase;letter-spacing:.05em;margin:6px 0 3px}
.pop-sec.av{color:var(--mt-av-seg-c)}
.pop-sec.bs{color:var(--mt-bs-seg-c)}
.pop-list{max-height:40vh;overflow-y:auto}
.pop-r{font:400 .75rem/1.5 var(--font);color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:216px}
.pop-r b{font-weight:500;color:var(--t1)}

/* -- Best times -- */
.bt-badge{margin-left:auto;flex-shrink:0;font:600 .6875rem/1 var(--font);color:var(--mt-win);background:var(--mt-win-f);border-radius:50px;padding:5px 10px}

/* -- Participants -- */
.pp-row{display:flex;gap:8px;flex-wrap:wrap;padding:14px 20px}
.pp-row .chip{cursor:pointer;max-width:16ch;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s,background .15s}
.pp-row .chip.me{cursor:default;background:var(--mt-win-f);color:var(--mt-win);border-color:var(--mt-win)}
.pp-row .chip.off{opacity:.35}

/* -- Merge conflicts -- */
.cf-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 20px;border-bottom:1px solid var(--bdr2)}
.cf-row:last-child{border-bottom:none}
.cf-name{font:500 .875rem/1.3 var(--font);color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cf-seg{display:flex;gap:4px;flex-shrink:0}
.cf-seg .chip.active{background:var(--mt-win);border-color:var(--mt-win)}

/* -- QR modal -- */

/* -- Collision / notices -- */
.nb{display:none;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:10px 10px 10px 16px;margin-bottom:14px}
.nb.on{display:flex;animation:fi .2s ease}
.nb span{font:500 .8125rem/1.4 var(--font);color:var(--t2);min-width:0}
.nb .pick-btns button{white-space:nowrap}

/* -- Error / noscript card -- */
.err-card{padding:26px 24px;text-align:center}
.err-card svg{width:34px;height:34px;color:var(--t4);margin:0 auto 12px;display:block}
.err-t{font:700 1.0625rem/1.3 var(--font);color:var(--t1)}
.err-s{font:400 .875rem/1.5 var(--font);color:var(--t3);margin-top:6px}

.sec-t{display:flex;align-items:center;justify-content:space-between;font:600 .8125rem/1 var(--font);color:var(--t3);padding:2px 20px 10px;text-transform:uppercase;letter-spacing:.05em}
.sec-x{border:none;background:none;font:600 .6875rem/1 var(--font);color:var(--t4);cursor:pointer;text-transform:uppercase;letter-spacing:.05em;padding:2px 0;transition:color .15s}
@media(hover:hover){.sec-x:hover{color:var(--t2)}}
.card>.sec-t:first-child{padding-top:16px}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<main class="w">

<section id="v-create" class="view">
  <div class="inp"><input id="c-title" type="text" placeholder="Event Name" maxlength="80" autocomplete="off" spellcheck="false" aria-label="Event Name"></div>
  <div class="card"><div class="seg-row c2">
    <button type="button" class="seg active" id="c-md" data-cm="0">Specific Dates</button>
    <button type="button" class="seg" id="c-mw" data-cm="1">Days Of Week</button>
  </div></div>
  <div class="card" id="c-cal-card"><div class="cal">
    <div class="cal-head">
      <button type="button" class="cal-nav" id="c-prev" aria-label="Previous Month"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
      <span class="cal-ttl" id="c-mon"></span>
      <button type="button" class="cal-nav" id="c-next" aria-label="Next Month"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
    </div>
    <div class="cal-grid" id="c-cal"></div>
  </div></div>
  <div class="card" id="c-dow-card" style="display:none"><div class="dow-row" id="c-dow"></div></div>
  <div class="card">
    <div class="srow">
      <label class="slbl"><svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span id="c-st">No Earlier Than: 9 AM</span></label>
      <div class="stepper">
        <button type="button" class="step-btn" id="c-st-dn" aria-label="Earlier"><svg aria-hidden="true" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button type="button" class="step-btn" id="c-st-up" aria-label="Later"><svg aria-hidden="true" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
    </div>
    <div class="srow">
      <label class="slbl"><svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span id="c-en">No Later Than: 6 PM</span></label>
      <div class="stepper">
        <button type="button" class="step-btn" id="c-en-dn" aria-label="Earlier"><svg aria-hidden="true" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button type="button" class="step-btn" id="c-en-up" aria-label="Later"><svg aria-hidden="true" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
    </div>
  </div>
  <div class="card"><div class="seg-row">
    <button type="button" class="seg" data-g="15">15m</button>
    <button type="button" class="seg active" data-g="30">30m</button>
    <button type="button" class="seg" data-g="60">1h</button>
  </div></div>
  <div class="tz-wrap">
    <div class="inp"><input id="c-tz" type="text" placeholder="Timezone" autocomplete="off" spellcheck="false" aria-label="Search Timezone" aria-expanded="false" aria-haspopup="listbox"></div>
    <div class="tz-drop" id="c-tz-drop" role="listbox" aria-label="Timezone Results"></div>
  </div>

    if(st===PEND){const a=anchor;stop();o.onTap(a)}
    else if(st===PAINT){
      const list=o.rect(anchor,cur<0?anchor:cur),ad=add;
      stop();
      o.onCommit(list,ad);
    }else stop();
  });
  sc.addEventListener('pointercancel',e=>{if(e.pointerId===pid)stop()});
  /* the one non-passive listener: block native pan only while painting */
  sc.addEventListener('touchmove',e=>{if(st===PAINT)e.preventDefault()},{passive:false});
  document.addEventListener('visibilitychange',()=>{if(document.hidden)stop()});
  return{active:()=>st!==IDLE,abort:stop};
}

/* -- popover -- */
let popT=0,popHideT=0;
function hidePop(){clearTimeout(popT);clearTimeout(popHideT);$('pop').classList.remove('on')}
function showPop(i,sticky){
  if(!ev||ev.parts.length<2||picking)return;
  const pop=$('pop');
  const d=Math.floor(i/S),s=i%S;
  const col=gridP.cols[d];
  const a=gridP.uniform?col.labelMin[s]:ev.startUnit*15+s*ev.gran;
  const hid=hiddenIdx();
  const w=model.whoAt(ev,i);
  w.av=w.av.filter(pi=>!hid.has(pi));
  w.un=w.un.filter(pi=>!hid.has(pi));
  const their=p=>{
    try{return fmtMin(tzmod.wallParts(p.tz||ev.tz,tzmod.slotUtc(ev,d,s,Date.now())).min)}
    catch(_){return fmtMin(ev.startUnit*15+s*ev.gran)}
  };
  const row=pi=>{
    const p=ev.parts[pi];
    return'<div class="pop-r"><b>'+esc(p.name||'Guest')+'</b> · '+their(p)+'</div>';
  };
  let html='<div class="pop-h">'+DOWS[col.dow]+(gridP.noDates?'':' '+col.d)+' · '+fmtRange(a,a+ev.gran)+'</div><div class="pop-list">';
  if(w.av.length)html+='<div class="pop-sec av">Available ('+w.av.length+')</div>'+w.av.map(row).join('');
  if(w.un.length)html+='<div class="pop-sec bs">Busy ('+w.un.length+')</div>'+w.un.map(row).join('');
  pop.innerHTML=html+'</div>';
  const r=cellEls[i].getBoundingClientRect();
  pop.classList.add('on');
  pop.classList.remove('below','side');
  const pw=pop.offsetWidth,ph=pop.offsetHeight;
  let left=Math.min(Math.max(r.left+r.width/2-pw/2,8),innerWidth-pw-8);
  let top=r.top-ph-9;
  if(top<8){
    top=r.bottom+9;
    pop.classList.add('below');
    if(top+ph>innerHeight-8){
      pop.classList.remove('below');pop.classList.add('side');
      top=Math.min(Math.max(r.top,8),innerHeight-ph-8);
      left=r.right+9<=innerWidth-pw-8?r.right+9:r.left-pw-9;
    }
  }
  pop.style.left=left+'px';
  pop.style.top=top+'px';
  pop.style.setProperty('--caret-x',Math.min(Math.max(r.left+r.width/2-left,12),pw-12)+'px');
  clearTimeout(popHideT);
  if(!sticky)popHideT=setTimeout(hidePop,2500);
}
$('e-mg').addEventListener('mousemove',e=>{
  if(!matchMedia('(hover:hover)').matches||gridDrag.active())return;
  clearTimeout(popT);
  const i=cellAt(e.clientX,e.clientY);
  if(i<0){hidePop();return}
  popT=setTimeout(()=>showPop(i,true),120);
});

/* -- merge -- */
function extractCode(text){
  const t=String(text||'');
  const m=t.match(/#([01][A-Za-z0-9_-]{8,})/)||t.trim().match(/^([01][A-Za-z0-9_-]{8,})$/);
  return m?m[1]:null;
}
async function mergeFrom(text){
  const code=extractCode(text);
  if(!code){_base.notify('No Meet Link Found',false);return}
  let theirs;
  try{theirs=await codec.decodeEvent(code)}catch(_){_base.notify('That Link Is Damaged',false);return}
  const res=model.mergeEvents(ev,theirs);
  if(res.error){
    _base.notify({mode:'Different Event Type',gran:'Different Granularity',window:'Different Time Window',tz:'Different Timezone',days:'No Matching Dates'}[res.error],false);
    return;
  }
  ring.push({ev:structuredClone(ev),me:meIdx});
  ev=res.merged;
  meIdx=findPart(myName());
  if(res.conflicts.length){
    confState=res.conflicts.map(c=>({...c,pick:'t'}));
    _base.notify(res.conflicts.length+(res.conflicts.length===1?' Conflict, Kept Theirs':' Conflicts, Kept Theirs'),'warn');
  }else{
    confState=null;
    _base.notify(res.partial?'Only Matching Dates Merged':'Merged',res.partial?'warn':true);
  }
  scheduleSync();
  renderEvent();
}
$('e-merge').addEventListener('click',()=>{
  if(navigator.clipboard&&navigator.clipboard.readText)
    navigator.clipboard.readText().then(mergeFrom,()=>_base.notify('Clipboard Access Denied','warn'));
  else _base.notify('Clipboard Access Denied','warn');
});

document.addEventListener('paste',e=>{
  const tag=(document.activeElement||{}).tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  const t=e.clipboardData&&e.clipboardData.getData('text');
  const code=extractCode(t);
  if(!code)return;
  e.preventDefault();
  if(ev)mergeFrom(t);
  else location.hash='#'+code;
});

/* -- keyboard -- */
function kcMove(dd,ds,sweep,e){
  if(!ev)return;
  e.preventDefault();
  if(kcIdx<0){
    const r=geo?geo.rect:$('e-mgs').getBoundingClientRect();
    kcIdx=cellAt(r.left+(r.right-r.left)/2,r.top+(r.bottom-r.top)/2);
    if(kcIdx<0)kcIdx=0;
  }else{
    const d=Math.max(0,Math.min(D-1,Math.floor(kcIdx/S)+dd));
    const s=Math.max(0,Math.min(S-1,kcIdx%S+ds));
    kcIdx=d*S+s;
  }
  if(sweep)paintCells([kcIdx],tool==='r'?0:1);
  else updateCells();
  cellEls[kcIdx].scrollIntoView({block:'nearest',inline:'nearest'});
}
_base.onKey({
  'n':e=>{if(!ev)return;e.preventDefault();$('e-name').focus();$('e-name').select()},
  'c':()=>{if(ev)copyLink($('e-copy'))},
  'v':()=>{if(ev)$('e-merge').click()},
  'p':()=>{if(ev)$('e-merge').click()},
  'q':()=>{if(ev)$('e-qr').click()},
  'f':()=>{if(ev&&!picking)startPick()},
  ' ':e=>{if(!ev||kcIdx<0)return;e.preventDefault();tapToggle(kcIdx)},
  'Enter':()=>{if(ev&&picking&&pickSel)confirmPick()},
  'Escape':()=>{
    if(!ev)return;
    if($('dcm').classList.contains('on'))hideDcm();
    else if(picking)exitPick();
    else if(kcIdx>=0){kcIdx=-1;updateCells()}
    else hidePop();
  },
  'ArrowUp':e=>kcMove(0,-1,e.shiftKey,e),
  'ArrowDown':e=>kcMove(0,1,e.shiftKey,e),
  'ArrowLeft':e=>kcMove(-1,0,e.shiftKey,e),
  'ArrowRight':e=>kcMove(1,0,e.shiftKey,e),
  ctrl:{
    'z':e=>{if(!ev)return;e.preventDefault();undo()}
  }
});
/* redo: onKey's ctrl branch excludes shift, so one raw listener */
document.addEventListener('keydown',e=>{
  if(!(e.metaKey||e.ctrlKey)||e.altKey||!ev)return;
  const tag=(document.activeElement||e.target).tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  const k=e.key.toLowerCase();
  if((k==='z'&&e.shiftKey)||k==='y'){e.preventDefault();redo()}
});

/* -- recents -- */
function pushRecent(code){
  if(!ev)return;
  const fp=codec.configFingerprint(ev);
  let rec=_base.load('meet:recents',[]);
  rec=rec.filter(r=>r.fp!==fp);
  rec.unshift({code,title:ev.title||'Meet',mode:ev.mode,fp,ts:Date.now()});
  if(rec.length>20)rec.length=20;
  _base.save('meet:recents',rec);
}
function renderRecents(){
  const card=$('c-rec-card');
  const rec=_base.load('meet:recents',[]);
  if(!rec.length){card.style.display='none';return}
  card.style.display='';
  const wrap=$('c-rec');
  wrap.replaceChildren();
  for(const r of rec.slice(0,8)){
    const b=document.createElement('button');
    b.type='button';
    const d=new Date(r.ts);
    b.innerHTML='<svg aria-hidden="true" viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>';
    const span=document.createElement('span');
    span.textContent=r.title+' · '+d.getDate()+' '+MONS[d.getMonth()];
    b.appendChild(span);
    b.addEventListener('click',()=>{location.hash='#'+r.code});
    wrap.appendChild(b);
  }
}
const recClear=_base.twoPress($('c-rec-clear'),{
  label:$('c-rec-clear'),
  text:'Clear',
  guard:()=>_base.load('meet:recents',[]).length>0,
  onConfirm:()=>{_base.save('meet:recents',[]);renderRecents()}
});
$('c-rec-clear').addEventListener('click',()=>recClear.press());

/* -- create view -- */
const cs={mode:0,dates:new Set(),dow:0,start:36,end:72,gran:30,tz:viewerTz,month:0};
let calEls=new Map();
function calRender(){
  const base=new Date();
  base.setDate(1);
  base.setMonth(base.getMonth()+cs.month);
  $('c-mon').textContent=MONS[base.getMonth()]+' '+base.getFullYear();
  $('c-prev').disabled=cs.month===0;
  $('c-next').disabled=cs.month>=12;
  const first=(new Date(base.getFullYear(),base.getMonth(),1).getDay()+6)%7;
  const dim=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  const today=todayNum();
  let html='';
  DOWS.forEach((d,i)=>{html+='<div class="cal-dow'+(i>=5?' we':'')+'">'+d[0]+'</div>'});
  for(let i=0;i<first;i++)html+='<div class="cal-d out"></div>';
  for(let d=1;d<=dim;d++){
    const dn=tzmod.ymdToDay(base.getFullYear(),base.getMonth()+1,d);
    let cls='cal-d';
    if(dn<today)cls+=' off';
    if(dn===today)cls+=' today';
    if(cs.dates.has(dn)){
      cls+=' sel';
      /* Consecutive selected days connect into a band within a week row */
      const col=(first+d-1)%7;
      const p=cs.dates.has(dn-1)&&col>0&&d>1,n=cs.dates.has(dn+1)&&col<6&&d<dim;
      if(p&&n)cls+=' sel-m';else if(n)cls+=' sel-s';else if(p)cls+=' sel-e';
    }
    html+='<div class="'+cls+'" data-dn="'+dn+'">'+d+'</div>';
  }
  $('c-cal').innerHTML=html;
  calEls=new Map();
  $('c-cal').querySelectorAll('.cal-d[data-dn]').forEach(el=>calEls.set(+el.dataset.dn,el));
}
$('c-prev').addEventListener('click',()=>{if(cs.month>0){cs.month--;calRender()}});
$('c-next').addEventListener('click',()=>{if(cs.month<12){cs.month++;calRender()}});
function calToggle(list,add){
  const today=todayNum();
  let refused=false;
  for(const dn of list){
    if(!calEls.has(dn)||dn<today)continue;
    if(add){
      if(cs.dates.size>=14&&!cs.dates.has(dn)){refused=true;continue}
      cs.dates.add(dn);
    }else cs.dates.delete(dn);
  }
  if(refused)_base.notify('14 Days Maximum','warn');
  calRender();
}
let calPv=new Set();
dragPaint($('c-cal'),{
  enabled:()=>cs.mode===0,
  cellAt:(x,y)=>{
    const el=document.elementFromPoint(x,y);
    const c=el&&el.closest('.cal-d');
    return c&&c.dataset.dn?+c.dataset.dn:-1;
  },
  isOn:dn=>cs.dates.has(dn),
  rect:(a,b)=>{
    const out=[];
    for(let d=Math.min(a,b);d<=Math.max(a,b);d++)out.push(d);
    return out;
  },
  onPreview:(list,add)=>{
    for(const dn of calPv){const el=calEls.get(dn);if(el)el.classList.remove('pv')}
    calPv=new Set();
    if(!list)return;
    for(const dn of list){
      const el=calEls.get(dn);
      if(el&&!el.classList.contains('off')){el.classList.add('pv');calPv.add(dn)}
    }
  },
  onTap:dn=>calToggle([dn],!cs.dates.has(dn)),
  onCommit:(list,add)=>calToggle(list,add)
});
document.querySelectorAll('[data-cm]').forEach(b=>b.addEventListener('click',()=>{
  cs.mode=+b.dataset.cm;
  document.querySelectorAll('[data-cm]').forEach(x=>x.classList.toggle('active',x===b));
  $('c-cal-card').style.display=cs.mode?'none':'';
  $('c-dow-card').style.display=cs.mode?'':'none';
}));
function dowRender(){
  const row=$('c-dow');
  row.replaceChildren();
  DOWS.forEach((d,b)=>{
    const c=document.createElement('button');
    c.type='button';
    c.className='chip'+(cs.dow&(1<<b)?' active':'');
    c.textContent=d;
    c.addEventListener('click',()=>{cs.dow^=1<<b;dowRender()});
    row.appendChild(c);
  });
}
function stpRender(){
  $('c-st').textContent='No Earlier Than: '+fmtMin(cs.start*15);
  $('c-en').textContent='No Later Than: '+(cs.end===96?'Midnight':fmtMin(cs.end*15));
  $('c-st-dn').disabled=cs.start<=0;
  $('c-st-up').disabled=false;
  $('c-en-dn').disabled=false;
  $('c-en-up').disabled=cs.end>=96;
}
function stp(which,delta){
  if(which==='st'){
    const v=cs.start+delta;
    if(v<0)return;
    if(v>cs.end-4){_base.notify('Overnight Windows Need Both Days Selected Instead','warn');return}
    cs.start=v;
  }else{
    const v=cs.end+delta;
    if(v>96)return;
    if(v<cs.start+4){_base.notify('Overnight Windows Need Both Days Selected Instead','warn');return}
    cs.end=v;
  }
  stpRender();
}
$('c-st-dn').addEventListener('click',()=>stp('st',-2));
$('c-st-up').addEventListener('click',()=>stp('st',2));
$('c-en-dn').addEventListener('click',()=>stp('en',-2));
$('c-en-up').addEventListener('click',()=>stp('en',2));
document.querySelectorAll('[data-g]').forEach(b=>b.addEventListener('click',()=>{
  cs.gran=+b.dataset.g;
  document.querySelectorAll('[data-g]').forEach(x=>x.classList.toggle('active',x===b));
}));

/* -- timezone picker -- */
const TZ_LIST=(()=>{
  let l=[];
  try{l=Intl.supportedValuesOf('timeZone').slice()}catch(_){}
  if(!l.length)l=[viewerTz];
  if(l.indexOf('UTC')<0)l.push('UTC');
  return l.map(id=>({
    id,
    city:tzCity(id),
    q:_search.norm(id.toLowerCase().replace(/[/_]/g,' ')),
    tl:_search.norm(tzCity(id).toLowerCase())
  }));
})();
function tzSearch(query){
  const q=_search.norm(query.trim().toLowerCase());
  if(!q)return[];
  const words=q.split(/\s+/).filter(Boolean);
  const scored=[];
  for(const z of TZ_LIST){
    let tot=0,ok=true;
    for(const w of words){
      const s=Math.max(_search.scoreWord(w,z.q),_search.scoreWord(w,z.tl)*1.5);
      if(s<=0){ok=false;break}
      tot+=s;
    }
    if(ok)scored.push({z,s:tot});
  }
  scored.sort((a,b)=>b.s-a.s||a.z.city.localeCompare(b.z.city));
  return scored.slice(0,8).map(x=>x.z);
}
let tzResults=[],tzIdx=-1,tzT=0;
function tzLabel(id){
  let off='';
  try{off=' ('+fmtOff(tzmod.tzOffsetMin(id,Date.now()))+')'}catch(_){}
  return tzCity(id)+off;
}
function tzRenderDrop(){
  const drop=$('c-tz-drop');
  drop.scrollTop=0;
  if(!tzResults.length){
    drop.innerHTML='<div class="tz-empty">No Timezones Found</div>';
    drop.classList.add('open');
    return;
  }
  let html='';
  tzResults.forEach((z,i)=>{
    let meta='';
    try{meta=fmtOff(tzmod.tzOffsetMin(z.id,Date.now()))}catch(_){}
    html+='<div class="tz-opt'+(i===tzIdx?' tz-active':'')+'" role="option" data-i="'+i+'">'+
      '<span class="tz-city">'+esc(z.city)+'</span><span class="tz-meta">'+esc(z.id)+' · '+meta+'</span></div>';
  });
  drop.innerHTML=html;
  drop.classList.add('open');
}
function tzClose(){
  $('c-tz-drop').classList.remove('open');
  $('c-tz-drop').innerHTML='';
  $('c-tz').setAttribute('aria-expanded','false');
  tzResults=[];tzIdx=-1;
}
function tzSelect(i){
  if(i<0||i>=tzResults.length)return;
  cs.tz=tzResults[i].id;
  $('c-tz').value='';
  $('c-tz').placeholder=tzLabel(cs.tz);
  tzClose();
}
$('c-tz').addEventListener('input',()=>{
  clearTimeout(tzT);
  tzT=setTimeout(()=>{
    const v=$('c-tz').value.trim();
    if(!v){tzClose();return}
    tzResults=tzSearch(v);tzIdx=-1;
    $('c-tz').setAttribute('aria-expanded','true');
    tzRenderDrop();
  },120);
});
$('c-tz').addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();tzIdx=Math.min(tzIdx+1,tzResults.length-1);tzRenderDrop()}
  else if(e.key==='ArrowUp'){e.preventDefault();tzIdx=Math.max(tzIdx-1,0);tzRenderDrop()}
  else if(e.key==='Enter'){e.preventDefault();tzSelect(tzIdx>=0?tzIdx:0)}
  else if(e.key==='Escape')tzClose();
});
$('c-tz-drop').addEventListener('click',e=>{
  const opt=e.target.closest('.tz-opt');
  if(opt)tzSelect(+opt.dataset.i);
});
document.addEventListener('click',e=>{if(!e.target.closest('.tz-wrap'))tzClose()});

/* -- create -- */
$('c-go').addEventListener('click',async()=>{
  if(cs.mode===0&&!cs.dates.size){_base.notify('Pick At Least One Date',false);return}
  if(cs.mode===1&&!cs.dow){_base.notify('Pick At Least One Day',false);return}
  const nev={
    gran:cs.gran,mode:cs.mode,startUnit:cs.start,endUnit:cs.end,tz:cs.tz,
    title:codec.byteTrim($('c-title').value.trim(),80),
    days:[...cs.dates].sort((a,b)=>a-b),dowMask:cs.dow,parts:[],final:null
  };
  const code=await codec.encodeEvent(nev);
  history.pushState(null,'','#'+code);
  openEvent(nev,code);
});
function renderCreate(){
  calRender();
  dowRender();
  stpRender();
  renderRecents();
  $('c-tz').placeholder=tzLabel(cs.tz);
}

/* -- router -- */
function show(view){
  ['v-create','v-event','v-error'].forEach(id=>$(id).classList.toggle('active',id==='v-'+view));
}
function openEvent(e,code){
  encTok++;
  clearTimeout(syncT);
  ev=e;lastCode=code;
  ring.clear();
  hiddenParts.clear();
  confState=null;pickSel=null;picking=false;kcIdx=-1;tzBroken=false;guestWarned=false;gridKey='';
  const saved=_base.load('meet:name','');
  $('e-name').value=saved;
  meIdx=saved?findPart(saved):-1;
  $('e-clash').classList.remove('on');
  pushRecent(code);
  show('event');
  renderEvent();
}
const ERRS={
  charset:['This Link Is Damaged','Part of the link is missing or was mangled in transit. Ask for it to be sent again.'],
  truncated:['This Link Is Damaged','The link arrived incomplete. Ask for it to be sent again.'],
  crc:['This Link Is Damaged','The link failed its integrity check. Ask for it to be sent again.'],
  bounds:['This Link Is Damaged','The link contains impossible event data. Ask for it to be sent again.'],
  inflate:['This Link Is Damaged','The event data inside the link cannot be unpacked. Ask for it to be sent again.'],
  version:['Link From A Newer Meet','This link uses a newer format than this page understands. Reload and try again.'],
  unsupported:['Browser Too Old To Open This Link','Opening this link needs modern decompression support. Update your browser and try again.']
};
async function route(){
  const code=location.hash.slice(1);
  if(!code){
    encTok++;
    clearTimeout(syncT);
    ev=null;lastCode=null;
    show('create');
    renderCreate();
    return;
  }
  try{
    openEvent(await codec.decodeEvent(code),code);
  }catch(err){
    ev=null;
    const[t,s]=ERRS[err.reason]||ERRS.bounds;
    $('x-t').textContent=t;
    $('x-s').textContent=s;
    show('error');
  }
}
window.addEventListener('hashchange',()=>{
  if(location.hash.slice(1)===(lastCode||''))return;
  route();
});
$('x-new').addEventListener('click',()=>{
  history.pushState(null,'',location.pathname);
  route();
});
let rzT=0;
window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(()=>{if(ev&&cellEls)measureGrid()},150)});
route();
if('serviceWorker'in navigator&&location.protocol!=='file:')
  addEventListener('load',()=>navigator.serviceWorker.register('/meet/sw.js').catch(()=>{}));
})();
</script>
