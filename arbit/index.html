<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" type="image/png" href="/ds-favicon.png">
<title>Arbit</title>
<style>
:root{
  --bg:#FAFAFA;--bg2:#F5F5F5;--card:#FFF;
  --t1:#1A1A1A;--t2:#6B6B6B;--t3:#9A9A9A;--t4:#C7C7CC;
  --bdr:#E8E8E8;--bdr2:#F0F0F0;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  --num-bg:#48484A;
  --tab-bg:rgba(245,245,245,.92);--tab-blur:rgba(255,255,255,.35);--tab-border:rgba(255,255,255,.45);--tab-shadow:0 2px 6px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.06);--tab-active:rgba(50,50,52,.85);--tab-active-c:#fff
}
html[data-theme="dark"]{
  --bg:#1C1C1E;--bg2:#2C2C2E;--card:#2C2C2E;
  --t1:#D4D4D4;--t2:#8A8A8A;--t3:#6E6E6E;--t4:#444;
  --bdr:#3A3A3C;--bdr2:#2C2C2E;--num-bg:#48484A;
  --shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15);
  --tab-bg:rgba(38,38,38,.92);--tab-blur:rgba(30,30,30,.55);--tab-border:rgba(255,255,255,.06);--tab-shadow:0 2px 6px rgba(0,0,0,.2),0 8px 20px rgba(0,0,0,.3);--tab-active:rgba(255,255,255,.12);--tab-active-c:#E4E4E4
}
html[data-theme="sepia"]{
  --bg:#F5EDDA;--bg2:#EDE5D0;--card:#FAF4E6;
  --t1:#5B4636;--t2:#8B7355;--t3:#AB9B85;--t4:#C8B99E;
  --bdr:#DDD4C0;--bdr2:#E8E0CE;--num-bg:#6B5744;
  --shadow:0 1px 3px rgba(91,70,54,.06),0 4px 12px rgba(91,70,54,.06);
  --tab-bg:rgba(240,232,216,.92);--tab-blur:rgba(245,237,218,.55);--tab-border:rgba(255,255,255,.35);--tab-shadow:0 2px 6px rgba(91,70,54,.06),0 8px 20px rgba(91,70,54,.08);--tab-active:rgba(91,70,54,.8);--tab-active-c:#F5EDDA
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:var(--bg);color:var(--t1);transition:background .3s,color .3s;min-height:100vh;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.w{max-width:440px;padding:20px 20px 100px;width:100%}
.res{background:var(--num-bg);border-radius:20px;box-shadow:var(--shadow);padding:24px;margin-bottom:14px;min-height:72px;display:flex;align-items:center;justify-content:center;transition:background .3s}
#r{font:600 clamp(1.4rem,8vw,2.25rem)/1.2 var(--font);text-align:center;color:#fff;word-break:break-word;transition:font-size .15s}
.mode-row{display:flex;align-items:center;padding:10px 14px 10px 20px}
.mode-row svg{width:18px;height:18px;color:var(--t4);flex-shrink:0}
.mode-row span{flex:1;font:500 .9375rem/1 var(--font);color:var(--t2);margin-left:12px}
.toggle-pill{padding:8px 16px;border-radius:50px;border:1.5px solid var(--bdr);font:500 .75rem/1 var(--font);color:var(--t3);background:none;cursor:pointer;flex-shrink:0;min-width:58px;text-align:center;transition:.2s ease}
.toggle-pill:active{opacity:.7}
.toggle-pill.toggled{background:#DCFCE7;color:#34D399;border-color:#A7F3D0;animation:pop .35s ease}
.toggle-pill.toggled svg{width:12px;height:12px;display:block;margin:0 auto}
.toggle-pill.toggled polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
.inp{display:flex;gap:8px;margin-bottom:14px}
.inp input{flex:1;padding:12px 20px;border:1px solid var(--bdr2);border-radius:50px;font:400 .9375rem/1 var(--font);color:var(--t1);background:var(--card);box-shadow:var(--shadow);outline:none;transition:border-color .15s}
.inp input:focus{border-color:var(--t4)}
.inp button{width:44px;height:44px;border-radius:50%;border:none;background:var(--card);box-shadow:var(--shadow);cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s}
.links{background:var(--card);border-radius:20px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.links>button{display:flex;align-items:center;gap:12px;width:100%;padding:14px 20px;font:500 .9375rem/1 var(--font);color:var(--t2);background:none;border:none;border-bottom:1px solid var(--bdr2);cursor:pointer;text-align:left;transition:background .25s,color .15s}
.links>button:last-child,.links>:last-child{border-bottom:none}
.links>button svg{width:18px;height:18px;color:var(--t4);flex-shrink:0}
.links>button[disabled]{opacity:.35;cursor:not-allowed}
.ok{background:#DCFCE7!important;color:#34D399!important}
.ok svg,.ok span{color:#34D399!important}
.ok polyline{stroke-dasharray:24;stroke-dashoffset:24;animation:draw .35s ease .08s forwards}
.rs-fb{background:#FEF9C3!important;color:#CA8A04!important}
.rs-fb svg{color:#CA8A04!important;animation:spin .4s ease}
.rs-fb span{color:#CA8A04}
.items{background:var(--card);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
.item{display:flex;align-items:center;padding:12px 16px 12px 20px;border-bottom:1px solid var(--bdr2);font:400 .9375rem/1.3 var(--font);color:var(--t2);word-break:break-word;transition:background .3s}
.item:last-child{border-bottom:none}
.item span{flex:1}
.item .del{width:28px;height:28px;border-radius:50%;border:none;background:none;cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s,background .15s}
.item.hi{background:var(--bg2)}
.drop-overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(250,250,250,.95);font:600 1.25rem/1 var(--font);color:var(--t3);opacity:0;pointer-events:none;transition:opacity .2s}
.drop-overlay.active{opacity:1;pointer-events:auto}
html[data-theme="dark"] .drop-overlay{background:rgba(28,28,30,.95)}
html[data-theme="sepia"] .drop-overlay{background:rgba(245,237,218,.95)}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:10;padding:0 20px calc(20px + env(safe-area-inset-bottom,0px));display:flex;gap:8px;align-items:center}
.tabs{display:flex;background:var(--tab-bg);border-radius:50px;padding:5px;box-shadow:var(--tab-shadow);border:1px solid var(--tab-border);max-width:calc(100vw - 40px)}
@supports(backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px)){
  .tabs{background:var(--tab-blur);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6)}
}
.tabs a{padding:12px clamp(10px,3vw,22px);border-radius:50px;font:500 clamp(.75rem,2.2vw,.875rem)/1 var(--font);color:var(--t3);transition:color .15s,background .15s,box-shadow .15s;white-space:nowrap;text-decoration:none}
.tabs a.active{background:var(--tab-active);color:var(--tab-active-c);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tabs a:active{opacity:.7}
.theme-toggle{display:flex;align-items:center;justify-content:center;padding:12px;border:none;border-radius:50%;cursor:pointer;color:var(--t3);background:none;transition:color .15s}
.theme-toggle:active{opacity:.7}
.fi{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
:focus-visible{outline:2px solid #3B82F6;outline-offset:3px}
@media(hover:hover){
  .links>button:hover:not([disabled]){background:var(--bg2);color:var(--t1)}
  .inp button:hover{color:var(--t1)}
  .item .del:hover{color:var(--t2);background:var(--bg2)}
  .toggle-pill:hover{background:var(--bg2);color:var(--t2);border-color:var(--t4)}
  .tabs a:hover:not(.active){color:var(--t2)}
  .theme-toggle:hover{color:var(--t1)}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(max-width:480px){.tabs{max-width:calc(100vw - 28px)}}
</style>
</head>
<body>
<div class="w">
  <div class="res" aria-live="polite">
    <div id="r">-</div>
  </div>
  <div class="inp">
    <input id="inp" type="text" autocomplete="off" placeholder="Option 1">
    <button id="add-btn" aria-label="Add Item"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>
  <div class="links">
    <button id="pick-btn" disabled aria-label="Pick Random"><svg id="pi" width="18" height="18" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><path d="M4 20L21 3"/><polyline points="21 16 21 21 16 21"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg><svg id="pc" width="18" height="18" viewBox="0 0 24 24" style="display:none"><polyline points="4 12 9 17 20 6"/></svg><span id="pl">Pick Random</span></button>
    <div class="mode-row">
      <svg id="mi-keep" width="18" height="18" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><svg id="mi-rm" width="18" height="18" viewBox="0 0 24 24" style="display:none"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      <span id="ml">Keep Picked</span>
      <button id="mode-btn" class="toggle-pill" aria-label="Toggle Remove Picked">Toggle</button>
    </div>
  </div>
  <div class="links">
    <button id="copy-btn" aria-label="Copy Result"><svg id="cb-i" width="18" height="18" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><svg id="cb-ck" width="18" height="18" viewBox="0 0 24 24" style="display:none"><polyline points="4 12 9 17 20 6"/></svg><span id="cb-l">Copy</span></button>
    <button id="reset-btn" aria-label="Reset"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M21 2v6h-6M21 13a9 9 0 1 1-3-7.7L21 8"/></svg><span id="rl">Reset</span></button>
  </div>
  <div class="items" id="items" style="display:none"></div>
</div>
<div class="drop-overlay" id="drop-overlay">
  <svg width="48" height="48" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg>
  Drop Items Here
</div>
<nav>
<div class="tabs">
<a href="/">Home</a>
<a class="active">Arbit</a>
</div>
<div class="tabs"><button id="theme-btn" class="theme-toggle" aria-label="Toggle Theme"></button></div>
</nav>
<script>
var THEMES=['light','sepia','dark'],THEME_COLORS={light:'#FAFAFA',dark:'#1C1C1E',sepia:'#F5EDDA'};
var THEME_ICONS={
  sepia:'<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>',
  dark:'<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 3z"/></svg>',
  light:'<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
};
function curTheme(){return document.documentElement.getAttribute('data-theme')||'light'}
function setThemeIcon(next){document.getElementById('theme-btn').innerHTML=THEME_ICONS[next]}
function setTheme(t){
  if(t==='light')document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',t);
  document.querySelector('meta[name="theme-color"]').content=THEME_COLORS[t];
  setThemeIcon(THEMES[(THEMES.indexOf(t)+1)%THEMES.length]);
  try{localStorage.setItem('theme',t)}catch(_){}
}
(function(){var t;try{t=localStorage.getItem('theme')}catch(_){}setTheme(t&&THEMES.includes(t)?t:'light')})();
document.getElementById('theme-btn').addEventListener('click',function(){setTheme(THEMES[(THEMES.indexOf(curTheme())+1)%THEMES.length])});
document.addEventListener('visibilitychange',function(){if(document.hidden)return;var s=localStorage.getItem('theme')||'light';if(s!==curTheme())setTheme(s);var n=document.querySelector('nav');if(n){n.style.display='none';n.offsetHeight;n.style.display=''}});
function $(id){return document.getElementById(id)}
var items=[],mode=false,picked=null;
var pickTimer=null,resetTimer=null,copyTimer=null,hiTimer=null,modeTimer2=null;
function load(){try{var r=localStorage.getItem('arbit-items');if(r){var p=JSON.parse(r);if(Array.isArray(p))items=p}var m=localStorage.getItem('arbit-mode');if(m==='true')mode=true}catch(_){}}
function save(){try{localStorage.setItem('arbit-items',JSON.stringify(items));localStorage.setItem('arbit-mode',mode?'true':'false')}catch(_){}}
function render(){
  var c=$('items');
  c.textContent='';
  if(items.length===0){c.style.display='none'}
  else{
    c.style.display='';
    for(var i=0;i<items.length;i++){
      var row=document.createElement('div');row.className='item';row.setAttribute('data-idx',i);
      var s=document.createElement('span');s.textContent=items[i];
      var btn=document.createElement('button');btn.className='del';btn.setAttribute('aria-label','Remove');
      var xsvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      xsvg.setAttribute('width','14');xsvg.setAttribute('height','14');xsvg.setAttribute('viewBox','0 0 24 24');
      var p1=document.createElementNS('http://www.w3.org/2000/svg','path');p1.setAttribute('d','M18 6L6 18M6 6l12 12');
      xsvg.appendChild(p1);btn.appendChild(xsvg);
      btn.addEventListener('click',(function(idx){return function(){removeItem(idx)}})(i));
      row.appendChild(s);row.appendChild(btn);c.appendChild(row);
    }
  }
  $('pick-btn').disabled=items.length<2;
  $('inp').placeholder='Option '+(items.length+1);
}
function addItem(text){
  var t=text.trim();if(!t)return;
  var dup=items.indexOf(t);
  if(dup!==-1){
    var row=$('items').querySelector('[data-idx="'+dup+'"]');
    if(row){row.classList.add('hi');setTimeout(function(){row.classList.remove('hi')},300)}
    return;
  }
  items.push(t);save();render();
  var all=$('items').querySelectorAll('.item'),last=all[all.length-1];
  if(last)last.classList.add('fi');
}
function addBulk(text){var parts=text.split(/[,\n]/);for(var i=0;i<parts.length;i++){var t=parts[i].trim();if(t)addItem(t)}}
function removeItem(idx){items.splice(idx,1);save();render()}
function sizeResult(text){
  var el=$('r'),len=text.length;
  if(len>30)el.style.fontSize='clamp(.9rem,4vw,1.25rem)';
  else if(len>20)el.style.fontSize='clamp(1rem,5vw,1.5rem)';
  else if(len>12)el.style.fontSize='clamp(1.2rem,6vw,1.75rem)';
  else el.style.fontSize='';
}
function doPick(){
  if(items.length<2)return;
  var arr=new Uint32Array(1);crypto.getRandomValues(arr);
  var idx=arr[0]%items.length;picked=items[idx];
  var rEl=$('r');rEl.classList.remove('fi');rEl.offsetWidth;
  rEl.textContent=picked;sizeResult(picked);rEl.classList.add('fi');
  var row=$('items').querySelector('[data-idx="'+idx+'"]');
  if(hiTimer)clearTimeout(hiTimer);
  var allRows=$('items').querySelectorAll('.item');
  for(var i=0;i<allRows.length;i++)allRows[i].classList.remove('hi');
  if(row)row.classList.add('hi');
  hiTimer=setTimeout(function(){if(row&&row.parentNode)row.classList.remove('hi')},300);
  var pb=$('pick-btn'),pi=$('pi'),pc=$('pc'),pl=$('pl');
  if(pickTimer){clearTimeout(pickTimer);pb.classList.remove('ok');pi.style.display='';pc.style.display='none';pl.textContent='Pick Random'}
  pi.style.display='none';pc.style.display='';pl.textContent=picked;
  pb.classList.remove('ok');pb.offsetWidth;pb.classList.add('ok');
  pickTimer=setTimeout(function(){pb.classList.remove('ok');pi.style.display='';pc.style.display='none';pl.textContent='Pick Random'},800);
  if(mode){
    setTimeout(function(){
      var ci=items.indexOf(picked);
      if(ci!==-1){items.splice(ci,1);save();render()}
      if(items.length===0){$('r').textContent='-';sizeResult('-');picked=null}
    },350);
  }
}
function doReset(){
  items=[];mode=false;picked=null;$('r').textContent='-';sizeResult('-');save();render();updateModeUI();
  var rb=$('reset-btn'),rl=$('rl');
  if(resetTimer){clearTimeout(resetTimer);rb.classList.remove('rs-fb');rl.textContent='Reset'}
  rl.textContent='Done';rb.classList.remove('rs-fb');rb.offsetWidth;rb.classList.add('rs-fb');
  resetTimer=setTimeout(function(){rb.classList.remove('rs-fb');rl.textContent='Reset'},1500);
}
var modeTimer=null;
function mkCheck(){
  var s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');s.setAttribute('stroke','currentColor');
  s.setAttribute('stroke-width','2.5');s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
  var p=document.createElementNS('http://www.w3.org/2000/svg','polyline');p.setAttribute('points','4 12 9 17 20 6');
  s.appendChild(p);return s;
}
function toggleMode(){
  mode=!mode;save();updateModeUI();
  var tb=$('mode-btn');
  if(modeTimer){clearTimeout(modeTimer);clearTimeout(modeTimer2);tb.classList.remove('toggled');tb.textContent='Toggle';tb.style.opacity=''}
  tb.classList.remove('toggled');tb.offsetWidth;
  tb.textContent='';tb.appendChild(mkCheck());
  tb.classList.add('toggled');
  modeTimer=setTimeout(function(){
    tb.style.opacity='0';
    modeTimer2=setTimeout(function(){
      tb.classList.remove('toggled');
      tb.textContent='Toggle';
      tb.style.opacity='';
    },200);
  },1500);
}
function updateModeUI(){var ik=$('mi-keep'),ir=$('mi-rm'),ml=$('ml');if(mode){ik.style.display='none';ir.style.display='';ml.textContent='Remove Picked'}else{ik.style.display='';ir.style.display='none';ml.textContent='Keep Picked'}}
function doCopy(){
  if(!picked)return;
  var ci=$('cb-i'),ck=$('cb-ck'),cl=$('cb-l'),btn=$('copy-btn');
  if(copyTimer){clearTimeout(copyTimer);btn.classList.remove('ok');ci.style.display='';ck.style.display='none';cl.textContent='Copy'}
  navigator.clipboard.writeText(picked).then(function(){
    ci.style.display='none';ck.style.display='';cl.textContent='Copied';
    btn.classList.remove('ok');btn.offsetWidth;btn.classList.add('ok');
    copyTimer=setTimeout(function(){btn.classList.remove('ok');ci.style.display='';ck.style.display='none';cl.textContent='Copy'},800);
  },function(){});
}
$('add-btn').addEventListener('click',function(){
  var v=$('inp').value;if(v.match(/[,\n]/))addBulk(v);else addItem(v);$('inp').value='';$('inp').focus();
});
$('inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();var v=$('inp').value;if(v.match(/[,\n]/))addBulk(v);else addItem(v);$('inp').value=''}
});
$('inp').addEventListener('paste',function(){
  var inp=$('inp');
  setTimeout(function(){var v=inp.value;if(v.match(/[,\n]/)){addBulk(v);inp.value=''}},0);
});
$('pick-btn').addEventListener('click',doPick);
$('mode-btn').addEventListener('click',toggleMode);
$('reset-btn').addEventListener('click',doReset);
$('copy-btn').addEventListener('click',doCopy);
document.addEventListener('keydown',function(e){
  var tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.metaKey||e.ctrlKey||e.altKey||e.shiftKey)return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();doPick()}
  else if(e.key==='c'){e.preventDefault();doCopy()}
  else if(e.key==='p')toggleMode();
  else if(e.key==='r')doReset();
  else if(e.key==='x'){if(items.length>0)removeItem(0)}
  else if(e.key==='/'){e.preventDefault();$('inp').focus()}
  else if(e.key==='t')setTheme(THEMES[(THEMES.indexOf(curTheme())+1)%THEMES.length]);
  else if(e.key==='1'||e.key==='ArrowLeft')window.location.href='/';
  else if(e.key==='2'||e.key==='ArrowRight')window.location.href='/projects';
});
var dragCount=0,overlay=$('drop-overlay');
document.addEventListener('dragenter',function(e){e.preventDefault();dragCount++;if(dragCount===1)overlay.classList.add('active')});
document.addEventListener('dragleave',function(e){e.preventDefault();dragCount--;if(dragCount<=0){dragCount=0;overlay.classList.remove('active')}});
document.addEventListener('dragover',function(e){e.preventDefault()});
document.addEventListener('drop',function(e){
  e.preventDefault();dragCount=0;overlay.classList.remove('active');
  var files=e.dataTransfer.files;
  if(files&&files.length>0){
    for(var i=0;i<files.length;i++){
      (function(file){
        if(file.type&&!file.type.match(/^text\//))return;
        var name=file.name||'';
        if(!file.type&&!name.match(/\.(txt|csv)$/i))return;
        var reader=new FileReader();
        reader.onload=function(ev){addBulk(ev.target.result)};
        reader.readAsText(file);
      })(files[i]);
    }
  }else{var text=e.dataTransfer.getData('text');if(text)addBulk(text)}
});
load();render();updateModeUI();
</script>
</body>
</html>
