<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FAFAFA">
<title>Wrighter</title>
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wrighter">
<meta name="description" content="A minimal, distraction-free plain text editor.">
<meta property="og:title" content="Wrighter">
<meta property="og:description" content="A minimal, distraction-free plain text editor.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(_){}if(t&&t!=='light')document.documentElement.setAttribute('data-theme',t)})()</script>
<link rel="stylesheet" href="/shared/base.css?v=14">
<style>
:root{--sel:rgba(59,130,246,.18);--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace}
html[data-theme="dark"]{--sel:rgba(59,130,246,.28)}
html[data-theme="sepia"]{--sel:rgba(139,115,85,.18)}
html,body{height:100%}
main{min-height:100vh;min-height:100dvh;padding:0 calc(40px + env(safe-area-inset-right,0px)) 0 calc(40px + env(safe-area-inset-left,0px));transition:background .3s}
main.drag{background:rgba(0,0,0,.02);outline:2px dashed var(--t3);outline-offset:-12px}
#editor{display:block;width:100%;height:100dvh;min-height:240px;padding:24px 0 calc(176px + env(safe-area-inset-bottom,0px));border:none;outline:0;resize:none;background:transparent;background-clip:padding-box;color:var(--t1);caret-color:var(--t1);font:400 22px/42px var(--mono);-webkit-overflow-scrolling:touch;scrollbar-gutter:stable;transition:color .3s}
#editor{scrollbar-width:none;-ms-overflow-style:none}
#editor::-webkit-scrollbar{display:none}
#editor::selection{background:var(--sel);color:inherit}.metrics{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:9;display:flex;align-items:center;gap:8px;padding:0 20px calc(86px + env(safe-area-inset-bottom,0px))}
.metric-pill{max-width:none}
.metric-label{display:block;padding:8px clamp(8px,2vw,12px);border-radius:var(--rr);text-align:center;font:500 clamp(.625rem,1.8vw,.75rem)/1 var(--font);color:var(--t2);white-space:nowrap;font-variant-numeric:tabular-nums}
@media(max-width:480px){main{padding:0 calc(28px + env(safe-area-inset-right,0px)) 0 calc(28px + env(safe-area-inset-left,0px))}#editor{height:100dvh}.metrics{gap:6px;padding-inline:14px}}
@media(print){.metrics,nav{display:none!important}main{padding:0}#editor{height:auto;padding:10mm;font:400 12pt/1.8 var(--mono);color:#000;white-space:pre-wrap;word-wrap:break-word}@page{margin:15mm}}
</style>
</head>
<body>
<main id="drop" aria-label="Plain Text Editor" aria-dropeffect="copy">
  <label for="editor" style="position:absolute;left:-9999px">Plain Text Editor</label>
  <textarea id="editor" aria-multiline="true" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" autofocus></textarea>
</main>

<div class="metrics">
  <div class="tabs metric-pill"><output id="words" class="metric-label" aria-live="polite">0 Words</output></div>
  <div class="tabs metric-pill"><output id="letters" class="metric-label" aria-live="polite">0 Characters</output></div>
  <div class="tabs metric-pill"><output id="time" class="metric-label" aria-live="polite">0m 0s</output></div>
</div>

<nav aria-label="Primary">
  <div class="tabs">
    <a href="/">Home</a>
    <a class="active">Wrighter</a>
  </div>
  <div class="tabs"><button id="theme-btn" class="theme-toggle" aria-label="Toggle Theme"></button></div>
</nav>

<script src="/shared/base.js?v=6"></script>
<script>
(()=>{
  'use strict';

  const KEY_TEXT='wrighter:text:v3';
  const KEY_STATE='wrighter:state:v4';
  const DB_NAME='wrighter-db';
  const DB_STORE='kv';
  const LPM=550;
  const SAVE_MS=140;
  const SAVE_TEXT=1;
  const SAVE_STATE=2;
  const CODE_A=65;
  const CODE_Z=90;
  const CODE_a=97;
  const CODE_z=122;
  const CODE_0=48;
  const CODE_9=57;
  const LAT_A=192;
  const LAT_B=214;
  const LAT_C=216;
  const LAT_D=246;
  const LAT_E=248;
  const LAT_F=255;
  const JOIN_APOS=39;
  const JOIN_DASH=45;
  const JOIN_UNDER=95;
  const JOIN_RAPOS=8217;

  const editor=document.getElementById('editor');
  const wordsOut=document.getElementById('words');
  const lettersOut=document.getElementById('letters');
  const timeOut=document.getElementById('time');
  const drop=document.getElementById('drop');

  let rafId=0;
  let beforeInput=0;
  let beforeStart=0;
  let beforeEnd=0;
  let beforeRev=0;
  let dragDepth=0;
  let saveTimer=0;
  let saveMask=0;
  let touched=0;
  let textCache='';
  let textRev=0;
  let words=0;
  let letters=0;
  let nonSpace=0;
  let shownWords=-1;
  let shownLetters=-1;
  let shownSec=-1;
  let storedText='';
  let storedState='';
  let dbPromise=0;
  let dbFailed=false;
  let composing=false;
  let writeToken=0;
  let writeBusy=false;
  let pendingMask=0;
  let pendingText='';
  let pendingState='';
  const oldCounts={w:0,l:0,ns:0};
  const newCounts={w:0,l:0,ns:0};

  const clamp=(n,min,max)=>Math.min(max,Math.max(min,n));
  function getLineStart(v,s){return v.lastIndexOf('\n',s-1)+1}
  function getLineEnd(v,s){var i=v.indexOf('\n',s);return i<0?v.length:i}

  var cachedLH=0;
  function editorLineHeight(){
    if(!cachedLH){var s=getComputedStyle(editor);cachedLH=parseFloat(s.lineHeight)||parseFloat(s.fontSize)*1.5}
    return cachedLH;
  }

  function safeGetLocal(key){
    try{return localStorage.getItem(key);}catch(_){return null;}
  }

  function safeSetLocal(key,value){
    try{localStorage.setItem(key,value);}catch(_){
      try{localStorage.removeItem(key);}catch(e){}
    }
  }

  function clearDb(){
    dbPromise=0;
  }

  function openDb(){
    if(dbPromise)return dbPromise;
    if(dbFailed)return Promise.resolve(null);
    if(!('indexedDB' in window))return Promise.resolve(null);
    dbPromise=new Promise(resolve=>{
      let req;
      try{req=indexedDB.open(DB_NAME,1);}catch(_){resolve(null);return;}
      req.onupgradeneeded=event=>{
        const db=event.target.result;
        if(!db.objectStoreNames.contains(DB_STORE))db.createObjectStore(DB_STORE,{keyPath:'k'});
      };
      req.onsuccess=()=>{
        const db=req.result;
        db.onversionchange=()=>{try{db.close();}catch(_){ }clearDb();};
        db.onclose=clearDb;
        resolve(db);
      };
      req.onerror=()=>resolve(null);
      req.onblocked=()=>resolve(null);
    });
    return dbPromise.then(db=>{
      if(!db){dbPromise=0;dbFailed=true;}
      return db;
    });
  }

  function readDb(key){
    return openDb().then(db=>{
      if(!db)return null;
      return new Promise(resolve=>{
        let req;
        try{req=db.transaction(DB_STORE).objectStore(DB_STORE).get(key);}catch(_){resolve(null);return;}
        req.onsuccess=()=>resolve(req.result?req.result.v:null);
        req.onerror=()=>resolve(null);
      });
    }).catch(()=>null);
  }

  function txDone(tx){
    return new Promise((resolve,reject)=>{
      tx.oncomplete=resolve;
      tx.onabort=()=>reject(tx.error||new Error('Abort'));
      tx.onerror=()=>reject(tx.error||new Error('Error'));
    });
  }

  function scheduleIdle(fn){
    if('requestIdleCallback' in window)return requestIdleCallback(fn,{timeout:600});
    return setTimeout(fn,0);
  }

  function queueDbWrite(key,value){
    if(key===KEY_TEXT){
      pendingText=value;
      pendingMask|=SAVE_TEXT;
    }else if(key===KEY_STATE){
      pendingState=value;
      pendingMask|=SAVE_STATE;
    }else{
      return;
    }
    if(writeToken)return;
    writeToken=scheduleIdle(drainWrites);
  }

  function writeLocalMask(mask,textValue,stateValue){
    if(mask&SAVE_TEXT)safeSetLocal(KEY_TEXT,textValue);
    if(mask&SAVE_STATE)safeSetLocal(KEY_STATE,stateValue);
  }

  async function drainWrites(){
    writeToken=0;
    if(writeBusy)return;
    writeBusy=true;
    while(pendingMask){
      const mask=pendingMask;
      const textValue=pendingText;
      const stateValue=pendingState;
      pendingMask=0;
      const db=await openDb();
      if(!db){
        writeLocalMask(mask,textValue,stateValue);
        continue;
      }
      try{
        const tx=db.transaction(DB_STORE,'readwrite');
        const store=tx.objectStore(DB_STORE);
        if(mask&SAVE_TEXT)store.put({k:KEY_TEXT,v:textValue});
        if(mask&SAVE_STATE)store.put({k:KEY_STATE,v:stateValue});
        await txDone(tx);
      }catch(_){
        clearDb();
        writeLocalMask(mask,textValue,stateValue);
      }
    }
    writeBusy=false;
    if(pendingMask&&!writeToken)writeToken=scheduleIdle(drainWrites);
  }

  function readPersisted(key){
    return readDb(key).then(value=>{
      if(value!==null&&value!==undefined)return String(value);
      const local=safeGetLocal(key);
      return local===null?null:String(local);
    });
  }

  function isLetter(code){
    return(code>=CODE_A&&code<=CODE_Z)||(code>=CODE_a&&code<=CODE_z)||(code>=LAT_A&&code<=LAT_B)||(code>=LAT_C&&code<=LAT_D)||(code>=LAT_E&&code<=LAT_F);
  }

  function isCJK(code){
    return(code>=0x4E00&&code<=0x9FFF)||(code>=0x3400&&code<=0x4DBF)||(code>=0x3040&&code<=0x309F)||(code>=0x30A0&&code<=0x30FF)||(code>=0xAC00&&code<=0xD7AF);
  }

  function isWordCore(code){
    return(code>=CODE_0&&code<=CODE_9)||isLetter(code);
  }

  function isJoiner(code){
    return code===JOIN_APOS||code===JOIN_DASH||code===JOIN_UNDER||code===JOIN_RAPOS;
  }

  function isWordRelated(code){
    return isWordCore(code)||isJoiner(code);
  }

  function countRange(text,start,end,out){
    let w=0;
    let l=0;
    let ns=0;
    let inWord=false;
    for(let i=start;i<end;){
      const code=text.codePointAt(i);
      const step=code>0xFFFF?2:1;
      const letter=isLetter(code);
      const core=letter||(code>=CODE_0&&code<=CODE_9);
      if(code!==10&&code!==13)l++;
      if(code!==10&&code!==13&&code!==32&&code!==9)ns++;
      if(isCJK(code)){
        inWord=false;
        w++;
        i+=step;
        continue;
      }
      if(core){
        if(!inWord){w++;inWord=true;}
        i+=step;
        continue;
      }
      if(inWord&&isJoiner(code)){
        const nc=i+step<end?text.codePointAt(i+step):0;
        if((nc>=CODE_0&&nc<=CODE_9)||isLetter(nc)){i+=step;continue;}
      }
      inWord=false;
      i+=step;
    }
    out.w=w;
    out.l=l;
    out.ns=ns;
  }

  function expandLeft(text,index){
    let i=index;
    while(i>0&&isWordRelated(text.charCodeAt(i-1)))i--;
    return i;
  }

  function expandRight(text,index){
    let i=index;
    const len=text.length;
    while(i<len&&isWordRelated(text.charCodeAt(i)))i++;
    return i;
  }

  function recountAll(text){
    countRange(text,0,text.length,newCounts);
    words=newCounts.w;
    letters=newCounts.l;
    nonSpace=newCounts.ns;
    textCache=text;
    textRev++;
  }

  function applyDelta(next,start,oldEnd,newEnd){
    const prev=textCache;
    const oldL=expandLeft(prev,start);
    const oldR=expandRight(prev,oldEnd);
    const newL=expandLeft(next,start);
    const newR=expandRight(next,newEnd);
    countRange(prev,oldL,oldR,oldCounts);
    countRange(next,newL,newR,newCounts);
    words+=newCounts.w-oldCounts.w;
    letters+=newCounts.l-oldCounts.l;
    nonSpace+=newCounts.ns-oldCounts.ns;
    if(words<0||letters<0||nonSpace<0){recountAll(next);return;}
    textCache=next;
    textRev++;
  }

  function applyFallback(next){
    const prev=textCache;
    if(prev===next)return;
    let start=0;
    const minLen=Math.min(prev.length,next.length);
    while(start<minLen&&prev.charCodeAt(start)===next.charCodeAt(start))start++;
    let oldEnd=prev.length;
    let newEnd=next.length;
    while(oldEnd>start&&newEnd>start&&prev.charCodeAt(oldEnd-1)===next.charCodeAt(newEnd-1)){oldEnd--;newEnd--;}
    applyDelta(next,start,oldEnd,newEnd);
  }

  function suffixEqual(prev,next,oldEnd,newEnd){
    const prevLen=prev.length-oldEnd;
    if(prevLen!==next.length-newEnd)return false;
    for(let i=0;i<prevLen;i++){
      if(prev.charCodeAt(oldEnd+i)!==next.charCodeAt(newEnd+i))return false;
    }
    return true;
  }

  function paint(){
    rafId=0;
    const sec=Math.round(nonSpace*60/LPM);
    if(words!==shownWords){
      shownWords=words;
      wordsOut.textContent=words+(words===1?' Word':' Words');
    }
    if(letters!==shownLetters){
      shownLetters=letters;
      lettersOut.textContent=letters+(letters===1?' Character':' Characters');
    }
    if(sec!==shownSec){
      shownSec=sec;
      timeOut.textContent=Math.floor(sec/60)+'m '+(sec%60)+'s';
    }
  }

  function queuePaint(){
    if(rafId)return;
    rafId=requestAnimationFrame(paint);
  }

  function stateSnapshot(){
    const len=editor.value.length;
    const start=clamp(editor.selectionStart|0,0,len);
    const end=clamp(editor.selectionEnd|0,start,len);
    const lh=editorLineHeight();
    const raw=Math.max(0,Number(editor.scrollTop)||0);
    const snapped=Math.max(0,Math.round(raw/lh)*lh);
    return start+'|'+end+'|'+snapped;
  }

  function persist(mask,hard){
    const writeText=!!(mask&SAVE_TEXT);
    const writeState=!!(mask&SAVE_STATE);
    const value=(writeText||hard)?editor.value:'';
    if(writeText){
      if(value!==storedText){
        storedText=value;
        queueDbWrite(KEY_TEXT,value);
      }
    }
    const stateNow=(writeState||hard)?stateSnapshot():'';
    if(writeState){
      if(stateNow!==storedState){
        storedState=stateNow;
        queueDbWrite(KEY_STATE,stateNow);
      }
    }
    if(hard){
      safeSetLocal(KEY_TEXT,value);
      safeSetLocal(KEY_STATE,stateNow);
    }
  }

  function queuePersist(mask){
    saveMask|=mask;
    if(saveTimer)clearTimeout(saveTimer);
    saveTimer=setTimeout(flush,SAVE_MS,false);
  }

  function flush(hard){
    if(saveTimer){clearTimeout(saveTimer);saveTimer=0;}
    if(!saveMask){
      if(!hard)return;
      saveMask=SAVE_TEXT|SAVE_STATE;
    }
    const mask=saveMask;
    saveMask=0;
    persist(mask,!!hard);
  }

  function setText(text){
    const next=String(text||'').replace(/\r\n?/g,'\n');
    if(next===textCache)return;
    editor.value=next;
    const end=next.length;
    editor.focus();
    editor.setSelectionRange(end,end);
    recountAll(next);
    queuePaint();
    queuePersist(SAVE_TEXT|SAVE_STATE);
    flush(true);
  }

  function isTextFile(file){
    const name=(file&&file.name?file.name:'').toLowerCase();
    const type=(file&&file.type?file.type:'').toLowerCase();
    return type.startsWith('text/')||type==='application/json'||type==='application/xml'||type==='application/javascript'||/\.(txt|text|md|markdown|mdown|mkd|log|csv|tsv|json|jsonl|xml|html|htm|css|js|mjs|cjs|ts|tsx|jsx|vcf|ics|yaml|yml|toml|ini|cfg|conf|env|sh|bash|zsh|fish|bat|cmd|ps1|py|rb|rs|go|java|kt|kts|c|h|cpp|hpp|cs|swift|m|mm|r|pl|pm|lua|php|sql|graphql|gql|svg|tex|bib|rtf|org|rst|adoc|diff|patch|gitignore|gitattributes|editorconfig|prettierrc|eslintrc|babelrc|dockerfile|makefile|cmake|gradle|properties|plist|lock)$/.test(name);
  }

  function hasFiles(dt){
    return !!dt&&Array.from(dt.types||[]).includes('Files');
  }

  function restoreState(raw){
    const parts=raw.split('|');
    const len=editor.value.length;
    const start=clamp(Number(parts[0])||0,0,len);
    const end=clamp(Number(parts[1])||start,start,len);
    const scroll=Math.max(0,Number(parts[2])||0);
    requestAnimationFrame(()=>{
      const lh=editorLineHeight();
      const snapped=Math.max(0,Math.round(scroll/lh)*lh);
      const maxScroll=editor.scrollHeight-editor.clientHeight;
      editor.setSelectionRange(start,end);
      editor.scrollTop=Math.min(snapped,Math.max(0,maxScroll));
    });
  }

  function onInput(){
    if(composing)return;
    touched=1;
    const next=editor.value;
    let applied=false;
    const prev=textCache;
    if(beforeInput&&beforeRev===textRev){
      const start=clamp(beforeStart,0,prev.length);
      const oldEnd=clamp(beforeEnd,start,prev.length);
      const newEnd=clamp(oldEnd+(next.length-prev.length),start,next.length);
      if(start<=next.length&&suffixEqual(prev,next,oldEnd,newEnd)){
        applyDelta(next,start,oldEnd,newEnd);
        applied=true;
      }
    }
    if(!applied)applyFallback(next);
    beforeInput=0;
    queuePaint();
    queuePersist(SAVE_TEXT|SAVE_STATE);
  }

  editor.addEventListener('compositionstart',()=>{composing=true;});
  editor.addEventListener('compositionend',()=>{composing=false;onInput();});

  editor.addEventListener('beforeinput',()=>{
    beforeInput=1;
    beforeRev=textRev;
    beforeStart=editor.selectionStart|0;
    beforeEnd=editor.selectionEnd|0;
  });

  editor.addEventListener('input',onInput);
  editor.addEventListener('scroll',()=>queuePersist(SAVE_STATE),{passive:true});
  editor.addEventListener('keyup',()=>queuePersist(SAVE_STATE));
  editor.addEventListener('click',()=>queuePersist(SAVE_STATE));

  editor.addEventListener('keydown',event=>{
    if(event.key==='Tab'&&!event.shiftKey){
      event.preventDefault();
      const s=editor.selectionStart;
      const e=editor.selectionEnd;
      const v=editor.value;
      editor.value=v.substring(0,s)+'  '+v.substring(e);
      editor.selectionStart=editor.selectionEnd=s+2;
      onInput();
      return;
    }
    if(event.key==='Tab'&&event.shiftKey){
      event.preventDefault();
      const s=editor.selectionStart;
      const v=editor.value;
      const ls=getLineStart(v,s);
      if(v[ls]===' '&&v[ls+1]===' '){
        editor.value=v.substring(0,ls)+v.substring(ls+2);
        editor.selectionStart=editor.selectionEnd=Math.max(ls,s-2);
        onInput();
      }
      return;
    }
    if(event.key==='Enter'){
      const s=editor.selectionStart;
      const v=editor.value;
      const lineStart=getLineStart(v,s);
      const m=v.slice(lineStart,s).match(/^[ \t]*/);
      const indent=m?m[0]:'';
      if(indent){
        event.preventDefault();
        const e=editor.selectionEnd;
        editor.value=v.substring(0,s)+'\n'+indent+v.substring(e);
        editor.selectionStart=editor.selectionEnd=s+1+indent.length;
        onInput();
      }
      return;
    }
    const mod=event.metaKey||event.ctrlKey;
    if(!mod)return;
    if(!event.shiftKey&&!event.altKey&&event.code==='KeyS'){
      event.preventDefault();
      flush(true);
      const blob=new Blob([editor.value],{type:'text/plain'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      const fname=editor.value.trim().split(/\s+/).slice(0,5).join('_').toLowerCase().replace(/[^a-z0-9_]/g,'')||'wrighter';
      a.download=fname+'.txt';
      a.click();
      URL.revokeObjectURL(url);
      return;
    }
    if(event.shiftKey&&!event.altKey&&event.code==='KeyK'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const ls=getLineStart(v,s);
      const le=v.indexOf('\n',s);
      const lineEnd=le<0?v.length:le+1;
      editor.value=v.substring(0,ls)+v.substring(lineEnd);
      editor.selectionStart=editor.selectionEnd=Math.min(ls,editor.value.length);
      onInput();
      return;
    }
    if(event.shiftKey&&!event.altKey&&event.code==='ArrowUp'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const ls=getLineStart(v,s);
      const le=v.indexOf('\n',s);
      if(ls===0)return;
      const prevLs=getLineStart(v,ls-1);
      const prevLine=v.substring(prevLs,ls);
      const curLine=v.substring(ls,le<0?v.length:le+1);
      const atEnd=le<0;
      const swap=atEnd?curLine+'\n'+prevLine.replace(/\n$/,''):curLine+prevLine;
      editor.value=v.substring(0,prevLs)+swap+v.substring(atEnd?v.length:le+1);
      editor.selectionStart=editor.selectionEnd=s-prevLine.length;
      onInput();
      return;
    }
    if(event.shiftKey&&!event.altKey&&event.code==='ArrowDown'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const ls=getLineStart(v,s);
      const le=v.indexOf('\n',s);
      if(le<0)return;
      const nextLe=v.indexOf('\n',le+1);
      const curLine=v.substring(ls,le+1);
      const nextLine=v.substring(le+1,nextLe<0?v.length:nextLe+1);
      const atEnd=nextLe<0;
      const swap=atEnd?nextLine+'\n'+curLine.replace(/\n$/,''):nextLine+curLine;
      editor.value=v.substring(0,ls)+swap+v.substring(atEnd?v.length:nextLe+1);
      editor.selectionStart=editor.selectionEnd=s+nextLine.length+(atEnd?1:0);
      onInput();
      return;
    }
    if(event.shiftKey&&!event.altKey&&event.code==='KeyD'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const ls=getLineStart(v,s);
      const le=getLineEnd(v,s);
      const line=v.substring(ls,le);
      const ins='\n'+line;
      const pos=le;
      editor.value=v.substring(0,pos)+ins+v.substring(pos);
      editor.selectionStart=editor.selectionEnd=s+ins.length;
      onInput();
      return;
    }
    if(!event.shiftKey&&!event.altKey&&event.code==='KeyL'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const ls=getLineStart(v,s);
      const le=v.indexOf('\n',s);
      editor.selectionStart=ls;
      editor.selectionEnd=le<0?v.length:le+1;
      return;
    }
    if(!event.shiftKey&&!event.altKey&&event.code==='Enter'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const pos=getLineEnd(v,s);
      editor.value=v.substring(0,pos)+'\n'+v.substring(pos);
      editor.selectionStart=editor.selectionEnd=pos+1;
      onInput();
      return;
    }
    if(event.shiftKey&&!event.altKey&&event.code==='Enter'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const ls=getLineStart(v,s);
      editor.value=v.substring(0,ls)+'\n'+v.substring(ls);
      editor.selectionStart=editor.selectionEnd=ls;
      onInput();
      return;
    }
    if(!event.shiftKey&&!event.altKey&&event.code==='KeyJ'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const le=v.indexOf('\n',s);
      if(le<0)return;
      const nextNonSpace=v.substring(le+1).match(/^[ \t]*/)[0].length;
      editor.value=v.substring(0,le)+' '+v.substring(le+1+nextNonSpace);
      editor.selectionStart=editor.selectionEnd=le+1;
      onInput();
      return;
    }
    if(!event.shiftKey&&!event.altKey&&event.code==='BracketRight'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const e=editor.selectionEnd;
      const ls=getLineStart(v,s);
      const le=getLineEnd(v,e-1);
      const block=v.substring(ls,le);
      const indented=block.split('\n').map(l=>'  '+l).join('\n');
      editor.value=v.substring(0,ls)+indented+v.substring(le);
      editor.selectionStart=s+2;
      editor.selectionEnd=e+(indented.length-block.length);
      onInput();
      return;
    }
    if(!event.shiftKey&&!event.altKey&&event.code==='BracketLeft'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const e=editor.selectionEnd;
      const ls=getLineStart(v,s);
      const le=getLineEnd(v,e-1);
      const block=v.substring(ls,le);
      const outdented=block.split('\n').map(l=>l.startsWith('  ')?l.substring(2):l.replace(/^[ \t]/,'')).join('\n');
      const diff=block.length-outdented.length;
      if(!diff)return;
      editor.value=v.substring(0,ls)+outdented+v.substring(le);
      const firstLineDiff=block.split('\n')[0].length-outdented.split('\n')[0].length;
      editor.selectionStart=Math.max(ls,s-firstLineDiff);
      editor.selectionEnd=e-diff;
      onInput();
      return;
    }
    if(!event.shiftKey&&!event.altKey&&event.code==='KeyD'){
      event.preventDefault();
      const v=editor.value;
      const s=editor.selectionStart;
      const e=editor.selectionEnd;
      if(s===e){
        const wl=v.substring(0,s).search(/\w+$/);
        const wr=v.substring(s).search(/\W/);
        const ws=wl<0?s:wl;
        const we=wr<0?v.length:s+wr;
        editor.selectionStart=ws;
        editor.selectionEnd=we;
      }
      return;
    }
  });

  drop.addEventListener('dragenter',event=>{
    if(!hasFiles(event.dataTransfer))return;
    event.preventDefault();
    dragDepth++;
    drop.classList.add('drag');
  });

  drop.addEventListener('dragover',event=>{
    if(!hasFiles(event.dataTransfer))return;
    event.preventDefault();
    event.dataTransfer.dropEffect='copy';
  });

  drop.addEventListener('dragleave',event=>{
    if(!hasFiles(event.dataTransfer))return;
    event.preventDefault();
    dragDepth=Math.max(0,dragDepth-1);
    if(!dragDepth)drop.classList.remove('drag');
  });

  drop.addEventListener('drop',async event=>{
    event.preventDefault();
    dragDepth=0;
    drop.classList.remove('drag');
    const dt=event.dataTransfer;
    if(!dt)return;

    const file=Array.from(dt.files||[]).find(isTextFile);
    if(file){try{setText(await file.text());}catch(_){}return;}

    const plain=dt.getData('text/plain');
    if(plain)setText(plain);
  });

  window.addEventListener('dragover',event=>{
    if(hasFiles(event.dataTransfer))event.preventDefault();
  });

  window.addEventListener('drop',event=>{
    if(hasFiles(event.dataTransfer)&&!drop.contains(event.target))event.preventDefault();
  });

  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden')flush(true);
  });
  window.addEventListener('pagehide',()=>flush(true));
  window.addEventListener('beforeunload',()=>flush(true),{capture:true});

  window.addEventListener('storage',event=>{
    if(event.key===KEY_TEXT&&!document.hasFocus()){
      const next=event.newValue;
      if(next!==null&&next!==editor.value){
        editor.value=next;
        storedText=next;
        recountAll(next);
        queuePaint();
      }
    }
  });

  Promise.all([readPersisted(KEY_TEXT),readPersisted(KEY_STATE)]).then(values=>{
    const text=values[0];
    const state=values[1];
    if(!touched&&text!==null){
      editor.value=text;
      storedText=text;
    }
    recountAll(editor.value);
    if(!touched&&state){
      storedState=state;
      restoreState(state);
    }
    editor.focus();
    paint();
  }).catch(()=>{
    recountAll(editor.value);
    paint();
  });

  document.querySelectorAll('nav a').forEach(function(a){
    a.addEventListener('click',function(e){
      if(editor.value.trim()&&!confirm('Leave? Unsaved text will be lost.')){e.preventDefault();e.stopImmediatePropagation();}
    });
  });
  document.querySelector('.tabs a.active').addEventListener('click',e=>{
    e.preventDefault();
    setText('');
  });
})();
</script>
</body>
</html>
