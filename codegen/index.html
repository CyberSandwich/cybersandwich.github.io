<script src="/shared/base.js?v=17"></script>
<script>
var $=function(s){return document.getElementById(s)};

/* Constants */
var EC=['L','M','Q','H'];
var QRSIZES=[32,96,110,170,180,192,256,300,400,500,512,800,900,1000,1024,1080,1200,1500,1600,1800,2000,2048,3000,3600,4000,6000];
var MARGINS=[0,8,16,24,32,48,64];
var FMTS=['PNG','SVG','JPEG'];

/* State */
var qrS={ec:2,sizeIdx:16,marginIdx:4,style:0,fmt:0,exactSz:0};

/* Icons */
var IC={
  shield:'<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  maximize:'<svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><path d="M21 3l-7 7M3 21l7-7"/></svg>',
  crop:'<svg viewBox="0 0 24 24"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>',
  sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
  moon:'<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  clear:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>',
  png:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
  svg:'<svg viewBox="0 0 24 24"><polygon points="12 2 22 12 12 22 2 12"/></svg>',
  jpeg:'<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  reset:'<svg viewBox="0 0 24 24"><path d="M21 2v6h-6M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>'
};
window._cgResetSvg=IC.reset;
window._cgResetInner=IC.reset.replace(/<\/?svg[^>]*>/g,'');
_cg.mkActions('qr');

var FMT_ICONS=[IC.png,IC.svg,IC.jpeg];
var STYLE_ICONS=[IC.sun,IC.moon,IC.clear];

/* Elements */
var qrIn=$('qrIn'),qrC=$('qrC'),qrPv=$('qrPv');

/* Utilities */
var qrCtx=qrC.getContext('2d');
var qrExpC=document.createElement('canvas'),qrExpCtx;
function qrText(){return qrIn.value.trim()||'saputra.co.uk'}
function reGen(force){genQR(force)}

function scanOk(btn,cpBtn,result){
  _base.feedback(btn,'ps-fb','Scanned');
  var val=result.rawValue,display=val.length>40?val.substring(0,37)+'...':val;
  setInput(val);
  _base.copyText(val);
  _base.notify(display,true,function(){_base.copyText(val,function(){_base.feedback(cpBtn,'ok','Copied')})});
}
function scanFail(btn){_base.feedback(btn,'err-fb',_cg.NF);_base.notify(_cg.NF,false)}
function scanBlob(blob,psBtn,cpBtn){
  psBtn.classList.add('ld');psBtn.querySelector('span').textContent='Scanning\u2026';
  scanImage(blob).then(function(r){if(r)scanOk(psBtn,cpBtn,r);else scanFail(psBtn)}).catch(function(){scanFail(psBtn)});
}

/* QR Rendering */
var qrKey='',matKey='',matCache=null;
function getCachedMatrix(text,ec){
  var k=text+'|'+ec;
  if(k===matKey&&matCache)return matCache;
  matKey=k;
  try{matCache=getQRMatrix(text,EC[ec])}catch(e){matCache=null}
  return matCache;
}
function genQR(force){
  var text=qrText();
  var w=qrC.offsetWidth||300;
  var key=text+'|'+qrS.ec+'|'+qrS.style+'|'+qrS.marginIdx+'|'+w;
  if(!force&&key===qrKey)return;
  qrKey=key;
  var qr=getCachedMatrix(text,qrS.ec);
  if(!qr)return;
  var st=_cg.STYLES[qrS.style];
  var dpr=window.devicePixelRatio||2;
  var sz=Math.max(1,Math.round(w*dpr));
  var marginPhys=Math.round(MARGINS[qrS.marginIdx]/w*sz);
  qrC.width=sz;qrC.height=sz;
  _cg.drawQR(qrCtx,qr,st,sz,marginPhys);
  _cg.drawCropMarks(qrC,qrS.style,marginPhys,qrCtx);
}

function hiResQR(){
  var text=qrText();
  var qr=getCachedMatrix(text,qrS.ec);
  if(!qr)return null;
  var st=_cg.STYLES[qrS.style];
  var exportSz=qrS.exactSz||QRSIZES[qrS.sizeIdx];
  var w=qrC.offsetWidth||300;
  var exportMargin=qrS.exactSz?0:Math.round(MARGINS[qrS.marginIdx]/w*exportSz);
  if(!qrExpCtx)qrExpCtx=qrExpC.getContext('2d');
  qrExpC.width=exportSz;qrExpC.height=exportSz;
  _cg.drawQR(qrExpCtx,qr,st,exportSz,exportMargin);
  _cg.quantizeCanvas(qrExpCtx,exportSz,exportSz,!!st.bg);
  return qrExpC;
}

/* QR Matrix: 177px render + center sampling (31K pixels vs 250K at 500px) */
var matC=document.createElement('canvas');
var matCtx=matC.getContext('2d',{willReadFrequently:true});
function getQRMatrix(text,ecLevel){
  var S=177;
  QrCreator.render({text:text,radius:0,ecLevel:ecLevel,fill:'#000',background:'#FFF',size:S,quiet:0},matC);
  var data=new Uint32Array(matCtx.getImageData(0,0,S,S).data.buffer);
  var firstLight=S;
  for(var x=0;x<S;x++){if((data[x]&0xFF)>128){firstLight=x;break}}
  var modPx=firstLight/7;
  var rawCount=S/modPx;
  var bestCount=21,bestDiff=Math.abs(rawCount-21);
  for(var v=1;v<=40;v++){
    var c=4*v+17,d=Math.abs(rawCount-c);
    if(d<bestDiff){bestDiff=d;bestCount=c}
  }
  modPx=S/bestCount;
  var matrix=new Array(bestCount);
  for(var r=0;r<bestCount;r++){
    var row=new Uint8Array(bestCount);
    var py=Math.floor((r+.5)*modPx)*S;
    for(var c=0;c<bestCount;c++){
      row[c]=(data[py+Math.floor((c+.5)*modPx)]&0xFF)<128?1:0;
    }
    matrix[r]=row;
  }
  return {count:bestCount,matrix:matrix};
}

function qrSVG(){
  var text=qrText();
  var st=_cg.STYLES[qrS.style];
  var exportSz=qrS.exactSz||QRSIZES[qrS.sizeIdx];
  var w=qrC.offsetWidth||300;
  var exportMargin=qrS.exactSz?0:Math.round(MARGINS[qrS.marginIdx]/w*exportSz);
  var qr=getCachedMatrix(text,qrS.ec);
  var modSz=(exportSz-2*exportMargin)/qr.count;
  var p=['<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+exportSz+' '+exportSz+'" width="'+exportSz+'" height="'+exportSz+'">'];
  if(st.bg)p.push('<rect width="'+exportSz+'" height="'+exportSz+'" fill="'+st.bg+'"/>');
  p.push('<g fill="'+st.fg+'" shape-rendering="crispEdges">');
  for(var r=0;r<qr.count;r++){
    var c=0;
    while(c<qr.count){
      if(qr.matrix[r][c]){
        var start=c;
        while(c<qr.count&&qr.matrix[r][c])c++;
        p.push('<rect x="'+(exportMargin+start*modSz).toFixed(2)+'" y="'+(exportMargin+r*modSz).toFixed(2)+'" width="'+((c-start)*modSz).toFixed(2)+'" height="'+modSz.toFixed(2)+'"/>');
      }else c++;
    }
  }
  p.push('</g>\n</svg>');
  return p.join('\n');
}

var genQRD=_cg.debounce(genQR,300);
var genQRS=_cg.debounce(function(){genQR();_cg.pvPop(qrC)},80);
qrIn.addEventListener('input',function(){_cg.autoGrow(qrIn);genQRD()});

/* QR Settings */
var qrGroups1=[
  {type:'stepper',icon:IC.shield,steps:[7,15,25,30],def:2,format:function(v){return '~'+v+'% Error Correction'},onChange:function(i){qrS.ec=i;genQRS()}},
  {type:'stepper',icon:IC.crop,steps:MARGINS,def:4,format:function(v){return v+' px Margin'},onChange:function(i){qrS.marginIdx=i;qrS.exactSz=0;genQRS()}},
  {type:'format',icons:STYLE_ICONS,formats:['Light','Dark','Clear'],def:0,hide:function(i){return i===2&&qrS.fmt===2},onChange:function(i){qrS.style=i;_cg.updatePvStyle(qrPv,i);genQRS()}}
];
_cg.initSettings($('qrCh1'),qrGroups1);
var qrGroups2=[
  {type:'format',icons:FMT_ICONS,formats:FMTS,def:0,onChange:function(i){qrS.fmt=i;qrGroups2[1]._row.style.display=i===1?'none':'';if(i===2&&qrS.style===2)_cg.resetGroup(qrGroups1[2]);else qrGroups1[2]._rebuild()}},
  {type:'stepper',icon:IC.maximize,steps:QRSIZES,def:15,format:function(v){return v+' \u00D7 '+v},onChange:function(i){qrS.sizeIdx=i;qrS.exactSz=0}}
];
_cg.initSettings($('qrCh2'),qrGroups2);

$('qrCp').onclick=function(){var c=hiResQR();if(c)_cg.copyCanvas(c,this,qrIn)};
$('qrDl').onclick=function(){
  var btn=this;
  try{
    var svg=qrS.fmt===1?qrSVG():null;
    var canvas=qrS.fmt!==1?hiResQR():null;
    if(!canvas&&!svg){_base.feedback(btn,'err-fb','Error');return}
    _cg.downloadExport(canvas,svg,qrS.fmt,_cg.dlName('qrcode',qrIn),btn);
  }catch(e){_base.feedback(btn,'err-fb','Error')}
};

/* Paste + Scan */
function handlePaste(btn){
  btn.classList.add('ld');btn.querySelector('span').textContent='Reading\u2026';
  var cpBtn=$('qrCp');
  function onScanResult(result){if(result)scanOk(btn,cpBtn,result);else scanFail(btn)}
  function tryImages(){
    if(!navigator.clipboard||!navigator.clipboard.read){_base.feedback(btn,'err-fb','No Access');return}
    navigator.clipboard.read().then(function(items){
      for(var x=0;x<items.length;x++){
        var it=items[x],imgType=null;
        for(var y=0;y<it.types.length;y++){if(it.types[y].indexOf('image/')===0){imgType=it.types[y];break}}
        if(imgType){it.getType(imgType).then(function(blob){scanImage(blob).then(onScanResult).catch(function(){scanFail(btn)})});return}
      }
      _base.feedback(btn,'err-fb',_cg.NF);
    }).catch(function(){_base.feedback(btn,'err-fb','No Access')});
  }
  if(!navigator.clipboard){_base.feedback(btn,'err-fb','No Access');return}
  navigator.clipboard.readText().then(function(text){
    if(text){setInput(text);_base.feedback(btn,'ps-fb','Pasted')}
    else tryImages();
  }).catch(tryImages);
}

function loadJsQR(){
  if(typeof jsQR!=='undefined')return;
  var el=$('jsqr-src');
  if(el){var s=document.createElement('script');s.textContent=el.textContent;document.head.appendChild(s);el.remove();s.remove()}
}
var scanC=document.createElement('canvas');
var scanCtx=scanC.getContext('2d',{willReadFrequently:true});
function decodeImg(img){
  if(!img||!img.width||!img.height)return Promise.resolve(null);
  loadJsQR();
  if(typeof jsQR==='undefined')return Promise.resolve(null);
  var w=img.width,h=img.height,max=800;
  if(w>max||h>max){var s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
  w=Math.max(1,w);h=Math.max(1,h);
  scanC.width=w;scanC.height=h;
  scanCtx.drawImage(img,0,0,w,h);
  var d=scanCtx.getImageData(0,0,w,h);
  var r=jsQR(d.data,d.width,d.height);
  return Promise.resolve(r?{rawValue:r.data}:null);
}
function scanImage(blob){return _cg.scanImage(blob,decodeImg)}

function setInput(text){
  qrIn.value=text;_cg.autoGrow(qrIn);genQR();
}

$('qrPs').onclick=function(){handlePaste(this)};

/* Camera scanning */
var camStream=null,camVideo=null,camWrap=null,camScanning=false,camFacing='environment';
var camCard,camRow,camLbl,camChip;
(function(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return;
  camWrap=document.createElement('div');camWrap.className='settings cam-wrap';camWrap.style.display='none';
  camVideo=document.createElement('video');camVideo.setAttribute('playsinline','');camVideo.setAttribute('autoplay','');camVideo.muted=true;
  camWrap.appendChild(camVideo);
  var anchor=$('qrCh2');
  var card=document.createElement('div');card.className='card settings';
  anchor.parentNode.insertBefore(card,anchor.nextSibling);
  var row=document.createElement('div');row.className='srow';
  var lbl=document.createElement('div');lbl.className='slbl';
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 24 24');
  var p1=document.createElementNS('http://www.w3.org/2000/svg','path');
  p1.setAttribute('d','M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z');
  var c1=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c1.setAttribute('cx','12');c1.setAttribute('cy','13');c1.setAttribute('r','4');
  svg.appendChild(p1);svg.appendChild(c1);lbl.appendChild(svg);
  var sp=document.createElement('span');sp.textContent='Scan';lbl.appendChild(sp);
  row.appendChild(lbl);card.appendChild(row);
  var chipWrap=document.createElement('div');chipWrap.className='schips';chipWrap.style.display='none';
  var chip=document.createElement('button');chip.type='button';chip.className='chip';chip.textContent='Front Camera';
  chip.addEventListener('click',function(e){e.stopPropagation();switchCam()});
  chipWrap.appendChild(chip);row.appendChild(chipWrap);
  camCard=card;camRow=row;camLbl=sp;camChip=chip;chipWrap._wrap=chipWrap;chip._wrap=chipWrap;
  row.addEventListener('click',function(e){if(e.target===chip||e.target===chipWrap)return;if(camScanning)stopCam();else startCam()});
})();
function startCam(){
  camScanning=true;
  camLbl.textContent='Stop';camRow.classList.add('cam-active');
  camCard.parentNode.insertBefore(camWrap,camCard.nextSibling);
  camWrap.style.display='';
  camChip.textContent=camFacing==='environment'?'Front Camera':'Rear Camera';camChip._wrap.style.display='';
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing,width:{ideal:1280},height:{ideal:1280}}}).then(function(stream){
    camStream=stream;camVideo.srcObject=stream;camVideo.play();
    var track=stream.getVideoTracks()[0];
    if(track){try{track.applyConstraints({advanced:[{focusMode:'continuous'}]})}catch(e){}}
    requestAnimationFrame(camLoop);
  }).catch(function(){_base.notify('Camera Access Denied',false);stopCam()});
}
var camLastT=0;
function camLoop(){
  if(!camScanning)return;
  var now=performance.now();
  if(now-camLastT>150&&camVideo.readyState>=2){
    camLastT=now;
    var fn=function(){
      loadJsQR();if(typeof jsQR==='undefined')return Promise.resolve(null);
      var w=camVideo.videoWidth,h=camVideo.videoHeight,max=800;
      if(w>max||h>max){var s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
      w=Math.max(1,w);h=Math.max(1,h);scanC.width=w;scanC.height=h;scanCtx.drawImage(camVideo,0,0,w,h);
      var d=scanCtx.getImageData(0,0,w,h),r=jsQR(d.data,d.width,d.height);
      return Promise.resolve(r?{rawValue:r.data}:null);
    };
    fn().then(function(r){
      if(r&&r.rawValue){
        var val=r.rawValue,display=val.length>40?val.substring(0,37)+'...':val;
        setInput(val);_base.copyText(val);
        var cpBtn=$('qrCp');
        _base.notify(display,true,function(){_base.copyText(val,function(){_base.feedback(cpBtn,'ok','Copied')})});
        stopCam();return;
      }
      if(camScanning)requestAnimationFrame(camLoop);
    }).catch(function(){if(camScanning)requestAnimationFrame(camLoop)});
    return;
  }
  requestAnimationFrame(camLoop);
}
function switchCam(){
  camFacing=camFacing==='environment'?'user':'environment';
  if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}
  if(camVideo)camVideo.srcObject=null;
  camScanning=false;startCam();
}
function stopCam(){
  camScanning=false;camFacing='environment';if(camWrap)camWrap.style.display='none';
  if(camLbl)camLbl.textContent='Scan';
  if(camRow)camRow.classList.remove('cam-active');
  if(camChip)camChip._wrap.style.display='none';
  if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}
  if(camVideo)camVideo.srcObject=null;
}

/* Preview tap-to-copy */
var qrCpBtn=$('qrCp');
qrPv.addEventListener('click',function(){qrCpBtn.click()});

/* Global paste */
document.addEventListener('paste',function(e){
  var psBtn=$('qrPs'),cpBtn=$('qrCp');
  var items=(e.clipboardData||{}).items;
  if(items){
    for(var i=0;i<items.length;i++){
      if(items[i].type.indexOf('image/')===0){
        e.preventDefault();
        scanBlob(items[i].getAsFile(),psBtn,cpBtn);
        return;
      }
    }
  }
  if(document.activeElement===qrIn)return;
  var text=(e.clipboardData||{}).getData('text');
  if(text){e.preventDefault();setInput(text);_base.feedback(psBtn,'ps-fb','Pasted')}
});

/* Reset */
var qrAllGroups=qrGroups1.concat(qrGroups2);
var qrResetCtrl=_base.twoPress($('qrRs'),{
  onConfirm:function(){stopCam();_cg.doResetAll(qrAllGroups,qrIn)}
});
$('qrRs').onclick=function(){qrResetCtrl.press()};

/* Drag and Drop */
_base.setupDragDrop({overlay:$('dropOv'),onDrop:function(files,text){
  var imgFile=null;
  for(var i=0;i<files.length;i++){if(files[i].type.indexOf('image/')===0){imgFile=files[i];break}}
  if(imgFile){
    scanBlob(imgFile,$('qrPs'),$('qrCp'));
  }else if(text){
    setInput(text);
  }else if(files.length){
    _base.notify('Unsupported File Type',false);
  }
}});

_base.onKey({ctrl:{s:function(e){e.preventDefault();$('qrDl').click()},c:function(e){if(!getSelection().toString()){e.preventDefault();$('qrCp').click()}}},'3':function(){location.href='/codegen/barcode/'},ArrowRight:function(){location.href='/codegen/barcode/'},'4':function(){location.href='/codegen/aztec/'},'/':function(e){e.preventDefault();qrIn.focus()},Enter:function(e){if(document.activeElement.classList.contains('preview')){e.preventDefault();document.activeElement.click()}},' ':function(e){if(document.activeElement.classList.contains('preview')){e.preventDefault();document.activeElement.click()}},l:function(){qrGroups1[2]._set(0)},d:function(){qrGroups1[2]._set(1)},c:function(){qrGroups1[2]._set(2)},p:function(){qrGroups2[0]._set(0)},s:function(){if(camRow)camRow.click()},j:function(){qrGroups2[0]._set(2)},'=':function(){qrGroups1[0]._inc()},'-':function(){qrGroups1[0]._dec()},']':function(){qrGroups1[1]._inc()},'[':function(){qrGroups1[1]._dec()},o:function(){var qr=getCachedMatrix(qrText(),qrS.ec);if(qr){qrGroups1[1]._setIdx(0);qrGroups2[1]._setVal(qr.count);qrS.exactSz=qr.count;_base.notify(qr.count+' \u00D7 '+qr.count,true)}},';':function(){qrGroups2[1]._dec()},"'":function(){qrGroups2[1]._inc()},v:function(){$('qrPs').click()},r:function(){$('qrRs').click()},Escape:function(){var n=document.querySelector('.notif');if(n)n.click()}});

/* Resize + Visibility */
var resizeRaf=0;
if(window.ResizeObserver){
  new ResizeObserver(function(){cancelAnimationFrame(resizeRaf);resizeRaf=requestAnimationFrame(reGen)}).observe(document.querySelector('.w'));
}else{window.addEventListener('resize',_cg.debounce(reGen,200))}
document.addEventListener('visibilitychange',function(){if(!document.hidden)requestAnimationFrame(reGen)});
(function watchDPR(){var mq=matchMedia('(resolution:'+devicePixelRatio+'dppx)');mq.addEventListener('change',function(){reGen(true);watchDPR()},{once:true})})();

/* Init */
genQR();
</script>
