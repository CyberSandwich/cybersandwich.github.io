<style>
#bcC{display:block;image-rendering:pixelated;max-width:100%}
.in input[type=text]{

  font:400 1rem/1.5 var(--font);color:var(--t1);background:var(--card);

/* Barcode Preview: scales exportBC for pixel-accurate preview */
var bcKey='';
function genBC(force){
  var text=bcIn.value.trim();
  var fmt=FMT[curFmt];
  if(!text)text=fmt.p;
  var pw=Math.max(1,bcC.parentElement.clientWidth-48)||300;
  var key=text+'|'+curFmt+'|'+bcS.height+'|'+bcS.text+'|'+bcS.style+'|'+bcS.marginIdx+'|'+bcS.sizeIdx+'|'+pw;
  if(!force&&key===bcKey)return;
  bcKey=key;
  try{
    var exp=exportBC();
    if(!exp)throw new Error('Invalid');
    var dpr=window.devicePixelRatio||2;
    var fit=pw/exp.width*dpr;
    var tw=Math.round(exp.width*fit);var th=Math.round(exp.height*fit);
    bcC.width=tw;bcC.height=th;
    bcC.style.width=Math.round(tw/dpr)+'px';
    bcCtx.imageSmoothingEnabled=false;
    bcCtx.drawImage(exp,0,0,tw,th);
    _cg.drawCropMarks(bcC,bcS.style,MARGINS[bcS.marginIdx],bcCtx);
    bcErr.style.display='none';
  }catch(e){
    bcErr.textContent=validateBC(text,fmt);
    bcErr.style.display='';
  }
}
function gtin(d,len){var s=0;for(var i=0;i<len-1;i++)s+=+(d[i])*(3-i%2*2);return(10*Math.ceil(s/10)-s)=== +(d[len-1])}
function validateBC(text,fmt){
  var f=fmt.f,n=fmt.l,len=text.length;
  var noDigit=n+' Requires Numeric Input';
  if(f==='EAN13'){
    if(!/^\d+$/.test(text))return noDigit;
    if(len!==13)return n+' Requires Exactly 13 Digits, Currently '+len;
    if(!gtin(text,13))return n+' Check Digit Mismatch, Verify Last Digit';
  }else if(f==='EAN8'){
    if(!/^\d+$/.test(text))return noDigit;
    if(len!==8)return n+' Requires Exactly 8 Digits, Currently '+len;
    if(!gtin(text,8))return n+' Check Digit Mismatch, Verify Last Digit';
  }else if(f==='UPC'){
    if(!/^\d+$/.test(text))return noDigit;
    if(len!==12)return n+' Requires Exactly 12 Digits, Currently '+len;
    if(!gtin(text,12))return n+' Check Digit Mismatch, Verify Last Digit';
  }else if(f==='UPCE'){
    if(!/^\d+$/.test(text))return noDigit;
    if(len!==8&&len!==6)return n+' Requires 6 Or 8 Digits, Currently '+len;
  }else if(f==='ITF14'){
    if(!/^\d+$/.test(text))return noDigit;
    if(len!==14)return n+' Requires Exactly 14 Digits, Currently '+len;
    if(!gtin(text,14))return n+' Check Digit Mismatch, Verify Last Digit';
  }else if(f==='ITF'){
    if(!/^\d+$/.test(text))return noDigit;
    if(len%2!==0)return n+' Requires An Even Number Of Digits, Currently '+len;
  }else if(f==='MSI'){
    if(!/^\d+$/.test(text))return noDigit;
  }else if(f==='CODE39'){
    if(!/^[0-9A-Z\-. $/+%]+$/.test(text))return n+' Accepts Uppercase A-Z, 0-9, And - . $ / + %';
  }else if(f==='CODE128'){
    if(!/^[\x00-\x7F]+$/.test(text))return n+' Accepts Standard ASCII Characters Only';
  }
  return n+' Cannot Encode This Input';
}

var genBCD=_cg.debounce(genBC,300);
var genBCS=_cg.debounce(function(){genBC();_cg.pvPop(bcC)},80);

function exportBC(){
  loadJsBarcode();
  if(typeof JsBarcode==='undefined')return null;
  var text=bcText();
  var st=_cg.STYLES[bcS.style];
  var targetW=BCSIZES[bcS.sizeIdx];
  var mg=MARGINS[bcS.marginIdx];
  var fmt=FMT[curFmt].f;
  var heights=[50,80,120];
  var probe=document.createElement('canvas');
  try{JsBarcode(probe,text,{format:fmt,width:1,height:1,margin:0,displayValue:false})}catch(e){return null}
  var modCount=probe.width;
  if(!modCount)return null;
  var bw=Math.max(1,Math.floor(Math.max(1,targetW-mg*2)/modCount));
  var scale=bw/2;
  var h=Math.round(heights[bcS.height]*scale);
  var showText=bcS.text===0;
  var fontSize=showText?Math.round(14*scale):0;
  if(!expCtx)expCtx=expC.getContext('2d');
  try{
    JsBarcode(expC,text,{
      format:fmt,width:bw,height:h,
      displayValue:showText,font:FF,fontSize:fontSize,
      textMargin:showText?Math.round(4*scale):0,
      lineColor:st.fg,background:st.bg||'#FFFFFF',
      margin:mg
    });
  }catch(e){return null}
  if(!st.bg){
    var id=expCtx.getImageData(0,0,expC.width,expC.height);
    var d=id.data;
    for(var i=0;i<d.length;i+=4){if(d[i]>250&&d[i+1]>250&&d[i+2]>250)d[i+3]=0}
    expCtx.putImageData(id,0,0);
  }
  return expC;
}

function bcSVG(){
  loadJsBarcode();
  if(typeof JsBarcode==='undefined')return null;
  var text=bcText();
  var st=_cg.STYLES[bcS.style];
  var targetW=BCSIZES[bcS.sizeIdx];
  var mg=MARGINS[bcS.marginIdx];
  var fmt=FMT[curFmt].f;
  var heights=[50,80,120];
  var probe=document.createElement('canvas');
  try{JsBarcode(probe,text,{format:fmt,width:1,height:1,margin:0,displayValue:false})}catch(e){return null}
  var modCount=probe.width;
  if(!modCount)return null;
  var bw=(targetW-mg*2)/modCount;
  var scale=bw/2;
  var h=heights[bcS.height]*scale;
  var showText=bcS.text===0;
  var fontSize=showText?14*scale:0;
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  try{
    JsBarcode(svg,text,{
      format:fmt,width:bw,height:h,
      displayValue:showText,font:'sans-serif',fontSize:fontSize,
      textMargin:showText?Math.round(4*scale):0,
      lineColor:st.fg,background:st.bg||'',
      margin:mg
    });
  }catch(e){return null}
  return new XMLSerializer().serializeToString(svg);
}

/* Paste + Scan */
function handlePaste(btn){
  btn.classList.add('ld');btn.querySelector('span').textContent='Reading\u2026';
  var cpBtn=$('bcCp');
  function onScanResult(result){if(result)scanOk(btn,cpBtn,result);else scanFail(btn)}
  function tryImages(){
    if(!navigator.clipboard||!navigator.clipboard.read){_base.feedback(btn,'err-fb','No Access');return}
    navigator.clipboard.read().then(function(items){
      for(var x=0;x<items.length;x++){
        var it=items[x],imgType=null;
        for(var y=0;y<it.types.length;y++){if(it.types[y].indexOf('image/')===0){imgType=it.types[y];break}}
        if(imgType){it.getType(imgType).then(function(blob){scanImage(blob).then(onScanResult).catch(function(){scanFail(btn)})});return}
      }
      _base.feedback(btn,'err-fb',_cg.NF);
    }).catch(function(){_base.feedback(btn,'err-fb','No Access')});
  }
  if(!navigator.clipboard){_base.feedback(btn,'err-fb','No Access');return}
  navigator.clipboard.readText().then(function(text){
    if(text){setInput(text);_base.feedback(btn,'ps-fb','Pasted')}
    else tryImages();
  }).catch(tryImages);
}

function loadJsBarcode(){
  if(typeof JsBarcode!=='undefined')return;
  var el=$('jsbarcode-src');
  if(el){var s=document.createElement('script');s.textContent=el.textContent;document.head.appendChild(s);el.remove();s.remove()}
}
function loadBCReader(){
  if(typeof Quagga!=='undefined')return;
  var el=$('quagga-src');
  if(el){var s=document.createElement('script');s.textContent=el.textContent;document.head.appendChild(s);el.remove();s.remove()}
}
var scanC=document.createElement('canvas');
var scanCtx=scanC.getContext('2d',{willReadFrequently:true});
function decodeImg(img){
  if(!img||!img.width||!img.height)return Promise.resolve(null);
  return decodeBarcodeImg(img);
}
var decC=document.createElement('canvas');
var decCtx=decC.getContext('2d');
function decodeBarcodeImg(img){
  loadBCReader();
  if(typeof Quagga==='undefined')return Promise.resolve(null);
  var w=img.width,h=img.height,max=800;
  if(w>max||h>max){var sc=max/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc)}
  w=Math.max(1,w);h=Math.max(1,h);
  decC.width=w;decC.height=h;
  decCtx.drawImage(img,0,0,w,h);
  var src=decC.toDataURL();
  return new Promise(function(resolve){
    Quagga.decodeSingle({
      src:src,numOfWorkers:0,locate:true,
      decoder:{readers:['code_128_reader','ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_39_reader','i2of5_reader']}
    },function(result){
      if(result&&result.codeResult)resolve({rawValue:result.codeResult.code});
      else resolve(null);
    });
  });
}
function scanImage(blob){return _cg.scanImage(blob,decodeImg)}

function setInput(text){
  bcIn.value=text;genBC();
}

$('bcPs').onclick=function(){handlePaste(this)};

/* Camera scanning */
var camStream=null,camVideo=null,camWrap=null,camScanning=false,camFacing='environment';
var camCard,camRow,camLbl,camChip;
(function(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return;
  camWrap=document.createElement('div');camWrap.className='settings cam-wrap';camWrap.style.display='none';
  camVideo=document.createElement('video');camVideo.setAttribute('playsinline','');camVideo.setAttribute('autoplay','');camVideo.muted=true;
  camWrap.appendChild(camVideo);
  var anchor=$('bcCh2');
  var card=document.createElement('div');card.className='settings';
  anchor.parentNode.insertBefore(card,anchor.nextSibling);
  var row=document.createElement('div');row.className='srow';
  var lbl=document.createElement('div');lbl.className='slbl';
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 24 24');
  var p1=document.createElementNS('http://www.w3.org/2000/svg','path');
  p1.setAttribute('d','M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z');
  var c1=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c1.setAttribute('cx','12');c1.setAttribute('cy','13');c1.setAttribute('r','4');
  svg.appendChild(p1);svg.appendChild(c1);lbl.appendChild(svg);
  var sp=document.createElement('span');sp.textContent='Scan';lbl.appendChild(sp);
  row.appendChild(lbl);card.appendChild(row);
  var chipWrap=document.createElement('div');chipWrap.className='schips';chipWrap.style.display='none';
  var chip=document.createElement('button');chip.type='button';chip.className='chip';chip.textContent='Front Camera';
  chip.addEventListener('click',function(e){e.stopPropagation();switchCam()});
  chipWrap.appendChild(chip);row.appendChild(chipWrap);
  camCard=card;camRow=row;camLbl=sp;camChip=chip;chipWrap._wrap=chipWrap;chip._wrap=chipWrap;
  row.addEventListener('click',function(e){if(e.target===chip||e.target===chipWrap)return;if(camScanning)stopCam();else startCam()});
})();
function startCam(){
  camScanning=true;
  camLbl.textContent='Stop';camRow.classList.add('cam-active');
  camCard.parentNode.insertBefore(camWrap,camCard.nextSibling);
  camWrap.style.display='';
  camChip.textContent=camFacing==='environment'?'Front Camera':'Rear Camera';camChip._wrap.style.display='';
  navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing,width:{ideal:1920},height:{ideal:1080}}}).then(function(stream){
    camStream=stream;camVideo.srcObject=stream;camVideo.play();
    var track=stream.getVideoTracks()[0];
    if(track){try{track.applyConstraints({advanced:[{focusMode:'continuous'}]})}catch(e){}}
    requestAnimationFrame(camLoop);
  }).catch(function(){_base.notify('Camera Access Denied',false);stopCam()});
}
var camLastT=0;
function camLoop(){
  if(!camScanning)return;
  var now=performance.now();
  if(now-camLastT>150&&camVideo.readyState>=2){
    camLastT=now;
    var fn=function(){
      var w=camVideo.videoWidth,h=camVideo.videoHeight,max=1024;
      if(w>max||h>max){var sc=max/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc)}
      w=Math.max(1,w);h=Math.max(1,h);scanC.width=w;scanC.height=h;
      scanCtx.drawImage(camVideo,0,0,w,h);
      return decodeBarcodeImg(scanC);
    };
    fn().then(function(r){
      if(r&&r.rawValue){
        var val=r.rawValue,display=val.length>40?val.substring(0,37)+'...':val;
        setInput(val);_base.copyText(val);
        var cpBtn=$('bcCp');
        _base.notify(display,true,function(){_base.copyText(val,function(){_base.feedback(cpBtn,'ok','Copied')})});
        stopCam();return;
      }
      if(camScanning)requestAnimationFrame(camLoop);
    }).catch(function(){if(camScanning)requestAnimationFrame(camLoop)});
    return;
  }
  requestAnimationFrame(camLoop);
}
function switchCam(){
  camFacing=camFacing==='environment'?'user':'environment';
  if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}
  if(camVideo)camVideo.srcObject=null;
  camScanning=false;startCam();
}
function stopCam(){
  camScanning=false;camFacing='environment';if(camWrap)camWrap.style.display='none';
  if(camLbl)camLbl.textContent='Scan';
  if(camRow)camRow.classList.remove('cam-active');
  if(camChip)camChip._wrap.style.display='none';
  if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null}
  if(camVideo)camVideo.srcObject=null;
}

/* Preview tap-to-copy */
var bcCpBtn=$('bcCp');
bcPv.addEventListener('click',function(){bcCpBtn.click()});

/* Global paste */
document.addEventListener('paste',function(e){
  var psBtn=$('bcPs'),cpBtn=$('bcCp');
  var items=(e.clipboardData||{}).items;
  if(items){
    for(var i=0;i<items.length;i++){
      if(items[i].type.indexOf('image/')===0){
        e.preventDefault();
        scanBlob(items[i].getAsFile(),psBtn,cpBtn);
        return;
      }
    }
  }
  if(document.activeElement===bcIn)return;
  var text=(e.clipboardData||{}).getData('text');
  if(text){e.preventDefault();setInput(text);_base.feedback(psBtn,'ps-fb','Pasted')}
});

/* Reset */
var bcAllGroups=bcGroups1.concat(bcGroups2);
var bcResetCtrl=_base.twoPress($('bcRs'),{
  onConfirm:function(){stopCam();_cg.doResetAll(bcAllGroups,bcIn)}
});
$('bcRs').onclick=function(){bcResetCtrl.press()};

/* Drag and Drop */
_base.setupDragDrop({overlay:$('dropOv'),onDrop:function(files,text){
  var imgFile=null;
  for(var i=0;i<files.length;i++){if(files[i].type.indexOf('image/')===0){imgFile=files[i];break}}
  if(imgFile){
    scanBlob(imgFile,$('bcPs'),$('bcCp'));
  }else if(text)setInput(text);
  else if(files.length)_base.notify('Unsupported File Type',false);
}});

_base.onKey({ctrl:{s:function(e){e.preventDefault();$('bcDl').click()},c:function(e){if(!getSelection().toString()){e.preventDefault();$('bcCp').click()}}},'2':function(){location.href='/codegen/'},ArrowLeft:function(){location.href='/codegen/'},'4':function(){location.href='/codegen/aztec/'},ArrowRight:function(){location.href='/codegen/aztec/'},'/':function(e){e.preventDefault();bcIn.focus()},Enter:function(e){if(document.activeElement.classList.contains('preview')){e.preventDefault();document.activeElement.click()}},' ':function(e){if(document.activeElement.classList.contains('preview')){e.preventDefault();document.activeElement.click()}},l:function(){bcGroups1[3]._set(0)},d:function(){bcGroups1[3]._set(1)},c:function(){bcGroups1[3]._set(2)},p:function(){bcGroups2[0]._set(0)},s:function(){if(camRow)camRow.click()},j:function(){bcGroups2[0]._set(2)},']':function(){bcGroups1[2]._inc()},'[':function(){bcGroups1[2]._dec()},h:function(){bcGroups1[0]._next()},';':function(){bcGroups2[1]._dec()},"'":function(){bcGroups2[1]._inc()},v:function(){$('bcPs').click()},r:function(){$('bcRs').click()},Escape:function(){var n=document.querySelector('.notif');if(n)n.click()}});

/* Resize + Visibility */
var resizeRaf=0;
if(window.ResizeObserver){
  new ResizeObserver(function(){cancelAnimationFrame(resizeRaf);resizeRaf=requestAnimationFrame(reGen)}).observe(document.querySelector('.w'));
}else{window.addEventListener('resize',_cg.debounce(reGen,200))}
document.addEventListener('visibilitychange',function(){if(!document.hidden)requestAnimationFrame(reGen)});
(function watchDPR(){var mq=matchMedia('(resolution:'+devicePixelRatio+'dppx)');mq.addEventListener('change',function(){reGen(true);watchDPR()},{once:true})})();

/* Init */
genBC();
